name: Automation report ingest

on:
  repository_dispatch:
    types:
      - automation-work-status
      - automation-dashboard
      - automation-dashboard-clear

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply automation API update
        run: node automation-report/scripts/apply-automation-api-update.mjs
      - name: Commit dashboard snapshot
        run: |
          if git diff --quiet -- api/automation/dashboard.json; then
            echo "No dashboard changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/automation/dashboard.json
          git commit -m "Update automation report dashboard API snapshot"
          git push
