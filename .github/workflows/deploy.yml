# GitHub Pages: with "Deploy from a branch" (Settings → Pages),
# the site is published automatically from the master branch root.
# This workflow runs on push; no Vercel or external deploy step.
name: CI

on:
  push:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: automation-report/package-lock.json
      - name: Build GitHub Pages report bundle
        working-directory: automation-report
        run: |
          npm ci
          npm run build:pages
      - name: Verify report export exists
        run: test -f report/index.html
