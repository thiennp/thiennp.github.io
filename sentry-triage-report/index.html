<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHECK24 Energie Sentry Triage History</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff8f1;
      --panel: #fffdfb;
      --text: #28223d;
      --muted: #71657f;
      --line: #eadfd6;
      --accent: #7d55d6;
      --accent-soft: #eee8ff;
      --mint: #e5f7ef;
      --peach: #fde9e2;
      --sky: #e5f1ff;
      --ok: #2f7358;
      --warn: #8d5a23;
      --danger: #9d3737;
      --shadow: 0 10px 30px rgba(40, 34, 61, 0.08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      min-width: 0;
    }

    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 1px 0 rgba(40, 34, 61, 0.04);
      padding: 16px 32px;
      max-width: 100%;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    main {
      padding: 16px 32px 36px;
      max-width: 100%;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
      color: var(--text);
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      max-width: 900px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      white-space: normal;
    }

    .live-indicator::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.75;
    }

    .live-indicator[data-state="live"] {
      border-color: #b6dfcc;
      background: var(--mint);
      color: var(--ok);
    }

    .live-indicator[data-state="waiting"] {
      border-color: #f4cdbf;
      background: var(--peach);
      color: var(--warn);
    }

    .live-indicator[data-state="offline"] {
      border-color: #edb9ac;
      background: var(--peach);
      color: var(--danger);
    }

    .header-actions {
      display: flex;
      flex: 0 0 auto;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      max-width: 100%;
    }

    .update-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1px solid #6d48c1;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
      padding: 6px 11px;
      white-space: normal;
    }

    .update-button:hover {
      background: #6845ba;
    }

    .update-button:disabled {
      border-color: var(--line);
      background: #eee8df;
      color: var(--muted);
      cursor: wait;
    }

    .update-status {
      flex: 1 1 260px;
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      max-width: 340px;
      overflow-wrap: anywhere;
      text-align: right;
    }

    .update-status.status-blocked {
      color: var(--danger);
    }

    .update-status.status-done {
      color: var(--ok);
    }

    .update-status.status-active {
      color: var(--warn);
    }

    .workflow-panel {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto 12px;
      border: 1px solid #c9b8f0;
      border-radius: 8px;
      background: var(--accent-soft);
      box-shadow: var(--shadow);
      padding: 10px 12px;
    }

    .workflow-panel.workflow-visible {
      display: grid;
    }

    .workflow-copy {
      display: grid;
      gap: 3px;
      max-width: 100%;
    }

    .workflow-kicker {
      color: var(--accent);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .workflow-title,
    .workflow-message {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .workflow-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
    }

    .workflow-message {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .workflow-link {
      justify-self: end;
      border: 1px solid #c9b8f0;
      border-radius: 999px;
      background: var(--panel);
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .overview {
      display: grid;
      grid-template-columns: minmax(320px, 0.7fr) minmax(420px, 1.3fr);
      gap: 12px;
      align-items: start;
      max-width: 100%;
      margin-bottom: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 2fr) repeat(4, minmax(150px, 1fr));
      gap: 12px;
      margin: 12px 0 14px;
      max-width: 100%;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      padding: 8px 10px;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(125, 85, 214, 0.14);
    }

    .toggle-filter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      padding: 8px 10px;
      user-select: none;
    }

    .toggle-filter input {
      flex: 0 0 auto;
      width: 16px;
      height: 16px;
      min-height: 0;
      margin: 0;
      accent-color: var(--accent);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      align-content: start;
      gap: 8px;
      margin: 0;
      max-width: 100%;
    }

    .stat {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      min-height: 34px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      padding: 6px 10px;
      box-shadow: 0 3px 12px rgba(40, 34, 61, 0.04);
      text-align: left;
      white-space: normal;
    }

    .stat strong {
      font-size: 15px;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .stat:hover,
    .stat:focus-visible {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .stat[aria-pressed="true"] {
      border-color: #c8b9f5;
      background: var(--accent-soft);
      color: #5c3fad;
    }

    .action-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      max-width: 100%;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    #sentryScopePanel {
      grid-column: 1 / -1;
      width: 100%;
      display: grid;
      gap: 8px;
    }

    .source-scope-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      max-width: 100%;
      padding: 0 2px;
    }

    .source-scope-title,
    .source-scope-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      list-style: none;
      margin: 0;
      padding: 9px 12px;
    }

    .panel-heading::-webkit-details-marker {
      display: none;
    }

    .panel-heading::before {
      content: "+";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .action-panel[open] .panel-heading::before {
      content: "-";
    }

    .panel-title {
      margin: 0;
      flex: 1 1 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .panel-heading span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .panel-current-work {
      display: inline-flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      max-width: min(56vw, 620px);
      border: 1px solid #c9b8f0;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 9px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: none;
    }

    .panel-current-work[hidden] {
      display: none;
    }

    .panel-current-work.status-blocked {
      border-color: #edb9ac;
      background: var(--peach);
      color: var(--danger);
    }

    .panel-current-work.status-done {
      border-color: #b6dfcc;
      background: var(--mint);
      color: var(--ok);
    }

    .action-list {
      display: grid;
      gap: 8px;
      max-width: 100%;
      border-top: 1px solid var(--line);
      padding: 10px 12px 12px;
    }

    .action-card {
      display: grid;
      grid-template-columns: 6px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 8px 10px;
      max-width: 100%;
    }

    .action-marker {
      width: 6px;
      height: 100%;
      min-height: 34px;
      border-radius: 999px;
      background: var(--accent);
    }

    .action-card.action-blocked .action-marker,
    .item.item-blocked {
      border-color: #edb9ac;
    }

    .action-card.action-blocked .action-marker {
      background: var(--danger);
    }

    .action-card.action-active .action-marker {
      background: var(--warn);
    }

    .action-card.action-done .action-marker {
      background: var(--ok);
    }

    .action-card.action-working {
      border-color: #c9b8f0;
      background: #fbf8ff;
    }

    .action-card.action-working .action-marker {
      background: var(--accent);
    }

    .action-main {
      display: grid;
      gap: 4px;
      max-width: 100%;
    }

    .action-title {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .action-context,
    .action-copy {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .source-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 8px;
      max-width: 100%;
      overflow: visible;
      padding: 0;
    }

    .source-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 9px 10px;
      max-width: 100%;
      overflow: hidden;
    }

    .source-card.source-working {
      border-color: #c9b8f0;
      background: #fbf8ff;
      box-shadow: 0 0 0 3px rgba(125, 85, 214, 0.14);
    }

    .source-card header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 6px;
      padding: 0;
      background: transparent;
      color: inherit;
    }

    .source-key {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .source-title {
      margin: 0;
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .source-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .source-badge {
      display: inline-flex;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.25;
    }

    .source-working-badge {
      border: 1px solid #c9b8f0;
      background: #fff;
    }

    .source-warning {
      grid-column: 1 / -1;
      border-color: #edb9ac;
      background: #fff7f5;
    }

    .action-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 6px;
      max-width: 100%;
    }

    .action-empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      max-width: 100%;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .item.item-active {
      border-color: #f4cdbf;
      background: #fffaf5;
    }

    .item.item-working {
      border-color: #c9b8f0;
      background: #fbf8ff;
      box-shadow: 0 0 0 3px rgba(125, 85, 214, 0.14), var(--shadow);
    }

    .item.item-working .item-summary {
      background: rgba(238, 232, 255, 0.72);
    }

    .working-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      margin-top: 8px;
      border: 1px solid #c9b8f0;
      border-radius: 999px;
      background: var(--panel);
      color: var(--accent);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.35;
      padding: 4px 8px;
    }

    .item.item-done {
      border-color: #b6dfcc;
      background: #fbfffc;
    }

    .item.item-blocked {
      border-color: #edb9ac;
      background: #fff8f5;
    }

    .item-summary {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      list-style: none;
      max-width: 100%;
    }

    .item-summary::-webkit-details-marker {
      display: none;
    }

    .item[open] .item-summary {
      border-bottom: 1px solid var(--line);
    }

    .item-summary:hover {
      background: rgba(238, 232, 255, 0.42);
    }

    .item-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      margin-top: 1px;
    }

    .item-toggle::before {
      content: "+";
    }

    .item[open] .item-toggle::before {
      content: "-";
    }

    .item-heading {
      display: grid;
      gap: 7px;
      max-width: 100%;
    }

    .summary-actions {
      display: flex;
      justify-content: flex-end;
      min-width: 0;
      max-width: 100%;
    }

    .item-status {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .title-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      max-width: 100%;
    }

    .title {
      flex: 1 1 280px;
      margin: 0;
      font-size: 17px;
      overflow-wrap: anywhere;
    }

    .summary-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 8px;
      max-width: 100%;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .summary-line-title {
      align-items: baseline;
    }

    .summary-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .summary-title {
      flex: 1 1 280px;
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .summary-title:hover {
      color: var(--accent);
    }

    .summary-link {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .summary-muted {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .summary-tickets {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 5px;
      max-width: 100%;
    }

    .pre-badge {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      max-width: 100%;
      border: 1px solid #c8b9f5;
      border-radius: 5px;
      background: var(--accent-soft);
      color: #5c3fad;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      padding: 3px 6px;
    }

    .primary-action {
      flex: 0 1 auto;
      max-width: 180px;
      font-weight: 700;
    }

    .env-matrix {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 10px;
      margin-top: 8px;
      max-width: 100%;
    }

    .env-group {
      display: grid;
      grid-template-columns: 38px repeat(3, 22px);
      gap: 3px;
      align-items: center;
    }

    .env-group.env-check {
      grid-template-columns: 42px repeat(2, 22px);
    }

    .env-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
    }

    .env-cell {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--panel);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .env-cell.env-empty {
      opacity: 0.38;
    }

    .env-key-long {
      display: none;
    }

    .item-detail {
      padding: 16px 16px 20px;
      background: var(--panel);
      max-width: 100%;
    }

    .item-detail > .meta {
      margin-bottom: 12px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      max-width: 100%;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #5c3fad;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      overflow-wrap: anywhere;
      text-align: left;
      white-space: normal;
    }

    a.pill,
    a.status-pill {
      text-decoration: none;
    }

    a.pill:hover,
    a.status-pill:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      text-decoration: none;
    }

    .meta-text {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      max-width: 100%;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.35;
      overflow-wrap: anywhere;
      text-align: left;
      white-space: normal;
    }

<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>CHECK24 Energie Sentry Triage</h1>
      </div>
      <div class="header-actions">
        <button class="update-button" id="manualUpdateButton" type="button">Update Report</button>
        <span class="live-indicator" id="liveStatus" data-state="waiting">Connecting</span>
        <span class="update-status" id="manualUpdateStatus">Manual update ready</span>
      </div>
    </div>
  </header>

  <main>
    <div class="overview">
      <div class="stats" id="stats" aria-label="Status shortcuts"></div>
      <details class="action-panel" id="actionQueuePanel">
        <summary class="panel-heading">
          <span class="panel-title" id="actionQueueTitle">Action Queue</span>
          <span class="panel-current-work" id="currentWorkSummary" hidden></span>
          <span id="actionQueueCount"></span>
        </summary>
        <div class="action-list" id="actionQueue"></div>
      </details>
      <section id="sentryScopePanel" aria-label="Sentry Source Scope">
        <div class="source-scope-heading">
          <span class="source-scope-title">Sentry Source Scope</span>
          <span class="source-scope-count" id="sentryScopeCount">Not verified</span>
        </div>
        <div class="source-list" id="sentryScopeList"></div>
      </section>
    </div>

    <p class="note">
      Live data source: <code>report-data.json</code>. No report data is stored in this app shell.
    </p>
  </main>

  <script>
    let lastUpdated = '';
    let triageItems = [];
    let statusByPre = {};
    let sentryScopeItems = [];
    let sentrySourceVerification = {};
    let workflowState = {};
    let activeClaudeEvaluationPre = '';
    let claudeEvaluationsByPre = {};

    const repoLabels = {
      'enrg-web-frontend': 'Web Frontend',
      'enrg-energymodule': 'EnergyModule',
      'enrg-energycenter-rev': 'EnergyCenter REV',
      'enrg-tarifvergleich': 'Tarifvergleich'
    };

    const reviewerSlackUrls = {
      'Aleksandar Jaksic': 'https://grid-check24.enterprise.slack.com/team/U01C3GT9Q6L',
      'Andreas Buchenrieder': 'https://grid-check24.enterprise.slack.com/team/U07UK6GT6N6',
      'Daria Honcharuk': 'https://grid-check24.enterprise.slack.com/team/U07NC54458Q',
      'Hamed Okhovvat': 'https://grid-check24.enterprise.slack.com/team/U06JXEUBQ0N',
      'Hassan Farooq': 'https://grid-check24.enterprise.slack.com/team/UGAD7ELQK',
      'Jan Herman': 'https://grid-check24.enterprise.slack.com/team/U034FUFT56F',
      'Martin Schwarzböck Pino': 'https://grid-check24.enterprise.slack.com/team/U04QTP92AKA',
      'Viktor Brusylovets': 'https://grid-check24.enterprise.slack.com/team/U01KKMQ4ZC6'
    };

    const jiraUrl = (pre) => `https://c24-energie.atlassian.net/browse/${pre}`;
    const repoUrl = (repo) => `https://bitbucket.org/check24/${repo}`;
    const isPrReference = (value) => /^\d+$/.test(String(value ?? ''));
    const prUrl = (item) => isPrReference(item.pr) ? `https://bitbucket.org/check24/${item.repo}/pull-requests/${item.pr}` : `${repoUrl(item.repo)}/pull-requests/`;
    const SENTRY_ISSUES_URL = 'https://check24-energie.sentry.io/issues/';
    const sentrySearchUrl = (key) => `https://check24-energie.sentry.io/issues/?query=${encodeURIComponent(key)}`;
    const sentryUrlFor = (item) => item.sentryUrl || (item.sentryKey ? sentrySearchUrl(item.sentryKey) : SENTRY_ISSUES_URL);
    const commentStatusFor = (comment) => comment.status || (comment.answer ? 'Answered' : 'Open');
    const commentUrlFor = (item, comment) => comment.url || (comment.id ? `${prUrl(item)}#comment-${encodeURIComponent(comment.id)}` : prUrl(item));

    const scalarText = (value) => {
      if (value === null || value === undefined) {
        return '';
      }
      if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') {
        return String(value);
      }
      return '';
    };
    const normalize = (value) => scalarText(value).toLowerCase();
    const firstPresent = (...values) => values.find((value) => scalarText(value).trim());
    const isAssignedAwaySentry = (item, status = getStatus(item)) => {
      const scopeValues = [
        status.scopeStatus,
        item.scopeStatus,
        status.sentryScope,
        item.sentryScope,
        status.sentryScopeStatus,
        item.sentryScopeStatus,
        status.reason,
        item.reason
      ].map(normalize);
      return Boolean(status.outOfScope || item.outOfScope || status.sentryOutOfScope || item.sentryOutOfScope) ||
        scopeValues.some((value) => value === 'out-of-scope' || value === 'out-of-scope-not-in-union');
    };
    const hasPositiveWord = (value, word) => {
      const normalized = normalize(value);
      const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return new RegExp(`\\b${escaped}\\b`).test(normalized) &&
        !new RegExp(`\\b(?:not|no)\\s+${escaped}\\b`).test(normalized);
    };
    const hasNegativeWord = (value, word) => {
      const normalized = normalize(value);
      const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return new RegExp(`\\b(?:not|no)\\s+${escaped}\\b`).test(normalized);
    };
    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
    const getStatus = (item) => statusByPre[item.pre] ?? {
      jira: 'Unknown',
      jiraCategory: 'unknown',
      pr: 'UNKNOWN',
      sentry: 'unknown'
    };
    const prWorkflowState = (item = {}, status = getStatus(item)) => {
      const explicit = firstPresent(status.prState, status.prStatus, item.prState, item.prStatus, '');
      if (explicit) {
        return normalize(explicit);
      }
      const raw = firstPresent(status.pr, item.pr, '');
      return /^[a-z\s]+$/i.test(String(raw).trim()) ? normalize(raw) : '';
    };
    const workflowIsVisible = () => {
      const status = normalize(workflowState.status);
      return Boolean(
        status &&
        status !== 'idle' &&
        (
          workflowState.step ||
          workflowState.phase ||
          workflowState.title ||
          workflowState.message ||
          workflowState.pre ||
          workflowState.sentryKey ||
          workflowState.sentryIssueId ||
          workflowState.url
        )
      );
    };
    const workflowStepLabel = () => firstPresent(
      workflowState.phase,
      workflowState.title,
      workflowState.step,
      'Workflow update'
    );
    const workflowTargetLabel = () => firstPresent(
      workflowState.pre,
      workflowState.sentryKey,
      workflowState.sentryIssueId,
      workflowState.repo && workflowState.pr ? `${workflowState.repo} #${workflowState.pr}` : '',
      workflowState.repo,
      'global'
    );
    const workflowStatusClass = () => {
      const status = normalize(workflowState.status);
      if (status.includes('block') || status.includes('fail') || status.includes('error')) {
        return 'status-blocked';
      }
      if (status.includes('success') || status.includes('done') || status.includes('complete')) {
        return 'status-done';
      }
      return 'status-active';
    };
    const workflowIsCompleted = () => {
      const status = normalize(workflowState.status);
      return status.includes('success') || status.includes('done') || status.includes('complete');
    };
    const workflowIsActiveTarget = () => workflowIsVisible() && !workflowIsCompleted();
    const normalizedWorkflowUrl = () => normalize(workflowState.url || '');
    const workflowMatchesSentryIdentity = (candidate) => {
      const workflowSentryKey = normalize(workflowState.sentryKey);

        unavailable: ['phpcs could not run', 'phpunit/phpcs could not run', 'phpcs unavailable', 'phpcs remain unavailable', 'phpcs remains unavailable', 'phpstan/phpunit/phpcs/psalm remain unavailable', 'vendor/bin/phpcs is missing', 'vendor/bin/phpcs missing']
      });
      addFromText('PhpStan', {
        mentions: ['phpstan'],
        passed: [/phpstan[^;]*passed/],
        failed: [/phpstan[^;]*failed/],
        unavailable: ['phpstan unavailable', 'phpstan remain unavailable', 'phpstan remains unavailable', 'phpstan/phpunit unavailable', 'phpstan/phpunit/phpcs/psalm remain unavailable']
      });
      addFromText('Psalm', {
        mentions: ['psalm'],
        passed: [/psalm[^;]*passed/],
        failed: [/psalm[^;]*failed/],
        unavailable: ['psalm unavailable', 'psalm remain unavailable', 'psalm remains unavailable', 'phpstan/phpunit/phpcs/psalm remain unavailable']
      });
      if (!fields.length && text.includes('see pr for exact command output')) {
        addStatus('Verification', 'See PR');
      }
      if (!fields.length && text) {
        addStatus('Verification', 'Recorded');
      }
      return fields;
    };
    const renderVerification = (item) => {
      const fields = deriveVerificationStatus(item);
      if (!fields.length) {
        return '';
      }
      const chips = fields.map(({ label, status }) => (
        `<span class="status-pill ${detailTone(status)}">${label}: ${status}</span>`
      )).join('');
      return `
        <section class="verification section">
          <h3>Verification</h3>
          <div class="status-row">${chips}</div>
        </section>
      `;
    };

    const renderActionLinks = (links) => {
      const seen = new Set();
      return (links ?? [])
        .filter((link) => {
          if (!link.href || seen.has(link.href)) {
            return false;
          }
          seen.add(link.href);
          return true;
        })
        .map((link) => `<a class="pill" href="${link.href}" target="_blank" rel="noreferrer">${escapeHtml(link.label)}</a>`)
        .join('');
    };
    const renderItemRefreshButton = (item) => `
      <button class="item-refresh-button" type="button" data-refresh-pre="${escapeHtml(item.pre)}" data-refresh-title="${escapeHtml(item.title)}" title="Refresh this item from PR, Sentry, Jira, Jenkins, staging, and release sources">Refresh</button>
    `;
    const renderClaudeEvaluateButton = (item) => `
      <button class="item-evaluate-button" type="button" data-evaluate-pre="${escapeHtml(item.pre)}" aria-expanded="${activeClaudeEvaluationPre === item.pre ? 'true' : 'false'}" title="Explain this issue history in Vietnamese and suggest the next action">Evaluate with Claude</button>
    `;

    const renderNextAction = (item) => {
      const action = deriveNextAction(item);
      if (action.priority > 7) {
        return '';
      }
      return `
        <section class="next-action ${actionToneClass(action)}">
          <div>
            <strong>${escapeHtml(action.title)}</strong>
            <p>${escapeHtml(action.body)}</p>
          </div>
          <div class="action-links">${renderActionLinks(action.links)}</div>
        </section>
      `;
    };

    const compactText = (value) => scalarText(value).replace(/\s+/g, ' ').trim();
    const firstCompactText = (...values) => compactText(firstPresent(...values));
    const uniqueTexts = (values) => {
      const seen = new Set();
      return values
        .map(compactText)
        .filter(Boolean)
        .filter((value) => {
          const key = normalize(value);
          if (seen.has(key)) {
            return false;
          }
          seen.add(key);
          return true;
        });
    };
    const formatViTime = (value) => {
      if (!value) {
        return '';
      }
      try {
        return new Intl.DateTimeFormat('vi-VN', {
          dateStyle: 'medium',
          timeStyle: 'short'
        }).format(new Date(value));
      } catch (_error) {
        return value;
      }
    };
    const viValue = (value, fallback = 'chưa có dữ liệu') => compactText(value) || fallback;
    const renderViBullets = (items) => uniqueTexts(items)
      .map((item) => `<li>${escapeHtml(item)}</li>`)
      .join('');
    const summarizeCommentsVi = (item) => {
      if (!Array.isArray(item.prComments) || !item.prComments.length) {
        return '';
      }
      const openCount = item.prComments.filter((comment) => {
        const status = normalize(commentStatusFor(comment));
        return status && !status.includes('resolved') && !status.includes('answered');
      }).length;
      return openCount
        ? `PR có ${item.prComments.length} bình luận được ghi nhận, trong đó còn ${openCount} bình luận cần chú ý.`
        : `PR có ${item.prComments.length} bình luận được ghi nhận và hiện đều đã được trả lời hoặc đánh dấu resolved.`;
    };
    const nextActionVi = (item, status, action) => {
      const prState = normalize(firstPresent(status.prState, status.prStatus, item.prState, item.prStatus, ''));
      const rawPrValue = firstPresent(item.pr, item.prNumber, status.pr, status.prNumber, '');
      const hasRealPr = isPrReference(rawPrValue);
      const jiraStatus = firstCompactText(status.jiraStatus, status.jira, item.jiraStatus, item.jira);
      const jenkins = firstCompactText(jenkinsStatusValue(status.latestJenkinsBuild || item.latestJenkinsBuild), status.jenkins, item.jenkins);
      const sonar = firstCompactText(status.sonar, item.sonar, status.sonarState, item.sonarState);
      const staging = firstCompactText(status.staging, item.staging, status.stagingResult, item.stagingResult);
      if (!hasRealPr && item.cursorHandoffPath) {
        return `Chạy Cursor với /agent-fix-bug theo handoff ${item.cursorHandoffPath}, tạo PR mới cho ${item.pre}, rồi quay lại report để refresh Jira/PR/Sentry.`;
      }
      if (prState === 'open') {
        if (!isPassed(sonar) && normalize(sonar).includes('not reported')) {
          return `Giữ PR #${rawPrValue} ở trạng thái chờ: Jenkins đã có dữ liệu, nhưng Sonar chưa được report cho head hiện tại. Bước tiếp theo là kiểm tra/refresh Sonar hoặc xác nhận vì sao không có quality gate trước khi staging.`;
        }
        if (!isPassed(jenkins)) {
          return `Tập trung vào PR #${rawPrValue}: Jenkins hiện chưa pass (${jenkins || 'chưa rõ'}). Kiểm tra build log trước khi staging.`;
        }
        if (!isPassed(sonar)) {
          return `Tập trung vào PR #${rawPrValue}: Sonar hiện chưa pass (${sonar || 'chưa rõ'}). Xử lý quality gate trước khi staging.`;
        }
        if (normalize(staging).includes('blocked') || !hasPositiveWord(staging, 'merged')) {
          return `PR #${rawPrValue} đã sẵn sàng hơn về CI; bước tiếp theo là staging an toàn, smoke test, rồi mới chuyển Jira sang In Test nếu evidence ổn.`;
        }
      }
      if (isMergedPr(status, item) && normalize(status.sentry || item.sentryStatus || item.sentry).includes('unresolved')) {
        return `Không sửa PR cũ đã merged. Vì Sentry vẫn unresolved, hãy dùng Cursor handoff/follow-up để tạo fix mới hoặc xác nhận release/staging còn thiếu trước khi resolve Sentry.`;
      }
      if (normalize(jiraStatus).includes('open') || normalize(jiraStatus).includes('to do')) {
        return `Đưa Jira ${item.pre} sang In Progress sau khi xác nhận mount Sentry/Jira, rồi chuẩn bị fix hoặc Cursor handoff.`;
      }
      return `${action.title}: ${action.body}`;
    };
    const renderClaudeMarkdown = (text) => {
      const lines = String(text || '').split(/\n/);
      let html = '';
      let listOpen = false;
      const closeList = () => {
        if (listOpen) {
          html += '</ul>';
          listOpen = false;
        }
      };
      lines.forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) {
          closeList();
          return;
        }
        const headingMatch = trimmed.match(/^#{1,4}\s+(.+)$/);
        if (headingMatch) {
          closeList();
          html += `<h4>${escapeHtml(headingMatch[1])}</h4>`;
          return;
        }
        const bulletMatch = trimmed.match(/^[-*]\s+(.+)$/);
        if (bulletMatch) {
          if (!listOpen) {
            html += '<ul>';
            listOpen = true;
          }
          html += `<li>${escapeHtml(bulletMatch[1])}</li>`;
          return;
        }
        closeList();
        html += `<p>${escapeHtml(trimmed)}</p>`;
      });
      closeList();
      return html || '<p>Claude chưa trả về nội dung.</p>';
    };
    const renderClaudeEvaluation = (item, status = getStatus(item), evaluationState = claudeEvaluationsByPre[item.pre]) => {
      const action = deriveNextAction(item);
      const rawPrValue = firstPresent(item.pr, item.prNumber, status.pr, status.prNumber, '');
      const prValue = isPrReference(rawPrValue) ? rawPrValue : '';
      const prState = firstCompactText(status.prState, status.prStatus, item.prState, item.prStatus, prValue ? 'OPEN' : 'No PR');
      const jiraStatus = firstCompactText(status.jiraStatus, status.jira, item.jiraStatus, item.jira);
      const sentryStatus = `${viValue(firstPresent(status.sentryStatus, item.sentryStatus, status.sentry, item.sentry), 'unknown')}/${viValue(firstPresent(status.sentrySubstatus, item.sentrySubstatus), 'no substatus')}`;
      const lastSeen = firstPresent(status.sentryLastSeen, item.sentryLastSeen, status.lastSeen, item.lastSeen);
      const firstSeen = firstPresent(status.sentryFirstSeen, item.sentryFirstSeen);
      const history = [
        `Sentry ${viValue(item.sentryKey)} đang là ${sentryStatus}, issue id ${viValue(item.sentryIssueId)}, project ${viValue(item.repo || status.repo)}.`,
        firstSeen ? `Issue xuất hiện lần đầu: ${formatViTime(firstSeen)}.` : '',
        lastSeen ? `Lần xảy ra gần nhất: ${formatViTime(lastSeen)}.` : '',
        firstPresent(status.sentryCount, item.sentryCount) ? `Số event ghi nhận: ${firstPresent(status.sentryCount, item.sentryCount)}${firstPresent(status.sentryUserCount, item.sentryUserCount) ? `; users: ${firstPresent(status.sentryUserCount, item.sentryUserCount)}` : ''}.` : '',
        firstPresent(status.sentryAssignee, item.sentryAssignee, status.sentryAssigneeEmail, item.sentryAssigneeEmail) ? `Sentry assignee hiện tại: ${firstPresent(status.sentryAssignee, item.sentryAssignee, status.sentryAssigneeEmail, item.sentryAssigneeEmail)}.` : '',
        `Jira ${viValue(item.pre)} hiện là ${viValue(jiraStatus)}${firstPresent(status.jiraAssignee, item.jiraAssignee) ? `, assignee ${firstPresent(status.jiraAssignee, item.jiraAssignee)}` : ''}.`,
        prValue ? `PR liên quan: #${prValue}, trạng thái ${viValue(prState)}${reviewerTextFor(item, status) ? `, reviewer: ${reviewerTextFor(item, status)}` : ''}.` : 'Chưa có PR cho issue này.',
        summarizeCommentsVi(item)
      ];
      const workDone = [
        firstCompactText(item.bugReason) ? `Nguyên nhân/giả thuyết hiện tại: ${item.bugReason}` : '',
        firstCompactText(item.fixSummary) ? `Fix hoặc kế hoạch fix đã ghi nhận: ${item.fixSummary}` : '',
        firstCompactText(item.verification) ? `Verification: ${item.verification}` : '',
        firstCompactText(item.amendmentSummary) ? `Amendment mới nhất: ${item.amendmentSummary}` : '',
        firstCompactText(item.regressionStatus || item.regressionNote) ? `Regression: ${firstCompactText(item.regressionStatus, item.regressionNote)}` : '',
        firstCompactText(status.jenkins || item.jenkins || status.latestJenkinsBuild?.status || item.latestJenkinsBuild?.status) ? `Jenkins: ${firstCompactText(status.jenkins, item.jenkins, status.latestJenkinsBuild?.status, item.latestJenkinsBuild?.status)}.` : '',
        firstCompactText(status.sonar || item.sonar) ? `Sonar: ${firstCompactText(status.sonar, item.sonar)}.` : '',
        firstCompactText(status.staging || item.staging || item.stagingResult) ? `Staging: ${firstCompactText(status.staging, item.staging, item.stagingResult)}.` : '',
        firstCompactText(status.releaseJenkins || item.releaseJenkins || status.releaseMain || item.releaseMain) ? `Release/production: ${firstCompactText(status.releaseJenkins, item.releaseJenkins, status.releaseMain, item.releaseMain)}.` : ''
      ];
      const risks = [
        firstCompactText(status.sentryBlocker || item.sentryBlocker) ? `Sentry blocker: ${firstCompactText(status.sentryBlocker, item.sentryBlocker)}.` : '',
        firstCompactText(status.jiraBlocker || item.jiraBlocker) ? `Jira blocker: ${firstCompactText(status.jiraBlocker, item.jiraBlocker)}.` : '',
        firstCompactText(status.prBlocker || item.prBlocker) ? `PR blocker: ${firstCompactText(status.prBlocker, item.prBlocker)}.` : '',
        firstCompactText(status.jenkinsBlocker || item.jenkinsBlocker) ? `Jenkins blocker: ${firstCompactText(status.jenkinsBlocker, item.jenkinsBlocker)}.` : '',
        firstCompactText(status.stagingBlocker || item.stagingBlocker || item.stagingSmoke?.blocker) ? `Staging blocker: ${firstCompactText(status.stagingBlocker, item.stagingBlocker, item.stagingSmoke?.blocker)}.` : '',
        firstCompactText(item.neededThienAction) ? `Việc cần Thien làm: ${item.neededThienAction}` : '',
        !prValue && item.cursorHandoffPath ? `Fix code đang chờ Cursor handoff: ${item.cursorHandoffPath}` : ''
      ];
      const visibleRisks = uniqueTexts(risks);
      const nextAction = nextActionVi(item, status, action);
      const localSummary = `
        <div class="claude-evaluation-grid">
          <div class="claude-evaluation-section">
            <h4>Lịch sử issue</h4>
            <ul>${renderViBullets(history)}</ul>
          </div>
          <div class="claude-evaluation-section">
            <h4>Đã làm / đang có</h4>
            <ul>${renderViBullets(workDone)}</ul>
          </div>
          <div class="claude-evaluation-section">
            <h4>Rủi ro còn lại</h4>
            <ul>${renderViBullets(visibleRisks.length ? visibleRisks : ['Chưa thấy blocker rõ ràng trong report; vẫn cần refresh nguồn trước khi chuyển trạng thái hoặc resolve Sentry.'])}</ul>
          </div>
          <div class="claude-evaluation-section claude-next-action">
            <h4>Hành động tiếp theo</h4>
            <p>${escapeHtml(nextAction)}</p>
          </div>
        </div>
      `;
      const isLoading = evaluationState?.status === 'loading';
      const isSuccess = evaluationState?.status === 'success';
      const isError = evaluationState?.status === 'error';
      const subtitle = isSuccess
        ? `Claude CLI · ${formatViTime(evaluationState.generatedAt)}`
        : 'Tóm tắt tiếng Việt từ dữ liệu hiện có trong report';
      const statusMessage = isLoading
        ? '<div class="claude-evaluation-status">Claude đang đọc lịch sử issue và viết đề xuất bằng tiếng Việt...</div>'
        : isError
          ? `<div class="claude-evaluation-status">Claude chưa trả lời được (${escapeHtml(evaluationState.error || 'unknown error')}). Đang hiển thị bản fallback từ dữ liệu report.</div>`
          : '';
      const claudeOutput = isSuccess
        ? `<div class="claude-evaluation-output">${renderClaudeMarkdown(evaluationState.text)}</div>`
        : '';
      return `
        <section class="claude-evaluation" id="claude-evaluation-${escapeHtml(item.pre)}">
          <div class="claude-evaluation-header">
            <h3>Evaluate with Claude</h3>
            <span class="claude-evaluation-kicker">${escapeHtml(subtitle)}</span>
          </div>
          ${statusMessage}
          ${claudeOutput || `<div class="claude-evaluation-fallback">${localSummary}</div>`}
        </section>
      `;
    };

    const scrollActiveClaudeEvaluationIntoView = () => {
      if (!activeClaudeEvaluationPre) {
        return;
      }
      requestAnimationFrame(() => {
        document.getElementById(`claude-evaluation-${activeClaudeEvaluationPre}`)?.scrollIntoView({
          behavior: 'smooth',
          block: 'nearest'
        });
      });
    };
    const requestClaudeEvaluation = async (pre) => {
      try {
        const response = await fetch('/api/claude-evaluate', {
          method: 'POST',
          headers: {
            'content-type': 'application/json'
          },
          body: JSON.stringify({ pre })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || `HTTP ${response.status}`);
        }
        claudeEvaluationsByPre = {
          ...claudeEvaluationsByPre,
          [pre]: {
            status: 'success',
            text: payload.evaluation || '',
            generatedAt: payload.generatedAt || new Date().toISOString(),
            source: payload.source || 'claude-cli'
          }
        };
      } catch (error) {
        claudeEvaluationsByPre = {
          ...claudeEvaluationsByPre,
          [pre]: {
            status: 'error',
            error: error.message || String(error)
          }
        };
      }
      if (activeClaudeEvaluationPre === pre) {
        renderItems();
        scrollActiveClaudeEvaluationIntoView();
      }
    };

    const renderActionQueue = (items) => {
      const actionQueue = document.getElementById('actionQueue');
      const actionQueueCount = document.getElementById('actionQueueCount');
      const actions = items
        .map((item) => ({ item, action: deriveNextAction(item) }))
        .filter(({ action }) => action.priority <= 6)
        .sort((a, b) => a.action.priority - b.action.priority || activeRank(a.item) - activeRank(b.item));
      const shownActions = actions.slice(0, 8);
      const blockedCount = actions.filter(({ action }) => action.tone === 'blocked').length;
      actionQueueCount.textContent = actions.length
        ? `${blockedCount} blocked / ${actions.length} to check`
        : 'No urgent work';

      if (!shownActions.length) {
        actionQueue.innerHTML = '<div class="action-empty">No immediate action in the current view.</div>';
        return;
      }

      actionQueue.innerHTML = shownActions.map(({ item, action }) => `
        <article class="action-card ${actionToneClass(action)}${workflowMatchesItem(item) ? ' action-working' : ''}">
          <span class="action-marker" aria-hidden="true"></span>
          <div class="action-main">
            <p class="action-title">${escapeHtml(item.pre)}: ${escapeHtml(action.title)}${workflowMatchesItem(item) ? ' · Working now' : ''}</p>
            <p class="action-context">${escapeHtml(repoLabels[item.repo] ?? item.repo)} &middot; ${item.pr ? `PR #${item.pr}` : 'No PR yet'} &middot; ${escapeHtml(action.label)}</p>
            <p class="action-copy">${escapeHtml(action.body)}</p>
          </div>
          <div class="action-links">${renderActionLinks(action.links)}</div>
        </article>
      `).join('');
    };

    const sentryScopeItemId = (item) => scalarText(item.id || item.sentryIssueId || item.issueId).trim();
    const sentryScopeUrl = (item) => item.permalink || item.sentryUrl || (sentryScopeItemId(item) ? `https://check24-energie.sentry.io/issues/${sentryScopeItemId(item)}/` : SENTRY_ISSUES_URL);
    const sentryScopeLabel = (item) => firstPresent(item.shortId, item.sentryKey, item.key, sentryScopeItemId(item), 'Sentry issue');
    const sentryScopeSources = (item) => Array.isArray(item.sources) && item.sources.length
      ? item.sources
      : [firstPresent(item.source, item.sentryScope, 'unknown')];
    const workflowMatchesSentryScopeItem = (item) => workflowIsActiveTarget() && workflowMatchesSentryIdentity(item);

    const renderSentryScopeList = () => {
      const count = document.getElementById('sentryScopeCount');
      const list = document.getElementById('sentryScopeList');
      const expectedIds = new Set(Array.isArray(sentrySourceVerification.unionIds) ? sentrySourceVerification.unionIds.map(String) : []);
      const actualIds = new Set(sentryScopeItems.map(sentryScopeItemId).filter(Boolean));
      const missing = [...expectedIds].filter((id) => !actualIds.has(id));
      const extra = [...actualIds].filter((id) => expectedIds.size && !expectedIds.has(id));
      const verified = sentrySourceVerification.status === 'verified';
      const expectedCount = Number(sentrySourceVerification.unionCount || expectedIds.size || sentryScopeItems.length);

      if (!verified) {
        count.textContent = 'Not verified';
      } else if (missing.length || extra.length || sentryScopeItems.length !== expectedCount) {
        count.textContent = `${sentryScopeItems.length}/${expectedCount} mismatch`;
      } else {
        count.textContent = `${sentryScopeItems.length} in scope`;
      }

      if (!sentryScopeItems.length) {
        list.innerHTML = '<div class="action-empty">No Sentry source scope items recorded.</div>';
        return;
      }

      const warning = (verified && (missing.length || extra.length || sentryScopeItems.length !== expectedCount))
        ? `<article class="source-card source-warning"><p class="source-title">Scope mismatch: ${missing.length} missing, ${extra.length} extra. Re-run Sentry source verification before acting.</p></article>`
        : '';

      list.innerHTML = `${warning}${sentryScopeItems.map((item) => {
        const isWorking = workflowMatchesSentryScopeItem(item);
        return `
        <article class="source-card${isWorking ? ' source-working' : ''}"${isWorking ? ' data-working="true"' : ''}>
          <header>
            <a class="source-key" href="${escapeHtml(sentryScopeUrl(item))}" target="_blank" rel="noreferrer">${escapeHtml(sentryScopeLabel(item))}</a>
            <span class="source-badge">${escapeHtml(item.substatus || item.status || 'unresolved')}</span>
          </header>
          <p class="source-title">${escapeHtml(item.title || 'Untitled Sentry issue')}</p>
          <div class="source-meta">
            <span class="source-badge">${escapeHtml(item.projectSlug || item.projectName || item.repo || 'project')}</span>
            <span class="source-badge">${escapeHtml(item.assignedTo || item.sentryAssignee || 'unassigned')}</span>
            ${isWorking ? `<span class="source-badge source-working-badge">Working: ${escapeHtml(workflowStepLabel())}</span>` : ''}
            ${sentryScopeSources(item).map((source) => `<span class="source-badge">${escapeHtml(source)}</span>`).join('')}
          </div>
        </article>
      `;
      }).join('')}`;
    };

    const hasStagingWork = (item) => {
      const status = getStatus(item);
      const staging = normalize(status.staging);
      const build = normalize(stagingBuildStatus(status));
      const activated = normalize(stagingActivationStatus(status));
      return staging.includes('conflict') ||
        staging.includes('not merged') ||
        build.includes('not built') ||
        build.includes('not verified') ||
        activated.includes('not activated') ||
        activated.includes('not verified') ||
        (prWorkflowState(item, status) === 'open' && isPassed(status.jenkins) && isPassed(status.sonar) && !hasPositiveWord(staging, 'merged'));
    };

    const matchesWorkFilter = (item, work) => {
      const status = getStatus(item);
      const action = deriveNextAction(item);
      if (work === 'needs-action') {
        return action.priority <= 6;
      }
      if (work === 'blocked') {
        return action.tone === 'blocked';
      }
      if (work === 'open-pr') {
        return prWorkflowState(item, status) === 'open';
      }
      if (work === 'staging') {
        return hasStagingWork(item);
      }
      if (work === 'done') {
        return normalize(status.jiraCategory) === 'done' || prWorkflowState(item, status) === 'merged';
      }
      return true;
    };

    const renderStats = (items, currentWorkFilter = '') => {
      const stats = document.getElementById('stats');
      const statItems = [
        { filter: 'needs-action', value: items.filter((item) => matchesWorkFilter(item, 'needs-action')).length, label: 'Actions' },
        { filter: 'blocked', value: items.filter((item) => matchesWorkFilter(item, 'blocked')).length, label: 'Blocked' },
        { filter: 'open-pr', value: items.filter((item) => matchesWorkFilter(item, 'open-pr')).length, label: 'Open PRs' },
        { filter: 'staging', value: items.filter((item) => matchesWorkFilter(item, 'staging')).length, label: 'Staging' },
        { filter: 'done', value: items.filter((item) => matchesWorkFilter(item, 'done')).length, label: 'Done/Merged' },
        { filter: '', value: items.length, label: 'Total' }
      ];
      stats.innerHTML = statItems.map((item) => `
        <button class="stat" type="button" data-work-filter="${item.filter}" aria-pressed="${currentWorkFilter === item.filter ? 'true' : 'false'}">
          <strong>${item.value}</strong><span>${item.label}</span>
        </button>
      `).join('');
      stats.querySelectorAll('[data-work-filter]').forEach((button) => {
        button.addEventListener('click', () => {
          const workFilter = document.getElementById('workFilter');
          if (workFilter) {
            workFilter.value = button.dataset.workFilter || '';
          }
          renderItems();
        });
      });
    };

    const renderFilters = () => {
      const repoFilter = document.getElementById('repoFilter');
      if (!repoFilter) {
        return;
      }
      const selectedRepo = repoFilter.value;
      repoFilter.querySelectorAll('option:not([value=""])').forEach((option) => option.remove());
      const repos = Array.from(new Set(triageItems.map((item) => item.repo))).sort();
      repos.forEach((repo) => {
        const option = document.createElement('option');
        option.value = repo;
        option.textContent = repoLabels[repo] ?? repo;
        repoFilter.appendChild(option);
      });
      repoFilter.value = repos.includes(selectedRepo) ? selectedRepo : '';
    };

    const itemMatches = (item, search, repo, detail, work, showResolvedSentry) => {
      const status = getStatus(item);
      if (item.hiddenFromTimeline || status.hiddenFromTimeline || isAssignedAwaySentry(item, status)) {
        return false;
      }
      const haystack = [
        JSON.stringify(status),
        item.sentryKey,
        item.pre,
        item.repo,
        item.pr,
        item.title,
        item.bugReason,
        item.fixSummary,
        item.rebaseResult,
        item.pipelineResult,
        item.amendmentResult,
        item.stagingResult,
        item.reviewerDecision,
        item.amendmentSummary,
        JSON.stringify(item.stagingSmoke ?? {}),
        item.stagingSmokeStatus,
        item.stagingSmokeNote,
        item.stagingSmokeEvidence,
        item.stagingSmokeBlocker,
        item.regression,
        item.regressionStatus,
        item.regressionNote,
        item.regressionEvidence,
        item.regressionBlocker,
        JSON.stringify(item.prComments ?? []),
        item.prCommentStatus,
        item.affectedUrl
      ].map(normalize).join(' ');
      return (showResolvedSentry || !isResolvedSentry(item)) &&
        (!search || haystack.includes(search)) &&
        (!repo || item.repo === repo) &&
        (!detail || item.detailLevel === detail) &&
        matchesWorkFilter(item, work);
    };

    const renderItems = () => {
      const searchInput = document.getElementById('searchInput');
      const repoFilter = document.getElementById('repoFilter');
      const workFilter = document.getElementById('workFilter');
      const detailFilter = document.getElementById('detailFilter');
      const showResolvedSentryToggle = document.getElementById('showResolvedSentry');
      const search = normalize((searchInput?.value || '').trim());
      const repo = repoFilter?.value || '';
      const work = workFilter?.value || '';
      const detail = detailFilter?.value || '';
      const showResolvedSentry = Boolean(showResolvedSentryToggle?.checked);
      const visibleItems = triageItems.filter((item) => {
        const status = getStatus(item);
        return !item.hiddenFromTimeline &&
          !status.hiddenFromTimeline &&
          !isAssignedAwaySentry(item, status) &&
          (showResolvedSentry || !isResolvedSentry(item));
      });
      const items = sortByActiveFirst(triageItems.filter((item) => {
        const status = getStatus(item);
        return !item.hiddenFromTimeline &&
          !status.hiddenFromTimeline &&
          !isAssignedAwaySentry(item, status) &&
          itemMatches(item, search, repo, detail, work, showResolvedSentry);
      }));
      const timeline = document.getElementById('timeline');
      const emptyState = document.getElementById('emptyState');
      renderCurrentWork();
      renderStats(visibleItems, work);
      renderActionQueue(items);
      renderSentryScopeList();
      return;

      if (!timeline || !emptyState) {
        return;
      }

      timeline.innerHTML = items.map((item) => `
        ${(() => {
          const status = getStatus(item);
          const action = deriveNextAction(item);
          return `
        <details class="item item-${action.tone}${workflowMatchesItem(item) ? ' item-working' : ''}" ${activeClaudeEvaluationPre === item.pre ? 'open' : ''}>
          <summary class="item-summary">
            <span class="item-toggle" aria-hidden="true"></span>
            <div class="item-heading">
              ${renderCollapsedSummary(item, status)}
              ${workflowMatchesItem(item) ? `<span class="working-badge">${escapeHtml(workflowState.step || 'Workflow')}: Working now</span>` : ''}
            </div>
            <div class="summary-actions">${renderClaudeEvaluateButton(item)}</div>
          </summary>
          <div class="item-detail">
            <div class="meta">
              <a class="pill" href="${repoUrl(item.repo)}" target="_blank" rel="noreferrer">${repoLabels[item.repo] ?? item.repo}</a>
              ${formatAffectedUrl(item.affectedUrl)}
              ${renderItemRefreshButton(item)}
            </div>
            ${renderNextAction(item)}
            ${activeClaudeEvaluationPre === item.pre ? renderClaudeEvaluation(item, status, claudeEvaluationsByPre[item.pre]) : ''}
            <div class="content-grid">
              <section class="section">
                <h3>Bug Reason</h3>
                <p>${item.bugReason}</p>
              </section>
              <section class="section">
                <h3>How It Was Fixed</h3>
                <p>${item.fixSummary}</p>
              </section>
              ${renderAmendment(item)}
              ${renderRegressionStatus(item, status)}
              ${renderStagingSmoke(item)}
              ${renderPrComments(item)}
            </div>
            ${renderVerification(item)}
          </div>
        </details>
          `;
        })()}
      `).join('');
      timeline.querySelectorAll('[data-refresh-pre]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          startManualUpdate({
            pre: button.dataset.refreshPre || '',
            title: button.dataset.refreshTitle || ''
          });
        });
      });
      timeline.querySelectorAll('[data-evaluate-pre]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const pre = button.dataset.evaluatePre || '';
          if (activeClaudeEvaluationPre === pre) {
            activeClaudeEvaluationPre = '';
            renderItems();
            return;
          }
          activeClaudeEvaluationPre = pre;
          if (!claudeEvaluationsByPre[pre] || claudeEvaluationsByPre[pre].status === 'error') {
            claudeEvaluationsByPre = {
              ...claudeEvaluationsByPre,
              [pre]: {
                status: 'loading'
              }
            };
            requestClaudeEvaluation(pre);
          }
          renderItems();
          scrollActiveClaudeEvaluationIntoView();
        });
      });
      timeline.querySelectorAll('.item-summary a[href]').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.stopPropagation();
        });
      });
      emptyState.style.display = items.length === 0 ? 'block' : 'none';
    };

    const setUpdatedAt = (value) => {
      const updatedAt = document.getElementById('updatedAt');
      if (updatedAt) {
        updatedAt.textContent = value;
      }
    };

    const applyReportData = (data = {}) => {
      lastUpdated = data.lastUpdated || '';
      triageItems = Array.isArray(data.triageItems) ? data.triageItems : [];
      statusByPre = data.statusByPre && typeof data.statusByPre === 'object' ? data.statusByPre : {};
      sentryScopeItems = Array.isArray(data.sentryScopeItems) ? data.sentryScopeItems : [];
      sentrySourceVerification = data.sentrySourceVerification && typeof data.sentrySourceVerification === 'object' ? data.sentrySourceVerification : {};
      setUpdatedAt(lastUpdated || 'Live');
      renderFilters();
      renderItems();
    };

    const loadReportData = async () => {
      if (!['http:', 'https:'].includes(window.location.protocol)) {
        setUpdatedAt('Open live server');
        renderFilters();
        renderItems();
        return;
      }

      try {
        const response = await fetch('/api/report-data', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        applyReportData(await response.json());
      } catch (error) {
        setUpdatedAt('Data unavailable');
        const timeline = document.getElementById('timeline');
        const emptyState = document.getElementById('emptyState');
        if (timeline) {
          timeline.innerHTML = '';
        }
        if (emptyState) {
          emptyState.textContent = `Live data unavailable: ${error.message}`;
          emptyState.style.display = 'block';
        }
      }
    };

    setUpdatedAt('Loading');
    loadReportData();
    [
      ['searchInput', 'input'],
      ['repoFilter', 'change'],
      ['workFilter', 'change'],
      ['detailFilter', 'change'],
      ['showResolvedSentry', 'change']
    ].forEach(([id, eventName]) => {
      document.getElementById(id)?.addEventListener(eventName, renderItems);
    });

    const manualUpdateButton = document.getElementById('manualUpdateButton');
    const manualUpdateStatus = document.getElementById('manualUpdateStatus');
    const liveStatus = document.getElementById('liveStatus');

    const formatUpdateTime = (value) => {
      if (!value) {
        return '';
      }
      try {
        return new Intl.DateTimeFormat(undefined, {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        }).format(new Date(value));
      } catch {
        return '';
      }
    };

    const updateStatusClass = (status) => {
      const normalized = normalize(status);
      if (normalized.includes('failed') || normalized.includes('stale') || normalized.includes('not-configured')) {
        return 'status-blocked';
      }
      if (normalized.includes('running')) {
        return 'status-active';
      }
      if (normalized.includes('succeeded')) {
        return 'status-done';
      }
      return '';
    };

    const setManualUpdateState = (state = {}) => {
      const status = state.status || 'idle';
      const idle = status === 'idle' && !state.startedAt && !state.completedAt;
      const completedAt = formatUpdateTime(state.completedAt);
      const startedAt = formatUpdateTime(state.startedAt);
      const detail = idle
        ? 'Ready'
        : state.running
        ? `Running since ${startedAt || 'now'}`
        : (completedAt ? `Last run ${completedAt}` : 'Manual update ready');
      const message = idle ? '' : state.message;
      manualUpdateButton.disabled = Boolean(state.running);
      manualUpdateButton.textContent = state.running ? 'Updating...' : 'Update Report';
      document.querySelectorAll('[data-refresh-pre]').forEach((button) => {
        const isTarget = state.pre && button.dataset.refreshPre === state.pre;
        button.disabled = Boolean(state.running);
        button.textContent = state.running && isTarget ? 'Refreshing...' : 'Refresh';
      });
      manualUpdateStatus.className = `update-status ${updateStatusClass(status)}`;
      manualUpdateStatus.textContent = message && detail !== 'Manual update ready'
        ? `${message} ${detail}`
        : (message || detail);
      manualUpdateStatus.title = state.logTail || manualUpdateStatus.textContent;
    };

    const setLiveState = (state, label) => {
      liveStatus.dataset.state = state;
      liveStatus.textContent = label;
    };

    const fetchManualUpdateStatus = async () => {
      if (!['http:', 'https:'].includes(window.location.protocol)) {
        setManualUpdateState({
          status: 'not-configured',
          message: 'Open the live report server to run manual updates.'
        });
        manualUpdateButton.disabled = true;
        return;
      }

      try {
        const response = await fetch('/api/update-status', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const body = await response.json();
        setManualUpdateState(body.update);
      } catch (error) {
        setManualUpdateState({
          status: 'failed',
          message: `Manual update status unavailable: ${error.message}`
        });
      }
    };

    const startManualUpdate = async (context = {}) => {
      const pre = context.pre || '';
      setManualUpdateState({
        running: true,
        status: 'running',
        pre: pre || null,
        startedAt: new Date().toISOString(),
        message: pre ? `Starting refresh for ${pre}.` : 'Starting manual update.'
      });
      try {
        const response = await fetch('/api/update', {
          method: 'POST',
          cache: 'no-store',
          headers: {
            'content-type': 'application/json'
          },
          body: JSON.stringify(context)
        });
        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.error || `HTTP ${response.status}`);
        }
        setManualUpdateState(body.update);
      } catch (error) {
        setManualUpdateState({
          running: false,
          status: 'failed',
          completedAt: new Date().toISOString(),
          message: `Manual update failed to start: ${error.message}`
        });
      }
    };

    manualUpdateButton.addEventListener('click', () => startManualUpdate());
    fetchManualUpdateStatus();

    const connectLiveReport = () => {
      if (!['http:', 'https:'].includes(window.location.protocol)) {
        return;
      }

      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const socketUrl = `${wsProtocol}//${window.location.host}/ws`;
      let retryDelay = 800;

      const connect = () => {
        const socket = new WebSocket(socketUrl);
        socket.addEventListener('open', () => {
          retryDelay = 800;
          setLiveState('live', 'Live');
        });
        socket.addEventListener('message', (event) => {
          try {
            const message = JSON.parse(event.data);
            if (message.update) {
              setManualUpdateState(message.update);
            }
            if (message.workflow) {
              setWorkflowState(message.workflow);
            }
            if ((message.type === 'report:data' || message.type === 'report:connected') && message.data) {
              applyReportData(message.data);
            }
            if (message.type === 'report:reload') {
              window.location.reload();
            }
          } catch {
            // Ignore malformed live-report messages.
          }
        });
        socket.addEventListener('close', () => {
          setLiveState('offline', 'Reconnecting');
          window.setTimeout(connect, retryDelay);
          retryDelay = Math.min(retryDelay * 1.6, 8000);
        });
        socket.addEventListener('error', () => {
          setLiveState('offline', 'Offline');
        });
      };

      connect();
    };

    connectLiveReport();
  </script>
</body>
</html>
