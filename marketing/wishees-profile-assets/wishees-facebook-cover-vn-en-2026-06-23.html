<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        width: 1640px;
        height: 624px;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
      }

      .cover {
        position: relative;
        width: 1640px;
        height: 624px;
        background:
          linear-gradient(110deg, rgba(53, 20, 70, 0.82), rgba(143, 68, 122, 0.62)),
          linear-gradient(135deg, #fff4e8 0%, #f3c7c4 48%, #9552a7 100%);
        color: #fff;
      }

      .gift {
        position: absolute;
        right: 120px;
        top: 72px;
        width: 430px;
        height: 430px;
        opacity: 0.78;
      }

      .gift::before {
        content: "";
        position: absolute;
        left: 45px;
        top: 140px;
        width: 340px;
        height: 230px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.2);
        border: 8px solid rgba(255, 255, 255, 0.42);
      }

      .gift::after {
        content: "";
        position: absolute;
        left: 185px;
        top: 84px;
        width: 58px;
        height: 322px;
        background: rgba(255, 255, 255, 0.34);
        border-radius: 16px;
        box-shadow: -137px 94px 0 -3px rgba(255, 255, 255, 0.28), 137px 94px 0 -3px rgba(255, 255, 255, 0.28);
      }

      .w {
        position: absolute;
        right: 234px;
        top: 206px;
        font-size: 150px;
        font-weight: 900;
        line-height: 1;
        text-shadow: 0 18px 34px rgba(50, 18, 66, 0.28);
      }

      .copy {
        position: absolute;
        left: 92px;
        top: 118px;
        width: 920px;
      }

      .eyebrow {
        font-size: 34px;
        font-weight: 700;
        opacity: 0.92;
        margin-bottom: 24px;
      }

      .headline {
        font-size: 70px;
        line-height: 1.08;
        font-weight: 900;
        letter-spacing: 0;
        max-width: 900px;
      }

      .sub {
        margin-top: 28px;
        font-size: 34px;
        line-height: 1.35;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.94);
      }

      .url {
        position: absolute;
        left: 96px;
        bottom: 68px;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main class="cover">
      <section class="copy">
        <div class="eyebrow">Wishees.com</div>
        <div class="headline">Wishlist cho sinh nhật, cưới & quà gia đình</div>
        <div class="sub">Simple gift wishlists for birthdays, weddings and family moments.</div>
      </section>
      <div class="gift"></div>
      <div class="w">W</div>
      <div class="url">Tạo wishlist tại wishees.com</div>
    </main>
  </body>
</html>
