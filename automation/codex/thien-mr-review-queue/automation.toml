prompt = "Goal: run Thien's MR/Linear/Sentry action queue every 5 minutes with the lowest practical cloud-token cost. A heartbeat run is not dashboard-only: first update the dashboard/report with inventory, then actually handle actionable MR, Linear, and Sentry work in the required order. Be concise, reuse persisted report/history, avoid restating unchanged data, summarize logs/output, and only inspect/run what is needed for changed/actionable items. Keep this prompt and the dashboard Automation Workflow panel synchronized whenever the user changes dashboard, MR, Linear, Sentry, reporting, notification, schedule, or execution-order behavior. Also keep the mirror at `/Users/study/thiennp.github.io/automation/codex/thien-mr-review-queue` synchronized by running its `sync-from-local.sh` after automation/dashboard/report behavior changes.\n\nDashboard live check: ensure http://127.0.0.1:4177 responds. If not, start/kickstart LaunchAgent `com.thien.mr-dashboard` from `/Users/study/Library/LaunchAgents/com.thien.mr-dashboard.plist`; recreate if missing to run `/opt/homebrew/bin/node /Users/study/aurora/fs-academy/.cursor/.temp/thien-mr-dashboard/server.mjs` with cwd `/Users/study/aurora/fs-academy`, env `PORT=4177`, `RunAtLoad=true`, `KeepAlive=true`. If responding, do not restart.\n\nExecution order: every heartbeat must attempt a real queue pass after inventory: (1) GitLab MR inventory and MR actions, including Thien-authored MR maintenance; (2) Linear assigned inventory and actionable Linear work; (3) Sentry open-issue inventory and actionable Sentry-to-MR work. Do not stop after dashboard/report refresh unless all queues are empty/unchanged/skipped or a recorded blocker prevents further action. If any required source cannot be checked, persist a source-blocker item and NOTIFY.\n\nDashboard requirements: colorful light UI; columns `MRs`, `Linear`, `Sentry`; every item card; status tabs/chips (`All`, `Needs review`, `Approve only`, `Approved`, `Skipped`, `Finished`); direct links open new pages; MR number/title/author/source/target clickable; no iframe or console/activity area; poll `/api/status` every 5s plus focus/visibility refresh; `Cache-Control: no-store`; header shows active action or `Waiting for next heartbeat round, in MM:SS`; countdown uses automation RRULE/anchor from automation.toml, not API/report time; waiting header includes `Start now` button that queues this heartbeat by setting local Codex automation DB `next_run_at` for `thien-mr-review-queue` to now; active cards show `Working now` and elapsed from persisted `startedAt`; dashboard report/header must show detailed `currentAction` from Cursor-provided report fields (`source`, `phase`, `detail`, `itemUrl`, `itemTitle`, `status`, `updatedAt`), for example `Create Linear ticket`, `Verify SOLID principles`, `Fix Sentry issue`, or `Run quality gates`; do not invent this detail from process names when Cursor reported it; related MR/Linear/Sentry links; Sentry cards show assignee, ticket/key, Linear link/status, MR link/status, processing status; Automation Workflow panel mirrors current behavior, sticky side rail on large screens, collapsed by default on small screens; never remove seen/closed/merged/finished items, mark `Finished` when gone from active queue.\n\nCursor agent allowlist and reporting contract: automation may invoke only Cursor agents whose file/name starts with `thien-`. This restriction does not apply to commands, skills, subagents, or rules. Do not invoke `becky-*`, `*-dana-*`, or any non-`thien-*` agent from this automation; human GitLab reviewers are not Cursor agents and may still be assigned by normal MR workflow when required. All Cursor agents/rules/skills used by this automation must update `/Users/study/.codex/automations/thien-mr-review-queue-report.json` before each meaningful phase change using `npx tsx .cursor/scripts/update-automation-current-action.ts --source ... --phase ... --detail ... --item-url ... --item-title ... --status running|blocked|completed|skipped`. Update the relevant Cursor rule/skill/agent first if a workflow lacks this reporting. All AI guidance/tooling changes under `.cursor/` must be made on branch `ai-improvement`, committed, and pushed; AI-only MRs/titles must use `[AI]` where the workflow creates an MR.\n\nPersist inventory before any action to `/Users/study/.codex/automations/thien-mr-review-queue-report.json`; keep history in `/Users/study/.codex/automations/thien-mr-dashboard-history.json`. Inventory includes MRs assigned/requesting review/approved-by-Thien/open-authored-by-Thien, Linear assigned to Thien, and open Sentry issues (all pages if possible, at least first page) including unassigned. For every item store compact fields: type, title, URL, state/status, assignee, changed-since-baseline, decision, reason, next action, command if actionable, blockers, related/result URLs, startedAt, output summary. MR extras: draft, author, source/target, Thien-authored, rebase, pipeline, approvals, merge readiness/result. Sentry extras: assignee or `Unassigned`, key, Linear/MR known or created, resulting statuses. Empty Linear/Sentry is valid only if checked; if blocked, add one source-blocker item and NOTIFY.\n\nMR rules: check open developers/fs-academy MRs where `thien.nguyen` is assignee, requested reviewer, approver, or author. Classify approval, Thien review note, commits after review, draft/WIP, `[AI]`, comment prompts, rebase, pipeline, merge readiness. Keep approved/open and Thien-authored/open visible. Draft: do not review/approve; decision `skipped`, reason `Draft MR - waiting until ready for review`. Skip approved MRs and reviewed MRs with no later commits. `[AI]` non-draft: approve only if not already approved; no `/thien-mr-review`. Other actionable review MRs: one at a time, `cursor-agent --print --trust --force --workspace /Users/study/aurora/fs-academy \"/thien-mr-review <MR_URL>\"`.\n\nGit unblock rule: if MR/Linear/Sentry work is blocked by local git dirt, stale branch state, or a dirty worktree in `/Users/study/aurora/fs-academy`, record the dirty files/blocker in the report, then switch to `staging`, fetch latest, hard-reset `staging` to `origin/staging`, clean untracked files only when they are generated/automation scratch files, and retry the queued work from that clean staging base. Use non-interactive commands: `git fetch origin`, `git switch staging` (or create/reset local staging if missing), `git reset --hard origin/staging`; then rerun inventory/action. This user explicitly approved this reset behavior for git-blocked automation. Do not reset while a Cursor task is actively running.\n\nThien-authored MR maintenance: every MR pass also checks all open unmerged MRs authored by Thien. If behind/conflicted/not rebased, rebase onto target, push, re-check pipeline. If pipeline failed/broken, inspect failing logs only, fix, verify locally, push, keep active/blocked until passing or blocker recorded. If approved, rebased, unblocked, no conflicts/unresolved blockers, and pipeline passing or merge-allowed, merge; record merge SHA/status. Never merge drafts.\n\nMR comments: for developer comments on Thien's prior comment or Thien-authored code, determine if code action is reasonable. Dashboard comment card shows commenter, clickable comment text/header opening GitLab discussion, code-action/reply-only status, editable suggested reply, `Post suggested reply`, and `Fix code with Cursor`. Do not auto-post replies. Posting saves edited text to `/Users/study/.codex/automations/thien-mr-dashboard-reply-tone.json` for future tone. Cursor comment fixes persist to `/Users/study/.codex/automations/thien-mr-dashboard-comment-fixes.json` with status, command, started/finished, summary, fixed commit link/SHA, blockers. If already solved, show solved status/fixed commit; avoid rerun.\n\nLinear rules: after MR pass, check Linear Aurora assigned to Thien at https://linear.app/fullscript/team/ACA/all. Persist complete assigned inventory first. Actionable bugs/regressions/Sentry/errors/broken behavior use `/thien-fix-bug <issue_url>`; features/enhancements/implementation/migration/docs/product use `/thien-implement-linear-feature <issue_url>`. Mark active with startedAt, process strictly one at a time. Skip done, In Review with open MR/no action, blocked, unassigned, or waiting on another person. Keep outcomes.\n\nSentry rules: after Linear, list collected open Sentry issues on dashboard, including unassigned and assigned-to-others. Only act when no MR is linked/created/found and the assignee is `Unassigned` or Thien Nguyen/TN/thien.nguyen. For an unassigned actionable Sentry issue, assign it to Thien first, persist the assignment/status on the dashboard, then run the Cursor workflow. For a Thien-assigned actionable issue with no MR, run the workflow directly. Skip MR-linked/already-handled/assigned-to-others with exact reason and next action. Actionable Sentry: one at a time, `cursor-agent --print --trust --force --workspace /Users/study/aurora/fs-academy \"/thien-sentry-to-mr <sentry_issue_url>\"`; this replaces `/thien-sentry-agent`. Inventory all pages if possible; at minimum first page. Do not stop inventory for individual blocked/assigned-away/duplicate/unactionable issues. If API/shell auth blocked but browser/screenshot shows issues, use visible evidence as inventory and add separate source blocker. Before each run, persist `Working now`/startedAt. After each run, update decision (`MR-created`, `fixed`, `resolved`, `skipped`, `blocked`), output summary, result MR/Linear/Sentry status, blockers, next action. Individual blocked issue must not stop the rest.\n\nEnd report: write concise structured `MRs`, `Linear`, `Sentry` with totals. NOTIFY if anything processed/approved/rebased/pipeline-fixed/merged/changed/blocked/needs attention, an inventory source was not checked, or comment prompt/fix waits for Thien; otherwise DONT_NOTIFY with short quiet status."
