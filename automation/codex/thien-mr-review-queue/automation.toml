prompt = """
# Thien MR/Linear/Sentry Action Queue — Codex heartbeat orchestrator
# Schedule: every 5 minutes | Mirror: /Users/study/thiennp.github.io/automation/codex/thien-mr-review-queue (run sync-from-local.sh on change)

## 1. Core constraints and token efficiency
- Role split: Codex owns dashboard health, delta inventory, report persistence, classification, notifications, cheap GitLab/git shell ops, and launching one Cursor thien-* workflow when needed. Cursor owns all substantive work—follow `.cursor/agents/thien-*.md`, skills, and subagents on the checked-out guidance branch (`ai-improvement` when active, else `staging`); do not re-implement or restate those workflows here.
- Persistent delta: read `/Users/study/.codex/automations/thien-mr-review-queue-report.json` and `/Users/study/.codex/automations/thien-mr-dashboard-history.json` first. Use each item's `changed-since-baseline` and prior report state; fetch only new/changed rows. Prefer API modified-since or If-None-Match when available; fall back to full fetch only when delta signals are missing.
- Concise output: summarize logs; do not restate unchanged inventory or agent-internal steps.
- One Cursor launch per heartbeat (retry only after git-unblock). Never duplicate dashboard-triggered Cursor runs (`/api/fix-comment`) or work agents already perform.
- Isolation guard: if a thien-* Cursor task is active (report `startedAt` + `currentAction.status=running`, or `cursor-agent`/thien-* PIDs), do not run queue steps, `git reset`, or state overwrites.


### Cursor guidance branch (ai-improvement vs staging)
At the start of every heartbeat, before inventory or queue actions, run:
`npx tsx .cursor/scripts/resolve-automation-cursor-baseline.ts --checkout --json`
Read `/Users/study/.codex/automations/thien-mr-cursor-baseline.json` and persist `cursorGuidance` on the report (`active`, `guidanceBranch`, `gitUnblockRef`, `guidanceRoot`, `changedCursorFiles`, `currentBranch`, `resolvedAt`, `checkedOutAt`).
- When `active=true` (ai-improvement has unmerged `.cursor/` changes vs staging): checkout branch `ai-improvement` (`git switch ai-improvement`, `git reset --hard origin/ai-improvement` when unblocking). Read agents/skills from `.cursor/` on that branch.
- When `active=false` (merged or no diff): checkout branch `staging` and read `.cursor/` from staging.
Dashboard startup also runs `--checkout`. Do not use a separate `.cursor/ai-improvement/` folder.
## 2. Infrastructure and dashboard lifecycle
- Live check: curl http://127.0.0.1:4177. If down, ensure LaunchAgent `com.thien.mr-dashboard` is loaded from `/Users/study/Library/LaunchAgents/com.thien.mr-dashboard.plist` running `/opt/homebrew/bin/node /Users/study/aurora/fs-academy/.cursor/.temp/thien-mr-dashboard/server.mjs` with cwd `/Users/study/aurora/fs-academy`, env `PORT=4177`, `RunAtLoad=true`, `KeepAlive=true`. Recreate plist if missing using that template. If responding, do not restart.
- Dashboard API: UI polls `/api/status` every 5s + focus refresh; `Cache-Control: no-store`. Header shows Cursor `currentAction` (`source`, `phase`, `detail`, `itemUrl`, `itemTitle`, `status`, `updatedAt`) or Waiting countdown from automation.toml RRULE. Start now sets Codex DB `next_run_at` for `thien-mr-review-queue` to now.
- Keep this prompt, dashboard Automation Workflow panel in server.mjs, and GitHub mirror synchronized after behavior changes.

## 3. Execution sequence
[Live check & sync] → [Refresh inventory] → [GitLab MRs] → [Linear] → [Sentry open issues]
Do not stop after inventory unless all queues are empty/unchanged/skipped or a recorded blocker prevents action. Unchecked required source → source-blocker item + NOTIFY.

### 3a. Refresh inventory (before any action)
Run cursor baseline resolve/checkout first; persist `cursorGuidance` and inventory to report JSON. Include MRs assigned/requesting review/approved-by-Thien/open-authored-by-Thien, Linear assigned to Thien, open Sentry issues (all pages if possible, minimum first page) including unassigned. Per item store compact fields: type, title, URL, state/status, assignee, changed-since-baseline, decision, reason, next action, command, blockers, related/result URLs, startedAt, output summary. Empty Linear/Sentry only if checked.

### 3b. GitLab MR queue (priority 1)
Scope: `developers/fs-academy` where `thien.nguyen` is assignee, requested reviewer, approver, or author.
- Draft: `skipped`, reason `Draft MR - waiting until ready for review`; no agents.
- Skip approved MRs and reviewed MRs with no later commits.
- `[AI]` non-draft: GitLab approve only if not already approved; no `/thien-mr-review`.
- Other actionable review MRs (one at a time): `cursor-agent --print --trust --force --workspace /Users/study/aurora/fs-academy "/thien-mr-review <MR_URL>"`.
- Thien-authored open MRs: Codex may shell rebase/push if behind target; if pipeline red or review threads need code use `/thien-mr-fix-followup <MR_URL>` (not manual CI/code work in Codex); merge via glab when approved+rebased+unblocked+pipeline green; never merge drafts.
- MR comments: dashboard owns suggested replies and Fix code with Cursor; Codex inventories comment prompts only—do not re-analyze or fix in Codex; do not auto-post.

### 3c. Linear sync (priority 2)
Target: Aurora assigned items at https://linear.app/fullscript/team/ACA/all. One at a time. Skip done, In Review with open MR/no action, blocked, unassigned, waiting on others.
- Bugs/regressions/errors/broken behavior: `/thien-fix-bug <issue_url>`
- Features/enhancements/implementation/migration/docs/product: `/thien-implement-linear-feature <issue_url>`

### 3d. Sentry triage (priority 3)
List-only in Codex—no Sentry writes. Inventory is already in 3a (all pages if possible; minimum first page; include unassigned and assigned-to-others). Individual blocked rows must not stop the rest.
Token rule: launch **one** Cursor drain per heartbeat when inventory shows **≥1 actionable row** (no linked MR; assignee Unassigned or Thien Nguyen/TN/thien.nguyen). Do **not** loop `/thien-sentry-single-issue` one URL per heartbeat.
`cursor-agent --print --trust --force --workspace /Users/study/aurora/fs-academy "/thien-sentry-all"`
(Cursor runs `@.cursor/agents/thien-sentry-all.md`: MCP list + assign + Linear + fix/MR/review for **all** actionable unresolved issues in one session; replaces per-heartbeat `/thien-sentry-single-issue <url>` and deprecated `/thien-sentry-to-mr` / `/thien-sentry-agent`.)
Skip Cursor launch when every open Sentry row is MR-linked, assigned-to-others, or already at terminal state (In Review MR / review complete). Record per-item skip reasons in report. Optional operator `max_issues` cap only when explicitly set; default is drain all actionable rows.
Reserve `/thien-sentry-single-issue <url>` for manual or dashboard one-off triggers—not Codex heartbeat. MCP/auth blocked but visible evidence → inventory + separate source-blocker (inventory-only; no browser triage).

## 4. Git conflict and workspace unblocking
If git dirt or stale branch blocks work: verify no Cursor task running; record dirty paths in report; read `cursorGuidance.gitUnblockRef` and `cursorGuidance.guidanceBranch` from baseline/report.
- `active=true` (`origin/ai-improvement`): `git fetch origin`, `git switch ai-improvement` (create/reset local branch if missing), `git reset --hard origin/ai-improvement`, rerun `resolve-automation-cursor-baseline.ts --checkout`, then rerun inventory/action.
- `active=false` (`origin/staging`): `git fetch origin`, `git switch staging`, `git reset --hard origin/staging`, clean generated/scratch untracked only, rerun `resolve-automation-cursor-baseline.ts --checkout`, then rerun inventory/action.
User approved this reset. Do not reset while Cursor is running.

## 5. UI layout and reporting contract
Dashboard: colorful light theme; columns MRs | Linear | Sentry; status tabs All/Needs review/Approve only/Approved/Skipped/Finished; clickable MR metadata; no iframe/console; sticky Automation Workflow panel (collapsed on small screens); never delete finished/historical items—mark Finished when gone from active queue; Sentry cards show assignee/key/Linear/MR/processing status.
Agent allowlist: thien-* only (not becky-*, *-dana-*). Commands/skills/subagents/rules unrestricted. Human GitLab reviewers may still be assigned by normal MR workflow.
Before meaningful phase changes agents must call:
`npx tsx .cursor/scripts/update-automation-current-action.ts --source <src> --phase <phase> --detail <detail> --item-url <url> --item-title <title> --status running|blocked|completed|skipped`
Do not invent dashboard phase text when Cursor reported currentAction. Author new `.cursor/` automation changes on branch `ai-improvement`, committed, pushed; runtime checks out `ai-improvement` while that branch is ahead of staging on `.cursor/`; AI-only MR titles use `[AI]`.

## 6. Notification rules
Write concise MRs/Linear/Sentry totals to report JSON.
NOTIFY if processed/approved/rebased/pipeline-fixed/merged/changed/blocked/needs attention, source unchecked, or comment prompt/fix waits for Thien.
DONT_NOTIFY with short quiet status if no operational state change."""
