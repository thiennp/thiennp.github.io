prompt = '''
Run the Sentry Chrome snapshot script first:

`/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot.sh`

The script is the source of truth for this automation. It verifies the local Google Chrome profile for `thien.nguyen.check24@gmail.com`, identifies only windows belonging to that verified profile, reuses or opens the exact target Sentry URL, focuses the target tab, waits for Sentry's issue list to become extractable, reads visible issue rows from the live DOM, redacts sensitive auth query parameters, writes the full JSON atomically, writes a compact chat JSON atomically, validates both JSON files, keeps Chrome open, and leaves the target Sentry tab focused.

After every snapshot JSON write, the script runs:

`/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/sync-live-report.mjs /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`

That sync step keeps `http://localhost:8766/` up to date by pushing the latest snapshot into the live Sentry triage report API at `http://127.0.0.1:8766/api/report-data`. It updates `lastSentryFeedSnapshot` and `lastChromeProfileSentrySnapshot`, refreshes matching existing `sentryScopeItems` with visible 24h fields, preserves the existing 86-item source scope, records out-of-current-scope visible rows as untracked candidates, writes a backup of the live report JSON, and restores `sentrySourceVerification.status` to `verified` only when the stored scope and union IDs are internally consistent. It writes sync status to `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/live-report-sync-status.json`.

After a successful snapshot and successful localhost sync, the script runs:

`/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/scan-issue-jira-links.mjs /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`

That detail-scan step opens visible Sentry issues one at a time in the already verified Chrome tab, sends `POST http://127.0.0.1:8766/api/workflow-status` before each issue with the current Sentry issue plus `previousSentryIssueId`/`previousSentryKey`/`previousUrl` and `nextSentryIssueId`/`nextSentryKey`/`nextUrl`, so the app can show a scan lane: the current item as the strongest active highlight, the next item as a quieter blue cue, and the previous item as a separate green cue. It waits for `GET http://127.0.0.1:8766/api/ui-state` to confirm that the app actually rendered the same issue and scan request, scrolled/focused the current card into the current viewport, and rendered previous/next cues when those rows exist. It checks the Sentry detail DOM for attached Jira tickets, assigns any existing but unassigned Jira ticket to Thien Nguyen, creates a `PRE` Bug assigned/reported to Thien Nguyen when no Jira ticket exists, writes Jira keys/ticket URLs/action results back into matching report issues through `PUT http://127.0.0.1:8766/api/report-data`, sends another workflow-status update for the result, waits again for the app render acknowledgement, then remains on that focused Chrome issue tab/window until the issue detail view has had at least 5 seconds of confirmed foreground dwell before moving to the next issue. It also updates `lastChromeProfileSentryJiraScan` and per-issue `jiraTickets`, `jiraTicketKeys`, `linkedJiraKeys`, `jiraScanStatus`, `lastJiraLinkScanAt`, and `lastJiraAutomationActions` fields in the live report. The app renders the latest `lastSentryFeedSnapshot.items` in a Visible Sentry Feed panel as the primary scan lane and keeps Sentry Source Scope as a compact reference column, so every visible row can be highlighted while it is being opened, including rows outside the preserved source scope. Items with completed `lastJiraLinkScanAt` or non-blocked `jiraScanStatus` must stay visibly marked as checked/finished, Jira-action blockers must be visibly marked as blocked, and found/created Jira ticket keys must be shown.

Detail-scan guardrails:
- Reuse the verified Chrome tab only; do not open another Chrome profile.
- If the active Chrome tab/window drifts away from the verified target-profile Sentry tab, if the target URL/filter cannot be reconfirmed, or if Sentry auth expires, abort Jira write actions and record a fail-closed blocker instead of continuing.
- Default to at most 25 visible issue rows per run unless `SENTRY_ISSUE_JIRA_SCAN_LIMIT` overrides it.
- For every Sentry issue detail page opened or focused in Chrome, keep that Chrome issue tab/window in the foreground for at least `SENTRY_ISSUE_JIRA_SCAN_MIN_CHROME_DWELL_MS`, with an effective minimum of 5000ms even if the environment value is lower. Dwell timing starts only after the issue detail URL is confirmed active/loaded; scan, Jira, report, and UI-ack time counts toward dwell, and the script must sleep the remaining time before proceeding if the elapsed dwell is under 5000ms. This applies to successful checks and recoverable per-issue scan errors.
- For every issue action, generate a `scanRequestId`, include it in the workflow-status payload, and require consecutive UI acknowledgements from `/api/ui-state` to echo the same `scanRequestId`, active issue id/key/url, highlight state, `activeCardVisible=true`, `activeCardFocused=true`, `previousHighlighted=true` when a previous row exists, and `nextHighlighted=true` when a next row exists before navigating or continuing.
- Treat a UI acknowledgement timeout, mismatch, missing previous/next cue, off-screen active card, or unfocused active card as a hard detail-scan blocker for that run; do not open the next Sentry issue until the app reflects and focuses the current action.
- Prefer Jira links whose href contains `atlassian.net/browse/`; fallback only to likely Jira keys such as `PRE-123` or `OPS-123` in Jira/linked-issue text.
- Before Jira write actions, preflight Jira REST access: base URL, API token, reporter email/default user, project `PRE`, and Thien Nguyen's account id `712020:98c2de13-71c4-48ae-a98a-3baa7fa11ba2`. If preflight fails, write a structured Jira blocker and do not mark the issue as cleanly finished.
- When an attached Jira ticket exists, fetch it through Jira REST and assign it to Thien Nguyen only if it is currently unassigned. Record `already-assigned`, `assigned`, `skipped`, `dry-run`, or failure actions in `lastJiraAutomationActions`.
- When no Jira ticket exists, dedupe before creation by searching existing `PRE` issues for the Sentry short id and issue id. Treat a deduped existing PRE issue as the Jira ticket for this Sentry row. If no existing PRE issue is found, create a `PRE` Bug assigned and reported to Thien Nguyen, using a summary beginning with `[Sentry]` and a description containing the Sentry URL, short id, project, title/culprit, counts, users, and last-seen text when available.
- When `SENTRY_TRIAGE_JIRA_DRY_RUN=1`, do not call any Jira write endpoint, including assign, create, transition, comment, or link operations. Record intended assignment/create actions as dry-run results.
- Abort the detail scan with an auth blocker if a Sentry detail page redirects to login/SSO, and do not write a false no-ticket result for that issue.
- Treat Sentry auth, Chrome/profile verification, Jira preflight, and UI synchronization failures as stop-the-run blockers. Do not advance to another issue or mutate Jira after one of those blockers. Per-issue extraction warnings may be recorded without failing the list snapshot, but must not be reported as cleanly checked/finished.
- Restore the target Sentry list URL after the scan finishes or aborts.
- Treat detail-scan warnings as scan warnings, not as a failed list snapshot.
- Write detail-scan status to `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json`.
- The app must expose `GET/POST http://127.0.0.1:8766/api/ui-state`; the frontend must scroll/focus the highlighted source/feed card into the viewport, then POST that endpoint only after the highlight DOM has rendered, including `scanRequestId`, `activeIssueId`, `activeSentryKey`, `activeUrl`, `activeJiraKeys`, `previousIssueId`, `previousSentryKey`, `previousUrl`, `nextIssueId`, `nextSentryKey`, `nextUrl`, `focusedIssueId`, `activeCardVisible`, `activeCardFocused`, `highlightedCount`, `previousHighlightedCount`, `nextHighlightedCount`, highlight booleans, and `workflowUpdatedAt`.
- The app must visibly mark current, next, previous, finished/checked, and blocked issues in both Sentry Source Scope and Visible Sentry Feed using `lastJiraLinkScanAt`, `jiraScanStatus`, `lastJiraAutomationActions`, and Jira ticket key fields.
- Redact auth/session material in all JSON and chat output. Never print Jira API tokens, Sentry auth tokens, cookies, session IDs, OAuth/SAML/CSRF parameters, or raw Authorization headers.

Target Sentry URL: `https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h`.

Output files:
- Full snapshot: `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`
- Compact chat snapshot: `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-compact.json`
- Last stderr log: `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-last.stderr.log`
- Live report sync status: `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/live-report-sync-status.json`
- Detail Jira scan status: `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json`

Script exit codes:
- `0`: success
- `1`: precondition failure, such as missing Chrome/profile/Apple Events access or no verified target-profile window
- `2`: Sentry auth/login failure
- `3`: page load or DOM sentinel timeout
- `4`: ambiguous extraction, such as zero rows without an explicit empty-state reason
- `5`: lock conflict with an active run

Retry policy:
- For exit codes `3` and `4`, retry the script up to 2 additional times with bounded backoff: wait 15 seconds before the first retry and 30 seconds before the second retry.
- For exit codes `1`, `2`, and `5`, do not retry; report the structured blocker from the JSON/log.
- Do not start manual browser/JXA fallback until the script has failed and the retry policy is exhausted. If fallback is needed, keep it narrowly scoped to the original task and never use a non-target Chrome profile.

On success or when the script writes a blocker JSON:
1. Read `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-compact.json`.
2. Read `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/live-report-sync-status.json` when it exists.
3. Read `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json` when it exists.
4. Validate the localhost dashboard data with `curl -fsS http://127.0.0.1:8766/api/report-validation`.
5. Display the saved compact JSON in this chat inside a fenced `json` code block.
6. Briefly state whether the tab was reused or opened, how many verified-profile tabs were listed, how many Sentry rows were saved, whether the localhost sync passed, how many issues were opened for Jira scanning, how many Jira tickets were found, how many Jira tickets were created, how many unassigned Jira tickets were assigned to Thien Nguyen, how many UI render acknowledgements were verified, whether active cards were focused/visible and previous/next cues were rendered before continuing, whether each opened Chrome issue view met the effective minimum 5000ms dwell, the full JSON path, the compact JSON path, the live sync status path, the Jira scan status path, and any blockers.
7. Because the user explicitly wants the JSON shown in chat, choose a heartbeat `NOTIFY` response whenever a fresh success or blocker snapshot is written.

If no fresh JSON can be written, report the exit code, its label, the exact command attempted, and the last 10 lines of `snapshot-last.stderr.log`. Do not claim success unless both JSON files parse successfully. If the snapshot succeeds but the localhost sync fails, report the snapshot as successful and include the sync warning from `live-report-sync-status.json`. If the snapshot and sync succeed but the Jira detail scan fails or aborts, report the snapshot and sync as successful, include the Jira scan warning/blocker from `issue-jira-scan-status.json`, and do not retry auth failures or UI acknowledgement failures in the same run.
'''
