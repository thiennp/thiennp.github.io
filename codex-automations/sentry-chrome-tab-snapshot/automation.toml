prompt = "Run `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot.sh` first. The script is the source of truth: it verifies the local Google Chrome profile signed in as `thien.nguyen.check24@gmail.com`, reuses or opens the exact target Sentry list URL `https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h`, focuses the verified-profile tab, extracts visible Sentry rows, writes the full and compact JSON atomically, validates both JSON files, syncs `http://localhost:8766/` through `/api/report-data`, and leaves Chrome open. Retry snapshot exit codes `3` and `4` up to two additional times with 15s then 30s backoff; do not retry `1`, `2`, or `5`.\n\nAfter a successful snapshot and localhost sync, run `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/scan-issue-jira-links.mjs /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`. The scanner opens visible Sentry issues one at a time in the already verified Chrome tab, sends live workflow status to `http://127.0.0.1:8766/api/workflow-status`, waits for `/api/ui-state` to confirm the app focused the active card and rendered previous/current/next cues, marks finished/blocked items in the report, and keeps each final confirmed Sentry issue detail page foregrounded for at least 5 seconds before moving on.\n\nCreate/use a narrowly scoped verifier subagent before detail scan and again while/after it runs. The verifier independently checks scanner/snapshot processes, `http://127.0.0.1:8766/api/report-validation`, `/api/ui-state`, `/api/workflow-status`, and latest status/log files. If a scanner/snapshot process is active and the verifier sees API failure, stale or mismatched workflow status, missing active highlight, `activeCardVisible=false`, `activeCardFocused=false`, previous/next cue mismatch, or blocked/stopped workflow with a still-running scanner, kill only the matching process through `POST http://127.0.0.1:8766/api/kill-scanner` when available, or exact matching PIDs as fallback. Wait for the verifier result before reporting success.\n\nCritical Jira/Sentry policy: when a known or deduped Jira ticket exists, re-read Sentry's Issue Tracking section first. If the target Jira key is already visible in that section's text, treat it as already linked, skip the Sentry Jira modal entirely, and open Jira directly for assignee/owner work. If the key is not visible, attach that existing key in Chrome through Sentry's Jira modal `Link` tab only. After opening Jira and selecting `Link`, click/focus the visible `Issue` dropdown/combobox, clear stale value, type the target Jira key or prefix before waiting, poll/select a matching option, verify the selected Jira issue is reflected in the `Issue` field, then click `Link Issue`; never wait on an untouched Issue field and never submit before selected-state evidence. Re-read Sentry's Issue Tracking section and require the key to be visible before marking the issue finished. Never use the modal `Create` tab for a known/deduped ticket.\n\nAssign existing unassigned Jira tickets by opening the Jira issue page in Chrome, clicking directly in the Jira assignee UI, and verifying the loaded Jira key matches and the assignee becomes `Thien Nguyen`. Do not call Jira REST assignment endpoints under any condition. Jira REST may be used only for no-ticket dedupe/create; if no known/deduped ticket exists, dedupe in project `PRE`, create a `PRE` Bug assigned/reported to Thien Nguyen only when no duplicate exists, then return to Sentry and attach the created key through the Issue Tracking `Link` tab.\n\nAfter exactly one Jira key is linked or verified visible in Sentry's Issue Tracking section for the active Sentry issue, open the Jira issue page in Chrome and read the assignee field in a fresh page visit that follows any Jira UI assignment step. Return to the same Sentry issue detail URL and mirror that Jira Assignee to the Sentry issue assignee through the Sentry UI. If zero Jira keys, more than one distinct Jira key, no Jira assignee, no matching Sentry member option, or multiple DOM-distinct matching Sentry member options are present, including options with identical visible text, fail closed instead of guessing.\n\nEach Chrome-driven Sentry/Jira UI action may wait/poll up to 60 seconds by default. This includes opening the Sentry Jira modal, choosing `Link`, focusing/typing/selecting the Issue dropdown, verifying selected-state evidence, linking/verifying Issue Tracking, loading Jira, Jira assignee clicks/verifications, opening/selecting/verifying the Sentry assignee, and verifier/UI acknowledgements. Respect `SENTRY_TRIAGE_SENTRY_ISSUE_TRACKING_ACTION_TIMEOUT_MS`, `SENTRY_TRIAGE_JIRA_UI_ACTION_TIMEOUT_MS`, and `SENTRY_TRIAGE_UI_ACTION_POLL_MS`; status JSON should include timeout values, attempts, selected-state evidence, fresh Jira owner page-read evidence, Sentry member option evidence including DOM-distinct match counts, visible option evidence when available, and waited milliseconds for blocked UI actions.\n\nFail closed on Sentry auth, Chrome/profile drift, UI acknowledgement mismatch, off-screen/unfocused active card, Issue Tracking link verification failure, Jira UI assignment verification failure, Jira owner resolution failure, ambiguous linked Jira keys, ambiguous Sentry member mapping, Sentry assignee UI selection/verification failure, no-ticket Jira preflight/create failure, verifier-detected anomaly, or any blocked Jira/Sentry action. Record blockers in `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json` and stop before opening the next issue. When `SENTRY_TRIAGE_JIRA_DRY_RUN=1`, do not call Jira write endpoints and do not submit Sentry/Jira UI changes; record intended create/assign/link/assignee-sync actions as dry-run results.\n\nOn success or when a fresh blocker JSON is written, read the compact JSON, live sync status, Jira scan status, verifier result when present, and validate `curl -fsS http://127.0.0.1:8766/api/report-validation`. Display the saved compact JSON in chat inside a fenced `json` block and briefly report tab reused/opened, verified-profile tab count, saved Sentry row count, localhost sync status, issues opened, Jira tickets found/created/attached, Jira tickets assigned to Thien Nguyen through Chrome UI, Sentry issues assigned to linked Jira owners through Chrome UI, UI acknowledgement count, verifier health/kill decision, active card focus/visibility and previous/next cues, 5s dwell status, all output paths, and blockers. Redact auth/session material in all JSON and chat output."
