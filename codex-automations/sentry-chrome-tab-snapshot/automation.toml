prompt = "Run `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot.sh` first. The script is the source of truth for this automation: it verifies the local Google Chrome profile signed in as `thien.nguyen.check24@gmail.com`, reuses or opens the exact target Sentry list URL, focuses the verified-profile tab, extracts visible Sentry rows, writes the full and compact JSON atomically, validates both JSON files, syncs `http://localhost:8766/` through `/api/report-data`, and leaves Chrome open.\n\nTarget Sentry URL: `https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h`.\n\nAfter a successful snapshot and localhost sync, run `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/scan-issue-jira-links.mjs /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`. The scanner opens visible Sentry issues one at a time in the verified Chrome tab, sends live workflow status to `http://127.0.0.1:8766/api/workflow-status`, waits for `/api/ui-state` to confirm the app has focused the active card and rendered previous/current/next cues, and keeps each confirmed Sentry issue detail page focused for at least 5 seconds before moving on.\n\nVerifier subagent requirement: before starting the detail scan and again while/after it runs, create a narrowly scoped verifier subagent. It must independently check active scanner/snapshot processes, `http://127.0.0.1:8766/api/report-validation`, `http://127.0.0.1:8766/api/ui-state`, `http://127.0.0.1:8766/api/workflow-status`, and latest status files. If a scanner/snapshot process is active and the verifier sees localhost API failure, stale/mismatched workflow status, missing active highlight while scan is running, `activeCardVisible=false`, `activeCardFocused=false`, previous/next cue mismatch, or blocked/stopped workflow with a still-running scanner, kill only matching scanner/snapshot processes through `POST http://127.0.0.1:8766/api/kill-scanner` when available, or exact matching PIDs as fallback.\n\nCritical Jira/Sentry policy: for a known or deduped Jira ticket missing from Sentry Issue Tracking, attach that key through Sentry's Jira modal `Link` tab only. After opening Jira and selecting `Link`, click/focus the visible `Issue` dropdown/combobox, clear stale value, type the target Jira key or prefix, poll/select the matching dropdown option, verify the selected Jira issue is reflected in the `Issue` field, then click `Link Issue`. Never use the modal `Create` tab for a known/deduped ticket. Re-read Issue Tracking and require the key to be visible before marking the issue finished.\n\nJira assignment policy: assign existing unassigned Jira tickets by opening the Jira issue page in Chrome, clicking directly in the Jira assignee UI, and verifying the loaded Jira key and assignee field. Do not call Jira REST assignment endpoints under any condition. Jira REST may be used only for no-ticket dedupe/create; if no known/deduped ticket exists, dedupe in project `PRE`, create a `PRE` Bug assigned/reported to Thien Nguyen only when no duplicate exists, then return to Sentry and attach the created key through the Issue Tracking `Link` tab.\n\nSentry assignee mirror policy: after exactly one Jira key is linked or verified visible for the active Sentry issue, resolve the Jira Assignee from the verified Jira issue page in Chrome after any Jira UI assignment step, return to the same Sentry issue detail URL, and mirror that Jira Assignee to the Sentry issue assignee through the Sentry UI. If zero Jira keys, more than one distinct Jira key, no Jira assignee, no matching Sentry member option, or multiple matching Sentry member options are present, fail closed instead of guessing. Do not call Sentry REST assignment endpoints. If Sentry is already assigned to that owner, verify and record `already-assigned`; otherwise click/focus the Sentry assignee control, type/select the matching member option, and verify the Sentry assignee field before continuing.\n\nUI timing policy: each Chrome-driven Sentry/Jira UI action may wait and poll for up to 60 seconds by default before it is considered blocked. This includes opening the Sentry Jira modal, selecting `Link`, focusing/typing/selecting/verifying the `Issue` dropdown, waiting for `Link Issue`, verifying Issue Tracking, loading Jira, clicking/verifying Jira assignee controls, opening Sentry assignee controls, selecting the matching Sentry member, and verifying Sentry assignee. Defaults are controlled by `SENTRY_TRIAGE_SENTRY_ISSUE_TRACKING_ACTION_TIMEOUT_MS=60000`, `SENTRY_TRIAGE_JIRA_UI_ACTION_TIMEOUT_MS=60000`, and `SENTRY_TRIAGE_UI_ACTION_POLL_MS=1000`; status JSON must include timeout values, attempt counts, selected-state evidence, Jira owner evidence, Sentry member option evidence, and waited milliseconds for blocked UI actions.\n\nFail closed: Sentry auth, Chrome/profile drift, UI acknowledgement mismatch, off-screen/unfocused active card, Sentry Issue Tracking link verification failure, Jira UI assignment verification failure, Jira owner resolution failure, ambiguous linked Jira keys, ambiguous Sentry member mapping, Sentry assignee UI selection or verification failure, no-ticket Jira preflight/create failure, verifier-detected connectivity anomaly, or any blocked Jira/Sentry action must stop the run before the next issue is opened. Record the blocker in `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json` and do not report the issue as cleanly finished. When `SENTRY_TRIAGE_JIRA_DRY_RUN=1`, do not call Jira write endpoints and do not submit Sentry/Jira UI changes; record intended create/assign/link/assignee-mirror actions as dry-run results.\n\nRetry policy for `snapshot.sh`: retry exit codes `3` and `4` up to two additional times with 15s then 30s backoff. Do not retry exit codes `1`, `2`, or `5`. Do not use manual browser/JXA fallback unless the script has failed and the retry policy is exhausted, and never use a non-target Chrome profile.\n\nOutput files: full snapshot `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`; compact chat JSON `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-compact.json`; stderr log `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-last.stderr.log`; live sync status `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/live-report-sync-status.json`; detail Jira scan status `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json`.\n\nOn success or when a fresh blocker JSON is written: read compact JSON, live sync status, Jira scan status, and verifier result when present; validate `curl -fsS http://127.0.0.1:8766/api/report-validation`; display the saved compact JSON in chat inside a fenced `json` block; briefly state tab reused/opened, verified-profile tab count, saved Sentry row count, localhost sync status, issues opened, Jira tickets found/created/attached, Jira tickets assigned through Chrome UI, Sentry issues assigned to Jira owners, UI acknowledgement count, verifier health/kill decision, active-card/prev-next cue status, 5s dwell status, output paths, and blockers. Choose `NOTIFY` whenever a fresh success or blocker snapshot is written. Redact auth/session material in all JSON and chat output."
