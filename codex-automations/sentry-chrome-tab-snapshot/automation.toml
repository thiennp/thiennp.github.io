prompt = "Run `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot.sh` first. The script is the source of truth for this automation: it verifies the local Google Chrome profile signed in as `thien.nguyen.check24@gmail.com`, reuses or opens the exact target Sentry list URL, focuses the verified-profile tab, extracts visible Sentry rows, writes the full and compact JSON atomically, validates both JSON files, syncs `http://localhost:8766/` through `/api/report-data`, and leaves Chrome open.\n\nTarget Sentry URL: `https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h`.\n\nAfter a successful snapshot and localhost sync, the script runs `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/scan-issue-jira-links.mjs /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`. That scanner opens visible Sentry issues one at a time in the verified Chrome tab, sends live workflow status to `http://127.0.0.1:8766/api/workflow-status`, waits for `/api/ui-state` to confirm the app has focused the active card and rendered previous/current/next cues, and keeps each confirmed Sentry issue detail page focused for at least 5 seconds before moving on.\n\nVerifier subagent requirement: before starting the detail scan and again while/after it runs, create a narrowly scoped verifier subagent for this automation. The verifier must independently check active scanner/snapshot processes, `http://127.0.0.1:8766/api/report-validation`, `http://127.0.0.1:8766/api/ui-state`, `http://127.0.0.1:8766/api/workflow-status`, and the latest status files (`issue-jira-scan-status.json`, `live-report-sync-status.json`, `snapshot-compact.json`, and stderr log tail). If a scanner/snapshot process is active and the verifier sees an unusual state such as localhost API failure, stale/mismatched workflow status, missing active highlight while a scan is running, `activeCardVisible=false` or `activeCardFocused=false` for an active scan request, previous/next cue mismatch, or a blocked/stopped workflow with a still-running scanner, it must kill only the matching scanner/snapshot process through `POST http://127.0.0.1:8766/api/kill-scanner` when available, or exact matching PIDs as fallback. The main automation must wait for the verifier result before reporting success, include whether anything was killed, and choose `NOTIFY` when the verifier kills or flags anything unusual.\n\nCritical Jira/Sentry policy: when a known or deduped Jira ticket exists but is not visible in Sentry's Issue Tracking section, attach that existing key in Chrome through Sentry's Jira modal `Link` tab only, then re-read the Issue Tracking section and require the key to be visible before marking the issue finished. Never use the modal `Create` tab for a known/deduped ticket. Assign existing unassigned Jira tickets by opening the Jira issue page in Chrome, clicking directly in the Jira assignee UI, and verifying that the loaded Jira key matches the target key and the assignee field shows `Thien Nguyen`. Do not call Jira REST assignment endpoints under any condition, even if an environment flag attempts to enable a fallback. Jira REST may be used only for no-ticket dedupe/create; if no known/deduped ticket exists, dedupe in project `PRE`, create a `PRE` Bug assigned/reported to Thien Nguyen only when no duplicate exists, then return to Sentry and attach the created key through the Issue Tracking `Link` tab.\n\nFail closed: Sentry auth, Chrome/profile drift, UI acknowledgement mismatch, off-screen/unfocused active card, Sentry Issue Tracking link verification failure, Jira UI assignment verification failure, no-ticket Jira preflight/create failure, verifier-detected connectivity anomaly, or any blocked Jira/Sentry action must stop the run before the next issue is opened. Record the blocker in `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json` and do not report the issue as cleanly finished. When `SENTRY_TRIAGE_JIRA_DRY_RUN=1`, do not call Jira write endpoints and do not submit Sentry/Jira UI changes; record intended create/assign/link actions as dry-run results.\n\nRetry policy for `snapshot.sh`: retry exit codes `3` and `4` up to two additional times with 15s then 30s backoff. Do not retry exit codes `1`, `2`, or `5`. Do not use manual browser/JXA fallback unless the script has failed and the retry policy is exhausted, and never use a non-target Chrome profile.\n\nOutput files: full snapshot `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json`; compact chat JSON `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-compact.json`; stderr log `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-last.stderr.log`; live sync status `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/live-report-sync-status.json`; detail Jira scan status `/Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/issue-jira-scan-status.json`.\n\nOn success or when a fresh blocker JSON is written: read the compact JSON, live sync status, Jira scan status, and verifier result when present; validate `curl -fsS http://127.0.0.1:8766/api/report-validation`; display the saved compact JSON in chat inside a fenced `json` block; briefly state whether the tab was reused/opened, verified-profile tab count, saved Sentry row count, localhost sync status, issues opened for Jira scanning, Jira tickets found, Jira tickets created, Jira tickets attached in Sentry Issue Tracking, unassigned Jira tickets assigned to Thien Nguyen through Chrome UI, UI render acknowledgement count, verifier health/kill decision, whether active cards were focused/visible and previous/next cues rendered before continuing, whether each opened Chrome issue view met the 5s dwell, all output paths, and blockers. Because the user wants JSON shown in chat, choose a heartbeat `NOTIFY` response whenever a fresh success or blocker snapshot is written. Redact auth/session material in all JSON and chat output."
