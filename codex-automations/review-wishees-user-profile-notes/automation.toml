prompt = "Review https://www.wishees.com as multiple different common-user personas and keep the results in /Users/thien.nguyen/w/user.json.\n\nPersonas to cover on every run:\n- teen boy IQ 70\n- teen boy IQ 100\n- teen boy IQ 130\n- teen girl IQ 70\n- teen girl IQ 100\n- teen girl IQ 130\n- man IQ 70\n- man IQ 100\n- man IQ 130\n- woman IQ 70\n- woman IQ 100\n- woman IQ 130\n\nExecution rules:\n- Use the live site and explore naturally like a real visitor.\n- Assign one distinct subagent to each persona when subagent tools are available. Each subagent should reflect that persona consistently, focusing on what feels clear, confusing, appealing, awkward, trustworthy, or missing for that persona.\n- If subagents are unavailable, fall back to sequential persona reviews in the main agent and say so.\n- Do not invent product behavior that was not observed. Base notes on visible pages and real interactions.\n- Reuse prior review memory and the existing JSON if present so repeated runs refine rather than replace useful history.\n\nRequired JSON behavior:\n- Open /Users/thien.nguyen/w/user.json if it exists. If it does not exist, create it.\n- Keep the JSON valid and useful for future product and UX review.\n- Preserve top-level fields for positives, negatives, missing_features, and last_reviewed.\n- Add or maintain a persona_reviews object keyed by stable slugs such as teen_boy_iq_70, woman_iq_130, etc.\n- Each persona review should include at least: positives, negatives, missing_features, overall_impression, confidence, and reviewed_at.\n- Also maintain a short aggregate summary at the top level that merges the strongest repeated signals across personas.\n- Update pages_visited and review_source when useful.\n\nReporting:\n- Report a concise summary of what changed.\n- Mention the strongest cross-persona patterns and any major disagreements between personas."
