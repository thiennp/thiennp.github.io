name = "Hourly Sentry Jira Bugfix Workflow"
prompt = "Run the Sentry-to-Jira bugfix workflow using desktop applications and checkpoint progress to JSON so the workflow can resume if interrupted.

Global shared rules:
- Follow `/Users/thien.nguyen/.codex/AGENTS.md` for automation reporting and shared Jira duplicate-check/fingerprint rules. Do not duplicate those shared rules inside this automation prompt.

State and resume:
- Maintain a durable JSON status file at `/Users/thien.nguyen/.codex/automation-state/hourly-sentry-jira-bugfix.json`.
- At startup, read the JSON file if it exists and resume from the last completed step when possible.
- After every meaningful step, update the JSON with timestamp, current phase, selected Sentry issue URL/id, Jira ticket key, branch name, repo path, PR URL, errors, and next action.
- Do not lose prior history; append run entries where helpful.

Browser and account requirements:
- Use the real Chrome app, not the Codex in-app browser.
- Check whether Chrome is reachable/controllable.
- Find an open Chrome window using the profile/account `thien.nguyen.check24@gmail.com`.
- Check whether a Sentry tab is already open in that Chrome profile. If none exists, open a new Sentry tab. If one exists, focus that tab.
- Navigate the tab to `https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=7d`.

Sentry selection:
- Find the first unresolved issue that is either assigned to Thien Nguyen or unassigned.
- Open that Sentry issue.
- If no suitable issue exists, log that result in the JSON file and stop the run.

Jira handling:
- If the Sentry issue has an associated Jira ticket, open that Jira ticket in Chrome.
- If the associated Jira ticket is closed/resolved/done and the Sentry issue has regressed, never reopen the closed Jira ticket. Create a new Jira ticket instead and continue with the new ticket.
- If the Sentry issue has no Jira ticket, create a new Jira ticket with a `PRE-...` key, assign Thien Nguyen as developer, assignee, and reporter, link it to the Sentry issue, then continue.
- If the Jira ticket is not assigned to Thien Nguyen, log that it was ignored and stop the run.
- When starting implementation, transition the Jira ticket to In Progress.

Implementation workflow:
- The implementation branch must be named exactly like the Jira ticket key, for example `PRE-1234`.
- Locate the relevant repository under `/Users/thien.nguyen` based on the Jira ticket, Sentry context, stacktrace, linked project, or existing local repos.
- Use the Cursor desktop app to implement the fix. Do not implement through CLI-only editing when Cursor is required; open the relevant repo in Cursor and drive Cursor AI for the fix.
- Make focused changes for the Sentry issue and Jira ticket only.
- Verify the fix with the repo's appropriate tests/build checks where practical, recording commands/results in the JSON file.

Review workflow:
- After finishing the bug fix, ask Claude AI to review the code using the Claude desktop app.
- Open the relevant repo/context in Claude; do not guess the code without providing the repo context.
- Address actionable Claude review feedback if needed and update the JSON file.

Pull request workflow:
- Create a pull request to the `main` branch in Bitbucket after the fix and review are complete.
- Use the branch named exactly as the Jira ticket key.
- Once the PR is created, transition the Jira ticket to Code Review.
- Record the PR URL and final Jira status in the JSON file.

Strict tool/application constraints:
- Bitbucket, Sentry, and Jira must be opened with the Chrome app, not the Codex in-app browser.
- Cursor AI must be used through the Cursor app, not CLI.
- Claude review must be requested through the Claude app.
- Prefer safe, resumable progress. If any desktop app, account, permission, login, or automation-control capability is unavailable, log the exact blocker and stop rather than guessing."
