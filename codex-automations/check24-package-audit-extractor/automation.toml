name = "CHECK24 package audit extractor"
prompt = "Use Google Chrome to open `https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow` and extract the current Power package-audit vulnerability data into `/Users/thien.nguyen/sec.check24.de.json` for downstream agents.\n\nExecution flow:\n1. Open the URL in Google Chrome and wait for the page to finish loading.\n2. If Chrome shows a login wall, certificate/client-auth prompt, expired session, network error, or any other access blocker, stop without guessing. Write `/Users/thien.nguyen/sec.check24.de.json` with a valid JSON object containing `status: \"blocked\"`, the blocker type, visible evidence text, `captured_at`, and `source_url`, then report the blocker.\n3. Find every visible `Recheck` button on the package-audit page. Click all of them. If clicking all at once is not stable, click them sequentially.\n4. Wait until every recheck has finished. Treat disabled/spinner/loading states as still in progress. Continue waiting until there are no pending recheck indicators, or until a clear page error/blocker appears.\n5. Refresh the page after all rechecks finish, then wait for the refreshed page to stabilize.\n6. Enumerate every vulnerability/item row or card visible for the current critical, high, medium, and low filters.\n7. For each item, open it and click its `Details` button or equivalent details affordance. Read all visible detail content, including labels, package names, repositories/projects, versions, severity, vulnerability/advisory IDs, paths, dependency chains, scanner/source data, remediation/fixed-version guidance, timestamps, links, status text, and any raw notes shown by the page.\n8. Save all collected package-audit data to `/Users/thien.nguyen/sec.check24.de.json`. Keep the file valid JSON and useful for another agent. Preserve exact visible labels and raw detail text wherever possible instead of normalizing away information.\n9. After saving the package-audit data, open `https://c24-energie.atlassian.net/jira/for-you?tab=assigned` in Google Chrome and wait for Jira to finish loading.\n10. If Jira shows a login wall, expired session, network error, or any other access blocker, keep the package-audit items intact. Add a top-level `jira.status: \"blocked\"` object with visible blocker evidence, add `jira_ticket: null` and `jira_match: { \"status\": \"blocked\", \"reason\": \"<evidence>\" }` to every item, then write and validate the JSON.\n11. Read the assigned Jira items visible on the page. Search and paginate/scroll/filter as needed within the assigned view to find tickets related to the package-audit items.\n12. For every package-audit item, identify related Jira tickets by matching visible Jira issue text, issue keys, summaries, descriptions/previews, labels, repository names, file paths, package names, CVE/GHSA/advisory identifiers, or other strong visible evidence. Do not invent relationships. If multiple tickets match one item, include all strong matches and mark the best one as primary. If no visible assigned ticket matches, set the ticket fields to null/empty and record the no-match reason.\n13. Re-write `/Users/thien.nguyen/sec.check24.de.json` with Jira ticket data merged into each item, then parse the file to verify it is valid JSON and contains the expected top-level keys.\n\nRequired JSON shape:\n{\n  \"status\": \"ok|partial|blocked|error\",\n  \"captured_at\": \"ISO-8601 timestamp\",\n  \"source_url\": \"https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow\",\n  \"page_title\": \"visible title if available\",\n  \"filters\": { \"slug\": \"power\", \"vulnerabilityCountsSearch\": [\"critical\", \"high\", \"medium\", \"low\"] },\n  \"recheck\": {\n    \"buttons_found\": 0,\n    \"buttons_clicked\": 0,\n    \"started_at\": \"ISO-8601 timestamp or null\",\n    \"finished_at\": \"ISO-8601 timestamp or null\",\n    \"errors\": []\n  },\n  \"jira\": {\n    \"status\": \"ok|partial|blocked|error\",\n    \"source_url\": \"https://c24-energie.atlassian.net/jira/for-you?tab=assigned\",\n    \"captured_at\": \"ISO-8601 timestamp or null\",\n    \"assigned_tickets_seen\": 0,\n    \"matched_items\": 0,\n    \"errors\": []\n  },\n  \"summary\": {\n    \"total_items\": 0,\n    \"by_severity\": {},\n    \"by_repository\": {},\n    \"by_package\": {},\n    \"with_jira_ticket\": 0,\n    \"without_jira_ticket\": 0\n  },\n  \"items\": [\n    {\n      \"stable_key\": \"best stable key from visible item data\",\n      \"row_index\": 0,\n      \"severity\": \"visible severity or null\",\n      \"package_name\": \"visible package name or null\",\n      \"current_version\": \"visible current version or null\",\n      \"fixed_version\": \"visible fixed/remediated version or null\",\n      \"repository\": \"visible repository/project or null\",\n      \"paths\": [],\n      \"advisory_ids\": [],\n      \"cve_ids\": [],\n      \"cwe_ids\": [],\n      \"links\": [],\n      \"remediation\": \"visible remediation guidance or null\",\n      \"status_text\": \"visible status/actionability text or null\",\n      \"jira_ticket\": {\n        \"key\": \"PRE-1234 or other visible key\",\n        \"title\": \"visible Jira summary\",\n        \"url\": \"visible Jira issue URL\",\n        \"status\": \"visible Jira status or null\",\n        \"assignee\": \"visible assignee or null\"\n      },\n      \"jira_tickets\": [],\n      \"jira_match\": {\n        \"status\": \"matched|no_match|blocked|error\",\n        \"confidence\": \"high|medium|low|null\",\n        \"matched_on\": [],\n        \"evidence\": \"short visible evidence used for the match or no-match reason\"\n      },\n      \"row_text\": \"raw visible row text\",\n      \"details_text\": \"raw visible details text\",\n      \"detail_fields\": { \"visible label\": \"visible value\" },\n      \"captured_at\": \"ISO-8601 timestamp\"\n    }\n  ],\n  \"errors\": []\n}\n\nCollection and matching rules:\n- Do not invent values that are not visible. Use `null`, empty arrays, and an `errors` entry when data is absent or a row cannot be opened.\n- If some package-audit rows are captured but others fail, write `status: \"partial\"` and include per-row errors.\n- If Jira matching partially fails, keep `status: \"partial\"` only when the package-audit extraction is incomplete; otherwise keep `status: \"ok\"` and set `jira.status: \"partial\"` with Jira-specific errors.\n- If there are no package-audit items after refresh, write `status: \"ok\"` with an empty `items` array and zero summary counts, then still set `jira.status` to `ok`, `blocked`, or `error` based on whether Jira could be checked.\n- Related-ticket matching must be evidence-based. Prefer exact repository name, exact package name, exact filepath, advisory ID, or CVE/GHSA match. Use a low-confidence match only when the Jira text clearly refers to the same vulnerable dependency work; otherwise record `no_match`.\n- After writing the JSON, reopen/read it or parse it to verify it is valid JSON and contains the expected top-level keys.\n- Final output should include the status, number of recheck buttons clicked, number of items captured, Jira status, number of items with related Jira tickets, the JSON path, and any blockers/errors.\n- After the JSON is written and validated, show the JSON content in the final thread response in a fenced `json` code block so Thien Nguyen can read it here. If the content is too large for the response limit, show the top-level summary plus as many complete `items` entries as fit, state that it was truncated, and include the file path for the full JSON."
