version = 1
id = "check24-package-audit-extractor"
kind = "cron"
name = "CHECK24 package audit extractor"
prompt = "Use Google Chrome to open `https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow` and extract the current Power package-audit vulnerability data into `/Users/thien.nguyen/sec.check24.de.json` for downstream agents.\n\nCritical stability guardrails:\n1. Never trust Chrome's active tab. Always target a Chrome tab whose URL contains `sec.check24.de/package-audit` for package-audit work. If none exists, open a new tab/window with the package-audit URL and then target that URL-matched tab explicitly.\n2. Before running Chrome JavaScript, verify `View > Developer > Allow JavaScript from Apple Events` is enabled by executing a tiny script against the target tab. If Chrome blocks JavaScript from Apple Events, do not overwrite `/Users/thien.nguyen/sec.check24.de.json`; keep the previous good file and report the blocker.\n3. Never overwrite the existing JSON directly during scraping. Write new output to `/Users/thien.nguyen/sec.check24.de.json.tmp` first. Only atomically replace `/Users/thien.nguyen/sec.check24.de.json` after all validation passes.\n4. Before replacing the JSON, create/update a backup of the previous good file at `/Users/thien.nguyen/sec.check24.de.json.bak`.\n5. The report must never be replaced by an empty or partial scrape unless the page itself visibly and confidently says there are zero package-audit rows. For this CHECK24 Power audit flow, expect 16 rows unless the page visibly shows a different explicit count. If a scrape sees 0 rows, a non-CHECK24 URL, no Details buttons, or an unrelated page such as Jira/Jenkins/Sentry, treat it as a failed scrape and keep the previous good JSON.\n6. Validate these invariants before promoting the tmp file:\n   - top-level `status` is `ok` or `partial` with explicit errors;\n   - `items` is an array;\n   - `items.length` is 16 for the current known Power audit report, unless the CHECK24 page visibly shows a different explicit total;\n   - every item has `repository`, `filepath`, `branch`, `severity`, `details_text`, `detail_fields`, and `package_audit_details.raw_text`;\n   - `details_text` for every item contains `Audit Details`, `BRANCH`, `LAST CHECKED`, `HOW IT WAS SCANNED`, and `Package`;\n   - `summary.total_items === items.length`;\n   - `summary.with_jira_ticket + summary.without_jira_ticket === items.length`;\n   - `summary.with_local_repository + summary.without_local_repository + summary.ignored_local_repository === items.length`;\n   - ignored local repositories are exactly `enrg-chatbot` and `enrg-messagesystem` when those items are present;\n   - parsed JSON can be read back from disk.\n7. If any invariant fails, leave `/Users/thien.nguyen/sec.check24.de.json` unchanged, write the failed candidate to `/Users/thien.nguyen/sec.check24.de.failed.json`, and report the exact failed invariant.\n8. Final output must explicitly include: whether the previous file was preserved or replaced, item count, details coverage, package-audit tab URL used, recheck button counts, Jira match counts, local repository counts, ignored repositories, JSON path, backup path, and any failed/blocked guardrail.\n\nExecution flow:\n1. Open or find the CHECK24 package-audit URL in Google Chrome and wait for the page to finish loading. Explicitly target the tab with URL containing `sec.check24.de/package-audit` for all package-audit JavaScript.\n2. If Chrome shows a login wall, certificate/client-auth prompt, expired session, network error, Apple Events JavaScript blocker, or any other access blocker, do not overwrite the previous report. If no previous report exists, write a blocked JSON only after validating that it is intentionally a blocked-state report.\n3. Verify the package-audit page before interacting: URL must contain `sec.check24.de/package-audit`, title/body must indicate CHECK24 Security/package audit, and visible Details/Recheck controls or an explicit zero-results state must be present.\n4. Find every visible `Recheck` button on the package-audit page. Click all of them, sequentially if needed. Record `buttons_found`, `buttons_clicked`, `started_at`, `finished_at`, and wait observations.\n5. Wait until every recheck has finished. Treat disabled/spinner/loading states as still in progress. After waiting, refresh the same URL-matched CHECK24 tab and wait for the refreshed page to stabilize.\n6. Enumerate every vulnerability/item row visible for the current critical, high, medium, and low filters. Refuse to continue if the row count is 0 without a visible explicit zero-results message.\n7. For each item, open its `Details` button from the URL-matched CHECK24 tab, read the dialog content, and close it before moving on. Capture all visible detail content including labels, package names, repositories/projects, versions, severity, vulnerability/advisory IDs, paths, dependency chains, scanner/source data, remediation/fixed-version guidance, timestamps, links, status text, and raw notes shown by the page.\n8. Every item must include CHECK24 details in all of these fields: `details_text`, `detail_fields`, and `package_audit_details.raw_text`. Parse the package table into `vulnerable_packages`; if the table is awkward but visible in `details_text`, keep the raw text and include the best parsed rows possible.\n9. Open `https://c24-energie.atlassian.net/jira/for-you?tab=assigned` in Google Chrome and wait for Jira to finish loading. Jira tab work may use the Jira URL-matched tab, but must never retarget the package-audit scrape to Jira.\n10. If Jira is blocked by login/session/network/access, keep package-audit items intact. Add top-level `jira.status: \"blocked\"`, visible blocker evidence, and item-level `jira_ticket: null`, `jira_issue: null`, plus `jira_match.status: \"blocked\"`.\n11. Read assigned Jira items visible on the page. Search/scroll/filter as needed within the assigned view to find tickets related to package-audit items. Add `jira_ticket`, `jira_tickets`, and `jira_match` evidence to every item.\n12. For every primary matched Jira ticket, open the Jira issue page in Chrome and read visible issue content into `jira_issue` when Apple Events/page access allows it. If issue content cannot be read, keep `jira_ticket` and set per-item `jira_issue.status: \"blocked\"` or `\"error\"` with evidence.\n13. For every distinct repository except ignored repositories, resolve the local repository only at root level: `/Users/thien.nguyen/<repository>`. Do not scan nested folders or broad workspace roots.\n14. Always ignore `enrg-chatbot` and `enrg-messagesystem` during local repository discovery and cloning. Keep the package-audit/Jira item if present, but set `local_repository.status: \"ignored\"`, `path: null`, `local_url: null`, and `reason: \"Repository intentionally ignored by automation configuration\"`.\n15. If `/Users/thien.nguyen/<repository>` exists and is a git repository, verify it with `git -C /Users/thien.nguyen/<repository> remote -v`. Prefer exact git remote evidence containing `bitbucket.org/check24/<repository>`. Add `local_repository.status: \"found\"`, `name`, `path`, `local_url` as a `file://` URL, `remote_url`, `bitbucket_url`, and `matched_by`.\n16. If `/Users/thien.nguyen/<repository>` exists but is not a usable git repository or does not match the expected Bitbucket repository, do not overwrite it. Add `local_repository.status: \"blocked\"` or `\"error\"`, reason, and command evidence.\n17. If `/Users/thien.nguyen/<repository>` does not exist, open `https://bitbucket.org/check24/workspace/repositories/` in Google Chrome, search/find the repository by exact name, open the repository page, read or infer the clone URL, and clone it to `/Users/thien.nguyen/<repository>`. Prefer SSH clone URLs when visible/available; otherwise use HTTPS. Never overwrite an existing directory.\n18. Assemble the full JSON in memory, write it to `/Users/thien.nguyen/sec.check24.de.json.tmp`, validate all guardrail invariants against the tmp file, then promote tmp to `/Users/thien.nguyen/sec.check24.de.json` only if validation passes.\n19. After the validated JSON report has been promoted and shown in the final thread response, start remediation work by delegating tickets to subagents. Do not start remediation before the JSON report is shown.\n\nPost-report remediation delegation workflow:\n1. Work only from the validated `/Users/thien.nguyen/sec.check24.de.json` report from this run.\n2. Create one subagent per actionable Jira ticket/item, with exactly one Jira ticket assigned to each subagent. Use the ticket key as the subagent scope label, for example `PRE-4353 (Cursor Remediation Agent: enrg-app-bo)`.\n3. Skip remediation subagents for items whose `local_repository.status` is `ignored`, `blocked`, `missing`, or `error`, or whose package-audit details show no actionable package/fix path. For skipped items, handle Jira as described in the no-fix workflow below.\n4. The main automation agent is the orchestrator. Subagents may inspect local files and propose commands, but all code changes must be delegated to Cursor AI. Do not hand-edit application code directly in the orchestrator.\n5. Each subagent must work in the item's `local_repository.path` only and must use the Jira ticket key as the branch name exactly, for example `PRE-1234`. If a branch already exists, reuse it after checking its current state; never overwrite unrelated work.\n6. Before code work starts for a ticket, use Chrome/Jira to move that Jira ticket to `In Progress`. Do not move ignored, blocked, or not-actionable tickets to In Progress.\n7. Instruct Cursor AI to make the dependency/security fix in the local repository for that one ticket. Cursor must own the code changes. The subagent should give Cursor the ticket key, package-audit details, repository path, affected lockfile/path, package names, severity, branch name, and required verification.\n8. The branch for every fix must always be exactly the Jira ticket key, for example `PRE-1234`.\n9. The commit message for every fix must always start with the Jira key and use this format: `PRE-1234: (fix) - <short human-readable summary>`.\n10. After Cursor finishes changes, the subagent must verify the repo state, relevant dependency/audit checks, and tests where feasible. If verification fails, do not create a PR; report the blocker and keep/update Jira according to the no-fix/blocker workflow.\n11. When Cursor's change is verified, create a pull request in Bitbucket using Chrome. The PR source branch must be the ticket branch, and the PR title should use the same format as the commit: `PRE-1234: (fix) - <short human-readable summary>`.\n12. Add Aleksandar Jaksic and Jens Bachmann as reviewers on every PR. Use Chrome to create/update the PR and reviewer assignment. If reviewer assignment fails, keep the PR but report the failure clearly.\n13. After the PR is created successfully, use Chrome/Jira to move the Jira ticket to `In Code Review`. Do not move a ticket to In Code Review unless a PR URL exists.\n14. The final remediation output must include one line per ticket: ticket key, repository, branch, commit message, PR URL if created, reviewers assigned, Jira transition performed, verification run, and blocker/no-fix comment if any.\n\nNo-fix / not-actionable workflow:\n1. If a ticket cannot be fixed because there is no available fixed upstream version, no vendor-supported remediation path, the package-audit Details provide no actionable dependency, or the repository is intentionally ignored, do not create code changes or a PR.\n2. Before commenting, open the Jira ticket in Chrome and read previous visible comments/activity. Avoid duplicate comments. If a recent comment already says the same blocker/no-fix reason, do not add another comment; report that the existing comment was reused.\n3. If a new comment is needed, keep it short, clear, and understandable to a non-technical human. Avoid jargon and long logs. Example style: `I checked this item again. There is currently no safe update available for the affected package, so I cannot prepare a fix yet. I will leave this ticket in To Do until an update becomes available.`\n4. Move the Jira ticket to `To Do` after adding or confirming the no-fix comment. Do not leave not-actionable tickets In Progress.\n5. Save the no-fix evidence and comment status in the final output and, if updating the JSON is useful, in an item-level remediation field.\n\nRequired JSON additions:\n- Top-level `jira` object with `status`, `source_url`, `captured_at`, `assigned_tickets_seen`, `matched_items`, `issues_read`, and `errors`.\n- Top-level `repositories` object with `status`, `search_roots: [\"/Users/thien.nguyen\"]`, `clone_root: \"/Users/thien.nguyen\"`, `found`, `cloned`, `ignored`, `blocked`, `ignored_repositories: [\"enrg-chatbot\", \"enrg-messagesystem\"]`, and `errors`.\n- Top-level `remediation` object with `status`, `started_at`, `finished_at`, `tickets_total`, `tickets_delegated`, `tickets_skipped`, `prs_created`, `jira_moved_in_progress`, `jira_moved_in_code_review`, `jira_moved_to_do`, and `errors`.\n- Summary fields `with_jira_ticket`, `without_jira_ticket`, `with_jira_issue_content`, `without_jira_issue_content`, `with_local_repository`, `without_local_repository`, and `ignored_local_repository`.\n- Each item gets `jira_ticket`, `jira_tickets`, `jira_match`, `jira_issue`, `jira_issues`, `local_repository`, `details_text`, `detail_fields`, `package_audit_details`, and optional `remediation` status.\n\nRules:\n- Do not invent values that are not visible or locally verified. Use `null`, empty arrays, and errors when data is absent.\n- Jira issue content must be captured from the actual issue page, not inferred from the assigned-list row alone. The assigned-list row is enough for `jira_ticket`; `jira_issue` requires opening/reading the issue.\n- If Chrome blocks JavaScript from Apple Events or Jira issue pages cannot be read, record the blocker in `jira.errors`, set per-item `jira_issue.status: \"blocked\"`, and continue with package-audit/local repository data when possible.\n- If repository discovery or cloning partially fails, keep package-audit and Jira data intact. Set `repositories.status` appropriately and record item-level evidence.\n- Local repository matching must use `/Users/thien.nguyen/<repository>` only. Do not scan nested folders or other roots.\n- Never delete, reset, clean, or overwrite existing local repositories or directories. Only clone missing repositories into a nonexistent `/Users/thien.nguyen/<repository>` directory.\n- Never create duplicate Jira comments for the same no-fix/blocker reason; read previous comments first.\n- Never move a Jira ticket to In Code Review without a PR URL.\n- Never create a PR without assigning or attempting to assign Aleksandar Jaksic and Jens Bachmann as reviewers.\n- After writing JSON, reopen/read it or parse it to verify validity.\n- After the JSON is written and validated, show the JSON content in the final thread response in a fenced `json` code block before starting remediation delegation. If too large, show the top-level summary plus complete item entries as space allows, state that it was truncated, and include the full JSON path.\n\nAgent Report requirement (updated 2026-06-02):\n- At the very start of every run or heartbeat, ensure the Agent Report server is running by executing: AGENT_REPORT_SEND_STATUS=0 /Users/thien.nguyen/thiennp.github.io/agent-report/scripts/ensure-agent-report-server.sh\n- Immediately after the ensure step, send a start message to the Agent Report page at http://localhost:3100/ so Thien can see that this automation has started.\n- Always report major step completion, every individual item finished, pause/blocker, and final state to ws://localhost:3100/stream with automationName, title, status, and text. Keep source as terminal; do not put the automation name in source.\n- Item-finished reports are mandatory: whenever a ticket, PR, vulnerability, listing, persona review, file sync, subagent assignment, scan row, or other discrete work item completes, immediately send a report before moving to the next item. Do not wait for the final summary.\n- Each item-finished report must include the item name/key, status, key evidence/output, whether the automation continues or stops, and the next item or next step.\n- Preferred command: cd /Users/thien.nguyen/thiennp.github.io/agent-report && AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --automation-name \"CHECK24 package audit extractor\" --title \"<item or step title>\" --status <running|success|warning|error|blocked|pending|info> \"<concise update>\"\n- Use honest statuses: running for in progress, success for completed work, warning for partial/non-blocking issues, error or blocked for stopped work, pending for waiting, info for neutral updates.\n- If the report server or send command fails, mention that in the final output and continue only when the current task can safely run without the report page."
