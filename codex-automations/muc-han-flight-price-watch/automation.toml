prompt = "Check live flight prices for a round trip from Munich (MUC) to Hanoi (HAN) for 2 adults and 1 child born 2024-10-23. Check both Economy and Premium Economy cabins. Outbound date options are January 30, January 31, and February 1, 2027. Return date options are February 18, February 19, and February 20, 2027. Only report itineraries with nonstop or at most 1 transit each direction.\n\nImportant verification rule: do not treat a search-result card as a final verified price. Use search platforms only to discover candidates. For each candidate worth reporting, click through to the flight detail page, booking handoff page, or airline fare/cart page wherever possible. Mark the verification depth for every price as one of: airline_cart, airline_fare_detail, ota_detail, booking_handoff, search_card_lead, blocked, or unavailable. If a platform blocks automation or a click-through cannot be completed, report that clearly and keep the search-card value separate from verified values.\n\nCheck Vietnam Airlines directly first, then compare relevant platforms such as Google Flights, Skyscanner, KAYAK, momondo, Expedia, and airline sites surfaced by those platforms. For Vietnam Airlines and any airline site reachable from a result, open the flight/fare detail and capture every visible fare level, not only premium economy: Economy Basic/Lite/Class/Classic/Flex, Premium Economy Classic/Flex, mixed-class premium, Business, and any branded fare names shown. Track all surfaced airlines and mixed-airline itineraries separately, including Singapore Airlines, Qatar Airways, Vietnam Airlines, Air China, Etihad, Turkish, Emirates, Lufthansa, and any new airline found. When an airline or itinerary does not surface true Premium Economy, look for the closest more-legroom comfort product, such as Extra Legroom, Preferred Seat, XL Seat, Economy Space, Comfort/Deluxe seat benefits, or an Economy fare only when it explicitly includes extra leg space. Keep those products separate from true Premium Economy and do not label an extra-legroom seat add-on as Premium Economy. If a comfort-equivalent product is policy-only with no fare or seat price opened, report it as price-not-verified/policy-only in notes instead of creating a verified price observation.\n\nFor every itinerary with a transit, capture and report the transit airport, layover duration, and total travel time for each direction. If only one direction is expanded on a search card, say which direction is still pending click-through.\n\nMaintain /Users/thien.nguyen/thiennp.github.io/codex-automations/muc-han-flight-price-watch/price-history.json by appending a daily observation for every airline/fare-level/date-pair series. Do not discard prior history. Update /Users/thien.nguyen/thiennp.github.io/codex-automations/muc-han-flight-price-watch/index.html so it reports all date and cabin combinations, all verified fare levels by airline, true Premium Economy options, comfort-equivalent extra-legroom options when Premium Economy is unavailable, the cheapest verified total, practical alternatives when the cheapest has long layovers, transit airport and layover times, source status, blocked platforms, and a daily price-change diagram by airline and fare level. The diagram should distinguish verified detail/cart prices from search-card leads. Keep verified live prices clearly separated from pending, blocked, unavailable, policy-only, or search-card-only checks."
