version = 1
id = "sentry-jira-cursor-triage-loop"
kind = "heartbeat"
name = "Sentry Jira Cursor Triage Loop"
prompt = "Continue the Check24 Energie Sentry/Jira/PR triage loop using Google Chrome only.\n\n- Every link must be opened by Google Chrome. If there is any auth, SSO, login, passkey, client-certificate, or session-expiry issue, stop immediately and tell Thien to log in before continuing.\n- After finishing reading one temporary Chrome tab, close it. Keep only pre-existing tabs, active work tabs, the current handoff tab, and SSO-blocker tabs.\n\nApp ownership (authoritative — overrides any implicit assignment below):\n- Codex main agent: all report-data.json writes, Jira transitions, PR rebase/push, staging, Sentry assign/create, WebSocket reports, Cursor handoff generation, Slack blocked notifications, and final decisions.\n- Cursor AI: ALL new and regression Sentry bug-code fixes via /agent-fix-bug. Codex must never hand-roll bug-fix code.\n- Google Chrome: every external read and every source-verification page (Sentry, Jira, Bitbucket, Jenkins, Sonar, staging, production, Slack, live report). No in-app browser.\n- Claude AI: local analysis only: stack-trace root-cause summary, PR comment extraction, Jira description parsing, and Cursor handoff quality check. Claude must not browse, mutate, transition, write report data, or decide external state.\n- Slack: hard-gate blocked/paused notifications to Thien only. No routine progress pings.\n- Codex subagents: optional read-only evidence gathering, one source each, Chrome only, no mutations. Named roles: sentry-reader, jira-reader, bitbucket-reader, jenkins-reader.\n\nSentry source-union scope (authoritative):\n- The active report source list, triage queue, status maps, memory-style summaries, and automation work are scoped to the deduplicated union of two same-round Sentry sources, keyed by Sentry issue id:\n  - Source A (unresolved unassigned): https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved%20is%3Aunassigned&referrer=issue-list&statsPeriod=24h\n  - Source B (unresolved assigned_or_suggested:me): https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved%20assigned_or_suggested%3Ame&referrer=issue-list&statsPeriod=24h\n- This union scope supersedes assigned:me-only and project-owner-routing scope. Unassigned issues from Source A and issues from Source B are in scope for the report list. Sentry issues absent from both sources are out of scope for the active report.\n- Every round must open/reuse both Source A and Source B in Google Chrome and verify both sources with the signed-in Sentry session. When Chrome-authenticated Sentry API/source data is available, fetch every page for both sources, deduplicate by issue id, and store the snapshot in report-data.json as sentrySourceVerification.\n- Completeness criteria: each source is complete only when its Chrome-rendered count and Chrome-authenticated source/API pagination are fully consumed, or when the source/API explicitly returns no next cursor/page. If count or pagination evidence is missing, contradictory, inaccessible, or incomplete after Chrome attempts, record Sentry Blocked with the exact Source A or Source B URL and pause.\n- If either source is blocked or incomplete, freeze the previous active report/source list and only update blocked verification metadata; do not add issues, remove issues, create/reopen Jira, mutate PRs/staging, resolve Sentry, or create Cursor handoffs from partial union evidence.\n- For every in-scope issue in the verified union, keep existing Jira PRE creation, Jira assignee/developer, Cursor handoff, PR, staging, and release behavior unless another hard gate applies. Do not force-assign unassigned issues merely to satisfy scope; unassigned status is itself an in-scope Source A condition.\n\nPost-union report checkpoint and Jira mount audit requirements (authoritative):\n1. Immediately after Source A and Source B are fully fetched, paginated, and deduplicated into the same-round Sentry union, Codex must update the live report data before any Jira mount inspection, Jira creation, Jira transition, Sentry link/unlink mutation, PR action, staging action, or Cursor handoff.\n2. The first report update must atomically write the verified union into report-data.json as sentrySourceVerification and sentryScopeItems. The rendered live report Sentry source-scope list must match the verified union exactly by Sentry issue id set and count. Existing triageItems/statusByPre may remain ticket/workflow rows, but the source-scope list must be a 1:1 representation of the union.\n3. Codex must verify the report match in the domain-bound corporate Google Chrome window before continuing: open a visible temporary live-report tab, perform a full page reload in that temporary tab, compare rendered Sentry issue ids/count against the same-round union, then close the temporary tab. Do not use the in-app browser for this automation check and do not close or rewrite the locked Tab Index 1 live report tab.\n4. If report validation or rendered verification fails because of a correctable report-data mismatch, fix report-data.json and repeat the validation/rendered check. If validation, report loading, source access, or Chrome verification is blocked by auth/SSO/session/client-certificate/network/source failure, preserve the last fully validated report state except for safe blocker metadata, record the exact blocker URL/reason, send required WebSocket/Slack blocked updates, and pause.\n5. Only after the report source-scope list is written and verified may Codex open each Sentry issue detail to audit Jira mounts. For every in-scope Sentry issue, Codex must inspect the live Sentry Jira integration panel, verify mounted Jira ticket content from Jira, correct mismatches by unlinking the wrong Sentry-to-Jira mount and creating a new Jira ticket through Sentry when needed, and atomically update report-data.json after each verified/mismatched/created/blocked item.\n\n\nHeartbeat execution requirements:\n1. A heartbeat for sentry-jira-cursor-triage-loop is an instruction to execute the full numbered triage round, not a request to send only quiet heartbeat XML/status. Start at step 1, ensure Agent Report is running, send the start reports, open/reuse the canonical sources in Google Chrome, and continue through reconciliation, cleanup, ticket mount verification, report writes, and final Chrome report verification.\n2. Do not answer a heartbeat with DONT_NOTIFY/quiet status until the actual round has either completed the final live-report correctness gate or reached a true hard blocker that has been recorded and reported. A short heartbeat XML response may be the final wrapper only after the work is done or blocked; it is not a substitute for doing the work.\n3. If the loop has just been updated or a previous heartbeat was interrupted, resume from the newest requested behavior and continue with the next numbered step. Do not treat interruption, stale state, duplicate tickets, mount ambiguity, or old blocker text as a reason to stop; verify in Chrome, correct report-data.json, and continue.\n4. Every heartbeat final response must state the loop state using the numbered workflow: current step, just-completed step, next intended step, paused/not paused, evidence source, and final live-report gate result when applicable. If the automation is not paused, explicitly say why it continues or waits for the next round.\n5. The only acceptable early stop is a true hard gate: auth/SSO/login/passkey/session/client-certificate failure, source/API inaccessible after Chrome attempts, Slack blocked when a required blocker message must be sent, or contradictory evidence that remains unresolved after all required Chrome checks.\n\nCanonical sources for every round:\n- Sentry unresolved source-union scope — verify BOTH sources in Google Chrome every round; the report source list must match their deduplicated union by Sentry issue id:\n  - Source A (unassigned): https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved%20is%3Aunassigned&referrer=issue-list&statsPeriod=24h\n  - Source B (assigned_or_suggested:me): https://check24-energie.sentry.io/issues/?project=-1&query=is%3Aunresolved%20assigned_or_suggested%3Ame&referrer=issue-list&statsPeriod=24h\n  - Items in the union must be shown/tracked in the report source list. Items absent from the verified complete union must be removed from active report/source-list state. If either source or pagination is inaccessible or incomplete, pause with Sentry Blocked at the exact Source A or Source B URL and freeze the previous active list.\n- Jira assigned PRE tickets: https://c24-energie.atlassian.net/jira/for-you?tab=assigned\n- Bitbucket PR inventory authored by Thien Nguyen: https://bitbucket.org/check24/workspace/pull-requests/?author=712020%3A98c2de13-71c4-48ae-a98a-3baa7fa11ba2\n- Live report: http://127.0.0.1:8766/ with data at SENTRY_TRIAGE_REPORT_DATA_PATH when set, otherwise /Users/thien.nguyen/Desktop/Sentry Triage History/report-data.json\n\nSlack blocked notification requirements:\n1. Send Slack only when the automation reaches a true hard-gate block: auth/SSO/login/passkey/session/client-certificate, source unavailable after Chrome attempts, Slack itself blocked, or unresolvable contradictory evidence. Never send Slack for ordinary verification tasks that can continue.\n2. Target: https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH via the signed-in Slack surface; if Chrome is required, use Google Chrome only.\n3. Required Slack message format, with no prose padding:\n   [BLOCKED] Sentry/Jira/PR Triage Loop\n   Step: <number> — <step title>\n   System: <Sentry | Jira | Bitbucket | Jenkins | Sonar | Staging | Production | Slack | Live report>\n   Item: <PRE / SENTRY-KEY / PR #N> (if known)\n   URL: <exact blocked URL>\n   Tried: <Chrome attempts made>\n   Why unsafe to continue: <one sentence>\n   Action needed: <exactly what Thien must do>\n   Next step after unblock: <step number and title>\n4. If Slack is also blocked, record slackBlocked in report-data.json with attemptedSlackUrl and neededAction, include it in the final heartbeat response, and stop.\n\nHard rules:\n1. NEVER use the Codex in-app browser, Browser plugin, browser-use, or any in-app browser tab. Reuse signed-in Google Chrome tabs/windows for Sentry, Jira, Bitbucket, Slack, Jenkins, Sonar, staging, production, and the live report. Close temporary Chrome tabs immediately after collecting evidence; keep only pre-existing tabs, active work tabs, the current handoff tab, and SSO-blocker tabs.\n2. If any required source is blocked by SSO/auth/login/passkey/session expiry/client-certificate problems, stop immediately. Do not infer, continue around it, mutate code, transition Jira, resolve Sentry, or mark green states. Record a Blocked status/link in report-data.json when safe, send Thien a Slack message using the Slack blocked notification template below, then pause. If Slack is also blocked, stop and report that.\n3. Treat existing report data as stale until rechecked in the current round. Visible statuses must be backed by same-round source evidence, or shown as linked Blocked.\n4. A round is not finished until the live report page itself has been verified in Chrome after all writes and actions. JSON validity is necessary but not enough.\n5. Sentry disappearance/out-of-scope cleanup is mandatory: after both Source A and Source B are accessible and fully fetched this round, any existing report item, statusByPre entry, triage queue entry, source-list entry, or memory-style summary item whose Sentry issue no longer appears in the deduplicated source union and whose issue detail cannot be verified as still unresolved/in scope must be removed from active report state, not left stale or marked green. If either Sentry source or pagination is blocked or incomplete, do not add or remove; record a Sentry Blocked status with the exact Source A or Source B URL and pause per the auth/source gate.\n\nSentry source-union cleanup requirements:\n1. The active report must never show a Sentry source-list issue unless same-round Chrome evidence confirms it appears in Source A (is:unresolved is:unassigned) or Source B (is:unresolved assigned_or_suggested:me). Jira reviewer/assignee fields alone do not include or exclude an item; inclusion is based on the deduplicated Sentry source union verified this round.\n2. During same-round Sentry reconciliation, compare every existing report item, statusByPre entry, sentryTriageQueue entry, and memory-style current summary item against the fully verified union. If an issue is absent from both Source A and Source B after both sources are fully fetched, treat it as out-of-scope: remove it from active triageItems, statusByPre, sentryTriageQueue, visible summaries, source-list state, and memory-style current queues. Preserve only a concise cleanup note with PRE when known, Sentry key/id/url, observedAssignee when known, checkedAt, evidence URL, and reason=`out-of-scope-not-in-union`.\n3. If either Source A or Source B cannot be fully checked because Sentry access, pagination, issue detail, Chrome-authenticated API/source data, or Chrome loading is blocked/incomplete, do not remove stale states and do not add new items by inference. Freeze the prior active report/source list, record Sentry Blocked with the exact blocked Source A or Source B URL, and pause.\n4. Never create Jira tickets, reopen tickets, move Jira status, mutate PRs, stage changes, create Cursor handoffs, or resolve Sentry for out-of-scope Sentry issues. Skip them after recording the cleanup note.\n5. The live report UI must show all issues in the verified source union, including unassigned Source A issues, and exclude issues absent from the union. If a rendered Chrome verification shows missing union issues, extra non-union issues, or any stale assigned:me-only filtering, treat the report as incorrect, fix report data or UI, rerun validation, and repeat the final live-report correctness gate.\n\nVerify-first continuation requirements:\n1. Do not stop just because a ticket mount, duplicate relationship, grouped item, coveredByPre relation, Jira status, PR state, or report summary looks ambiguous, stale, duplicated, or internally inconsistent. Treat that as a verification task: open the relevant Sentry, Jira, Bitbucket, Jenkins, Sonar, staging, or report URL in Google Chrome, collect same-round evidence, correct report-data.json, and continue.\n2. For ticket mount and duplicate questions, always verify both sides first: Sentry issue detail annotations/activity/plugin links and Jira browse/REST/remote-link content. If the evidence identifies the correct item or selected primary, update the active report and continue the numbered workflow in the same round.\n3. For missing or removed primaries, do not pause by default. Remount the still-unresolved Sentry item to its own visible report row when Chrome evidence proves it belongs to its own PRE, then continue. Example: PRE-4308 / TARIFVERGLEICH-64 must be visible when PRE-4307 / TARIFVERGLEICH-63 is removed/resolved.\n4. For duplicate PRE tickets, do not pause by default when Chrome evidence proves the same Sentry issue and a selected primary exists or can be selected from Thien's current instruction/context. Keep the duplicate hidden/grouped under the primary, clear stale duplicate blockers, and continue. Example: continue on PRE-4396 when PRE-4397 verifies as its duplicate for ENRG-ENERGYCENTER-REV-2D / Sentry issue 7461154741.\n5. Pause only for true hard gates: SSO/auth/login/passkey/session/client-certificate failure, source pages/API unavailable after Chrome verification attempts, Slack blocked when a required blocker message must be sent, or contradictory evidence that remains unresolved after all required Chrome checks. The blocker must say exactly which verification was attempted, which URL/source failed, why continuing would be unsafe, and the next action after Thien unblocks it.\n6. When verification resolves the uncertainty, send Agent Report and live-report workflow updates saying the automation is not paused, what was verified, what was corrected, and the next numbered step. Do not leave old blocker text in active report fields once Chrome evidence allows continuation.\n\nClaude AI invocation requirements:\n1. Before writing a Cursor handoff, invoke Claude AI with the Sentry error message and stack trace text already collected via Chrome. Ask: \"Summarize the root cause in 2–4 sentences for a developer fixing this bug.\" Store the output as stackTraceSummary in the Cursor handoff.\n2. When Bitbucket PR activity contains review comments, invoke Claude AI with the raw comment text and ask it to list actionable reviewer requests as structured items: location, request, severity, evidence text. Use this only for Codex-owned CI/Sonar/test-only follow-ups or to enrich Cursor handoffs.\n3. When Jira description or remote links lack a structured Sentry key or URL, invoke Claude AI with the Jira description text to extract sentryKey, sentryIssueUrl, and reproductionContext. Chrome/Jira evidence remains authoritative; Claude extraction is only an aid.\n4. Before writing a Cursor handoff, optionally ask Claude AI to quality-check the drafted handoff object for missing or contradictory fields.\n5. For each in-scope actionable regressed item from the verified Source A/Source B union identified in step 2.7, after same-round Chrome/report-data evidence is collected and before any external mutation or Cursor handoff, invoke Claude AI once per item per round unless the evidenceHash for that item changed. Provide only already-collected text/data: Sentry substatus and last-happened evidence, linked PRE key(s), current Jira status/category, current PR state, existing regression note, prior fix/PR context summary, stackTraceSummary when available, and report-data fields for that item. Ask Claude to return a structured advisory object with recommendedAction one of `reopen_to_in_progress_cursor_handoff`, `needs_investigation`, `escalate_to_thien`, or `skip_with_reason`; confidence `low`, `medium`, or `high`; rationale; and missingEvidence. Store it on the report item as regressionDecisionEvaluation with checkedAt, evidenceRefs, evidenceHash, promptVersion, recommendation, confidence, rationale, missingEvidence, and rawResponse. Claude's output is advisory only: Codex remains sole decision owner and must separately record codexFinalDecision and codexDecisionRationale before executing the action. Claude never overrides source-union scope, Chrome evidence authority, hard gates, or Cursor ownership of bug-code fixes.\n6. Claude AI receives only text already collected via Chrome. Never pass credentials, session tokens, cookies, client certificates, or auth headers to Claude AI.\n7. If Claude AI is unavailable, returns empty output, errors, or returns an invalid recommendedAction, record claudeAiUnavailable or claudeAiError inside regressionDecisionEvaluation or the handoff/report note as appropriate, map the advisory recommendation to `needs_investigation`, set decisionSource=`codex-fallback`, and continue with Codex's own assessment. Do not pause the round or send Slack solely because Claude AI failed. Use \"(unavailable — see Sentry URL)\" for stackTraceSummary when needed.\n\nJira ticket content verification requirements:\n1. Before claiming, recording, grouping, deduplicating, reopening, or acting on any relationship between two PRE tickets and a Sentry issue, open each Jira ticket browse URL in Google Chrome and verify the visible ticket title and description. Also verify Chrome-authenticated Jira REST issue content and remote links when available. Do not rely on adjacent PRE numbers, old report text, branch names, PR titles, comments, summaries, or memory.\n2. Extract and compare the Sentry issue key and Sentry issue URL/id from the Jira ticket description, Sentry annotations, and/or remote links. Only mark tickets as the same Sentry issue, duplicate, duplicateOf, or duplicatePre when Chrome evidence shows the same Sentry issue id/URL or Jira has an explicit duplicate relationship.\n3. coveredByPre/groupedIntoPre is different from duplicateOf/duplicatePre: use it only when Chrome verifies the tickets are separate Sentry issues but also verifies an explicit shared root cause/fix/PR relationship. The report note must say shared fix coverage or covered by, not same Sentry or duplicate, and must include checkedAt plus the Jira browse/REST evidence for every ticket.\n4. If two tickets have different Sentry keys, different Sentry issue ids/URLs, or different bug descriptions, keep them separate unless step 3's shared-coverage evidence is present. Example: PRE-4296 is TARIFVERGLEICH-1A / Sentry issue 7415297316, while PRE-4297 is ENERGYMODULE-EVALUATION-1F / Sentry issue 6683746630; they must never be grouped as the same Sentry issue or duplicate tickets.\n5. Record the Chrome evidence for ticket verification in report-data.json with checkedAt, the Jira browse URL, the Jira REST/remote-link URL when used, the extracted Sentry key/id, and whether the automation continues or pauses. If Jira ticket content cannot be verified in Google Chrome because of auth, SSO, loading, or API problems, record a Jira Blocked status with the exact URL and pause before mutating Jira, report data, PRs, staging, or Sentry.\n6. When a Sentry issue appears to have multiple linked PRE tickets, verify every linked PRE ticket in Chrome before blocking on duplicates or choosing a primary ticket. Never pick a primary or close/reopen tickets based on inference alone.\n7. Run Chrome/Jira evidence checks serially when they depend on the active Chrome tab. Do not parallelize AppleScript tab reads for ticket verification, because concurrent active-tab reads can capture the wrong ticket.\n8. The live report validation rejects duplicateOf/duplicatePre relationships whose stored Sentry issue ids or keys differ. If validation fails, fix the relationship by verifying the Jira tickets in Chrome, then either keep separate tickets or use coveredByPre/groupedIntoPre with explicit shared-coverage evidence.\n9. Mounted Jira mismatch replacement rule: when a Sentry issue's mounted Jira ticket does not describe the same Sentry issue by the match criteria in step 5.0.3, treat only the Sentry-to-Jira mount as wrong. Unlink the Jira ticket from the Sentry issue through the Sentry Jira integration panel in Google Chrome; do not delete, close, transition, or otherwise mutate the old Jira ticket unless a separate verified Jira workflow requires it. Re-read the live Sentry panel to confirm unlink, run the live-panel plus report-data idempotency guard, create a new Jira ticket only if no matching mount exists, verify the new mount after creation, and record unmountedJiraKey(s), newJiraKey/newPre, mismatchEvidence, checkedAt, panelSnapshotAt, Sentry evidence URL, and Jira browse/REST evidence URL in report-data.json.\n\n\nTicket mount verification requirements:\n1. Every round must verify that every active report PRE ticket, hidden/grouped PRE reference, duplicate PRE reference, coveredByPre/groupedIntoPre relation, and statusByPre entry is mounted to the correct Sentry item from both sides before the report can be considered correct.\n2. Sentry side verification: in Google Chrome, open or reuse a signed-in Sentry page and fetch each involved Sentry issue detail through the Chrome-authenticated issue detail API/page. Record the issue id, shortId/key, permalink, status/substatus, assignee, annotations, create_issue activity, plugin issue links when present, checkedAt, and evidence URL. The Sentry issue must show the expected PRE through annotations/activity/plugin links, or the report must be corrected/blocked.\n3. Jira side verification: for every involved PRE, open the Jira browse URL in Google Chrome and verify the visible title/description. Also fetch Chrome-authenticated Jira REST issue content and remote links when available. Extract Sentry keys, Sentry issue ids, and Sentry URLs from the title, description, custom fields, issue links, and remote links. The Jira ticket must point to the same Sentry issue key/id/url stored on the report item, or the report must be corrected/blocked.\n4. Mount comparison rule: a PRE is correctly mounted only when report-data.json, Sentry issue evidence, and Jira evidence agree on the PRE key and Sentry issue key/id/url. Sentry key-only evidence is acceptable only when Jira lacks an issue id URL but the visible Jira title/description and Sentry annotations/activity agree on the exact Sentry shortId and PRE.\n5. Relationship sanity rule: hiddenFromTimeline, duplicateOf, duplicatePre, groupedIntoPre, coveredByPre, groupedPreKeys, and duplicateResolution relationships must point to an active, verified primary when the relationship hides or groups an item. If the primary was removed because its Sentry issue disappeared, was resolved, or was assigned away, the related item must be remounted to its own visible report item unless Chrome evidence proves a valid selected primary for the same Sentry issue still exists.\n6. coveredByPre/groupedIntoPre must never be used to hide a still-unresolved Sentry issue under a removed primary. Example: if PRE-4308 / TARIFVERGLEICH-64 is still unresolved and PRE-4307 / TARIFVERGLEICH-63 was removed/resolved, PRE-4308 must be visible as its own item; keep shared-fix evidence only in history, not as an active hidden mount.\n7. duplicateOf/duplicatePre may hide a duplicate only when both Jira tickets and the Sentry issue verify the same Sentry issue id/key/url and a selected primary exists. Example: PRE-4397 may remain hidden under PRE-4396 only because both verify ENRG-ENERGYCENTER-REV-2D / Sentry issue 7461154741 and PRE-4396 is the selected primary.\n8. If Sentry or Jira mount evidence is incomplete or ambiguous, first keep verifying in Google Chrome: open the Sentry issue/page/API and every Jira browse/REST/remote-link URL needed, compare both sides, correct the report, and continue when the mapping is proven. Pause only when a true hard gate prevents verification or the evidence remains contradictory after all Chrome checks; record the exact URL/source and attempted checks before pausing.\n9. Store mount verification results in report-data.json as lastTicketMountVerification and append a concise ticketMountVerificationHistory entry. Include evidence file paths/URLs when available, every checked PRE, every compared Sentry key/id, bad mapping count before/after correction, correction notes, checkedAt, and whether the automation continues or pauses.\n10. Send Agent Report and live-report workflow WebSocket updates before the scan, after each corrected/blocked item, after the final comparison, and after report validation. The report page final gate must fail if any visible item is mounted to the wrong Sentry issue or hidden under a removed/missing primary.\n\nSelected primary ticket / duplicate PRE continuation requirements:\n1. Duplicate PRE tickets are a hard blocker only when no primary ticket is selected or no primary can be verified. If Thien explicitly names, links, or points to one PRE in chat, Agent Report, live report workflow status, or the current handoff context, treat that PRE as the selected primary after Chrome verification.\n2. Before continuing, open every linked or duplicate PRE browse URL in Google Chrome and verify the visible title and description. Also verify Chrome-authenticated Jira REST content and remote links when available. Verify that the selected primary and duplicate PREs are the same Sentry issue by id, URL, or key, or keep them separate per the Jira ticket content verification rules.\n3. When a selected primary is verified, do not keep the automation paused only because another duplicate PRE exists. Update report-data.json so the selected primary remains active, duplicate PRE rows are hidden or grouped under the primary, stale duplicate blockers are cleared from the active report, and duplicateResolution evidence/history records the checkedAt time, Jira browse URLs, REST/remote-link URLs, extracted Sentry key/id, and reason.\n4. Continue normal workflow on the selected primary: if it is Open, To Do, Done, Closed, Integrated, In Test, or otherwise not active while Sentry is unresolved/regressed, transition or reopen the selected primary to In Progress through Chrome-authenticated Jira transitions when safe. Then prepare/update the Cursor /agent-fix-bug handoff for new or repeated bug-code fixes. Do not mutate hidden duplicate tickets unless Thien explicitly asks for duplicate cleanup in Jira.\n5. If the selected primary is unclear, keep verifying rather than stopping: open every candidate PRE and the Sentry issue in Google Chrome, compare Jira browse/REST/remote-link evidence with Sentry annotations/activity, choose the verified primary when the evidence or Thien's current instruction identifies one, update report data, and continue. Pause only if the selected PRE does not match the Sentry issue, auth/source access is blocked, or multiple candidates remain genuinely contradictory after Chrome verification.\n6. Concrete guardrail: if Thien points at PRE-4396 while PRE-4396 and PRE-4397 both verify to ENRG-ENERGYCENTER-REV-2D / Sentry issue 7461154741, select PRE-4396 as the primary, keep PRE-4397 as the hidden duplicate reference, move PRE-4396 to In Progress when available, prepare the Cursor handoff, clear the stale duplicate blocker, and continue. Never leave the automation blocked only because PRE-4397 also exists.\n\nRegressed item rework requirements:\n1. A Sentry item is regressed/actionable when same-round Sentry evidence says the issue is unresolved and either substatus is `regressed`, last-happened is newer than the previous fix/release/staging evidence, or the linked Jira/PR/report state was previously Done, Closed, Integrated, In Test, merged, declined, resolved, staged, release-verified, or otherwise no longer active while Sentry is now active again.\n2. Before acting on any in-scope actionable regressed item, require a current-round regressionDecisionEvaluation from Claude AI per Claude AI invocation requirement 5, or an explicit claudeAiUnavailable/claudeAiError fallback record if Claude cannot be used. Codex must review the advisory evaluation, then persist codexFinalDecision and codexDecisionRationale before reopening Jira, preparing a Cursor handoff, escalating, skipping, or performing any other mutation. The Codex final decision must use one of the existing workflow paths and include the advisory action, final decision, paused/not paused state, and next step in the item-level workflow update.\n3. Never remove, hide, mark green, or leave stale a regressed item that is still unresolved in Sentry. Reclassify it as active regression work in triageItems/statusByPre with `sentry=unresolved`, the current Sentry substatus, last-happened evidence, regressionDecisionEvaluation, codexFinalDecision, codexDecisionRationale, and a regression note explaining why it is being reopened or otherwise acted on.\n4. If a regressed Sentry item already has a linked PRE ticket and Jira status category is Done or the status is Closed, Done, Integrated, In Test, or otherwise not an active work state, reopen that same PRE ticket through Chrome-authenticated Jira transitions only after the Claude advisory evaluation or explicit Codex fallback decision is recorded. Prefer the transition path that lands in `In Progress`; if direct `In Progress` is unavailable, reopen to the closest non-done state then move to `In Progress` when available. Record transition evidence, checkedAt, transition id/name, URL, regressionDecisionEvaluation, codexFinalDecision, and codexDecisionRationale. If no safe transition is available, record a Jira Blocked status and pause.\n5. If a regressed item has multiple linked PRE tickets, first apply the selected primary ticket / duplicate PRE continuation requirements. If Thien has explicitly selected a primary PRE and Chrome verifies it maps to the same Sentry issue, continue on that primary and hide/group the duplicate PREs with evidence. If no selected/verifiable primary exists, record duplicate-ticket Blocked with every PRE key and Sentry URL, ask Thien to choose/close/merge duplicates, and pause before transitions or code changes.\n6. If the reopened/regressed ticket has an open Thien-authored PR, refresh the base, rebase/update the branch, apply only regression/test/CI follow-up changes allowed by the current rules, verify, and push with --force-with-lease. If the existing PR is merged or declined, treat the ticket as needing a new regression follow-up fix.\n7. New or repeated Sentry bug-code fixes for regressed items must be done in Cursor with `/agent-fix-bug` in the mapped repo. The automation should prepare the exact Cursor handoff with Sentry issue, PRE key, repo path, previous PR/fix context, last-happened evidence, expected verification, regressionDecisionEvaluation, codexFinalDecision, and codexDecisionRationale. Codex may update report data, transitions, CI/Sonar/test-only follow-ups, and existing Thien-authored PR follow-ups as allowed, but must not hand-roll new bug-code fixes outside Cursor.\n8. After the regression fix is available and checks pass, continue the normal staging, Jira In Test, release verification, and Sentry resolution gates. Do not resolve Sentry until production/release Jenkins build and activation are verified in Google Chrome after the regression fix.\n9. Every reopened/regressed item must send workspace Agent Report and live-report workflow status updates at start, after Claude advisory evaluation, after Codex final decision, after Jira reopen, after Cursor handoff or PR update, after verification, and after any blocker. The status text must include the step number, PRE, Sentry key, repo, evidence URL, Claude advisory action, Codex final decision, paused/not paused, and next numbered step.\n\nNumbered action workflow:\n1. Every automation run must keep a hierarchical numbered action map for all work. Use major steps and substeps such as `1. Start/reuse live report service and load report data, then do 2.`, `2. Open Jira assigned page in Chrome and collect PRE status evidence, then do 2.1.`, `2.1. Fetch ticket status details, then do 2.2.`.\n2. Every progress update, blocked report, final response, report-data note, live-report note, and memory-style summary must include the current step number, the step just completed if any, and the next intended step number.\n3. When a step completes, explicitly say what was done, the status, the source/evidence URL or command when relevant, whether the automation continues or pauses, and the next numbered step.\n4. When a step is blocked, record the blocked step number, blocker source, exact URL, needed Thien action, why work cannot safely continue, and the next actionable step after unblocking.\n5. If subagents are used, give each subagent a single numbered scope. The main agent remains responsible for numbering, external mutations, final decisions, report data writes, and final live-report verification.\n\nWebSocket reporting requirements:\n1. At the start of every heartbeat/run, after every numbered step or substep finishes, after every blocker is detected, after report-data writes, after final live-report verification, and before the final heartbeat response, send a concise status report to the workspace report stream with this command format:\n   `AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --title \"<step number> <step title>\" --status <success|failed> \"<short report message>\"`\n2. Use `--status success` only for completed steps backed by evidence. Use `--status failed` for blockers, auth failures, validation failures, or steps that must pause the automation.\n3. The report message must include the step number, status, key evidence, whether the automation is paused or not, why, and the next step number if continuing.\n4. If the WebSocket report command itself fails, record that failure in the final heartbeat/report-data note when safe, but do not continue past a hard source/auth gate.\n5. Keep WebSocket reports concise and machine-scannable. Example format: `AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --title \"2.1 Jira status batch\" --status success \"2.1 success: Jira statuses verified in Chrome; not paused because source is accessible; next 2.2 Bitbucket PR batch.\"`\n\nLive report workflow WebSocket status requirements:\n1. In addition to the workspace Agent Report stream, every heartbeat/run must update the live report page at http://127.0.0.1:8766/ with workflow status so connected browsers receive changes over the report page WebSocket without polling or refresh.\n2. Use this command before starting a numbered step, after every numbered step/substep finishes, after every blocker, after report-data writes, after final live-report verification, and before the final heartbeat response:\n   `node \"/Users/thien.nguyen/Desktop/Sentry Triage History/send-workflow-status.mjs\" --step \"<step number>\" --phase \"<create-ticket|implement|review|create-pr|verify|stage|release|blocker>\" --title \"<step title>\" --status <running|success|failed|blocked|warning|info> --pre \"PRE-1234\" --sentry-key \"SENTRY-KEY\" --sentry-issue-id \"7523521052\" --repo \"repo-name\" --pr \"1234\" --url \"<evidence URL>\" \"<short report message>\"`\n3. When the automation is working on a specific report item, always include as many item identity fields as known: pre, sentry-key, sentry-issue-id, repo, pr, and url. Always set `--phase` to the concrete work phase currently underway, such as `create-ticket`, `implement`, `review`, `create-pr`, `verify`, `stage`, `release`, or `blocker`. Send a `running` update before collecting or mutating evidence so the report page can highlight the active item and show the current phase. Send a `success`, `failed`, or `blocked` update for the same item when that item phase finishes; completed phases should no longer be treated as the active highlight.\n4. When no specific item is active, omit item identity fields, set `--phase` to a global phase such as `reconcile`, `validate`, or `final-gate`, and report the global step only. The live report server persists the latest workflow status in workflow-status.json and broadcasts it to /ws clients; do not require the user to refresh the report page to see status changes.\n5. If the workflow-status command fails, mention that failure in the final heartbeat/report-data note when safe, but do not continue past a hard source/auth gate.\n\nHeartbeat reporting requirements:\n1. On every heartbeat, first run the full numbered triage round unless a true hard gate blocks it. Only after doing the work, report the current automation state instead of staying silent: say whether the loop is active, paused, or blocked, and why.\n2. Report the current numbered step being worked, the numbered step just completed if any, and the next intended numbered step.\n3. When paused or blocked, include the exact blocker source, URL when available, the verification attempts already made, the needed Thien action, and why work cannot safely continue. Do not pause for an issue that can be resolved by opening Chrome sources and correcting report data.\n4. When not paused, explicitly say it is not paused and give the short reason, such as sources accessible, no actionable discrepancy found, or waiting for the next round after the final report gate.\n5. Keep the report concise but specific enough that Thien can see what happened in this heartbeat and what state the loop is in.\n\nRound procedure:\n1. Start/reuse the live report server when needed. Load report-data.json. Send the WebSocket report for step 1.\n2. Before individual Sentry work, reconcile all Jira and PR statuses in one global pass. Send WebSocket reports for each substep:\n   2.1. From the report, collect every PRE key, every numeric PR plus repo, and every Bitbucket PR URL. Also collect any PRE tickets visible on the Jira assigned page and any Thien-authored PRs visible on the Bitbucket inventory page.\n   2.2. In Chrome, open/reuse the Jira assigned page and fetch ticket statuses for all collected PRE keys in one batch/pass using the signed-in page or Chrome-authenticated Jira API/JQL when available. Update every matching report ticket/statusByPre entry with the current Jira status, category, assignee/reporter if visible, evidence URL, checkedAt, and Blocked fields if the batch cannot verify a ticket.\n   2.3. In Chrome, open/reuse the Bitbucket inventory page and fetch every collected PR from Bitbucket’s authenticated source/API. PR status must be exactly Bitbucket PR state: OPEN, MERGED, or DECLINED. Preserve numeric pr/prNumber and PR URL. Never infer PR status from Jira, Jenkins, git, old report text, branch names, or comments.\n   2.4. Keep blockers scoped to their source: Jenkins/build/auth failures go in jenkinsBlocker/latestJenkinsBuild/stagingJenkins/releaseJenkins fields, not prBlocker. Jira blockers go in Jira fields. PR blockers only mean Bitbucket PR lookup/create/state is blocked.\n   2.5. Recompute report summary fields from the verified source state: open/merged/declined PR, current Jira status, PR Jenkins/Sonar when PR is not merged, Release Jenkins when merged, and On staging/Not on staging/Blocked. If a required source cannot be checked, show Blocked with the exact source URL.\n   2.6. Sentry source-union cleanup: using the same-round Google Chrome verified, fully fetched, deduplicated union of Source A (is:unresolved is:unassigned) and Source B (is:unresolved assigned_or_suggested:me), plus issue-detail/search checks when needed, remove every report/memory item whose Sentry issue no longer appears in either source. Delete it from triageItems, statusByPre, sentryTriageQueue, source-list state, and memory-style summaries/current queues. Preserve only a concise cleanup note with the removed Sentry key/PRE, observedAssignee when known, evidence URL, checkedAt, and reason (`disappeared` or `out-of-scope-not-in-union`). If either source is inaccessible or pagination is incomplete, freeze the prior active list, record Sentry Blocked with the exact Source A or Source B URL, and pause. Never keep a stale or out-of-scope Sentry issue in the active report after a complete union verification. Send a WebSocket report for step 2.6.\n   2.6a. Scope checkpoint: write and verify the Sentry source list before Jira inspection. Immediately after the Source A/Source B union is complete and any out-of-scope cleanup decision is made, build a candidate report-data.json update containing sentrySourceVerification and sentryScopeItems for the canonical deduplicated union. Validate the candidate with JSON parse, existing report validation rules, and explicit issue-id set/count equality between the union and sentryScopeItems before replacing the file. Atomically write the candidate only after validation. Send a live-report WebSocket update with phase `scope-committed`. In the bound corporate Google Chrome window, open a visible temporary tab to http://127.0.0.1:8766/, perform a full reload in that temporary tab, and verify the rendered Sentry source-scope list matches the canonical union by both count and exact issue-id set. Close the temporary tab after verification. If the rendered report is mismatched and the mismatch is correctable, fix report-data.json and repeat validation/rendered verification. If a hard source/auth/report/Chrome blocker prevents verification, preserve the last fully validated report state except for safe blocker metadata, record the blocker, send required blocked updates, pause, and do not proceed to regressed scans, ticket mount audits, Jira creation, PR/staging work, or Cursor handoffs. Send a live-report WebSocket update with phase `scope-confirmed` only after the rendered report matches.\n\n   2.7. Regressed item rework scan: from same-round Sentry unresolved/regressed evidence plus Jira/PR snapshots, identify every in-scope active regressed item whose linked PRE/PR/report state was previously done, closed, integrated, in test, merged, declined, resolved, staged, release-verified, or otherwise no longer active. For each actionable regressed item, after evidence collection and before any mutation, invoke Claude AI once per item per round unless the item evidenceHash changed; store regressionDecisionEvaluation in report-data.json, then record codexFinalDecision and codexDecisionRationale before deciding whether to reopen to In Progress, prepare a Cursor handoff, mark needs-investigation, escalate to Thien, skip with reason, or record duplicate/transition Blocked. Send item-level WebSocket and Agent Report updates after Claude evaluation and after Codex final decision, including advisory action, final decision, paused/not paused, and next step.\n   2.8. Ticket mount verification scan: verify every active report PRE, hidden/grouped PRE, duplicate PRE, coveredByPre/groupedIntoPre relation, and statusByPre entry from both sides. In Chrome, collect Sentry issue detail annotations/activity/plugin links and Jira browse/REST/remote-link content, compare report-data.json against both sources, correct bad mounts such as hidden items under removed primaries, record lastTicketMountVerification/ticketMountVerificationHistory, and send item-level WebSocket and Agent Report updates. If evidence is ambiguous, keep opening the needed Chrome sources and continue after correction; pause only for hard auth/source gates or unresolved contradictory evidence after all required checks.\n3. Write report-data.json safely: timestamped backup, same-directory temp file, JSON parse, /api/report-validation when available, then atomic move. Update lastUpdated, triageItems, statusByPre, sentrySourceVerification, sentryScopeItems, lastTicketMountVerification, and ticketMountVerificationHistory when mount verification ran. sentrySourceVerification must include status, checkedAt, Source A URL/count/ids, Source B URL/count/ids, unionCount, unionIds, pagination/completeness evidence, and blocked URL when applicable. Send the WebSocket report for step 3.\n4. Verify the rendered report in Chrome after writing. Check that visible PR and Jira statuses match the same-round Jira/Bitbucket/Sentry snapshot for every report item, including regressed/reopened rows and ticket mount corrections. Confirm no row is hidden under a removed/missing primary and every visible ticket is mounted to the correct Sentry item; fix discrepancies before proceeding. Send the WebSocket report for step 4.\n5.0. Per-Sentry-issue Jira mount audit and correction gate: after the scope checkpoint passes and before the existing step 5 triage actions, iterate every issue in sentryScopeItems in descending occurrenceCount/frequency order. Run this serially in the domain-bound corporate Google Chrome window with one visible temporary issue tab at a time, and close the temporary tab before advancing to the next issue.\n   5.0.1. Open the Sentry issue detail URL. Use a bounded load policy: wait up to 60 seconds, retry once in a fresh temporary tab if loading fails, then treat continued auth/SSO/session/client-certificate/network/loading failure as a hard blocker. On a hard blocker, write only safe blocker metadata for that issue (`jiraMountStatus=blocked`, blockerReason, blockedAt/checkedAt, evidence URL) using atomic validation, send live-report and Slack blocked updates, pause the entire loop, and do not advance to the next issue.\n   5.0.2. Read all Jira links mounted in the live Sentry Jira integration panel plus relevant annotations/activity/plugin links. If the integration panel is absent, permission-blocked, configuration-blocked, or contradictory after the retry policy, record the exact blocker and pause using the same blocker-only write rule.\n   5.0.3. For each mounted Jira ticket, open the Jira browse URL in Chrome and verify visible title/description plus Chrome-authenticated REST/remote-link content when available. A Jira ticket matches this Sentry issue only when all of these are true: (a) at least one of Jira summary, description, remote link, or issue link contains this Sentry issue key, numeric id, or URL; (b) the Jira problem statement describes the same error class/message and fingerprint or reproduction context; and (c) Jira evidence is not primarily associated with a different Sentry issue. Store structured evidence fields such as matchedBy, sentryIssueUrl, jiraUrl, panelSnapshotAt, checkedAt, and mismatchEvidence when applicable.\n   5.0.4. If one or more mounted Jira tickets match, choose the best matching PRE/Jira ticket as the verified mount, do not create a duplicate ticket, and atomically update report-data.json with `jiraMountStatus=verified`, jiraKey/pre, checkedAt, and evidence URLs. If additional mounted Jira links are proven mismatched extras for the same Sentry issue, unlink only those wrong Sentry-to-Jira mounts through the Sentry integration panel, re-read the live panel to confirm removal, record unmountedJiraKeys and mismatchEvidence, and send WebSocket updates after unlink and after the report write.\n   5.0.5. If mounted Jira tickets exist but none match this Sentry issue, unlink the wrong Sentry-to-Jira mount(s) through the Sentry Jira integration panel without deleting, transitioning, or otherwise mutating the Jira ticket itself. Re-read the live Sentry panel to confirm removal. Before creating a replacement, run the idempotency guard against both the latest live Sentry panel and current report-data.json; if a matching Jira ticket appeared, verify it instead of creating. If none exists, create a new PRE/Jira ticket directly from the Sentry Jira integration panel with Thien as assignee/developer/reporter when safely available. After create, re-read the live Sentry panel and verify the new Jira mount satisfies the same match criteria before marking it replaced. Atomically update report-data.json with `jiraMountStatus=replaced`, unmountedJiraKey(s), unmountReason=`description-mismatch`, newPre/newJiraKey, mismatchEvidence, checkedAt, and evidence URLs. Send WebSocket updates after unlink, after create, after post-create verification, and after the report write. If create or post-create verification is blocked or mismatched, record blocker/partial state safely and pause.\n   5.0.6. If no Jira ticket is mounted, run the idempotency guard against the latest live Sentry panel and current report-data.json. If no matching Jira exists, create a new PRE/Jira ticket directly from the Sentry Jira integration panel, then re-read the live panel and verify the new mount satisfies the match criteria. Atomically update report-data.json with `jiraMountStatus=created`, newPre/newJiraKey, checkedAt, and evidence URLs. Send WebSocket updates after create, after post-create verification, and after the report write. If a matching Jira exists after the guard or because another actor mounted one, verify and record it instead of creating a duplicate.\n   5.0.7. After all in-scope Sentry issues complete without a pause, send a summary WebSocket update with counts for verified, replaced, created, skipped-by-idempotency, and blocked. Only then continue with the existing step 5 triage behavior.\n\n5. Then triage unresolved Sentry issues by frequency from the same-round Chrome-verified deduplicated union of Source A (is:unresolved is:unassigned) and Source B (is:unresolved assigned_or_suggested:me). Before any mutation, confirm the issue appears in this round's complete union. If an issue is absent from both sources after complete verification, remove or keep it out of the active report as out-of-scope with evidence; do not assign it, create Jira, reopen/move Jira, mutate PRs/staging, resolve Sentry, or create Cursor handoffs for that item. For in-scope union issues only: if no linked PRE Jira exists, create one through the Sentry Jira integration with Thien as assignee/developer/reporter when those fields are safely available. If Jira assignee or Jira Developer cannot be set because of auth, source, API, or permission failure, apply the existing hard-gate blocker and Slack rules with the exact URL/source; do not send routine Slack notifications. If the in-scope ticket has no PR and is not done, move it to In Progress. For in-scope regressed items with existing linked PRE tickets, reopen the existing ticket instead of creating a duplicate. If duplicate linked PRE tickets exist, first check for an explicitly selected and Chrome-verified primary PRE or existing duplicateResolution evidence; when present, continue on the primary and hide/group the duplicates. Only block and ask Thien to choose/close/merge duplicates when no selected/verifiable primary exists. Send WebSocket reports for each Sentry item or blocker.\n6. For existing Thien-authored PRs, dedupe by PR URL/repo+number. Refresh base first (origin/release, else origin/main, else origin/master). For an open Thien-authored PR, update/rebase the source branch on the refreshed base, run focused repo-appropriate verification or record why blocked, and push with --force-with-lease. Do not mutate PRs authored by others. For regressed items whose previous PR is merged or declined, do not mutate old PR state; prepare a new Cursor `/agent-fix-bug` handoff for a follow-up fix on the reopened PRE. Send WebSocket reports for each PR/repo action.\n7. Cursor handoff spec: before delegating any bug-code fix, Codex must write `/Users/thien.nguyen/Desktop/Sentry Triage History/cursor-handoffs/cursor-handoff-{PRE}.json` containing: command=/agent-fix-bug, pre, sentryKey, sentryIssueId, sentryIssueUrl, repo, repoPath, jiraBrowseUrl, priorPrUrl, priorPrState, lastHappened, regressionNote, stackTraceSummary (from Claude AI when available), expectedVerification, handoffCreatedAt, and source evidence URLs. Send an Agent Report item-finished update with the handoff file path. Do not proceed past step 7 for that item until the handoff file is written, report-data.json references it, and the report is sent.\n7.1. Cursor/Claude active delegation gate: for any item requiring a new or regression bug-code fix, Codex must not stop at Jira creation or JSON handoff. After the handoff JSON is written, invoke Claude Code for local text/code analysis when available using only Chrome-collected issue text and repository files, then invoke Cursor Agent/AI with /agent-fix-bug in an isolated worktree for the mapped repo. Cursor owns all fix-code changes; Codex must not author or patch bug-fix code. Cursor may leave uncommitted work; do not assert a commit SHA, PR link, CI result, or push unless Cursor explicitly returns one and Codex verifies it. After Cursor returns or times out, inspect its output and .pipeline/plan.md, .pipeline/changes.md, .pipeline/test-results.md, and .pipeline/review.md when present; rerun lightweight Codex verification such as git diff --check and language syntax checks where appropriate. If Cursor is unavailable, fails before accepting the task, or times out without usable output, update report-data.json as Blocked when possible, send only the required Slack hard-gate notification, and stop that item; do not invent fallback Jira comments, Sentry reassignment, or hand-rolled code. If Claude Code is unavailable, record a warning and continue to Cursor. Report delegation complete only after Cursor output/artifacts and Codex lightweight checks are reviewed, then continue to PR/Jira/staging steps owned by Codex.\n8. If checks pass and staging is appropriate, update origin/staging, cherry-pick without overwriting unrelated work, verify lightly, push staging, move Jira to In Test, and capture staging smoke evidence from https://www.check24-test.de/strom/ when visible without login. If blocked, record Blocked/Needs Thien with URL and needed action. Send WebSocket reports for staging/Jira/smoke substeps.\n9. Before resolving Sentry, verify production/release Jenkins build and activation in Google Chrome. If production is not built/active, do not mark resolved; record resolve-next-release or Blocked as appropriate. Send the WebSocket report for release verification.\n10. Final live-report correctness gate: after all reconciliation, Sentry triage, branch/PR work, Jira transitions, staging/release updates, and report-data writes for the round, reload the live report page in Chrome and verify the rendered collapsed rows and expanded details are correct against the same-round source snapshots and report-data.json. At minimum verify: the rendered Sentry source-scope list, triageItems, statusByPre, sentryTriageQueue, and active summaries match the same-round Chrome-verified Source A/Source B union with no missing union issue ids and no extra non-union issue ids; unassigned Source A issues remain visible in the report source list; PR state/link/reviewer; Jira ticket links/statuses; reopened/regressed markers; selected primary PRE handling; two-sided ticket mount verification; hidden/grouped duplicate PREs; no item hidden under a removed/missing primary; no stale duplicate blocker text; PR Jenkins/Sonar or Release Jenkins choice; staging state; Blocked links; last happened; duplicate-ticket grouping; sorting; and that no stale old status appears in collapsed or expanded sections. If the page is wrong, fix report data or UI and rerun validation; do not stop on a correctable mismatch. If correctness cannot be verified because Chrome/source/report access is blocked, record a Blocked status with the exact URL and pause. Only report the round complete after this page-level check passes. Send the WebSocket report for step 10.\n11. Subagents (optional, read-only): assign at most one of the following named roles per subagent, one source each, Google Chrome only:\n   - sentry-reader: Sentry unresolved list + issue detail pages. Return issue id, shortId, status, substatus, assignee, last-happened, annotations/activity/plugin links, evidence URL. No Sentry mutations.\n   - jira-reader: Jira browse + REST `/rest/api/2/issue/{key}` + remote links. Return title, description, status, category, assignee, reporter, linked Sentry key/id/url, evidence URL. No transitions, comments, or field edits.\n   - bitbucket-reader: Bitbucket PR list + individual PR pages. Return PR state exactly OPEN/MERGED/DECLINED, reviewers, approvals/request-changes/comments, numeric PR id, repo slug, evidence URL. No PR mutations.\n   - jenkins-reader: Jenkins build pages for PR, staging, and release pipelines. Return latest build status, build number, result, activation/build evidence URL. No triggering or parameter changes.\n   Main Codex agent reviews all subagent returns, makes all decisions, performs all allowed mutations, writes report-data.json, and sends WebSocket reports for subagent assignment (step 11 start) and main-agent review (step 11 end).\n\nRepo mappings: energymodule -> /Users/thien.nguyen/enrg-energymodule; enrg-web-frontend -> /Users/thien.nguyen/enrg-web-frontend; enrg-energycenter-rev -> /Users/thien.nguyen/enrg-energycenter-rev; tarifvergleich -> /Users/thien.nguyen/enrg-tarifvergleich.\n\nIf no eligible issues, no regressed/reopen work, no ticket mount discrepancies, and no actionable report discrepancies remain after reconciliation, Sentry disappearance cleanup, regressed item rework scan, ticket mount verification, and the final live-report correctness gate passes, report briefly, send a final WebSocket `success` report that the loop is not paused and waiting for the next round, then send the final heartbeat response. Never send the final heartbeat response before the full round has completed or a true hard blocker has been recorded.\n\nAgent Report requirement (updated 2026-06-02):\n- At the very start of every run or heartbeat, before any final heartbeat response, ensure the Agent Report server is running by executing: AGENT_REPORT_SEND_STATUS=0 /Users/thien.nguyen/thiennp.github.io/agent-report/scripts/ensure-agent-report-server.sh\n- Immediately after the ensure step, send a start message to the Agent Report page at http://localhost:3100/ so Thien can see that this automation has started.\n- Always report major step completion, every individual item finished, pause/blocker, and final state to ws://localhost:3100/stream with automationName, title, status, and text. Keep source as terminal; do not put the automation name in source.\n- Item-finished reports are mandatory: whenever a ticket, PR, vulnerability, listing, persona review, file sync, subagent assignment, scan row, or other discrete work item completes, immediately send a report before moving to the next item. Do not wait for the final summary.\n- Each item-finished report must include the item name/key, status, key evidence/output, whether the automation continues or stops, and the next item or next step.\n- Preferred command: cd /Users/thien.nguyen/thiennp.github.io/agent-report && AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --automation-name \"Sentry Jira Cursor Triage Loop\" --title \"<item or step title>\" --status <running|success|warning|error|blocked|pending|info> \"<concise update>\"\n- Use honest statuses: running for in progress, success for completed work, warning for partial/non-blocking issues, error or blocked for stopped work, pending for waiting, info for neutral updates.\n- If the report server or send command fails, mention that in the final output and continue only when the current task can safely run without the report page."
