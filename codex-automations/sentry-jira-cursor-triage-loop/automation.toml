prompt = "Continue the Sentry triage loop for Check24 Energie unresolved issues in Chrome from https://check24-energie.sentry.io/issues/?project=4506704740876288&project=4506704741990400&project=4506704737206273&project=4506704738910208&project=4506704735043584&project=4511296841515008&project=1837965&project=6315296&project=6315299&project=6310641&project=6315302&project=4506581362933760&project=4511296882540544&project=4511252687093760&project=4511252689977344&project=4508879690792960&project=2040735&project=4511222628548608&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h. Inspect issues by frequency. Skip Sentry issues assigned to someone other than Thien Nguyen. Assign unassigned eligible issues to Thien. If no linked PRE Jira exists, create one through the Sentry Jira integration with Thien as developer, reporter, and assignee. Open/reuse the Jira ticket in Chrome. If it has no PR and is not done, move it to In Progress. If a branch exists, check whether the branch fixes the issue and create a PR. If no branch exists, open Cursor on the mapped repo and run /agent-fix-bug there only. Reuse existing Chrome tabs/windows for Sentry, Jira, Bitbucket, Slack, Jenkins, Sonar, and the local report; only open a new tab if no suitable tab exists. Before checking a branch/PR, creating a PR, starting Cursor, or staging a fix, update the local base branch: fetch origin, use release when origin/release exists otherwise master when origin/master exists, checkout that base, and pull --ff-only. Preserve unrelated local WIP safely. In every automation round, before inspecting new Sentry issues or taking unrelated action, refresh every known PR from this triage loop, including open PRs listed in the dashboard and skip list, plus any non-done Jira ticket with a linked PR. Do not skip a PR merely because it was checked in an earlier round. For each PR, ensure the source branch is up to date with the refreshed base, fetch comments, tasks, approvals, request-changes signals, reviewer list and reviewer activity, merge state, target branch/release/main membership, latest Jenkins build, latest Sonar state, staging state, production-build state, and whether the dashboard matches current reality. Update the dashboard whenever any PR state, reviewer state, comment/task/approval/request-change state, branch freshness, or CI/Sonar/Jenkins state changes. If a comment or request changes item is actionable and safe to resolve on an already-created PR, update the base, checkout/track the PR source branch, make the minimal review-comment fix, amend the last commit, run focused and repo-appropriate verification, force-push with --force-with-lease, update the dashboard, and recheck CI/Sonar before staging. If comments are approvals, questions, unclear, risky, non-actionable, blocked, or need Thien's business/product/owner decision, do not change code; add the comment summary, author, direct Bitbucket comment link, review state, and required Thien action to the dashboard/report and notify Thien when useful. If a comment has an answer, reply, resolution, or is addressed by a later commit, include a concise answer/resolution summary and direct answer/reply link when available. For decision-needed PR feedback, send Thien a Slack message in https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH with the PRE key, PR link, comment/request-changes link or ID, and the exact decision needed; if Slack sending is unavailable, record that blocker in the dashboard and notify in the heartbeat response. Every open PR check must rebase the source branch onto the refreshed base, verify or record why verification could not run, and push with --force-with-lease; if conflicts or risky decisions occur, stop and record the blocker. After creating/finding a PR, move Jira to In Code Review when available, check Bitbucket/Jenkins pipeline/build and SonarQube/SonarCloud when exposed, and block staging until required checks pass. Whenever the latest Jenkins build exposed for a PR, staging, release, or production check is failed, automatically inspect the Jenkins build details/console/logs through the existing Chrome/Jenkins session. If the failure is attributable to the already-created PR or staging change and is safe within Codex permissions, update the base, checkout/track the PR source branch or staging branch as appropriate, make the minimal CI/test/review-comment fix, amend the last PR commit or create the minimal staging follow-up as appropriate, run focused repo-appropriate verification, push with --force-with-lease for PR branches or normal push for staging, update the dashboard, and recheck Jenkins/Sonar. If Jenkins inspection is blocked by auth, the failure is infra/flaky/unrelated, the fix would require a product/business/owner decision, or it would require a new Sentry bug-code fix that belongs in Cursor, do not change code; record the blocker, latest failed build, likely cause, and needed Thien action in the dashboard and notify Thien when useful. Sonar failure is not terminal: inspect/fix/amend/verify/force-push for code/test/coverage/duplication/maintainability issues when allowed; do not stage until rerun passes unless Thien waives it. When checks pass, update origin/staging, checkout local staging at origin/staging, cherry-pick the PR commits without overwriting unrelated work, run lightweight verification or record why not, push staging, and move Jira to In Test. Before marking any Sentry issue resolved, check the relevant project Jenkins production build at https://jenkins.energie.check24.de/ and record the production build state in the dashboard. If the fix is not built on production, do not mark it resolved. If the fix is merged to release or main/master but is not yet built on production, mark/record it as resolve next release instead of resolved. Repo mappings: energymodule -> /Users/thien.nguyen/enrg-energymodule; enrg-web-frontend -> /Users/thien.nguyen/enrg-web-frontend; enrg-energycenter-rev -> /Users/thien.nguyen/enrg-energycenter-rev; tarifvergleich -> /Users/thien.nguyen/enrg-tarifvergleich. Do not fix new Sentry bug code in Codex; new Sentry bug fixes must be done in Cursor. Codex may only do CI/Sonar/test-only follow-up fixes, failed-Jenkins follow-up fixes on an already-created PR or staging change, and actionable PR-review comment fixes on an already-created PR. After creating/finding a PR, inspect the PR diff and surrounding local git history/blame to identify active owner-reviewers in Bitbucket. Do not add Peer Reymer or Magdalena Berger. If no active suitable owner exists, leave reviewers unchanged and record why. Notify Thien with every PR link and verification summary. Update /Users/thien.nguyen/Desktop/Sentry Triage History/index.html whenever an issue is assigned, linked to Jira, moved, fixed, pushed, gets a PR, rebased, reviewer-updated, PR comments are checked, request changes are checked, approvals are checked, a review-comment fix is made, a PR decision-needed Slack notification is sent or blocked, CI/Sonar is checked, a failed latest Jenkins build is inspected or fixed, cherry-picked to staging, amended, released, production-build status changes, or Jira status changes. Keep TRIAGE_ITEMS, STATUS_BY_PRE, and LAST_UPDATED current with Sentry/Jira/PR links, statuses, bug reason, fix summary, affected URL, repo, verification, rebase/pipeline/staging history in hidden data when useful, reviewer, PR review state, request-changes state, approval state, release/main merge state, release/main build state, release/main activation state, staging merge state, staging build state, staging activation state, latest Jenkins build state and failed-build action/blocker, PR comment status and needed Thien action, PR comment direct links, PR comment answers/replies/resolutions, amendment, amendment summary, and blocker notes. Keep the visible dashboard simple: do not render a Rebase section, do not render Jenkins history, and do not render a synthetic Fix lifecycle badge. Show only explicit branch/environment facts: a Release/Main section with Merged, Built, and Activated fields, and a Staging section with Merged, Built, and Activated fields. Activation means the built artifact is deployed/enabled for that branch or environment. Use Not verified when activation/build state is unknown, Not built when the branch is not merged or the build has not run, and Not activated when it is known not to be active. Only mark Built or Activated when verified. For visible Jenkins/Sonar, show only the latest Jenkins build status such as '#8 passed' or '#3 failed' plus Sonar state. For the visible PR Comments section, show only the commented code/file or PR discussion context, the comment, the author, the comment status, a direct link to the comment so Thien can react, and the answer/reply/resolution if it is answered; do not render full PR comment history. Capture Bitbucket's exact comment HTML link when available; if not available, link to the PR comments page and mark it as a fallback. Resolved PR comments must render collapsed by default; open, needs-answer, request-changes, and decision-needed comments must render expanded by default. For the visible Amendment section, show only a short human-language summary of what changed, why it matters now, and whether it is pushed/green/blocked; do not render commit hashes, command logs, or full technical amendment history, but keep detailed amendment history in hidden data when useful. For the visible Verification section, show only compact status chips for each verification field, such as Diff check: Passed, PHP lint: Passed, PHPUnit: Unavailable, Typecheck: Blocked, or Verification: See PR; do not render full command/output prose, but keep detailed verification history in hidden data when useful. Report status must explicitly distinguish release/main merged, release/main built, release/main activated, staging merged, staging built, staging activated, PR approved, request changes, comments in PR, open/no comments, latest Jenkins/Sonar state, and production build/activation state where known. If Jira is non-done but linked PR is merged, check whether Jira was reopened after merge or PR is outdated; close if not reopened/outdated, otherwise keep active and show sync status. Keep dashboard sorting active work first: open PRs, non-done Jira, unresolved Sentry, then completed. Skip already handled items unless their Jira ticket has no PR: ENRG-WEB-FRONTEND-314 via PRE-4208 PR 1024, ENRG-WEB-FRONTEND-33G via PRE-4206 PR 1063, ENRG-WEB-FRONTEND-294 via PRE-4275 PR 1064, ENRG-WEB-FRONTEND-2X0 via PRE-4295 PR 1075, TARIFVERGLEICH-1A via PRE-4296 PR 13739, TARIFVERGLEICH-17 via PRE-4301 PR 13744, ENERGYMODULE-EVALUATION-1F via PRE-4297 PR 4949, TARIFVERGLEICH-D8 via PRE-4281 PR 13728, ENERGYMODULE-SGR via PRE-4282 PR 4943, TARIFVERGLEICH-BZ via PRE-4283 PR 13729, ENRG-ENERGYCENTER-REV-34 via PRE-4284 PR 1428, EC-REV-7 via PRE-4285 PR 1429, ENRG-ENERGYCENTER-REV-23 via PRE-4290 PR 1432, EC-REV-11 via PRE-4294 PR 1434, TARIFVERGLEICH-67 via PRE-4286 PR 13730, ENRG-WEB-FRONTEND-33V via PRE-4287 PR 1068, ENRG-WEB-FRONTEND-34N via PRE-4288 PR 1069, ENRG-WEB-FRONTEND-338 via PRE-4289 PR 1070, PRE-4253 PR 4932, PRE-4254 PR 1051, PRE-4255 PR 1421, PRE-4256 PR 4933, PRE-4257 PR 4934, PRE-4258 PR 1422, PRE-4259 PR 1423, PRE-4260 PR 1424, PRE-4261 PR 1052, PRE-4262 PR 4936, PRE-4263 PR 1053, PRE-4264 PR 1054, PRE-4265 PR 1055, PRE-4267 PR 1056, PRE-4268 PR 1057, PRE-4269 PR 1058, PRE-4270 PR 1059, PRE-4271 PR 1060, PRE-4272 PR 1062, and PRE-4273 PR 4937. If no eligible issues remain, report briefly and wait for the next heartbeat."
