prompt = """
Continue the Check24 Energie Sentry/Jira/PR triage loop using fresh same-round source evidence, API-first verification for non-browser actions, Google Chrome for external visual checks or mutations, and Daily Magic WebSocket reporting through /thien/ws.

Global rules:
- Follow /Users/thien.nguyen/.codex/AGENTS.md for Daily Magic reporting payloads and shared Jira duplicate-check/fingerprint rules.
- The local live report app at http://127.0.0.1:8766/ is retired as automation state. Do not start it, require it, validate it, read it as source data, or use it as a blocker. If an old helper attempts a best-effort sync there, treat success/failure as non-authoritative UI decoration only.
- Do not read, write, rebuild, validate, or depend on /Users/thien.nguyen/Desktop/Sentry Triage History/report-data.json as automation state.
- Remove Jenkins from the workflow. Do not require Jenkins PR, staging, release, build, activation, or production checks.
- Daily Magic progress reporting goes to /thien/ws over WebSocket. Send work-status.update for status changes and agent.heartbeat every 60 seconds while online. If reporting fails, include reportWebSocketWarning in the final response and continue when safe.
- External source pages that still need visual inspection or mutation must use Google Chrome, not the in-app browser.

Fresh source policy:
- Always collect Sentry data fresh in the current run. Never use stale live-report rows, localhost:8766 state, old report-data fields, or previous report snapshots as Sentry source evidence.
- Before guessing endpoints or browser fallbacks, read /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-jira-cursor-triage-loop/API_ACTIONS.md.
- Prefer /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-jira-cursor-triage-loop/triage-api-actions.sh for verified non-browser actions.
- Start each round with triage-api-actions.sh check-all when possible. If Sentry API succeeds completely, it is authoritative for the Sentry source set. If Sentry API is permission-blocked/incomplete or the user asks for the Sentry info script, run /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot.sh and use its freshly written JSON files as the authoritative Sentry source for that round:
  /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot.json
  /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-chrome-tab-snapshot/snapshot-compact.json
- The Chrome snapshot script may attempt an optional legacy sync to localhost:8766. Ignore sync failure for data decisions. Do not run legacy 8766 detail scanning unless explicitly instructed.
- Jira assigned PRE statuses/details/descriptions/transitions: prefer Jira API script and Atlassian connector. Use Google Chrome only if API/connector evidence is insufficient for a remaining visual check or mutation.
- Bitbucket PR inventory/state: prefer API script. Use Google Chrome only for review/comment/activity details or mutation checks not available in the snapshot.
- Sentry Jira mount inspect/create/link: prefer sentry-jira-integration helper. Chrome remains required for unlink until a safe API unlink path is separately verified.

Workflow:
1. Report start to Daily Magic, then collect fresh Sentry/Jira/Bitbucket evidence. Sentry may come from complete API union or the fresh Chrome snapshot script. Jira/Bitbucket should come from API/connector snapshots.
2. Build the same-round Sentry set from the current run only. Treat items absent from the same-round set as out of scope.
3. Reconcile Jira and Bitbucket state from API/connector snapshots. Keep blockers scoped to their source and never create Jenkins blockers.
4. For unresolved/regressed in-scope items, collect same-round Sentry/Jira/PR evidence. Invoke Claude advisory only for read-only analysis when useful; record claudeAiUnavailable if unavailable.
5. For each in-scope item and active PRE/duplicate/grouped relationship, verify Sentry side and Jira side using API/connector first. Use Chrome only when API/connector evidence is insufficient or a browser-only mutation is required.
6. For Sentry Jira mount actions, inspect current Sentry Jira integration links by API. If no matching Jira exists and duplicate/idempotency checks pass, dry-run create first, then create through the API helper with required confirmation flags. If a matching Jira exists, verify/link through the helper as appropriate. Do not use Chrome for create/link unless the API helper is blocked.
7. For open Thien-authored PRs, refresh/rebase/push only when allowed by source evidence and repository rules. For merged/declined prior fixes on regressed items, prepare a new Cursor handoff rather than mutating old PR state.
8. Write Cursor handoff JSON under /Users/thien.nguyen/Desktop/Sentry Triage History/cursor-handoffs/ only when writable; otherwise use /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-jira-cursor-triage-loop/handoffs/ and mention the fallback. Delegate bug-code fixes to Cursor via the safe wrapper; Codex must not hand-roll bug-fix code.
9. Perform staging/Sonar/production checks only when still required. Use Chrome where visual validation is required. Jenkins is skipped by design.
10. Final gate: the round is complete when fresh source reconciliation, required mount verification/actions, remaining PR/staging/Sonar/production checks, Cursor delegation review, and Daily Magic reporting attempts have completed or a true hard blocker has been recorded.

Hard blockers:
- Missing/invalid/permission-blocked token/API access when no safe fresh fallback is available for a required source.
- Google Chrome auth/SSO/login/passkey/client-certificate/session failure on a remaining Chrome-only external check or mutation.
- Contradictory Sentry/Jira/PR evidence that remains unresolved after API/connector and required Chrome checks.
- Filesystem write failure for a required handoff/artifact after fallback path attempts.
- Cursor unavailable/timed out before accepting a required bug-code fix; record blocked for that item and do not hand-roll code.

Final response requirements:
- State current step, just-completed step, next intended step, paused/not paused, source evidence used, whether Chrome is still needed, and reportWebSocketWarning when Daily Magic WebSocket reporting could not be performed.
- If blocked, include exact source/system, URL when applicable, attempts made, why unsafe to continue, needed Thien action, and next step after unblock.
- If not blocked, say the automation is not paused and whether it is ready for the next heartbeat or continuing with remaining item work.
"""
