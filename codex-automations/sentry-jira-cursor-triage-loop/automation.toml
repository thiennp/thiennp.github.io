prompt = "Continue the Check24 Energie Sentry/Jira/PR triage loop using API-first source verification, in-app browser report-hook logging when a callable in-app browser tool is available, and Google Chrome only for remaining external visual checks/mutations.\n\nGlobal shared rules:\n- Follow /Users/thien.nguyen/.codex/AGENTS.md for general reporting payload shape and shared Jira duplicate-check/fingerprint rules, except where this prompt explicitly supersedes old Chrome-only/live-report/local-report-data requirements.\n- The local live report app at http://127.0.0.1:8766/ is retired for this automation. Do not start it, require it, verify it, or use it as a blocker.\n- Do not read, write, rebuild, validate, or depend on /Users/thien.nguyen/Desktop/Sentry Triage History/report-data.json. It is no longer automation state.\n- Remove Jenkins from the workflow. Do not require Jenkins PR, staging, release, build, activation, or production checks. Do not create Jenkins blockers.\n- Browser-hook progress reporting goes to https://thiennp.github.io/report/. Prefer the Codex in-app browser for this reporting page when an in-app browser control tool is exposed in the thread. If no callable in-app browser tool is available and Chrome JavaScript automation is unavailable, include reportHookWarning in the heartbeat final response and do not claim the dashboard was updated. Do not block solely on reporting.\n- External source pages that still need visual inspection or mutation must use Google Chrome, not the in-app browser. This includes Sentry UI pages, Jira UI pages, Bitbucket UI pages, Sonar, staging, production, and any remaining browser-only checks.\n\nAPI action playbook (authoritative):\n- Before guessing endpoints or opening browser fallbacks, read /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-jira-cursor-triage-loop/API_ACTIONS.md.\n- Prefer /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-jira-cursor-triage-loop/triage-api-actions.sh for all verified non-browser actions.\n- Start each round with triage-api-actions.sh check-all. Treat complete Sentry/Jira/Bitbucket API results as authoritative for read-only source lists/status snapshots.\n- Use Sentry Jira integration API helpers for inspect, fields, search, create dry-run, create, link dry-run, and link where the helper supports it.\n- Sentry Jira create/link mutations are allowed only through the helper, only at the numbered mutation step, and only after duplicate checks, idempotency guards, source evidence, and confirmation flags required by the helper are satisfied. Dry-run first.\n- Safe delegated CLI calls must go through triage-api-actions.sh delegate-cursor or delegate-claude, or directly through safe-delegate-cli.mjs. Prefer cursor-agent --model auto.\n- Tokens are owned by Codex main-agent scripts only. Never print, store, send, or delegate raw tokens, cookies, auth headers, client certificates, or ~/.env.\n\nApp ownership:\n- Codex main agent owns API source verification, Sentry/Jira API mutation decisions, Jira transitions when connector/API-safe, PR rebase/push, staging updates, browser-hook reporting, Cursor handoff generation, final decisions, and this heartbeat final response.\n- Cursor AI owns all new and regression bug-code fixes via /agent-fix-bug. Codex must not hand-roll bug-fix code.\n- Claude AI is local analysis only: stack-trace root-cause summaries, PR comment extraction, Jira description parsing, regression advisory, and Cursor handoff quality checks. Claude must not browse, mutate, transition, write state, or decide external state.\n- Google Chrome is only for remaining external visual inspection or mutations that cannot be completed safely by API/connector.\n- Codex subagents are optional read-only evidence gatherers. They must use one source each and perform no mutations.\n\nCanonical sources and verified access order:\n- Sentry source union: use triage-api-actions.sh sentry-union or check-all for Source A unresolved unassigned plus Source B unresolved assigned_or_suggested:me. Only fall back to Google Chrome if the token script is missing/incomplete.\n- Jira assigned PRE statuses/details/descriptions/transitions: prefer Jira API script and Atlassian connector. Use Google Chrome only if API/connector evidence is insufficient for a remaining visual check or mutation.\n- Bitbucket PR inventory/state: prefer API script. Use Google Chrome only for review/comment/activity details or mutation checks not available in the snapshot.\n- Sentry Jira mount inspect/create/link: prefer sentry-jira-integration helper. Chrome remains required for unlink until a safe API unlink path is separately verified.\n- Sonar, staging, and production smoke checks may still use Google Chrome when required. Jenkins is not part of this automation anymore.\n\nNumbered workflow:\n1. Start round and log status to https://thiennp.github.io/report/ using the in-app browser hook when a callable in-app browser tool is available. If no browser hook path is available, record reportHookWarning in the heartbeat final and continue. Run triage-api-actions.sh check-all. If Sentry, Jira, or Bitbucket API reads fail, fall back only for the failed source when useful. If both API and fallback are blocked for a required source, stop with a source-specific blocker.\n2. Build the same-round Sentry union from complete API evidence. Compare it with any current in-memory or artifact evidence from this run only. Do not use stale live-report rows or old report-data fields.\n3. Reconcile Jira and Bitbucket state from API/connector snapshots. Keep blockers scoped to their source. Do not create Jenkins/build blockers.\n4. Sentry source cleanup: treat items absent from the complete same-round union as out of scope. Do not create Jira, reopen Jira, mutate PRs/staging, resolve Sentry, or create Cursor handoffs for out-of-scope items.\n5. Regressed item scan: for in-scope unresolved/regressed items, collect same-round Sentry/Jira/PR evidence. Invoke Claude advisory when required by the existing regression rules, or record claudeAiUnavailable and continue with Codex's final decision.\n6. Ticket mount verification: for every in-scope item and every active PRE/duplicate/grouped relationship, verify Sentry side and Jira side using API/connector first. Use Chrome only when API/connector evidence is insufficient or for an unverified unlink path. Correct stale duplicate/grouping decisions when evidence proves the right mapping.\n7. Per-Sentry Jira mount action: inspect current Sentry Jira integration links by API. If no matching Jira exists and duplicate/idempotency checks pass, dry-run create first, then create through API helper with required confirmation flags. If a matching Jira exists, verify/link through helper as appropriate. Do not use Chrome for create/link unless the API helper is blocked.\n8. Existing PR work: for open Thien-authored PRs, refresh/rebase/push only when allowed by source evidence and repository rules. For merged/declined prior fixes on regressed items, prepare a new Cursor handoff rather than mutating old PR state.\n9. Cursor handoff and delegation: write the handoff JSON under /Users/thien.nguyen/Desktop/Sentry Triage History/cursor-handoffs/ only when that path is writable; otherwise use /Users/thien.nguyen/thiennp.github.io/codex-automations/sentry-jira-cursor-triage-loop/handoffs/ and mention the fallback. Delegate bug-code fixes to Cursor via the safe wrapper. Review Cursor artifacts before continuing.\n10. Staging/Sonar/production checks: perform only checks still required by the item workflow. Use Chrome where visual validation is required. Jenkins is skipped by design.\n11. Final gate: there is no live-report gate. The round is complete when API/source reconciliation, required mount verification/actions, PR/staging/Sonar/production checks that remain in scope, Cursor delegation review, and browser-hook reporting attempts or reportHookWarning handling have completed or a true hard blocker has been recorded.\n\nHard blockers:\n- Missing/invalid/permission-blocked token/API access when no safe fallback is available for a required source.\n- Google Chrome auth/SSO/login/passkey/client-certificate/session failure on a remaining Chrome-only external check or mutation.\n- Contradictory Sentry/Jira/PR evidence that remains unresolved after API/connector and required Chrome checks.\n- Filesystem write failure for a required handoff/artifact after fallback path attempts.\n- Cursor unavailable/timed out before accepting a required bug-code fix; record blocked for that item and do not hand-roll the code.\n\nHeartbeat final response requirements:\n- State current step, just-completed step, next intended step, paused/not paused, source evidence used, whether Chrome is still needed, and reportHookWarning when dashboard reporting could not be performed.\n- If blocked, include exact source/system, URL when applicable, attempts made, why unsafe to continue, needed Thien action, and next step after unblock.\n- If not blocked, say the automation is not paused and whether it is ready for the next heartbeat or continuing with remaining item work."
