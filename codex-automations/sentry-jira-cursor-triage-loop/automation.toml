prompt = "Continue the Sentry triage loop for Check24 Energie unresolved issues in Chrome from https://check24-energie.sentry.io/issues/?project=4506704740876288&project=4506704741990400&project=4506704737206273&project=4506704738910208&project=4506704735043584&project=4511296841515008&project=1837965&project=6315296&project=6315299&project=6310641&project=6315302&project=4506581362933760&project=4511296882540544&project=4511252687093760&project=4511252689977344&project=4508879690792960&project=2040735&project=4511222628548608&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h. Inspect issues by frequency. Skip Sentry issues assigned to someone other than Thien Nguyen. Assign unassigned eligible issues to Thien. If no linked PRE Jira exists, create one through the Sentry Jira integration with Thien as developer, reporter, and assignee. Open/reuse the Jira ticket in Chrome. If it has no PR and is not done, move it to In Progress. If a branch exists, check whether the branch fixes the issue and create a PR. If no branch exists, open Cursor on the mapped repo and run /agent-fix-bug there only. Reuse existing Chrome tabs/windows for Sentry, Jira, Bitbucket, Slack, Jenkins, Sonar, and the live local report at http://127.0.0.1:8766/; only open a new tab if no suitable tab exists. Browser tab hygiene rule: Avoid opening duplicate Chrome tabs. Reuse a single suitable tab per system whenever possible, and prefer navigating that existing Sentry, Jira, Bitbucket, Slack, Jenkins, Sonar, staging, production, or live-report tab instead of accumulating new tabs. If a new tab is opened only for one evidence-gathering step, treat it as temporary and close it immediately after capturing the needed URL/title/status/screenshot/API evidence. Do not close tabs that were already open before the round, tabs holding active work for the current Sentry/Jira/PR item, or tabs needed for Thien to react to an SSO blocker. If a tab must be left open, state why in the heartbeat/report summary. Hard SSO pause rule: If any required Sentry, Jira, Bitbucket, Slack, Jenkins, Sonar, staging, production, report, or internal CHECK24 page is blocked by SSO/auth/login/passkey/session expiry, stop immediately: do not continue with workaround evidence, inferred states, staging, Jira transitions, Sentry resolution, branch/PR mutation, reviewer edits, or dashboard green-state updates. Record the SSO blocker in report-data.json when safe from already-known context, send Thien a Slack message in https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH with the blocked system, PRE/PR/Sentry item, exact URL, and the action needed, then pause/wait for Thien input. If Slack sending is itself blocked by SSO or unavailable, stop and state that Slack notification is blocked in the heartbeat response; do not continue the triage round. In every automation round, delegate suitable read-only sidecar work to subagents before or alongside main-agent action. The main triage agent remains responsible for coordination, final decisions, any code mutation, branch operations, Jira transitions, Sentry resolution, Slack notification decisions, staging/release actions, report-data integration into the live report data path, and final validation. Resolve the live report path from SENTRY_TRIAGE_REPORT_DATA_PATH when present; otherwise use /Users/thien.nguyen/Desktop/Sentry Triage History/report-data.json. When writing report-data.json, preserve a timestamped backup, build the full next JSON in a same-directory temp file, parse and validate it (use http://127.0.0.1:8766/api/report-validation when available), then atomically mv it into place; never leave partial JSON. Use subagents only for read-only parallel evidence gathering, and use a strict one-role-per-subagent policy. Assign at most one role to each subagent when enough workers are available; if there are not enough workers, the main agent handles leftover roles instead of giving one worker unrelated responsibilities. Each subagent must return structured findings with source, item key, observed state, evidence link or command output summary, confidence, blocker if any, and recommended report-data.json update. When reporting, spawning, or summarizing subagents, always show each worker as Name (role), for example Pauli (PR Inventory), so the worker purpose is obvious. Desired subagent roles: (1) PR Inventory: gather Bitbucket Thien-authored PR inventory and behind-base detection; (2) PR Review Comments: gather Bitbucket comments, tasks, approvals/request-changes, and reviewers; (3) Sentry Jira Sync: gather unresolved Sentry issue eligibility, linked PRE tickets, Jira status, reopen checks, and outdated checks; (4) CI Quality: gather latest Jenkins/Sonar/regression/build state plus failed-build evidence; (5) Environment Release: gather release/main merged/built/activated evidence and staging merged/built/activated evidence; (6) Staging Smoke Evidence: gather staging smoke-test visibility, relevant-area, screenshot, and login/blocker evidence for https://www.check24-test.de/strom/; (7) Report QA: inspect report-data.json consistency, sorting, visible status semantics, and responsive live report sanity. Staging smoke screenshot capture and report-data writes remain a main-agent responsibility unless a future explicit instruction gives a worker a bounded screenshot/write scope. Subagents must not mutate anything: no code changes, rebase, push, Jira transitions, Sentry resolution, Slack messages, reviewer edits, staging, release, report data writes, or file modifications unless a future explicit instruction gives a worker a bounded write scope; for this workflow they gather evidence and return structured findings. The main triage agent dedupes, decides, acts where permitted, handles leftover roles when needed, and integrates subagent findings into report-data.json. Before checking a branch/PR, creating a PR, starting Cursor, or staging a fix, update the local base branch: fetch origin, use release when origin/release exists otherwise main when origin/main exists otherwise master when origin/master exists, checkout that base, and pull --ff-only. Preserve unrelated local WIP safely. Before working in a project, if no related branch exists, create the work branch only from that refreshed release/main/master base. If working on an existing related branch, fetch/pull the latest branch changes first, then rebase it onto the refreshed release/main/master base before continuing; if conflicts or risky decisions occur, stop and record the blocker. In every automation round, before inspecting new Sentry issues or taking unrelated action, open or reuse the Bitbucket PR inventory URL https://bitbucket.org/check24/workspace/pull-requests/?state=ALL&author=712020%3A98c2de13-71c4-48ae-a98a-3baa7fa11ba2 as the canonical list of PRs authored by Thien Nguyen. Use that page to refresh all Thien-authored PRs relevant to this triage, including open PRs listed in the dashboard and skip list plus any non-done Jira ticket with a linked PR. Do not touch, rebase, force-push, stage, transition Jira for, edit reviewers for, comment on, or otherwise mutate PRs authored by anyone else; only read non-Thien PRs when needed to understand a link or blocker. Dedupe overlapping PR checks/actions by PR URL or repo+PR number across Bitbucket inventory, dashboard, skip list, Jira, and Sentry links, then perform each branch freshness, comment/task, reviewer, Jenkins, Sonar, staging, and dashboard update action at most once per PR per round. If the same PR appears through multiple sources, merge the notes into one dashboard row instead of repeating work. Also check any PR owned by Thien Nguyen that appears in the dashboard/report or triage memory; if its source branch is behind the refreshed release/main/master target branch, update the local base, checkout or track the PR source branch, rebase it onto the refreshed base, run focused repo-appropriate verification or record why it could not run, and push with --force-with-lease. Do not skip a Thien-authored PR merely because it was checked in an earlier round. For each Thien-authored PR, ensure the source branch is up to date with the refreshed base, fetch comments, tasks, approvals, request-changes signals, reviewer list and reviewer activity, merge state, target branch/release/main membership, latest Jenkins build, latest Sonar state, regression status, staging state, production-build state, and whether the dashboard matches current reality. For every linked Sentry issue, refresh the current Sentry issue state through an authenticated Sentry API or signed-in browser source; do not infer Sentry resolved/unresolved from old report data, Jira status, or PR status. If Sentry access is blocked, set the report Sentry state to unknown/not verified with the blocker and needed Thien action instead of preserving a stale resolved or unresolved value. Update the dashboard whenever any PR state, reviewer state, comment/task/approval/request-change state, branch freshness, or CI/Sonar/Jenkins/regression state changes. If a comment or request changes item is actionable and safe to resolve on an already-created Thien-authored PR, update the base, checkout/track the PR source branch, make the minimal review-comment fix, amend the last commit, run focused and repo-appropriate verification, force-push with --force-with-lease, update the dashboard, and recheck CI/Sonar before staging. If comments are approvals, questions, unclear, risky, non-actionable, blocked, or need Thien's business/product/owner decision, do not change code; add the comment summary, author, direct Bitbucket comment link, review state, and required Thien action to the dashboard/report and notify Thien when useful. If a comment has an answer, reply, resolution, or is addressed by a later commit, include a concise answer/resolution summary and direct answer/reply link when available. For decision-needed PR feedback, send Thien a Slack message in https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH with the PRE key, PR link, comment/request-changes link or ID, and the exact decision needed; if Slack sending is unavailable, record that blocker in the dashboard and notify in the heartbeat response. Every open Thien-authored PR check must rebase the source branch onto the refreshed base, verify or record why verification could not run, and push with --force-with-lease; if conflicts or risky decisions occur, stop and record the blocker. After creating/finding a Thien-authored PR, move Jira to In Code Review when available, check Bitbucket/Jenkins pipeline/build and SonarQube/SonarCloud when exposed, and block staging until required checks pass. Whenever the latest Jenkins build exposed for a Thien-authored PR, staging, release, or production check is failed, automatically inspect the Jenkins build details/console/logs through the existing Chrome/Jenkins session. If the failure is attributable to the already-created Thien-authored PR or staging change and is safe within Codex permissions, update the base, checkout/track the PR source branch or staging branch as appropriate, make the minimal CI/test/review-comment fix, amend the last PR commit or create the minimal staging follow-up as appropriate, run focused repo-appropriate verification, push with --force-with-lease for PR branches or normal push for staging, update the dashboard, and recheck Jenkins/Sonar. If Jenkins inspection is blocked by auth, the failure is infra/flaky/unrelated, the fix would require a product/business/owner decision, or it would require a new Sentry bug-code fix that belongs in Cursor, do not change code; record the blocker, latest failed build, likely cause, and needed Thien action in the dashboard and notify Thien when useful. Sonar failure is not terminal: inspect/fix/amend/verify/force-push for code/test/coverage/duplication/maintainability issues when allowed; do not stage until rerun passes unless Thien waives it. When checks pass, update origin/staging, checkout local staging at origin/staging, cherry-pick the PR commits without overwriting unrelated work, run lightweight verification or record why not, push staging, and move Jira to In Test. After a fix is pushed to or confirmed on staging, use https://www.check24-test.de/strom/ as the staging base URL. Reason from the changed code, Sentry affected URL, and PR diff to choose the relevant staging area. If the relevant area is visible without login, smoke test that area in Chrome, confirm the page/interaction still works, take a screenshot, save it under /Users/thien.nguyen/Desktop/Sentry Triage History/evidence/ with the PRE key and timestamp in the filename, and update report-data.json with stagingSmoke {status, url, screenshot, note, testedAt}. If the relevant area cannot be found, is not visible on staging, needs login, or the smoke test is blocked, do not guess; record stagingSmoke.status as Blocked or Needs Thien, add the blocker and the exact question/action needed, and notify Thien when useful. Before marking any Sentry issue resolved, check the relevant project Jenkins production build at https://jenkins.energie.check24.de/ and record the production build state in the dashboard. If the fix is not built on production, do not mark it resolved. If the fix is merged to release or main/master but is not yet built on production, mark/record it as resolve next release instead of resolved. Repo mappings: energymodule -> /Users/thien.nguyen/enrg-energymodule; enrg-web-frontend -> /Users/thien.nguyen/enrg-web-frontend; enrg-energycenter-rev -> /Users/thien.nguyen/enrg-energycenter-rev; tarifvergleich -> /Users/thien.nguyen/enrg-tarifvergleich. Do not fix new Sentry bug code in Codex; new Sentry bug fixes must be done in Cursor. Codex may only do CI/Sonar/test-only follow-up fixes, failed-Jenkins follow-up fixes on an already-created Thien-authored PR or staging change, and actionable PR-review comment fixes on an already-created Thien-authored PR. After creating/finding a Thien-authored PR, inspect the PR diff and surrounding local git history/blame to identify active owner-reviewers in Bitbucket. Do not add Peer Reymer or Magdalena Berger. If no active suitable owner exists, leave reviewers unchanged and record why. Notify Thien with every PR link and verification summary. Keep the live report server running with /Users/thien.nguyen/Desktop/Sentry Triage History/start_live_report.sh when a report view is needed; use http://127.0.0.1:8766/ as the live report URL, ws://127.0.0.1:8766/ws for live updates, and the resolved live report data path as the only report data source. Update the resolved live report data path as the live report data source whenever an issue is assigned, linked to Jira, moved, fixed, pushed, gets a PR, rebased, reviewer-updated, PR comments are checked, request changes are checked, approvals are checked, a review-comment fix is made, a PR decision-needed Slack notification is sent or blocked, CI/Sonar is checked, a failed latest Jenkins build is inspected or fixed, cherry-picked to staging, staging smoke evidence is captured or blocked, amended, released, production-build status changes, or Jira status changes. Keep report-data.json fields lastUpdated, triageItems, and statusByPre current with Sentry/Jira/PR links, statuses, bug reason, fix summary, affected URL, repo, verification, rebase/pipeline/staging history in hidden data when useful, reviewer, PR review state, request-changes state, approval state, release/main merge state, release/main build state, release/main activation state, staging merge state, staging build state, staging activation state, stagingSmoke status/url/screenshot/note/testedAt/blocker evidence, latest Jenkins build state, regression status/evidence/blocker, and failed-build action/blocker, PR comment status and needed Thien action, PR comment direct links, PR comment answers/replies/resolutions, amendment, amendment summary, and blocker notes. Keep the visible dashboard simple: do not render a Rebase section, do not render Jenkins history, and do not render a synthetic Fix lifecycle badge. Show only explicit branch/environment facts: a Release/Main section with Merged, Built, and Activated fields, a Staging section with Merged, Built, and Activated fields, and a Staging Smoke section with status, checked URL, screenshot evidence, note, testedAt, and blocker when present. Activation means the built artifact is deployed/enabled for that branch or environment. Use Not verified when activation/build state is unknown, Not built when the branch is not merged or the build has not run, and Not activated when it is known not to be active. Only mark Built or Activated when verified. Treat every Not verified build, activation, release/main, staging, production, regression, or staging-smoke field as actionable in every automation round: gather the missing evidence from Bitbucket, Jenkins, Sonar, deployment/activation state, production, or staging as appropriate, update report-data.json, and do not leave the item passive; if access is blocked or the evidence cannot be determined safely, record the blocker and needed Thien action, then notify Thien when useful. For visible Jenkins/Sonar/regression, show only the latest Jenkins build status such as '#8 passed' or '#3 failed' plus Sonar state and regression status. For the visible PR Comments section, show only the commented code/file or PR discussion context, the comment, the author, the comment status, a direct link to the comment so Thien can react, and the answer/reply/resolution if it is answered; do not render full PR comment history. Capture Bitbucket's exact comment HTML link when available; if not available, link to the PR comments page and mark it as a fallback. Resolved PR comments must render collapsed by default; open, needs-answer, request-changes, and decision-needed comments must render expanded by default. For the visible Amendment section, show only a short human-language summary of what changed, why it matters now, and whether it is pushed/green/blocked; do not render commit hashes, command logs, or full technical amendment history, but keep detailed amendment history in hidden data when useful. For the visible Verification section, show only compact status chips for each verification field, such as Diff check: Passed, PHP lint: Passed, PHPUnit: Unavailable, Typecheck: Blocked, or Verification: See PR; do not render full command/output prose, but keep detailed verification history in hidden data when useful. Report status must explicitly distinguish release/main merged, release/main built, release/main activated, staging merged, staging built, staging activated, PR approved, request changes, comments in PR, open/no comments, latest Jenkins/Sonar/regression state, and production build/activation state where known. If Jira is non-done but linked PR is merged, check whether Jira was reopened after merge or PR is outdated; close if not reopened/outdated, otherwise keep active and show sync status. Keep dashboard sorting active work first: open PRs, non-done Jira, unresolved Sentry, then completed. Skip already handled items unless their Jira ticket has no PR: ENRG-WEB-FRONTEND-314 via PRE-4208 PR 1024, ENRG-WEB-FRONTEND-33G via PRE-4206 PR 1063, ENRG-WEB-FRONTEND-294 via PRE-4275 PR 1064, ENRG-WEB-FRONTEND-2X0 via PRE-4295 PR 1075, TARIFVERGLEICH-1A via PRE-4296 PR 13739, TARIFVERGLEICH-17 via PRE-4301 PR 13744, ENERGYMODULE-EVALUATION-1F via PRE-4297 PR 4949, TARIFVERGLEICH-D8 via PRE-4281 PR 13728, ENERGYMODULE-SGR via PRE-4282 PR 4943, TARIFVERGLEICH-BZ via PRE-4283 PR 13729, ENRG-ENERGYCENTER-REV-34 via PRE-4284 PR 1428, EC-REV-7 via PRE-4285 PR 1429, ENRG-ENERGYCENTER-REV-23 via PRE-4290 PR 1432, EC-REV-11 via PRE-4294 PR 1434, TARIFVERGLEICH-67 via PRE-4286 PR 13730, ENRG-WEB-FRONTEND-33V via PRE-4287 PR 1068, ENRG-WEB-FRONTEND-34N via PRE-4288 PR 1069, ENRG-WEB-FRONTEND-338 via PRE-4289 PR 1070, PRE-4253 PR 4932, PRE-4254 PR 1051, PRE-4255 PR 1421, PRE-4256 PR 4933, PRE-4257 PR 4934, PRE-4258 PR 1422, PRE-4259 PR 1423, PRE-4260 PR 1424, PRE-4261 PR 1052, PRE-4262 PR 4936, PRE-4263 PR 1053, PRE-4264 PR 1054, PRE-4265 PR 1055, PRE-4267 PR 1056, PRE-4268 PR 1057, PRE-4269 PR 1058, PRE-4270 PR 1059, PRE-4271 PR 1060, PRE-4272 PR 1062, and PRE-4273 PR 4937. If no eligible issues remain, report briefly and wait for the next heartbeat. Collapsed live-report item rule: when rendering a collapsed report item, show only: (1) Title linked to the Sentry issue with the Sentry status such as resolved, unresolved, ongoing, or regressed; (2) PR link with reviewer and PR status such as change requested, commented, approved, merged, open, or declined; (3) PR Sonar and PR Jenkins while the PR is not merged, otherwise Release Jenkins; (4) linked Jira ticket(s), supporting multiple PRE tickets when one PR covers several tickets, with ticket status; (5) On staging / Not on staging state. Keep all other report content in the expanded item view. Strict source verification rule: In every automation round, refresh and verify PR state, reviewer/comment state, and PR build/Sonar fields from Bitbucket/Jenkins/Sonar, Jira ticket status from Jira, and staging Jenkins/build state from Jenkins for every active triage/report item and every linked PRE/PR; never carry forward old PR, ticket, staging, or staging Jenkins statuses as current without a same-round source check. If any of those checks cannot be completed because of SSO/auth/permissions/HTTP errors/missing access/ambiguous page state, write the visible report status as Blocked (not Not verified, Unknown, or an old value), include the exact blocked source URL in the appropriate blocker/link field such as prBlockerUrl, jiraBlockerUrl, sonarBlockerUrl, latestJenkinsBuild.url, stagingJenkinsUrl, stagingBuildUrl, or stagingBlockerUrl, include the blocker reason and needed Thien action, send Slack when allowed by the SSO pause rule, and pause instead of continuing. The collapsed report must render that Blocked status as a link to the blocked Bitbucket/Jira/Jenkins/Sonar/staging page. Chrome-only browser rule: NEVER use the Codex in-app browser, Browser plugin, browser-use, or any in-app browser tab for this triage automation. Always use the existing signed-in Google Chrome application windows/tabs for Sentry, Jira, Bitbucket, Slack, Jenkins, Sonar, staging, production, and the live local report. When browser automation is needed for local report checks or evidence capture, drive Google Chrome itself (for example the installed Chrome executable or an existing Chrome debugging session), not the in-app browser. If the required Chrome page is blocked by SSO/auth/login/session expiry, follow the hard SSO pause rule and do not continue through the in-app browser as a workaround. Report validity verification rule: The automation is not done after writing report-data.json. In every round, after integrating source findings, read back the live report/report-data.json and verify that each visible PR status, Jira ticket status, PR Jenkins/Sonar status, release Jenkins status, staging state, and staging Jenkins/build state is still supported by same-round source evidence. Treat old report fields as stale until rechecked. If a visible reported value cannot be revalidated from Bitbucket/Jira/Jenkins/Sonar/Sentry/staging in that same round, replace that visible value with Blocked, link it to the blocked source page, record the blocker reason and needed Thien action, and pause under the SSO/auth rule when applicable. Run the local report-validation endpoint when available, but do not treat JSON/schema validity as source-status validity; both must pass before reporting the round as complete."
