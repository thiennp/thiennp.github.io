prompt = "Continue the Check24 Energie Sentry/Jira/PR triage loop using Google Chrome only.\n\nCanonical sources for every round:\n- Sentry unresolved issues, sorted by frequency: https://check24-energie.sentry.io/issues/?project=4506704740876288&project=4506704741990400&project=4506704737206273&project=4506704738910208&project=4506704735043584&project=4506704737206273&project=4511296841515008&project=1837965&project=6315296&project=6315299&project=6310641&project=6315302&project=4506581362933760&project=4511296882540544&project=4511252687093760&project=4511252689977344&project=4508879690792960&project=2040735&project=4511222628548608&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h\n- Jira assigned PRE tickets: https://c24-energie.atlassian.net/jira/for-you?tab=assigned\n- Bitbucket PR inventory authored by Thien Nguyen: https://bitbucket.org/check24/workspace/pull-requests/?author=712020%3A98c2de13-71c4-48ae-a98a-3baa7fa11ba2\n- Live report: http://127.0.0.1:8766/ with data at SENTRY_TRIAGE_REPORT_DATA_PATH when set, otherwise /Users/thien.nguyen/Desktop/Sentry Triage History/report-data.json\n\nHard rules:\n1. NEVER use the Codex in-app browser, Browser plugin, browser-use, or any in-app browser tab. Reuse signed-in Google Chrome tabs/windows for Sentry, Jira, Bitbucket, Slack, Jenkins, Sonar, staging, production, and the live report. Close temporary Chrome tabs immediately after collecting evidence; keep only pre-existing tabs, active work tabs, and SSO-blocker tabs.\n2. If any required source is blocked by SSO/auth/login/passkey/session expiry, stop immediately. Do not infer, continue around it, mutate code, transition Jira, resolve Sentry, or mark green states. Record a Blocked status/link in report-data.json when safe, send Thien a Slack message in https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH with the blocked system, item, URL, and action needed, then pause. If Slack is also blocked, stop and report that.\n3. Treat existing report data as stale until rechecked in the current round. Visible statuses must be backed by same-round source evidence, or shown as linked Blocked.\n4. A round is not finished until the live report page itself has been verified in Chrome after all writes and actions. JSON validity is necessary but not enough.\n\nRound procedure:\n1. Start/reuse the live report server when needed. Load report-data.json.\n2. Before individual Sentry work, reconcile all Jira and PR statuses in one global pass:\n   - From the report, collect every PRE key, every numeric PR plus repo, and every Bitbucket PR URL. Also collect any PRE tickets visible on the Jira assigned page and any Thien-authored PRs visible on the Bitbucket inventory page.\n   - In Chrome, open/reuse the Jira assigned page and fetch ticket statuses for all collected PRE keys in one batch/pass using the signed-in page or Chrome-authenticated Jira API/JQL when available. Update every matching report ticket/statusByPre entry with the current Jira status, category, assignee/reporter if visible, evidence URL, checkedAt, and Blocked fields if the batch cannot verify a ticket.\n   - In Chrome, open/reuse the Bitbucket inventory page and fetch every collected PR from Bitbucket’s authenticated source/API. PR status must be exactly Bitbucket PR state: OPEN, MERGED, or DECLINED. Preserve numeric pr/prNumber and PR URL. Never infer PR status from Jira, Jenkins, git, old report text, branch names, or comments.\n   - Keep blockers scoped to their source: Jenkins/build/auth failures go in jenkinsBlocker/latestJenkinsBuild/stagingJenkins/releaseJenkins fields, not prBlocker. Jira blockers go in Jira fields. PR blockers only mean Bitbucket PR lookup/create/state is blocked.\n   - Recompute report summary fields from the verified source state: open/merged/declined PR, current Jira status, PR Jenkins/Sonar when PR is not merged, Release Jenkins when merged, and On staging/Not on staging/Blocked. If a required source cannot be checked, show Blocked with the exact source URL.\n3. Write report-data.json safely: timestamped backup, same-directory temp file, JSON parse, /api/report-validation when available, then atomic move. Update lastUpdated, triageItems, and statusByPre.\n4. Verify the rendered report in Chrome after writing. Check that visible PR and Jira statuses match the same-round Jira/Bitbucket snapshot for every report item; fix discrepancies before proceeding.\n5. Then triage unresolved Sentry issues by frequency. Skip Sentry issues assigned to someone other than Thien. Assign unassigned eligible issues to Thien. If no linked PRE Jira exists, create one through the Sentry Jira integration with Thien as developer/reporter/assignee. If the ticket has no PR and is not done, move it to In Progress.\n6. For existing Thien-authored PRs, dedupe by PR URL/repo+number. Refresh base first (origin/release, else origin/main, else origin/master). For an open Thien-authored PR, update/rebase the source branch on the refreshed base, run focused repo-appropriate verification or record why blocked, and push with --force-with-lease. Do not mutate PRs authored by others.\n7. Code changes in Codex are allowed only for CI/Sonar/test-only follow-ups, failed-Jenkins follow-ups on an existing Thien-authored PR/staging change, or actionable review-comment fixes on an existing Thien-authored PR. New Sentry bug-code fixes must be done in Cursor with /agent-fix-bug in the mapped repo.\n8. If checks pass and staging is appropriate, update origin/staging, cherry-pick without overwriting unrelated work, verify lightly, push staging, move Jira to In Test, and capture staging smoke evidence from https://www.check24-test.de/strom/ when visible without login. If blocked, record Blocked/Needs Thien with URL and needed action.\n9. Before resolving Sentry, verify production/release Jenkins build and activation. If production is not built/active, do not mark resolved; record resolve-next-release or Blocked as appropriate.\n10. Final live-report correctness gate: after all reconciliation, Sentry triage, branch/PR work, Jira transitions, staging/release updates, and report-data writes for the round, reload the live report page in Chrome and verify the rendered collapsed rows and expanded details are correct against the same-round source snapshots and report-data.json. At minimum verify: PR state/link/reviewer, Jira ticket links/statuses, PR Jenkins/Sonar or Release Jenkins choice, staging state, Blocked links, last happened, duplicate-ticket grouping, sorting, and that no stale old status appears in collapsed or expanded sections. If the page is wrong, fix report data or UI and rerun validation. If correctness cannot be verified because Chrome/source/report access is blocked, record a Blocked status with the exact URL and pause. Only report the round complete after this page-level check passes.\n11. Use read-only subagents only when helpful for parallel evidence gathering. One role per subagent; no subagent mutations. The main agent decides, mutates, writes report data, and validates.\n\nRepo mappings: energymodule -> /Users/thien.nguyen/enrg-energymodule; enrg-web-frontend -> /Users/thien.nguyen/enrg-web-frontend; enrg-energycenter-rev -> /Users/thien.nguyen/enrg-energycenter-rev; tarifvergleich -> /Users/thien.nguyen/enrg-tarifvergleich.\n\nIf no eligible issues or actionable report discrepancies remain after reconciliation and the final live-report correctness gate passes, report briefly and wait for the next heartbeat."
