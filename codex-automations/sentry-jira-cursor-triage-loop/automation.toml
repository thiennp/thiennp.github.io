prompt = "Continue the Sentry triage loop for Check24 Energie unresolved issues in Chrome from https://check24-energie.sentry.io/issues/?project=4506704740876288&project=4506704741990400&project=4506704737206273&project=4506704738910208&project=4506704735043584&project=4511296841515008&project=1837965&project=6315296&project=6315299&project=6310641&project=6315302&project=4506581362933760&project=4511296882540544&project=4511252687093760&project=4511252689977344&project=4508879690792960&project=2040735&project=4511222628548608&statsPeriod=24h. Follow these rules: inspect issues by frequency; skip issues assigned to someone other than Thien Nguyen; assign unassigned eligible issues to Thien Nguyen; create a linked PRE Jira ticket through the Sentry Jira integration if missing with Thien Nguyen as developer, reporter, and assignee; open the Jira ticket in Chrome; if it has no pull request and is not done, move it to In Progress; if it has a branch, check whether the branch fixes the issue and create a pull request; if it has no branch, open Cursor on the relevant repo and run /agent-fix-bug there only. For Chrome/browser work, reuse the existing relevant tab for this session instead of opening duplicate tabs/windows. Because Chrome may have multiple windows on multiple screens, first search existing Chrome windows/tabs for the target Sentry, Jira, PR, or local report URL, activate and navigate that tab when needed, and only open a new tab if no suitable existing tab exists. Before checking an existing branch, checking an existing PR, creating a PR, starting Cursor, or staging a fix in any repo, update the local base branch first: fetch origin, use release as the base when origin/release exists, otherwise use master when origin/master exists, check out that base branch, and pull --ff-only from origin. Preserve unrelated local WIP safely and never overwrite user changes. Every time an open PR is checked, rebase its source branch onto the freshly updated base branch before status/reviewer/outdated decisions: resolve the PR source branch from Bitbucket or the PR metadata, ensure the repo working tree is clean, check out or track the PR branch, run git rebase <base>, run the repo-appropriate verification or clearly record why it could not be run, and push the rebased branch with git push --force-with-lease. If the rebase has conflicts or would require risky code decisions, stop, preserve the rebase state safely or abort if needed to avoid blocking the repo, notify Thien, and record the blocker in the dashboard. After creating a PR or confirming an existing PR for a ticket, move the Jira ticket to In Code Review when that transition is available and the ticket is not already further along. Then ensure the latest PR commit has passing Bitbucket pipeline/build statuses and SonarQube/SonarCloud status if the repo exposes one. If SonarQube/SonarCloud fails, do not treat that as a terminal blocker: inspect the finding when accessible; if it is a code, test, coverage, duplication, or maintainability issue, fix it on the PR branch, amend the last commit, run focused verification plus the repo-required verification, force-push with lease, update the dashboard, and recheck after CI/Sonar reruns. If Sonar cannot be inspected but Jenkins/build passed and the Sonar status is only Quality Gate failed, infer likely new-code quality/coverage from the changed files, add a narrow fix or focused tests, amend the last commit, and force-push with lease. Do not push that PR to staging or move Jira to In Test until the rerun exposes passing build and Sonar status, unless Thien explicitly waives the gate for that PR. Pipeline/build failures, pending checks, missing unexpected checks, or inaccessible check state still block staging until resolved or explicitly waived; record the exact state and notify Thien. When the PR checks pass, bring the change to staging: update current origin/staging, check out the local staging branch at origin/staging, cherry-pick the PR change commits onto staging without overwriting unrelated work, run the appropriate lightweight verification or clearly record why it could not be run, and push staging to origin. If cherry-pick conflicts or requires risky code decisions, stop, abort or preserve the state safely, notify Thien, and record the blocker. After the staging push succeeds, move the Jira ticket to In Test when that transition is available. Use repo mappings: energymodule -> /Users/thien.nguyen/enrg-energymodule, enrg-web-frontend -> /Users/thien.nguyen/enrg-web-frontend, enrg-energycenter-rev -> /Users/thien.nguyen/enrg-energycenter-rev, tarifvergleich -> /Users/thien.nguyen/enrg-tarifvergleich. Do not fix code in Codex except for CI/Sonar/test-only follow-up fixes on an already-created PR when Thien explicitly asks to fix and amend the last commit; Sentry bug fixes themselves must still be done in Cursor. After creating or finding a PR for a ticket, inspect the PR diff and the surrounding code in the local repo with git history/blame to identify the original implementer or likely code owners for the touched area. Check candidate reviewers are still active in Bitbucket before adding them, then assign the active person or people as Bitbucket PR reviewers. Do not add Peer Reymer or Magdalena Berger as reviewers even if Bitbucket shows either active: Peer now works in a different vertical and Magdalena has left. If blame points only to excluded people, leave reviewers unchanged and record that no suitable owner-reviewer was identified. If blame points to excluded people plus another active nearby owner, choose the other active nearby owner. If no active owner can be identified, leave reviewers unchanged and record the reason in the notification and dashboard notes. Notify Thien with every PR link and verification summary. Every time a Sentry issue is assigned, linked to Jira, moved, fixed, pushed, receives a PR, receives a rebase, receives reviewer updates, has CI/Sonar checked, is cherry-picked to staging, has a CI/Sonar follow-up amendment, or has Jira status changed, update the local HTML dashboard at /Users/thien.nguyen/Desktop/Sentry Triage History/index.html by editing the TRIAGE_ITEMS array, STATUS_BY_PRE, and LAST_UPDATED; include Sentry link, Jira link, PR link, current Sentry status, current Jira status, current PR status, bug reason, how it was fixed, affected bug URL when known, repo, verification, rebase result, pipeline/Sonar result, staging cherry-pick result, reviewer decision, amendment result, and any blocker notes. When refreshing dashboard status, if a Jira ticket is open or otherwise non-done but its linked PR is merged, check whether the Jira ticket was reopened after the PR merge. If it was not reopened and the PR is not outdated, transition the Jira ticket to Closed/done and refresh STATUS_BY_PRE. If Jira was reopened after the PR merge or the PR is outdated, keep the ticket active and show that status in STATUS_BY_PRE.sync, for example Reopened after merged PR or Outdated PR. Keep the dashboard sorting active work first: open PRs first, then non-done Jira tickets, then unresolved Sentry items, then completed rows. Skip already handled items from this thread, including ENRG-WEB-FRONTEND-314 via PRE-4208 PR 1024, ENRG-WEB-FRONTEND-33G via PRE-4206 PR 1063, ENRG-WEB-FRONTEND-294 via PRE-4275 PR 1064, ENRG-WEB-FRONTEND-2X0 via PRE-4295 PR 1075, TARIFVERGLEICH-1A via PRE-4296 PR 13739, ENERGYMODULE-EVALUATION-1F via PRE-4297 PR 4949, TARIFVERGLEICH-D8 via PRE-4281 PR 13728, ENERGYMODULE-SGR via PRE-4282 PR 4943, TARIFVERGLEICH-BZ via PRE-4283 PR 13729, ENRG-ENERGYCENTER-REV-34 via PRE-4284 PR 1428, EC-REV-7 via PRE-4285 PR 1429, ENRG-ENERGYCENTER-REV-23 via PRE-4290 PR 1432, EC-REV-11 via PRE-4294 PR 1434, TARIFVERGLEICH-67 via PRE-4286 PR 13730, ENRG-WEB-FRONTEND-33V via PRE-4287 PR 1068, ENRG-WEB-FRONTEND-34N via PRE-4288 PR 1069, ENRG-WEB-FRONTEND-338 via PRE-4289 PR 1070, PRE-4253 PR 4932, PRE-4254 PR 1051, PRE-4255 PR 1421,