name = "Sentry triage via Cursor"
prompt = "Run the Sentry triage/fix workflow for unresolved CHECK24 Energie issues in the 24h feed at https://check24-energie.sentry.io/issues/?project=1837965&project=4508879690792960&project=4511296882540544&query=is%3Aunresolved&referrer=issue-list&sort=freq&statsPeriod=24h. Use the authenticated Google Chrome/Sentry/Jira/Cursor desktop context when browser or IDE context is needed.\n\nProcess issues in feed order. Open the first Sentry issue detail. If the issue is assigned to someone other than Thien Nguyen, skip it and continue to the next issue. If it is unassigned, assign it to Thien Nguyen. If it is already assigned to Thien Nguyen, continue.\n\nFor the selected issue, collect only the visible non-secret issue context needed for triage: issue key, title/error message, exception type/value, relevant visible stack/component frames, culprit/source, URL/route, browser/platform/environment/release if visible, last-seen time, event/user counts, priority, tags/breadcrumbs/context that are visible and non-secret, and grouping/fingerprint clues. Do not copy raw event payloads wholesale and do not collect or transmit passwords, OTPs, passkey secrets, cookies, tokens, or raw credential material.\n\nCheck whether the Sentry issue already has a Jira ticket. If it does not, create a Jira ticket and set Thien Nguyen as developer, reporter, and assignee. Link the Jira ticket back to the Sentry issue when possible. If Jira creation, assignment, key confirmation, or Sentry/Jira linking fails, stop and report the blocker.\n\nOpen the Jira ticket in Chrome. If the Jira ticket is done, skip it and continue to the next Sentry issue. If it has no pull request and is not done, move it to In Progress unless it is already in an equivalent active development status.\n\nMap Sentry projects to local Cursor projects as follows: energymodule -> /Users/thien.nguyen/enrg-energymodule; enrg-web-frontend -> /Users/thien.nguyen/enrg-web-frontend; energycenter-rev -> /Users/thien.nguyen/enrg-energycenter-rev.\n\nIf the Jira ticket has a branch, inspect the relevant local project and check whether that branch fixes the Sentry issue. If it does fix the issue, create or attempt to create a pull request for that branch and report the PR link. If the branch does not fix the issue, continue with the Cursor workflow below using that branch context when appropriate.\n\nIf the Jira ticket has no branch or still needs a fix, open the relevant project in the native macOS Cursor app. Use Cursor, not Codex, to run the repository bug-fix workflow: start Cursor Agent with /agent-fix-bug and provide the full Sentry context and Jira ticket link/key. Tell Cursor to use the Jira key for branch, commit, documentation, and PR context, to follow the repo's .cursor guidance, and to avoid pasting secrets. Codex must not implement the code fix directly.\n\nWhen Cursor finishes, verify the result from outside Cursor: identify changed files, relevant verification, commit/push status, and PR creation status. If a PR was created, open it and notify Thien Nguyen with the PR link for review. If no PR was created or a blocker occurred, report exactly where the workflow stopped.\n\nContinue through the Sentry feed until there are no eligible issues left. For each processed issue, summarize Sentry assignment result, Jira ticket/link, Jira status changes, branch/PR result, Cursor result, verification, and any blockers."
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=5"
