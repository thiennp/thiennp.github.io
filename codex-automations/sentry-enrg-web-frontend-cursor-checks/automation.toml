version = 1
id = "sentry-enrg-web-frontend-cursor-checks"
kind = "heartbeat"
name = "Sentry enrg-web-frontend Cursor checks"
prompt = '''
Run Sentry triage checks for the enrg-web-frontend target. Use the authenticated Google Chrome Sentry feed URL https://check24-energie.sentry.io/issues/?project=4508879690792960&statsPeriod=24h. Use the authenticated non-no-cors Chrome window/tab when browser context is needed. Identify the latest issue in the 24h feed and open its Sentry issue detail page before deciding whether a Cursor fix is needed. Immediately assign the Sentry issue to Thien Nguyen before continuing; if assignment is unavailable or fails, stop and report the blocker.

Collect the visible non-secret issue context needed for triage: issue key, full title/error message, exception type/value, visible stack/function/component frames, culprit/source, URL/route, browser/platform/environment/release if visible, last-seen time, event/user counts, priority, tags/breadcrumbs/context that are visible and non-secret, and grouping/fingerprint clues. Do not copy raw event payloads wholesale and do not collect or transmit passwords, OTPs, passkey secrets, cookies, tokens, or raw credential material.

Only process issues from enrg-web-frontend. Treat issue keys/project prefixes shaped like ENRG-WEB-FRONTEND as in scope. If the latest issue is not from enrg-web-frontend, report the latest issue key, message, and last-seen time, then stop.

Before creating or reusing a Jira ticket or asking Cursor to fix, apply same-day de-duplication: check this thread's prior heartbeat results and the local repo's recent branches/commits/docs for the same Sentry issue key and same error signature. Do not try to fix the same Sentry issue key twice in the same local day. If skipped by de-duplication, do not create a Jira ticket, do not run commit workflow, do not push, do not create a PR, and do not change Jira status.

If not skipped and a Cursor fix may be needed, search Jira project PRE - Presales for an existing open/non-closed matching ticket using the Sentry issue key, short error signature, route, exception type/value, key stack/component/function names, grouping/fingerprint hash if visible, and likely root-cause terms. Treat Done, Closed, Resolved, Released, Cancelled, Won't Do, Duplicate, and equivalent statuses as closed; all other statuses are open/non-closed. If an open matching ticket exists, reuse it, assign or keep it assigned to Thien Nguyen when possible, and link it back to the Sentry issue if not already linked. If no open matching ticket exists, create and assign a PRE ticket in Jira project PRE - Presales via https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132. The ticket title should contain the Sentry issue key and short error signature; the description should summarize the non-secret Sentry context, Sentry issue URL, observed route/platform/grouping clues, and intended investigation. Link the confirmed PRE ticket back to the Sentry issue before starting Cursor. If Jira search, creation, assignment, key confirmation, or Sentry/Jira linking fails, stop and report the blocker.

Before starting Cursor, move the linked Jira ticket to In Progress. If it is already in an equivalent active development status, record that and continue. If it cannot be moved to In Progress, stop and report the blocker.

Open /Users/thien.nguyen/enrg-web-frontend in the native macOS Cursor app. Inspect the repo's .cursor guidance, especially fix-bug, commit, verification, and PR workflows. Run Cursor Agent automatically using the current project bug-fix workflow adapted for the full Sentry issue context and linked PRE ticket. Tell Cursor not to paste secrets and to use the PRE ticket key for workflow naming, branch naming, commit context, docs, and PR context. Branches should use the PRE ticket key rather than 00000.

After an actual fix, update relevant project docs according to the repo workflow, run the repository's required verification for touched files, then commit with the confirmed PRE ticket key using the repo's normal commit workflow. Never commit with --no-verify or bypass hooks. After a successful commit on a non-release fix branch, push the branch and create or attempt a PR using the repo's documented Bitbucket PR workflow. Move Jira to Code Review after the fix branch push and PR attempt/result.

After moving Jira to Code Review, checkout the latest staging branch in /Users/thien.nguyen/enrg-web-frontend, update it from origin, cherry-pick the fix commit(s) onto staging, resolve conflicts automatically only when the correct resolution is clear, run required staging verification for touched files, and push staging. Never push release. If conflicts cannot be resolved confidently, verification fails, or staging push fails, stop and report the blocker. After staging is verified and pushed, move Jira to In Test.

If Cursor determines the fix already exists or makes no file changes, do not commit, push, create a PR, cherry-pick to staging, or move Jira beyond the appropriate reported state. Summarize Sentry assignment result, Jira duplicate-search result, Jira ticket key/link and assignment result, Sentry/Jira linking result, Jira status transitions, changed files, documentation updates, verification, commit/push/PR result, staging cherry-pick/verification/push result, and the Sentry issue context used.
'''
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=5"
created_at = 1778051451000
updated_at = 1778051451000
