id = "hourly-bitbucket-dependency-pr-cleanup"
kind = "cron"
name = "Hourly assigned Bitbucket PR review"
prompt = "Once per hour, use Chrome to check Bitbucket for open pull requests assigned to or requiring review from Thien Nguyen in the CHECK24 workspace. Do not use Bitbucket MCP tools, Bitbucket app connectors, or other Bitbucket API wrappers for PR discovery, activity inspection, commenting, approvals, or change requests unless the user explicitly overrides this. Prefer the Chrome browser UI for all Bitbucket reads and writes. For each assigned PR, decide whether a new review is needed. First inspect prior review comments/approvals/request-changes from Thien Nguyen and prior agent comments signed with `-- Thien's Agent --`, plus the PR activity/commits. If Thien or Thien's Agent already reviewed the PR and there have been no subsequent code changes, do nothing. Treat pure rebase, merge-from-destination, branch sync, or merge commits that do not change the PR's effective code diff as non-code changes and do not duplicate the review. If code changed after the latest Thien/agent review/comment, review only the new/effective changed code and decide whether to post new feedback.\n\nGlobal shared rules:\n- Follow `/Users/thien.nguyen/.codex/AGENTS.md` for automation reporting and shared Jira duplicate-check/fingerprint rules. Do not duplicate those shared rules inside this automation prompt.\n\nFor PRs that need review, use this process: create or use a safe local checkout/worktree for the PR source and destination, inspect the effective diff, delegate the review to Claude CLI, and instruct Claude to delegate to Cursor Agent in read-only/plan mode as a secondary reviewer. Cursor should review for concrete bugs, regressions, and test gaps with file/line references and must not edit files. Claude should synthesize Cursor's findings with its own review.\n\nWhen posting feedback, put each actionable finding in the right place: prefer inline Bitbucket diff comments anchored to the exact changed file and line/hunk that causes the issue. Use a general PR comment only for cross-cutting summary, when Bitbucket cannot anchor the finding to a specific changed line, or when explaining that no inline location exists. Do not dump all findings into a general comment when inline comments are possible. Avoid duplicate comments that repeat feedback already given by Thien or Thien's Agent unless the issue remains after a relevant code change.\n\nEach comment must be short, clear, and scannable. Prefer 1-3 bullet points when the comment has multiple details. End every posted comment with the exact signature line `-- Thien's Agent --` so it is distinguishable from Thien's real manual comments. Keep the signature on its own final line. When there is an obvious small code change, include a Bitbucket-compatible code suggestion in the inline comment. Only include a suggestion if it is likely correct, applies cleanly to the commented line/hunk, and does not require broader architectural judgment. Avoid long essays; focus on the concrete risk, why it matters, and the requested fix.\n\nIf any unresolved finding is medium risk or higher, request changes on the PR after posting the relevant inline comments. If findings are only low-risk nits or test suggestions, comment without requesting changes. If no actionable issues are found and no new comment is warranted, do not comment or approve automatically unless explicitly requested elsewhere. Report which PRs were reviewed, skipped as already reviewed/no code changes, skipped as rebase/merge-only, commented inline, commented generally, changes-requested, or blocked, including brief reasons."
status = "PAUSED"
