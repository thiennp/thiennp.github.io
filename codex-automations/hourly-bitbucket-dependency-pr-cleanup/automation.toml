id = "hourly-bitbucket-dependency-pr-cleanup"
kind = "cron"
name = "15-minute assigned Bitbucket PR review"
prompt = "Every 15 minutes, review open Bitbucket pull requests assigned to or requiring review from Thien Nguyen in the CHECK24 workspace.\n\nOperating model:\n- Codex is the orchestrator. Codex owns run control, local git/worktree setup, effective-diff analysis, review dedupe, final decision-making, final reporting, and stale-thread cleanup.\n- Google Chrome is the only allowed app for Bitbucket and Slack web access in this automation. Chrome owns PR discovery, PR activity inspection, inline/general comment posting, and requesting changes. Use Chrome for blocker Slack messages too.\n- Claude AI is the primary reviewer. Claude owns the main code-review pass over the effective diff and synthesizes the final technical findings.\n- Cursor AI is the secondary reviewer. Cursor must be used in read-only or plan mode only, must not edit files, and should focus on concrete bugs, regressions, and missing tests with precise file/line references.\n- Slack is only for blocker notification to Thien, not for routine success messages.\n\nAvailability-first rules:\n- Before any cleanup, PR discovery, or review work, verify that every required application and access path for this run is available.\n- Required dependencies for every run are: real macOS Google Chrome app control, Bitbucket web access in Chrome, Slack web access in Chrome for blocker messaging, Claude availability for the primary review stage, and Cursor availability for the secondary review stage.\n- Treat this dependency verification as phase 0. Do not proceed to any later phase until the required dependencies have been checked.\n- If any dependency check fails, stop the run immediately. Do not use a fallback path, alternate browser, alternate reviewer, or partial-review mode.\n- If Slack web access in Chrome is available, send Thien a blocker message right away so he can act before the run exits.\n- If Slack web access is itself unavailable, record that the Slack notification could not be sent and include the exact failed dependency plus a concrete manual action Thien can take in the final blocked report.\n- Do not defer dependency discovery until the moment a tool is needed later in the run; check it up front.\n\nConversation cleanup rules:\n- At the start of each run, find prior Codex conversations or threads related to this automation.\n- Delete or archive any related conversation older than 1 hour so only recent context remains active.\n- Never delete or archive the current active conversation for the ongoing run.\n- If the environment supports archiving but not hard deletion, archive those old conversations instead and note that in the final report.\n- If cleanup fails, continue the review run unless the failure also blocks the required review workflow; mention the cleanup failure in the final report.\n\nChrome-only rules:\n- Use the real macOS Google Chrome app for all Bitbucket and Slack web access.\n- Do not use the Codex in-app browser, Browser skill, Playwright against another browser, or any non-Chrome browser path for PR discovery, inspection, commenting, approvals, change requests, or Slack notification.\n- Open Chrome to a target URL with `open -a \"Google Chrome\" \"https://TARGET_URL_HERE\"`.\n- Verify the front tab with `osascript -e 'tell application \"Google Chrome\" to get {URL, title} of active tab of front window'`.\n- If Chrome is not running or has no window, create one with `osascript -e 'tell application \"Google Chrome\" to make new window'` and then navigate the active tab with `osascript -e 'tell application \"Google Chrome\" to set URL of active tab of front window to \"https://TARGET_URL_HERE\"'`.\n- During phase 0, verify both that Chrome can be launched/controlled and that the Bitbucket and Slack target pages can be opened in the real Chrome app.\n- If the real-Chrome path cannot be automated or accessed, stop immediately, send Thien a Slack message at https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH saying Chrome is unavailable and the review round is blocked, then report `blocked: Chrome unavailable`.\n- Do not use Bitbucket MCP tools, Bitbucket app connectors, or other Bitbucket API wrappers for PR discovery, activity inspection, commenting, approvals, or change requests unless Thien explicitly overrides this.\n\nDelegation rules:\n- Codex must not hand off Bitbucket UI actions to Claude or Cursor. All browser interaction stays with Codex via real Chrome.\n- Claude must not post comments directly to Bitbucket. Claude returns findings and a comment plan to Codex.\n- Cursor must not browse Bitbucket, must not edit code, and must not be the final decision-maker. Cursor returns a scoped secondary review only.\n- If Claude is unavailable in this environment, record that as a blocker during phase 0, notify Thien on Slack, and stop rather than silently skipping the Claude review.\n- If Cursor is unavailable in this environment, record that as a blocker during phase 0, notify Thien on Slack, and stop rather than silently skipping the secondary review.\n\nReview phases:\n1. Dependency preflight in Codex and Chrome.\nVerify all required applications and access paths before any other work: Chrome control, Bitbucket access in Chrome, Slack access in Chrome, Claude availability, and Cursor availability. If any required dependency fails, send the blocker Slack message if possible and stop.\n2. Conversation cleanup in Codex.\nDelete or archive old automation-related conversations older than 1 hour before doing review work. Keep the current run thread.\n3. Chrome navigation preflight.\nRe-confirm the live Bitbucket and Slack Chrome tabs needed for the run after dependency verification, then proceed only if the access path is still healthy.\n4. PR inventory in Chrome.\nOpen the assigned-review PR view in Bitbucket and collect candidate PRs requiring review.\n5. Review-dedupe check in Chrome.\nFor each PR, inspect prior approvals, request-changes, comments from Thien Nguyen, and prior agent comments signed `-- Thien's Agent --`, plus PR activity and commits.\n6. Effective-change check in Codex.\nIf Thien or Thien's Agent already reviewed the PR and there have been no subsequent effective code changes, skip it. Treat pure rebase, merge-from-destination, branch sync, or merge commits that do not change the effective diff as non-code changes and do not duplicate review.\n7. Local diff prep in Codex.\nCreate or reuse a safe local checkout/worktree for source and destination. Compute the effective diff that remains unreveiwed since the latest Thien/agent review point.\n8. Primary review in Claude.\nGive Claude the scoped review package: PR link, title, summary, relevant prior Thien/agent comments, and only the effective new diff to review.\n9. Secondary review in Cursor.\nAsk Claude to delegate to Cursor AI in read-only or plan mode as a second reviewer for the same scoped diff. Cursor should look for concrete bugs, regressions, and missing tests with file/line references, and must not edit files.\n10. Synthesis in Claude.\nClaude synthesizes its own findings with Cursor's findings, removes duplicates, ranks severity, and returns a concise comment plan to Codex.\n11. Posting in Chrome.\nCodex posts actionable findings in Bitbucket using inline diff comments whenever a precise changed line or hunk exists. Use a general PR comment only for cross-cutting summary, no valid anchor location, or explanation that cannot be anchored.\n12. Final PR action in Chrome.\nIf any unresolved finding is medium risk or higher, request changes after posting the relevant comments. If findings are only low-risk nits or test suggestions, comment without requesting changes. If no actionable issues are found and no new comment is warranted, do not comment or approve automatically.\n13. Final report in Codex.\nReport which dependency checks passed or failed, whether Slack blocker notification was sent successfully, the concrete manual action suggested for any blocker, and which PRs were reviewed, skipped as already reviewed/no code changes, skipped as rebase/merge-only, commented inline, commented generally, changes-requested, blocked, or had cleanup failures, with brief reasons.\n\nComment-writing rules:\n- Keep each comment short, clear, and scannable.\n- Prefer 1-3 bullets when a comment has multiple details.\n- End every posted comment with the exact signature line `-- Thien's Agent --` on its own final line.\n- When there is an obvious small code change, include a Bitbucket-compatible code suggestion only if it is likely correct, applies cleanly to the commented line or hunk, and does not require broader architectural judgment.\n- Avoid long essays. Focus on the concrete risk, why it matters, and the requested fix.\n- Avoid duplicate comments that repeat feedback already given by Thien or Thien's Agent unless the issue remains after a relevant code change.\n\nBlocker-notification rules:\n- On any hard blocker, send Thien a short Slack message in https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH with the blocked system, PR or URL if known, exact blocker, and the next action needed.\n- If Slack cannot be accessed, include that Slack-notification failure in the blocked report.\n- Every blocker message and blocked report must include a concrete manual action for Thien to take to bypass or fix the blocker.\n- Treat any failed phase-0 dependency check as a hard blocker.\n- Treat Chrome unavailability, Bitbucket access failure, Slack access failure, Claude primary-review unavailability, and Cursor secondary-review unavailability as hard blockers.\n- Prefer failing early in phase 0 with a Slack notification over discovering missing applications later in the workflow."
