name = "15-minute assigned Bitbucket PR review"
prompt = "Every 15 minutes, review open Bitbucket pull requests assigned to or requiring review from Thien Nguyen in the CHECK24 workspace.\n\nOperating model:\n- Codex is the orchestrator. Codex owns run control, local git/worktree setup, effective-diff analysis, review dedupe, final decision-making, final reporting, and stale-thread cleanup.\n- Google Chrome is the only allowed app for Bitbucket and Slack web access in this automation. Chrome owns PR discovery, PR activity inspection, inline/general comment posting, and requesting changes. Use Chrome for blocker Slack messages too.\n- Claude AI is the primary reviewer. Claude owns the main code-review pass over the effective diff and synthesizes the final technical findings.\n- Cursor AI is the secondary reviewer. Cursor must be used in read-only or plan mode only, must not edit files, and should focus on concrete bugs, regressions, and missing tests with precise file/line references.\n- Slack is only for blocker notification to Thien, not for routine success messages.\n\nConversation cleanup rules:\n- At the start of each run, find prior Codex conversations or threads related to this automation.\n- Delete or archive any related conversation older than 1 hour so only recent context remains active.\n- Never delete or archive the current active conversation for the ongoing run.\n- If the environment supports archiving but not hard deletion, archive those old conversations instead and note that in the final report.\n- If cleanup fails, continue the review run unless the failure also blocks the required review workflow; mention the cleanup failure in the final report.\n\nChrome-only rules:\n- Use the real macOS Google Chrome app for all Bitbucket and Slack web access.\n- Do not use the Codex in-app browser, Browser skill, Playwright against another browser, or any non-Chrome browser path for PR discovery, inspection, commenting, approvals, change requests, or Slack notification.\n- Open Chrome to a target URL with `open -a \"Google Chrome\" \"https://TARGET_URL_HERE\"`.\n- Verify the front tab with `osascript -e 'tell application \"Google Chrome\" to get {URL, title} of active tab of front window'`.\n- If Chrome is not running or has no window, create one with `osascript -e 'tell application \"Google Chrome\" to make new window'` and then navigate the active tab with `osascript -e 'tell application \"Google Chrome\" to set URL of active tab of front window to \"https://TARGET_URL_HERE\"'`.\n- If the real-Chrome path cannot be automated or accessed, stop immediately, send Thien a Slack message at https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH saying Chrome is unavailable and the review round is blocked, then report `blocked: Chrome unavailable`.\n- Do not use Bitbucket MCP tools, Bitbucket app connectors, or other Bitbucket API wrappers for PR discovery, activity inspection, commenting, approvals, or change requests unless Thien explicitly overrides this.\n\nDelegation rules:\n- Codex must not hand off Bitbucket UI actions to Claude or Cursor. All browser interaction stays with Codex via real Chrome.\n- Claude must not post comments directly to Bitbucket. Claude returns findings and a comment plan to Codex.\n- Cursor must not browse Bitbucket, must not edit code, and must not be the final decision-maker. Cursor returns a scoped secondary review only.\n- If Claude is unavailable in this environment, record that as a blocker for the review phase, notify Thien on Slack, and stop rather than silently skipping the Claude review.\n- If Cursor is unavailable but Claude is available, Claude may continue alone; report that Cursor secondary review was unavailable.\n\nReview phases:\n1. Conversation cleanup in Codex.\nDelete or archive old automation-related conversations older than 1 hour before doing review work. Keep the current run thread.\n2. Chrome preflight.\nVerify real Chrome control for Bitbucket and Slack paths. If blocked, notify Thien on Slack and stop.\n3. PR inventory in Chrome.\nOpen the assigned-review PR view in Bitbucket and collect candidate PRs requiring review.\n4. Review-dedupe check in Chrome.\nFor each PR, inspect prior approvals, request-changes, comments from Thien Nguyen, and prior agent comments signed `-- Thien's Agent --`, plus PR activity and commits.\n5. Effective-change check in Codex.\nIf Thien or Thien's Agent already reviewed the PR and there have been no subsequent effective code changes, skip it. Treat pure rebase, merge-from-destination, branch sync, or merge commits that do not change the effective diff as non-code changes and do not duplicate review.\n6. Local diff prep in Codex.\nCreate or reuse a safe local checkout/worktree for source and destination. Compute the effective diff that remains unreveiwed since the latest Thien/agent review point.\n7. Primary review in Claude.\nGive Claude the scoped review package: PR link, title, summary, relevant prior Thien/agent comments, and only the effective new diff to review.\n8. Secondary review in Cursor.\nAsk Claude to delegate to Cursor AI in read-only or plan mode as a second reviewer for the same scoped diff. Cursor should look for concrete bugs, regressions, and missing tests with file/line references, and must not edit files.\n9. Synthesis in Claude.\nClaude synthesizes its own findings with Cursor's findings, removes duplicates, ranks severity, and returns a concise comment plan to Codex.\n10. Posting in Chrome.\nCodex posts actionable findings in Bitbucket using inline diff comments whenever a precise changed line or hunk exists. Use a general PR comment only for cross-cutting summary, no valid anchor location, or explanation that cannot be anchored.\n11. Final PR action in Chrome.\nIf any unresolved finding is medium risk or higher, request changes after posting the relevant comments. If findings are only low-risk nits or test suggestions, comment without requesting changes. If no actionable issues are found and no new comment is warranted, do not comment or approve automatically.\n12. Final report in Codex.\nReport which PRs were reviewed, skipped as already reviewed/no code changes, skipped as rebase/merge-only, commented inline, commented generally, changes-requested, blocked, or had cleanup failures, with brief reasons.\n\nComment-writing rules:\n- Keep each comment short, clear, and scannable.\n- Prefer 1-3 bullets when a comment has multiple details.\n- End every posted comment with the exact signature line `-- Thien's Agent --` on its own final line.\n- When there is an obvious small code change, include a Bitbucket-compatible code suggestion only if it is likely correct, applies cleanly to the commented line or hunk, and does not require broader architectural judgment.\n- Avoid long essays. Focus on the concrete risk, why it matters, and the requested fix.\n- Avoid duplicate comments that repeat feedback already given by Thien or Thien's Agent unless the issue remains after a relevant code change.\n\nBlocker-notification rules:\n- On any hard blocker, send Thien a short Slack message in https://grid-check24.enterprise.slack.com/archives/D055RM7UFEH with the blocked system, PR or URL if known, exact blocker, and the next action needed.\n- If Slack cannot be accessed, include that Slack-notification failure in the blocked report.\n- Treat Chrome unavailability and Claude primary-review unavailability as hard blockers.\n- Treat Cursor unavailability as non-fatal only if Claude can still complete the primary review; mention the degraded mode in the final report."
