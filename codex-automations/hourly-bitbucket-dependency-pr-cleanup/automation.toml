version = 1
id = "hourly-bitbucket-dependency-pr-cleanup"
kind = "cron"
name = "15-minute assigned Bitbucket PR review"
prompt = "Every 15 minutes, review open Bitbucket pull requests from Thien Nguyen's CHECK24 Bitbucket reviewing queue at `https://bitbucket.org/check24/workspace/pull-requests/?user_filter=REVIEWING`.\n\nOperating model:\n- Codex is the orchestrator. Codex owns run control, local git/worktree setup, effective-diff analysis, review dedupe, final decision-making, final reporting, and stale-thread cleanup.\n- Google Chrome is the only allowed app for Bitbucket web access in this automation. Chrome owns PR discovery, PR activity inspection, inline/general comment posting, and requesting changes.\n- Claude AI is the preferred primary reviewer when available. Claude owns the main code-review pass over the effective diff and synthesizes the final technical findings. If Claude is blocked after the required self-heal path, Codex replaces Claude and performs the primary review directly.\n- Cursor AI is the preferred secondary reviewer when available. Cursor must be used in read-only or plan mode only, must not edit files, and should focus on concrete bugs, regressions, and missing tests with precise file and line references. If Cursor is blocked or unavailable, Codex replaces Cursor and performs a second independent review pass directly.\n\nDaily Magic reporting rules:\n- Before any other work beyond reading memory and the Chrome scriptability gate, explicitly confirm in the run output that this automation is obligated to report status to `https://daily-magic.d.energie.check24.de/thien/` for the full iteration. Treat this confirmation as mandatory start-of-run bookkeeping, not optional narration.\n- Use the Daily Magic dashboard for all live status and action reporting in this automation.\n- Before creating a new thread, follow the Daily Magic thread rules: inspect existing thread context first, and create a new thread only when required by the workflow and after user approval when the topic is brand-new.\n- Always report major phase completion, every reviewed PR outcome, every ignored PR outcome, every blocker, and the final state through Daily Magic with the correct category, owner, thread/action linkage, and concise text.\n- If Daily Magic reporting fails, record that failure in memory and final output, but continue the automation unless the current step is otherwise a hard blocker.\n\nQueue export rules:\n- The first export step after phase-0 dependency verification succeeds is to export the current reviewing queue by running `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/export-bitbucket-reviewing-queue.sh`.\n- The export script must save the queue JSON to `codex-automations/hourly-bitbucket-dependency-pr-cleanup/state/bitbucket-reviewing-queue.json`.\n- Immediately after the queue export succeeds, run `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/export-bitbucket-pr-details.sh` to save per-PR Bitbucket detail JSON to `codex-automations/hourly-bitbucket-dependency-pr-cleanup/state/bitbucket-pr-details.json`.\n- For every PR that has an inferred Jira key, run `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/export-jira-issue-details.sh <JIRA_KEY>` unless a fresh `jira-<JIRA_KEY>.json` already exists for the current run. Infer Jira keys only from explicit Jira `/browse/KEY-123` links, from branch names that are exactly `KEY-123`, or from PR titles that contain a standalone `KEY-123`. Do not infer Jira keys from Sentry issue identifiers, stack traces, mixed tokens such as `ENRG-CHATTY-3Z`, or other generic `ABC-123` substrings embedded inside non-Jira identifiers.\n- After the Bitbucket PR detail export and all Jira exports complete, run `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/reconcile-agent-handoff.sh` to save the merged handoff JSON to `codex-automations/hourly-bitbucket-dependency-pr-cleanup/state/agent-handoff.json`.\n- Treat `codex-automations/hourly-bitbucket-dependency-pr-cleanup/state/agent-handoff.json` as the canonical review input artifact for the rest of the run. Record export success or failure for each script in Daily Magic reporting, memory, and the final report.\n- If the export script fails, first attempt one safe retry after re-confirming the active Chrome tab can open the Bitbucket reviewing queue URL. If it still fails, treat that as a hard blocker.\n- If any downstream export or reconciliation script fails, first attempt one safe retry after re-confirming the relevant Chrome page is open and authenticated. If it still fails, treat that as a hard blocker.\n\nAvailability-first rules:\n- The very first action of every run is to verify that the real macOS Google Chrome app is accessible and scriptable from this environment. Run `osascript -e 'tell application \"Google Chrome\" to get name'`. This automation must always reuse Thien's already running Chrome app/session when it exists and must not spawn a duplicate Chrome instance just to open a page. If the check fails, first confirm whether Chrome is already running with `pgrep -x \"Google Chrome\"`. If Chrome is running, repair by attaching to that existing app with JXA/AppleScript only and retry the exact scriptability check once. Only if Chrome is truly not running may the automation start it, and then it must start the existing app binary directly with `/Applications/Google Chrome.app/Contents/MacOS/Google Chrome >/dev/null 2>&1 &`, wait 3 seconds, and retry the exact AppleScript check once. If the retry still fails, stop immediately. Do not proceed to any other dependency check, cleanup step, PR discovery, or review work.\n- Before any cleanup, PR discovery, or review work, verify that every remaining required application and access path for this run is available after the Chrome accessibility gate passes.\n- Required hard dependencies for every run are: real macOS Google Chrome app control after the scriptability gate succeeds and Bitbucket web access in Chrome. Claude and Cursor should still be checked in phase 0 as preferred reviewer paths, but if either remains blocked after the required repair attempt, Codex becomes the reviewer replacement for that stage instead of stopping the run.\n- Treat this dependency verification as phase 0. The Chrome accessibility/scriptability gate is the first sub-step of phase 0. Do not proceed to any later phase until the required dependencies have been checked.\n- If a dependency check fails because of a blocker Codex can reasonably resolve itself from the terminal or local machine, Codex must try to fix it before stopping. Examples: installing a missing CLI or app, adding a known install location to `PATH`, launching a required app, following an in-browser fallback link, or applying another safe local setup step that does not require Thien's intervention.\n- The exact Claude availability/authentication check must be: `claude auth status`, followed by `claude -p \"Reply with READY and nothing else.\"`. Use that exact two-step check both before and after any Claude self-heal attempt.\n- If the Claude dependency check shows that Claude Code is installed but not logged in, treat that as a required user-assisted self-heal instead of an immediate hard stop: send a Daily Magic update that Claude login is required now, launch the interactive `claude` CLI in the foreground of the current terminal/session, let Thien complete `/login`, and wait up to 10 minutes for that `claude` session to exit.\n- The Claude login self-heal path may run at most once per automation run. If the interactive `claude` session is still running after 10 minutes, terminate it safely, record the outcome as `timeout`, and stop as blocked.\n- The Claude login self-heal attempt is successful only if the retry confirms both `claude auth status` shows `loggedIn: true` and `claude -p \"Reply with READY and nothing else.\"` succeeds. If the interactive `claude` session exits without a completed login, or the retry still fails, stop as blocked and tell Thien to finish Claude login manually before rerunning the automation.\n- Codex must not stop on a self-resolvable blocker until it has made a reasonable repair attempt and re-run the exact dependency check. If the repair succeeds, continue the automation and record the self-heal in the final report and memory.\n- Only stop immediately on blockers that are not self-resolvable by Codex, such as client-certificate or session problems, unavailable external services, missing human approvals, or a failed Chrome/Bitbucket access path. Missing Claude login is not an immediate stop condition; it must first go through the interactive `claude` login self-heal path above. If Claude or Cursor still remain blocked after their repair attempts, record that degraded state and continue with Codex as the replacement reviewer. Do not use a fallback browser.\n- Do not defer dependency discovery until the moment a tool is needed later in the run; check it up front.\n\nConversation cleanup rules:\n- At the very start of each run, before any review work resumes, find all prior Codex conversations or threads related to this automation.\n- Use `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/cleanup-codex-automation-sessions.py --automation-id hourly-bitbucket-dependency-pr-cleanup --automation-name \"15-minute assigned Bitbucket PR review\" --keep 1 --min-age-seconds 3600` as the canonical cleanup step. This archives old related session files from `~/.codex/sessions` into `~/.codex/archived_sessions` and serves as the supported fallback when hard deletion is unavailable.\n- Stop any still-running related conversation older than 1 hour first, then remove it completely. If hard deletion is not supported, archive it instead and note that fallback explicitly.\n- Keep only the current active conversation for the ongoing run. No older related conversation should remain active when the run proceeds.\n- If cleanup cannot stop and remove/archive the old related conversations, treat that as a blocker for starting a new review round and report it in the final output.\n\nChrome-only rules:\n- Use the real macOS Google Chrome app for all Bitbucket web access.\n- Do not use the Codex in-app browser, Browser skill, Playwright against another browser, or any non-Chrome browser path for PR discovery, inspection, commenting, approvals, or change requests.\n- Do not use `open -a \"Google Chrome\"` to open URLs during the automation. Navigate the already running Chrome session by setting the URL of an existing tab or a newly created tab/window inside that same running app.\n- Verify the front tab with `osascript -e 'tell application \"Google Chrome\" to get {URL, title} of active tab of front window'`.\n- If Chrome is not running or has no window, create one with `osascript -e 'tell application \"Google Chrome\" to make new window'` and then navigate the active tab with `osascript -e 'tell application \"Google Chrome\" to set URL of active tab of front window to \"https://TARGET_URL_HERE\"'`.\n- During phase 0, first verify local Chrome accessibility and scriptability with `osascript -e 'tell application \"Google Chrome\" to get name'`, including the reuse-existing-session rule and the one-time launch-and-retry flow above. Only after that check passes may the run verify that Chrome can be controlled and that the Bitbucket target page can be opened in the real Chrome app.\n- If the real-Chrome path cannot be automated or accessed, stop immediately and report `blocked: Chrome unavailable`, including the exact failure and a concrete manual action for Thien.\n- Do not use Bitbucket MCP tools, Bitbucket app connectors, or other Bitbucket API wrappers for PR discovery, activity inspection, commenting, approvals, or change requests unless Thien explicitly overrides this.\n\nDelegation rules:\n- Codex must not hand off Bitbucket UI actions to Claude or Cursor. All browser interaction stays with Codex via real Chrome.\n- Claude must not post comments directly to Bitbucket. Claude returns findings and a comment plan to Codex.\n- Cursor must not browse Bitbucket, must not edit code, and must not be the final decision-maker. Cursor returns a scoped secondary review only.\n- If Claude is unavailable in this environment, first attempt any self-resolvable fix Codex can do itself, such as installing the official CLI, fixing `PATH`, launching the required local tool, or running the interactive `claude` login flow when the blocker is specifically `loggedIn: false` / `Not logged in`. If Claude is still unavailable after that repair attempt, record `claude_fallback=codex` and continue with Codex as the primary reviewer instead of stopping.\n- If Cursor is unavailable in this environment, first attempt any self-resolvable fix Codex can do itself, such as fixing `PATH`, installing or updating the required CLI component, or launching the required local tool. If Cursor is still unavailable after that repair attempt, record `cursor_fallback=codex` and continue with Codex as the secondary reviewer instead of stopping.\n\nReview phases:\n1. Chrome accessibility gate and dependency preflight in Codex and Chrome.\nBefore any other work, run the explicit local Chrome accessibility and scriptability check with `osascript -e 'tell application \"Google Chrome\" to get name'`. Immediately after that gate passes, explicitly confirm in the run output that Daily Magic reporting is mandatory for this iteration, then continue with the Daily Magic start-of-run reporting sequence. If the Chrome check fails, first check whether Chrome is already running and attach to that existing app/session without spawning a duplicate instance. Only if Chrome is truly not running may the automation start it via `/Applications/Google Chrome.app/Contents/MacOS/Google Chrome >/dev/null 2>&1 &`, then wait 3 seconds and retry once. If that retry fails, stop immediately without doing cleanup, PR discovery, or any other dependency check. Immediately after this Chrome gate passes, verify the remaining required applications and access paths in this order:\n   1. Chrome control and Bitbucket access in Chrome\n   2. Claude availability using the exact two-step check `claude auth status` then `claude -p \"Reply with READY and nothing else.\"`\n   3. Cursor availability\nImmediately after the Chrome gate passes, send the required Daily Magic start-of-run status for the new run, then continue dependency verification. If the Claude check fails specifically because Claude is not logged in, first send a Daily Magic update that login is required now, then launch the interactive `claude` CLI in the foreground of the current terminal/session so Thien can complete `/login`. Wait up to 10 minutes for that interactive Claude session to exit. If it times out, terminate it safely and record the outcome as `timeout`. After the Claude session exits, rerun the exact same two-step Claude check once. If that retry still shows not logged in, record the outcome as `login_not_completed`. If `claude auth status` passes but the non-interactive probe still fails, record the outcome as `auth_ok_probe_failed`. The interactive Claude login self-heal may run at most once per automation run. If Claude remains blocked after that path, record `claude_fallback=codex`, report the degraded reviewer path, and continue.\nIf Cursor remains blocked after its repair attempt, record `cursor_fallback=codex`, report the degraded reviewer path, and continue. Only after Chrome and Bitbucket dependency verification succeed may the run execute the export pipeline in this exact order:\n   1. `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/export-bitbucket-reviewing-queue.sh`\n   2. `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/export-bitbucket-pr-details.sh`\n   3. `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/export-jira-issue-details.sh <JIRA_KEY>` for each inferred Jira key that does not already have a fresh export for this run\n   4. `./codex-automations/hourly-bitbucket-dependency-pr-cleanup/reconcile-agent-handoff.sh`\nIf any dependency or export step fails, first attempt any safe self-heal that Codex can perform itself and then re-run the exact check once where applicable. If the dependency or export step still fails after that repair attempt, stop and report the blocker with a concrete manual action for Thien.\n2. Conversation cleanup in Codex.\nBefore doing review work, stop all old automation-related conversations older than 1 hour, then remove them completely. Archive them only if hard deletion is unavailable. Keep the current run thread and do not proceed until no old related conversation remains active.\n3. Chrome navigation preflight.\nRe-confirm the live Bitbucket Chrome tab needed for the run after dependency verification. The Bitbucket PR inventory tab for this automation must be `https://bitbucket.org/check24/workspace/pull-requests/?user_filter=REVIEWING`. Proceed only if that exact access path is still healthy.\n4. PR inventory and context assembly from the exported artifacts.\nUse `codex-automations/hourly-bitbucket-dependency-pr-cleanup/state/bitbucket-reviewing-queue.json` as the source PR list, `codex-automations/hourly-bitbucket-dependency-pr-cleanup/state/bitbucket-pr-details.json` as the Bitbucket per-PR detail source, and `codex-automations/hourly-bitbucket-dependency-pr-cleanup/state/agent-handoff.json` as the merged review input for the run. The export pipeline must originate from the exact Chrome reviewing queue at `https://bitbucket.org/check24/workspace/pull-requests/?user_filter=REVIEWING`. Do not source PR or Jira review context from Bitbucket APIs, Jira APIs, repository-local PR pages, inbox notifications, or any other alternate inventory view unless Thien explicitly overrides this.\nEvery PR visible in the exported reviewing queue remains in review scope for this automation, whether or not the title looks dependency-related. `Not a dependency PR` is never a valid ignore reason by itself.\n5. Review-dedupe check in Chrome.\nFor each PR, inspect prior approvals, request-changes, comments from Thien Nguyen, and prior agent comments signed `-- Thien's Agent --`, plus PR activity and commits.\nIf Thien Nguyen already approved the PR and there have been no subsequent effective code changes after that approval, do not do any further work on that PR during this run. Do not comment, do not request changes, and do not recompute a new review package for it.\nFor those already-approved PRs, mark the report status as `Approved` and keep the visible report entry minimal: PR title plus `Approved` only.\nIf a PR is ignored or skipped at this stage, immediately report it through Daily Magic and include the exact reason, for example already reviewed with no effective code changes, rebase-only, merge-only, or another concrete scope rule explicitly defined in this automation. Do not ignore a PR solely because it is not dependency-related.\n6. Effective-change check in Codex.\nIf Thien approved the PR and there have been no subsequent effective code changes, skip it as `Approved`. If Thien or Thien's Agent already reviewed the PR without approval and there have been no subsequent effective code changes, skip it as already reviewed. If the last Bitbucket review state from Thien or Thien's Agent was previously `approved` or `changes requested` and that state is now missing while there have still been no subsequent effective code changes, restore that same state in Bitbucket during the current run instead of leaving the PR open. Reapplying `changes requested` under this rule still requires posting a fresh blocking comment in the same review pass before restoring the state. Treat pure rebase, merge-from-destination, branch sync, or merge commits that do not change the effective diff as non-code changes and do not duplicate review.\n7. Local diff prep in Codex.\nCreate or reuse a safe local checkout or worktree for source and destination. Compute the effective diff that remains unreviewed since the latest Thien or agent review point.\n8. Primary review in Claude or Codex fallback.\nIf Claude is available, give Claude the scoped review package from `agent-handoff.json`: PR link, title, Bitbucket summaries, matched Jira context when present, relevant prior Thien or agent comments, and only the effective new diff to review. If Claude is blocked, Codex performs the primary review directly over the same scoped package and effective diff.\n9. Secondary review in Cursor or Codex fallback.\nIf Cursor is available, ask Cursor AI in read-only or plan mode to do a second review for the same scoped diff, using the same merged handoff context from `agent-handoff.json`. Cursor should look for concrete bugs, regressions, and missing tests with file and line references, and must not edit files. If Cursor is blocked, Codex performs a second independent review pass directly and treats that output as the secondary review.\n10. Synthesis in Claude or Codex.\nIf Claude is available, Claude synthesizes its own findings with Cursor's findings or Codex's fallback second-pass findings, removes duplicates, ranks severity, and returns a concise comment plan to Codex. If Claude is blocked, Codex performs the synthesis itself using all findings gathered in the run.\n11. Posting in Chrome.\nCodex posts actionable findings in Bitbucket using inline diff comments whenever a precise changed line or hunk exists. Use a general PR comment only for cross-cutting summary, no valid anchor location, or explanation that cannot be anchored.\n12. Final PR action in Chrome.\nIf any unresolved finding is medium risk or higher, request changes only after posting the relevant comments in the same review pass. Never request changes without first posting at least one new Bitbucket comment during that pass that explains the blocker. For dependency-titled PRs, if Codex marks the PR as `changes requested`, Codex must also decline the PR in Bitbucket during the same run after posting the comments so the PR is clearly closed out instead of remaining open in a requested-changes state. If findings are only low-risk nits or test suggestions, comment without requesting changes and do not auto-approve in the same run. If no actionable issues are found and no new comment is warranted, auto-approve the PR in Bitbucket during the same run only when it is a human-created PR rather than a dependency PR. Before such an approval, if the PR had prior blocking feedback from Thien Nguyen or `-- Thien's Agent --` that is now considered addressed, Codex must post a short follow-up reply on the relevant thread or a short general follow-up comment stating that the issue was re-reviewed and is now resolved. This follow-up reply is mandatory before approval and is not optional. Treat PRs titled with `(deps)` or otherwise identified as dependency PRs as ineligible for auto-approval; leave them unapproved when clean unless another rule requires stronger action.\nIf there is no effective code change since the last reviewed point but Bitbucket has lost the last Thien/agent state, restore the previous state in the same run: re-approve when the last valid state was approval, or re-request changes when the last valid state was `changes requested`. Restoring `changes requested` still requires a fresh blocking comment in that same pass before the state is re-applied.\nSpecial dependency rule:\n- If a dependency PR changes any package whose name starts with `@check24/`, treat it as an intentional internal-package upgrade that must be reviewed and executed manually rather than auto-merged from Renovate.\n- For those PRs, request changes and decline the PR even if the version bump looks low risk.\n- Prefer a short comment that says internal `@check24/` package upgrades must be done intentionally and manually, then decline the PR in the same run.\n- Do not rely on a PR comment as the Renovate ignore mechanism. The durable Bitbucket-side signal is the declined PR state; if the same grouped PR keeps reappearing, the permanent fix belongs in Renovate repo config.\n13. Final report in Codex.\nReport which dependency checks passed or failed, which self-heals were attempted and whether they succeeded, including the `claude_login_attempt` outcome when applicable (`success`, `login_not_completed`, `timeout`, or `auth_ok_probe_failed`), whether `claude_fallback=codex` or `cursor_fallback=codex` was activated, whether the Daily Magic updates succeeded, which export/reconciliation scripts ran and whether they succeeded, the concrete manual action suggested for any remaining blocker, and which PRs were reviewed, ignored, skipped as `Approved`, skipped as already reviewed with no code changes, skipped as rebase or merge-only, commented inline, commented generally, changes-requested, declined, approved in this run, blocked, or had cleanup failures, with brief reasons. For every ignored or approved PR, include the exact reason it was skipped or approved.\n\nComment-writing rules:\n- Keep each comment short, clear, and scannable.\n- Prefer 1-3 bullets when a comment has multiple details.\n- End every posted comment with the exact signature line `-- Thien's Agent --` on its own final line.\n- When Codex is going to request changes, it must post a new blocking comment in that same review pass before clicking `Request changes`. A bare state change without a fresh comment is not allowed.\n- Hard fail-safe: if the comment composer does not open, the text cannot be inserted, the signature cannot be verified, or the comment submission cannot be confirmed, Codex must not click `Request changes`, `Approve`, or `Decline` in that pass. Stop, report the blocker, and leave the review state unchanged rather than applying any state transition without the required comment.\n- When Codex is approving a human-created PR after prior blocking feedback was addressed, post a short follow-up reply or follow-up comment before approving so the resolution is explicit in Bitbucket activity.\n- When there is an obvious small code change, include a Bitbucket-compatible code suggestion only if it is likely correct, applies cleanly to the commented line or hunk, and does not require broader architectural judgment.\n- Avoid long essays. Focus on the concrete risk, why it matters, and the requested fix.\n- Avoid duplicate comments that repeat feedback already given by Thien or Thien's Agent unless the issue remains after a relevant code change.\n\nBlocker rules:\n- Every blocked report must include a concrete manual action for Thien to take to bypass or fix the blocker.\n- Treat a failed phase-0 dependency check as a hard blocker only after Codex has exhausted any safe self-resolvable repair it can perform itself.\n- A Claude `loggedIn: false` or `Not logged in` result is not yet exhausted until Codex has sent the login-needed Daily Magic update, launched the interactive `claude` login flow once, allowed up to 10 minutes for Thien to attempt login, and rerun the exact Claude availability/authentication check once after that session exits or times out.\n- Treat Chrome unavailability and Bitbucket access failure as hard blockers. Claude primary-review unavailability and Cursor secondary-review unavailability should trigger Codex fallback after the required repair attempt instead of blocking the run.\n- Prefer failing early in phase 0 over discovering missing applications later in the workflow."
