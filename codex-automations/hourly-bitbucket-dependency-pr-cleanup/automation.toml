name = "Hourly assigned Bitbucket PR review"
prompt = "Once per hour, use Chrome to check Bitbucket for open pull requests assigned to or requiring review from Thien Nguyen in the CHECK24 workspace. Do not use Bitbucket MCP tools, Bitbucket app connectors, or other Bitbucket API wrappers for PR discovery, activity inspection, commenting, approvals, or change requests unless the user explicitly overrides this. Prefer the Chrome browser UI for all Bitbucket reads and writes. For each assigned PR, decide whether a new review is needed. First inspect prior review comments/approvals/request-changes from Thien Nguyen and prior agent comments signed with `-- Thien's Agent --`, plus the PR activity/commits. If Thien or Thien's Agent already reviewed the PR and there have been no subsequent code changes, do nothing. Treat pure rebase, merge-from-destination, branch sync, or merge commits that do not change the PR's effective code diff as non-code changes and do not duplicate the review. If code changed after the latest Thien/agent review/comment, review only the new/effective changed code and decide whether to post new feedback.\n\nFor PRs that need review, use this process: create or use a safe local checkout/worktree for the PR source and destination, inspect the effective diff, delegate the review to Claude CLI, and instruct Claude to delegate to Cursor Agent in read-only/plan mode as a secondary reviewer. Cursor should review for concrete bugs, regressions, and test gaps with file/line references and must not edit files. Claude should synthesize Cursor's findings with its own review.\n\nWhen posting feedback, put each actionable finding in the right place: prefer inline Bitbucket diff comments anchored to the exact changed file and line/hunk that causes the issue. Use a general PR comment only for cross-cutting summary, when Bitbucket cannot anchor the finding to a specific changed line, or when explaining that no inline location exists. Do not dump all findings into a general comment when inline comments are possible. Avoid duplicate comments that repeat feedback already given by Thien or Thien's Agent unless the issue remains after a relevant code change.\n\nEach comment must be short, clear, and scannable. Prefer 1-3 bullet points when the comment has multiple details. End every posted comment with the exact signature line `-- Thien's Agent --` so it is distinguishable from Thien's real manual comments. Keep the signature on its own final line. When there is an obvious small code change, include a Bitbucket-compatible code suggestion in the inline comment. Only include a suggestion if it is likely correct, applies cleanly to the commented line/hunk, and does not require broader architectural judgment. Avoid long essays; focus on the concrete risk, why it matters, and the requested fix.\n\nIf any unresolved finding is medium risk or higher, request changes on the PR after posting the relevant inline comments. If findings are only low-risk nits or test suggestions, comment without requesting changes. If no actionable issues are found and no new comment is warranted, do not comment or approve automatically unless explicitly requested elsewhere. Report which PRs were reviewed, skipped as already reviewed/no code changes, skipped as rebase/merge-only, commented inline, commented generally, changes-requested, or blocked, including brief reasons.\n\nAUTOMATION REPORT — AGENT LOGGING PROMPT\n\nPublic dashboard: https://thiennp.github.io/report/\nPublished snapshot: https://thiennp.github.io/report/dashboard.json\n\nYou are an automation agent (Codex, Cursor, or similar). Log every meaningful workflow step so this dashboard shows what you are doing. Humans read https://thiennp.github.io/report/; you write through the local Automation Report API, then publish when the public snapshot should change.\n\nThis Automation Report contract supersedes older Agent Report, agent-report, localhost:3100, and ws://localhost:3100/stream reporting instructions when they conflict. Keep existing domain workflow requirements unchanged.\n\nWHEN TO LOG\n- At run start, each step transition, blocker, success, and terminal state.\n- After Jira/PR/Sentry actions that change current work.\n- When status changes: running, success, warning, blocked, pending.\n\nBEFORE WRITING\n1. Ensure the local server is up:\n   cd automation-report && ./scripts/ensure-automation-report-server.sh\n2. Local write endpoints (not exposed on GitHub Pages):\n   - HTTP work status: http://127.0.0.1:3120/api/work-status\n   - WebSocket ingest: ws://127.0.0.1:3120/ws\n   - Dashboard read/clear: http://127.0.0.1:3120/api/dashboard\n\nPREFERRED — LOG CURRENT WORK (run each step)\nnode bin/send-work-status.mjs \\\n  --status running \\\n  --step \"2.1\" \\\n  --phase cursor \\\n  --title \"Short headline of current work\" \\\n  --pre PRE-4401 \\\n  --automationId \"my-automation-id\" \\\n  --runId \"20260608T120000Z\" \\\n  --agentName \"Codex\" \\\n  --nextStep \"2.2\" \\\n  \"One-line message describing what you are doing right now.\"\n\nALTERNATIVE — WEBSOCKET MESSAGE\nSend to ws://127.0.0.1:3120/ws after connect:\n{\n  \"type\": \"work-status.update\",\n  \"payload\": {\n    \"status\": \"running\",\n    \"step\": \"2.1\",\n    \"phase\": \"cursor\",\n    \"title\": \"Short headline of current work\",\n    \"message\": \"One-line message describing what you are doing right now.\",\n    \"pre\": \"PRE-4401\",\n    \"automationId\": \"my-automation-id\",\n    \"runId\": \"20260608T120000Z\",\n    \"agentName\": \"Codex\",\n    \"nextStep\": \"2.2\"\n  }\n}\n\nOPTIONAL — APPEND ACTIVITY EVENT\ncurl -fsS -X POST http://127.0.0.1:3120/api/automations/{automationId}/runs/{runId}/events \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"stepNumber\": \"2.1\",\n    \"title\": \"Step title\",\n    \"status\": \"running\",\n    \"message\": \"What happened in this step.\",\n    \"nextStep\": \"2.2\",\n    \"agentName\": \"Codex\"\n  }'\n\nPUBLISH TO https://thiennp.github.io/report/\nAfter material updates, sync the public snapshot:\ncd automation-report && npm run deploy:pages\ngit add report/ && git commit -m \"Sync automation report snapshot\" && git push origin master\n\nCLEAR DASHBOARD\nDELETE http://127.0.0.1:3120/api/dashboard\nThen redeploy if the public snapshot should reset.\n\nRULES\n- Use real status values; mark blockers as blocked with an actionable message.\n- Include PRE-#### when tied to Jira.\n- Activity history is capped at 200 events; older entries are trimmed automatically.\n- Do not treat https://thiennp.github.io/report/ as a write target; GitHub Pages is read-only except via deploy:pages."
