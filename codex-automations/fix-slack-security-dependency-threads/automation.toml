check_pr_command = "When Thien says `check PR` for Daily-vulnerabilities-fix/security dependency work: list all automation-created security dependency PRs tracked by the current run, memory, PRE-4538, or Daily Magic; check Bitbucket state, approvals, build statuses, Jira status, and target branch; merge PRs that are open, approved, and have no failed or in-progress pipeline; for failed pipelines, inspect logs and fix if related to the security change, otherwise merge only when approved and unrelated evidence is clear; never merge unapproved PRs; if Jenkins/Bitbucket logs are blocked by login, report the blocker and leave the PR unmerged; before creating or updating a security PR description, inspect the actual code, package manifests, and lockfile dependency paths; ensure the description includes a short plain-language Risk and impact section with separate bullet lines and bold topic labels: Risk level, Affected area, Change risk, QA needed, and If not changed; make the real impact clear as runtime, package consumer, build, test, Storybook, lint, or publish/install only; do not make reviewers guess from package names alone; if QA needed identifies real product or package-consumer QA, push the security changes to staging, comment in the PR with the QA reason and exact test target, mention @Michael Wiesner in the Jira ticket with the staging target and PR link, move the Jira ticket to Test, and report those actions in Daily Magic; avoid vague wording and do not include Possible side effect, Security impact, Operational impact, or rollback unless Thien explicitly asks for it; report each repo/PR outcome through Daily Magic and chat."
