prompt = "Run mode policy:\n- This automation runs once per day.\n- On each daily run, first check all pending security PRs/tickets tracked in memory and poll approval state.\n- On every run, always re-check every previously blocked Jira ticket and blocked memory item before starting any new dashboard scan or new remediation work.\n- A blocked item must never be assumed still blocked from old evidence; each run must gather fresh evidence using the same scanner/registry/API path that created the blocker when available, or record the fresh access failure if not available.\n- If a pending PR is approved, move its Jira issue to Approved and notify Thien Nguyen in output.\n- Perform full security dashboard scan/fix flow at 09:00 local time (or when explicitly triggered manually).\n- Daily run executes full scan/fix and Jira/PR tracking flow.\n\nUse existing Google Chrome session/windows/tabs (do not spawn parallel Codex tasks). Open or reuse a tab for https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow. From package-audit, iterate each issue and open Details to extract repository, branch, filepath, package, severity, and advisory identifiers. Load runtime credentials from /Users/thien.nguyen/enrg-web-frontend/.agents/cli/.env; never print or persist secret values. Use Bitbucket BASIC auth with EMAIL:BB_API_TOKEN and workspace BB_WORKSPACE. For each issue repo in the check24 workspace, resolve slug via workspace API when needed, then use an isolated worktree under the automation workspace or clone if absent. Before changes, always fetch, reset to latest scanned target branch, and rebase security branch onto latest target before push. Apply fixes as before: npm/pnpm lockfile vulnerabilities via package manager with focused lockfile diffs; composer vulnerabilities via targeted composer update of affected package with dependencies, no install, no scripts, and ignore platform requirements when needed, using Nexus credentials from env. For lockfiles, preserve unrelated metadata and dependency nodes (including peer metadata like \"peer\": true); if package-manager regeneration introduces unrelated churn (e.g. peer-flag flips, optional platform binaries, broad resolver noise), rebuild lockfile from parent and patch only vulnerable package nodes, then amend the existing commit and force-push the same security branch. Verify each fix with the same scanner/command family that reported it (npm audit/pnpm audit/composer audit/osv-scanner as applicable). Commit each changed repo on a concise 00000-style security branch, push, create or reuse Bitbucket PR to the scanned target branch, and include a proper PR description covering: what changed, side effects, breakage risk, rollback notes, post-merge checks, and lockfile-diff reasoning from actual committed changes (not local-environment assumptions). Always add Jens Bachmann and Aleksandar Jaksic as reviewers while preserving existing reviewers; resolve user UUIDs by display name if needed. If the scanned target branch is still vulnerable, ensure an open PR exists from the security branch where the same file resolves to a patched version; create or update PR if missing.\n\nJira workflow (mandatory for every security issue):\n1) In Chrome, create a Jira ticket in project PRE via https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132.\n2) Set both Assignee and Developer to Thien Nguyen, then move status to In Progress immediately.\n2.1) Immediately verify the created Jira work item is visible on the PRE board and specifically on https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132?assignee=712020%3A98c2de13-71c4-48ae-a98a-3baa7fa11ba2. If not visible, adjust board-relevant fields (status, assignee, labels/epic) and re-rank so it appears in that filtered board view, then record what was changed.\n3) After PR exists, update Jira with PR link and move status to In Code Review.\n4) Assign reviewer/owner in code review context to Alek (Aleksandar Jaksic).\n5) Poll PR approval status during each daily run (Bitbucket API or PR page in Chrome). When approved, move Jira ticket to Approved and notify Thien Nguyen in the run output.\n6) If an item is blocked, add a Jira ticket comment containing blocker reason/root cause/evidence/next action, then move ticket to To Do (never leave blocked tickets in Open).\n7) On later runs, re-check each blocked To Do ticket first; if still blocked, append a fresh blocker comment; if no longer blocked, move ticket to In Progress and continue processing.\n\nBlocked item recheck workflow (mandatory first phase of every run):\n- Before scanning the dashboard, creating new tickets, or modifying repositories for new findings, read memory and enumerate all blocked Jira tickets and blocked memory items.\n- For each blocked item, re-run the concrete blocker check: registry version lookup, npm/pnpm/composer/osv audit, Bitbucket PR/API check, Jira status check, dashboard detail check, or the exact command/API family recorded in memory.\n- If the item is still blocked, append a fresh Jira comment with the new timestamp, root cause, concrete evidence/error text, and recommended next action, keep or move the ticket to To Do, verify board visibility when Jira is reachable, and save the same evidence in memory.\n- If the blocker is gone, move the Jira ticket from To Do to In Progress, continue the fix/PR workflow immediately, and record the unblocked evidence in memory and output.\n- If Jira or the required external service is unreachable, treat that access failure as the fresh blocker evidence for this run and still include the Jira URL in memory and output.\n- Never skip a blocked item silently. The final output must include a recheck result for every blocked item from memory.\n\nFor every blocked item, always write an explicit blocker reason with root cause, concrete evidence (error text/command result), and recommended next action. If a Jira ticket exists for that blocked item, add the same blocker reason as a Jira ticket comment and move it to To Do (not Open). Always include the Jira ticket URL for each blocked item in the blocked-status section of the run output and saved memory. Track blocked tickets in memory so they are re-checked on the next run.\n\nLive report workflow:\n- At the end of every run, after writing the memory summary, regenerate the live report data by running `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/update_history_report.sh`.\n- The live report server is started with `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/start_live_report.sh`. It serves `http://127.0.0.1:8765/` and pushes updates over `ws://127.0.0.1:8765/ws`.\n- The live report data source is `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/security_audit_history.json`. If the live server is running, JSON changes must be pushed to connected browsers by WebSocket automatically.\n- Include the live report URL `http://127.0.0.1:8765/` in the final run output instead of presenting the static HTML file as the primary report.\n- If report data generation or live server startup fails, include the command error as a blocker, but do not discard the memory summary.\n\nAt the end, clearly report repos already fixed, repos changed, verification performed, pushed branches, PR links, reviewer assignment results, Jira ticket links/status transitions (including To Do/In Progress/Approved moves), ticket visibility verification results (including the assignee-filtered board URL), approval polling results, notifications sent, live report URL, WebSocket endpoint, report data path, and blockers/auth failures. In the blocked section, include one clickable Jira link per blocked item and the fresh recheck result for that run."
