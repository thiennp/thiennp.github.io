prompt = "Run mode policy:\n- This automation runs once per day and may also be manually triggered.\n- Keep a numbered step map for every run. Use hierarchical step ids in progress updates, delegation plans, memory summaries, dashboard notes, blockers, and final output.\n- Follow `/Users/thien.nguyen/.codex/AGENTS.md` for report-dashboard logging and shared Jira duplicate-check/fingerprint rules.\n- Read `$CODEX_HOME/automations/fix-slack-security-dependency-threads/memory.md` first and write exactly one concise final memory summary before finishing.\n- Keep browser tabs open at the end. Do not close the user's final/current browser tab.\n\n0. Readiness and ownership:\n- Main Codex agent owns orchestration, run lock, state mutation, final decisions, Jira/Bitbucket/repository/memory/report writes, conflict resolution, and final output.\n- Subagents are optional and bounded. They may perform read-only evidence work or one isolated local fix draft only. They must not mutate Jira, Bitbucket, memory, report state, shared branches, or external state.\n- Claude AI and Cursor AI are advisory only. Timeout, no output, auth prompts, or unavailable tools are advisory degradation and never block the daily security run.\n- Slack is for blocker/approval-needed human notifications only. If no Slack send/draft capability exists, record one concrete `Slack notification failed` entry and suppress repeated send attempts in the same run.\n\n1. Run lock and snapshot:\n- Validate `run.lock` ownership (`pid`, `started_utc`, automation id). If the owner is active, do not start a second mutable run. If stale or invalid, record evidence and replace it. If verification is unavailable and an existing lock cannot be proven stale, stop as an uncertain-lock blocker.\n- Create a run evidence directory, frozen memory snapshot, and short delegation plan before sync checks or mutations.\n\n2. Browser/API sync gate (must pass before PR polling, blocked-item rechecks, dashboard remediation, repository work, or continuation follow-up):\n- 2.1 Package-audit browser sync: open/sync `https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow` using the Codex in-app Browser or an already-open Google Chrome tab. Prefer the in-app Browser for report/package-audit extraction when it opens the URL and preserves auth; fall back to already-open Chrome when the in-app Browser is blocked or unauthenticated.\n- If one approved browser surface fails for package-audit, try the other before declaring package-audit blocked. If both fail because of auth/session/client-certificate/URL blocking, stop before mutations and record `Block reason:` plus `Actionability:`.\n- Write run-scoped package-audit evidence containing the required URL and a success marker such as `PACKAGE_AUDIT_SYNC=success` plus authenticated page evidence (for example title `CHECK24 Security`). Then run:\n  `node /Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/scripts/verify-package-audit-preflight.mjs --evidence-dir <current-run-evidence-dir>`.\n  If it exits non-zero, stop before PR/Jira/Bitbucket/repository mutations and report the verifier output as the `2.1` blocker.\n- 2.2 Jira sync: use Atlassian/Jira connector or Jira API for assigned PRE work, issue search, transitions, and board visibility. Jira does not require Chrome. If Jira API/connector access fails, stop before Jira mutations and repository remediation that requires Jira.\n- 2.3 Bitbucket sync: use Bitbucket API/CLI credentials for workspace `check24`, PR polling, reviewer lookup, branch pushes, and PR create/update. Bitbucket does not require Chrome. If Bitbucket API/CLI access fails, stop before branch pushes, PR create/update, reviewer assignment, approval polling, and remediation that depends on Bitbucket.\n- Browser UI for Jira/Bitbucket is optional fallback only when API/connector evidence is inconclusive; it must not become a hard precondition when API/connector access is healthy.\n- Show sync status with check marks or X marks for package-audit browser sync, package-audit preflight, Jira API/connector sync, and Bitbucket API/CLI sync.\n\n3. Queue order after sync gate succeeds:\n- Read the frozen memory snapshot.\n- Poll every tracked PR and Jira ticket from memory, including stale, done, blocked, waiting, and approval items.\n- Re-check every blocked Jira ticket and blocked memory item using the same scanner/registry/API/source family that created the blocker when available.\n- Only then scan/extract current package-audit dashboard rows and start new remediation.\n- Never keep an item active solely from old memory. If it is absent from the latest authenticated package-audit extract, closed/terminal with clean scanner evidence, already fixed/current, or stale/outdated, classify it as Done and remove it from Current.\n\n4. Classification rules:\n- Each active item must end as exactly one of: Done, Approved, Wait for PR Approval, Block, Needs triage, or ignored/dismissed by explicit user instruction.\n- `Approved` requires explicit Bitbucket approval evidence on an open or merged PR.\n- `Done` means no PR is required because the repo/target branch is clean/current, the lockfile/package is already fixed, or the package-audit row is stale/outdated.\n- Only `OPEN` Bitbucket PRs count as active/pending remediation or `Wait for PR Approval`. `MERGED`, `DECLINED`, `CLOSED`, `SUPERSEDED`, missing/deleted PRs, and other non-open states are historical only unless merged with explicit approval evidence for Approved handling.\n- A declined/closed/superseded PR without approval evidence must not move a ticket to Approved. If the target branch is still vulnerable, create or update a new open PR after the Jira hard gate; if clean/stale, move the ticket to Done.\n- Do not leave any Current report card in bare `Need Attention`; include `Attention reason:` and `Next action:` or convert it to Done/Wait/Block/Needs triage.\n\n5. Jira workflow hard gate for remediation:\n- Before repository mutation, branch push, PR creation/update, or continuing with a fix, search memory, assigned PRE backlog/Jira, and Bitbucket by stable SECDEP fingerprint: repo, branch, filepath, package, severity, advisory id, and scanner/source. Reuse existing open PRE tickets; do not create duplicates.\n- If no matching PRE ticket exists, create one in project PRE using the global SECDEP summary/fingerprint pattern. Set Assignee and Developer to Thien Nguyen (`712020:98c2de13-71c4-48ae-a98a-3baa7fa11ba2` when needed), move it to In Progress, and verify PRE board visibility through Jira API/Agile endpoints first.\n- Only after the ticket is assigned to Thien, In Progress, and board-visible may repository work continue.\n- After a PR exists, update the same PRE ticket with PR link, branch, reviewers, and verification summary; move it to In Code Review; set code-review Developer/reviewer context to Aleksandar Jaksic where required.\n- When a PR is approved, move the Jira ticket to Approved and report it. If no PR is needed because the item is clean/current/stale, move the ticket to Done instead of Approved.\n- If Jira API/connector access is blocked, save a blocked memory item and stop remediation for that issue until next run. Do not use Chrome merely to prove a Jira login wall.\n\n6. Repository remediation rules:\n- Load runtime credentials from `/Users/thien.nguyen/enrg-web-frontend/.agents/cli/.env`; fall back to `$HOME/.env` for API credentials and `$HOME/.npmrc` for npm/Nexus registry credentials. Never print or persist secret values.\n- Resolve Bitbucket repos in workspace `check24`; use isolated worktrees or current-checkouts under the automation workspace. Fetch/reset to latest scanned target branch before changes. Rebase the security branch on the latest target before pushing.\n- Use focused dependency updates. For npm/pnpm lockfile findings, prefer package-manager commands only when they produce focused diffs; otherwise rebuild from target and patch only vulnerable package nodes. Preserve unrelated metadata including peer flags such as `\"peer\": true`.\n- For composer findings, use targeted composer update of the affected package with dependencies, no install, no scripts, and ignore platform requirements when needed, using Nexus credentials from env.\n- Verify each fix with the same scanner/command family that reported it: `npm audit`, `pnpm audit`, `composer audit`, or `osv-scanner`, using the recorded package-audit command/version when available.\n- Before force-push, fetch the remote branch and verify it contains only automation-owned commits or the expected previous automation head. If human/unknown commits are present, stop and report a blocker.\n- If a commit/pre-commit hook is blocked only by missing local Docker daemon/container, treat it as a local-only validation gap: bypass with the repo-appropriate no-verify/documented mechanism, continue push/PR, and record the skipped Docker validation in memory, PR description, and final output. Do not add a Jira blocker comment for local-only validation gaps.\n- Commit concise 00000/PRE-style security branches, push, and create or reuse a Bitbucket PR to the scanned target branch. Add Jens Bachmann and Aleksandar Jaksic as reviewers while preserving existing reviewers.\n- PR descriptions must include: changed files, dependency/version deltas, side effects, breakage risk, rollback notes, post-merge checks, scanner verification, and lockfile-diff reasoning from actual committed changes. Explicitly answer `Can this break the application?`.\n\n7. Staging smoke evidence:\n- When a fix is pushed to staging or made visible on staging, infer the relevant area from repo/route/component/package usage. Test `https://www.check24-test.de/strom/` or the inferred route when visible without missing credentials.\n- Save screenshots under `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/evidence/<YYYY-MM-DD>/<ticket-or-repo>-staging-smoke.png`.\n- Record URL, area, inference, screenshot path, and pass/fail. If route/login/test data cannot be inferred or accessed, record the exact blocker/question; do not pretend the smoke test passed.\n\n8. Blocker rules:\n- Every blocked item must include exactly these scan-friendly lines near evidence:\n  `Block reason: <root cause plus concrete fresh evidence>`\n  `Actionability: Actionable|Not actionable yet|Needs triage - <why and exact next action or owner>`\n- Use `Actionable` for concrete unblock steps such as credentials, network/DNS, browser access, package-audit URL access, registry/Nexus access, repo checkout, Jira/Bitbucket API access, route/login/test data, or environment dependency.\n- Use `Not actionable yet` when no fixed upstream/vendor-supported remediation exists; include what release/advisory/registry should be watched.\n- Use `Needs triage` when evidence is inconclusive or a human product/security decision is required.\n- Move/keep blocked tickets in To Do, not Open, when Jira is reachable. Add Jira comments only for external/shared blockers requiring reviewer, owner, credential, repo-access, or product-security action. Never comment local-only blockers to Jira.\n- Stable blocker mode: if the same hard-gate blocker fingerprint appears in two or more consecutive runs, collect fresh evidence first and classify `Stable blocker` only if unchanged. In stable mode, output one canonical summary and suppress repeated Jira comments/Slack DMs for the same fingerprint for 24 hours.\n\n9. Reporting and final reconciliation:\n- Use the report dashboard hook from `/Users/thien.nguyen/.codex/AGENTS.md` when available. Report/dashboard transport failures are degradation, not a remediation hard gate unless another hard gate is already blocked or continuing would be unsafe.\n- Slack DM Thien Nguyen for blockers when send capability exists. Include automation name, blocked step, Jira URL when present, repo/branch/file/package/advisory when present, `Block reason`, `Actionability`, next action/owner, report status, and evidence source. If Slack send is unavailable, record `Slack notification failed` once.\n- Final output must report: sync statuses, tracked PR/ticket polling, repos already fixed, repos changed, verification, pushed branches, PR links, reviewers, Jira transitions/statuses, board visibility evidence, approval polling, staging evidence, notifications, dashboard logging status, blockers/auth failures, and Stable blocker summary when applicable.\n- Append one normalized memory summary, write final report status when available, verify current report semantics when available, release the run lock, and keep browser tabs open."
