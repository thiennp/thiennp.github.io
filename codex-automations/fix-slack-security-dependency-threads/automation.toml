version = 1
id = "fix-slack-security-dependency-threads"
kind = "cron"
name = "Daily-vulnerabilities-fix"
prompt = "Run mode policy:\n- This automation runs once per day.\n- Use the Codex in-app Browser or an already-open Google Chrome session for the report dashboard, package-audit, and package-audit Details. Prefer the in-app Browser for report dashboard telemetry and package-audit extraction when it can open the target URL and preserve authentication; fall back to already-open Chrome when the in-app Browser is blocked or unauthenticated. Use Google Chrome only for other browser-backed systems that require the authenticated/client-certificate browser session, such as staging smoke tests, Jenkins, and explicit UI fallback checks. Jira and Bitbucket do not require Chrome for this automation; use the Jira connector/API and Bitbucket API/CLI credentials first. If Jira or Bitbucket API/connector auth fails, record that API/connector blocker directly instead of opening Chrome to prove it.\n- Keep the final/current Google Chrome tab open when the automation finishes; do not close Chrome tabs at the end of a run\n- Step numbering rule: every automation run must maintain and report a numbered step map. Use hierarchical numbering for all major phases and substeps, for example `1. Check report dashboard, go to 2`, `2. Run sync gate, go to 2.1`, `2.1. Open package-audit, go to 2.2`. Include the current step number in progress updates, delegation plans, memory summaries, dashboard log notes, and final output. When a step completes, explicitly name the next step number; when a branch/substep is blocked, record the blocked step number and the next actionable step.\n- After the global reporting-readiness check from `/Users/thien.nguyen/.codex/AGENTS.md`, run a sync gate in this exact order before PR polling, blocked-item rechecks, dashboard remediation, or repository work: (1) open/sync `https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow` in the Codex in-app Browser or an already-open Google Chrome tab; (2) verify Jira connector/API access for assigned PRE work, issue search, transitions, and board visibility using the configured Atlassian tooling; (3) verify Bitbucket API/CLI access for the `check24` workspace, authored/security PR polling, reviewer lookup, branch pushes, and PR creation/update.\n- Step 2.1 verification guard: after package-audit browser sync evidence is written and before Jira/Bitbucket sync, PR polling, blocked-item rechecks, dashboard remediation, or repository work, run `node /Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/scripts/verify-package-audit-preflight.mjs --evidence-dir <current-run-evidence-dir>`. If it exits non-zero, treat step `2.1` as blocked, log the verifier output to memory/report/final, and stop before any PR/Jira/Bitbucket/repository mutation. This verifier only reads run evidence; it must not open or launch a browser. For continuation/manual follow-up runs, run this same verifier before reading PR/Jira status unless Thien Nguyen explicitly asks to skip package-audit preflight and accepts missing dashboard evidence.\n- Use the in-app Browser or already-open Google Chrome for the package-audit sync-gate page. If one browser surface is blocked or unauthenticated, try the other approved surface before declaring package-audit blocked. If package-audit cannot be opened or authenticated in either approved browser surface because of missing/expired credentials, a client-certificate/session problem, URL blocking, or an auth wall, stop the automation immediately, show the sync status with a check mark or X, update memory and the report dashboard when available with the credential blocker, and wait for Thien Nguyen. Jira and Bitbucket sync checks are connector/API checks, not browser gates; if Jira or Bitbucket API/connector access fails, stop before Jira/Bitbucket mutations, repository work, or remediation, record the API/connector blocker, and do not try to bypass it with browser UI.\n\nGlobal shared rules:\n- Follow `/Users/thien.nguyen/.codex/AGENTS.md` for automation reporting and shared Jira duplicate-check/fingerprint rules. Do not duplicate those shared rules inside this automation prompt.\n\n\nJira and Bitbucket connector/API sync policy (replaces the old Jira/Bitbucket Chrome gates):\n- Jira and Bitbucket no longer require Chrome during the mandatory sync gate. Use the installed Atlassian/Jira connector, Jira REST/API capabilities, Bitbucket API/CLI credentials, and repository Git remotes as the primary paths for assigned work, issue search, transitions, board visibility, PR polling, reviewer lookup, branch pushes, and PR creation/update.\n- Browser UI is allowed for Jira or Bitbucket only as an optional UI fallback after package-audit browser sync has succeeded and after the relevant API/connector path is available or has returned inconclusive read-only evidence. Browser fallback must not become a hard precondition for Jira or Bitbucket when API/connector access is healthy.\n- If Jira API/connector access is unavailable, record `Block reason:` and `Actionability:` for the Jira API/connector failure, stop before Jira mutations and repository remediation that requires Jira ticket creation/transition, and re-check the same API/connector path next run. Do not open Chrome merely to confirm a Jira login wall.\n- If Bitbucket API/CLI access is unavailable, record `Block reason:` and `Actionability:` for the Bitbucket API/CLI failure, stop before branch pushes, PR creation/update, reviewer assignment, and approval polling that requires Bitbucket. Do not open Chrome merely to confirm a Bitbucket login wall.\n- Board visibility verification may use Jira API/Agile endpoints first. Use Chrome for Jira board visibility only when the API result is inconclusive and a UI-only visibility question remains; a Chrome UI visibility failure must not override healthy Jira API evidence unless the workflow specifically depends on the UI-only state.\n- Reporting: sync status must show package-audit browser sync, Jira API/connector sync, and Bitbucket API/CLI sync separately with check marks or X marks. Memory, dashboard notes, and final output must identify whether a blocker is package-audit browser access, Jira API/connector, or Bitbucket API/CLI.\n\n- After all sync gate parts succeed, show the sync status of each part with a check mark or X, log to the report dashboard when available, then continue with the normal daily flow.\n\nMaintenance-review guardrail (compact, mandatory each run):\n- Purpose: keep daily security tracking reliable without weakening hard gates, and prevent repeated identical blocker noise.\n- Scope: repeated package-audit browser hard-gate blockers, Jira API/connector blockers, Bitbucket API/CLI blockers, dashboard reporting failures, Slack send capability unavailability, and stale or uncertain run locks. dashboard reporting send failures are reporting-transport degradation, not hard gates by themselves; do not stop remediation solely because a report send failed unless the current numbered step is already blocked by another hard gate or continuing would be unsafe without reporting.\n- Hard-gate preservation: if package-audit browser sync-gate auth/session/client-certificate/URL-access requirements fail across both approved browser surfaces, stop before blocked-item rechecks, Jira/Bitbucket mutations, PR work, repository mutations, or scanner-driven remediation. If Jira API/connector or Bitbucket API/CLI sync fails, stop before the affected Jira/Bitbucket mutations and repository remediation that depends on them.\n\nStable blocker mode (for repeated identical hard-gate blockers):\n- If the same hard-gate blocker fingerprint appears in two or more consecutive runs, collect fresh evidence again first, then classify it as `Stable blocker` only when the blocker remains unchanged.\n- Fingerprint fields: gate name, primary hard-gate system (`Chrome`, `Jira`, or `Bitbucket`), normalized error class/text, and affected URL or command family. dashboard reporting failures are tracked as reporting degradation unless they are coupled to another hard gate.\n- In Stable blocker mode, output a concise blocker summary as a single canonical block and do not repeat unchanged Jira comments or repeated Slack DMs for the same fingerprint.\n- Noise control: after fresh evidence confirms an unchanged Stable blocker fingerprint, this Stable blocker suppression rule takes precedence over the general \\\"DM every blocker\\\" Slack rule for that fingerprint. Send at most one Slack DM per unique stable blocker fingerprint per 24 hours when Slack send capability exists; otherwise record one `Slack notification failed` entry with concrete capability error and do not spam repeated send attempts in the same run.\n- Safety: Stable blocker mode must still stop before PR/Jira/repository mutations for that run.\n\nFresh-evidence requirement for repeated blockers:\n- Every repeated blocker must include fresh run-scoped evidence with timestamp plus command or URL result, plus a one-line comparison to the previous run: `unchanged` or `changed`.\n- If changed, exit Stable blocker mode and report it as a normal current blocker.\n\nRun lock maintenance gate:\n- Before work starts, validate run lock ownership with lock metadata: `pid`, `started_utc`, and automation id.\n- If the lock owner is verifiably active, do not start a second mutable run.\n- If the lock is verifiably stale because the process is missing or owner metadata is invalid, record stale-lock evidence and replace the lock safely.\n- If process verification is not permitted or unavailable, treat it as `uncertain lock`: do not perform Jira/Bitbucket/repository mutations; emit a blocker summary and wait for manual confirmation.\n\nOptional advisory tools non-blocking rule:\n- Claude AI and Cursor AI are optional advisory tools only. Timeout, unavailability, no-output responses, or auth prompts from these tools must be recorded as advisory degradation and must not by itself mark the daily security run blocked or failed.\n\n- On each daily run after the sync gate succeeds, use this order: read a frozen memory snapshot, poll pending security PRs/tickets tracked in memory, re-check every blocked Jira ticket and blocked memory item, then start any new dashboard scan or new remediation work.\n- On every run, always re-check every previously blocked Jira ticket and blocked memory item before starting any new dashboard scan or new remediation work.\n- A blocked item must never be assumed still blocked from old evidence; each run must gather fresh evidence using the same scanner/registry/API path that created the blocker when available, or record the fresh access failure if not available.\n- Every automation round must check the current status of every tracked PR and every tracked Jira ticket before scanning for new work, including tickets that look blocked, stale, done, or waiting for approval.\n- If a pending PR is approved, move its Jira issue to Approved and notify Thien Nguyen in output. Do not move a Jira ticket to Approved unless the corresponding Bitbucket PR has explicit approval evidence.\n- Never count closed PRs as active security work. Normalize Bitbucket PR lifecycle state before any PR/Jira/report decision: only `OPEN` PRs can count as pending remediation, active PR links, `Wait for PR Approval`, or evidence that an issue still has an active review path. Terminal PR states such as `MERGED`, `DECLINED`, `CLOSED`, `SUPERSEDED`, or any non-open state must be excluded from active counts and Current-view status; keep them only as historical evidence in inactive Tickets/PRs views or memory. A merged PR with explicit approval evidence may justify moving the Jira ticket to Approved, but a declined/closed/superseded PR without approval evidence must never move a ticket to Approved. If every matching PR is terminal and the target branch is still vulnerable, treat the item as needing a new open PR after the Jira API/connector hard gate; if the target branch is already clean or the dashboard row is stale, move the ticket to Done instead.\n- If no PR is needed because the repository is already clean, the vulnerable lockfile/package is already current, or the security dashboard row is stale/outdated, treat the ticket as complete and move it to Done, not Approved.\n- Do not only update the report state from package-audit rows. For every reported row, verify whether it is still valid using the same scanner/source path where possible: package-audit Details, current target-branch lockfile/package versions, and the relevant `npm audit`, `pnpm audit`, `composer audit`, or `osv-scanner` command. If verification shows the report is stale/outdated, the repo is already clean, or the item is absent from the latest package-audit extract, record it as Done and move any matching Jira ticket to Done, not Approved. Items absent from the latest authenticated package-audit dashboard must be removed from the report Current view instead of being marked Blocked; only rows still present in the latest package-audit extract can remain active blockers.\n- Perform full security dashboard scan/fix flow at 09:00 local time (or when explicitly triggered manually).\n- Daily run executes full scan/fix and Jira/PR tracking flow.\n\nTool and application delegation model (updated 2026-06-03):\n- Use this phase map for every non-trivial run:\n  0. Tool/app readiness: confirm dashboard reporting, Google Chrome, Slack notification capability, and optional advisory tools such as Claude AI/Cursor AI. This phase must not mutate Jira, Bitbucket, repositories, or memory except readiness evidence and non-blocking report dashboard readiness evidence.\n  1. Orchestration setup: Codex main agent acquires the run lock, creates the frozen memory snapshot, writes the delegation plan, and starts numbered step reporting.\n  2. Sync gate: Codex main agent holds the browser mutex only for report dashboard/package-audit browser sync; Jira readiness uses the Atlassian/Jira connector or Jira API, and Bitbucket readiness uses Bitbucket API/CLI credentials. Reporting must use only the report dashboard browser hook when available. A package-audit browser auth/session/client-certificate/URL-access failure across both approved browser surfaces is a hard blocker; Jira/Bitbucket API credential failures are recorded as Jira API/connector or Bitbucket API/CLI blockers.\n  3. Read-only evidence collection: Codex subagents may run bounded PR/Jira polling, blocked-item rechecks, dashboard extraction normalization, scanner verification, and report QA in parallel when their scopes do not overlap and no browser mutex is needed.\n  4. Main-agent decision gate: Codex main agent reviews all evidence, dedupes handoffs, decides Done vs Approved vs Block vs remediation, and chooses whether repository work is allowed.\n  5. Repository remediation: Codex main agent may assign exactly one Repository Fix Agent per repo/issue/worktree/file set to prepare a local fix only. Codex main reviews the diff and remains the only actor allowed to commit, push, create/update PRs, assign reviewers, or change Jira.\n  6. Browser-backed verification: Codex main agent or one browser-backed worker uses Google Chrome serially for package-audit Details, staging smoke tests, Jenkins, and optional Jira/Bitbucket UI fallback only when API/connector evidence is inconclusive.\n  7. Human notification and reporting: Slack sends direct messages to Thien Nguyen for blockers; The report dashboard receives start/step/item/final updates through the browser hook when available.\n  8. Final reconciliation: Codex main appends one normalized memory summary, writes one normalized final status through the global reporting rules when available, verifies current report semantics when available, then releases the run lock.\n- Application ownership matrix:\n  - Codex main agent: owns orchestration, state mutation, final decisions, Jira/Bitbucket/repository/memory/report dashboard writes, run lock, conflict resolution, and final output.\n  - Codex subagents: own bounded read-only evidence tasks or one isolated local fix draft. They must not mutate Jira, Bitbucket, memory, report dashboard state, shared branches, or external state.\n  - Claude AI: optional read-only workflow reviewer/advisory critic for automation prompt maintenance, blocker triage framing, PR-description review, or flow clarity. Claude AI must not be placed on the critical path of a daily security run; if Claude is unavailable, times out, asks for auth, or returns no output, record the advisory failure and continue with Codex-owned rules.\n  - Cursor AI: optional local IDE/code-navigation assistant for complex repository understanding, impact mapping, and patch review in a human-visible workspace. Cursor AI must not push, create PRs, update Jira, write automation memory/report dashboard data, or make unattended repo changes unless Thien explicitly authorizes a separate manual coding session.\n  - Browser surfaces: the Codex in-app Browser and already-open Google Chrome are approved for report dashboard, package-audit, and package-audit Details. Google Chrome remains the browser for staging, Jenkins, and other client-certificate/session-backed pages when the in-app Browser cannot access them. Jira and Bitbucket use connector/API access first; browser UI is optional fallback only when API/connector evidence is inconclusive. Browser-backed tasks are serialized under the browser mutex.\n  - Slack: human notification channel only. Use Slack direct messages to Thien Nguyen for blockers, approval-needed summaries, and explicit human action requests; do not use Slack as evidence storage or as a replacement for memory/report dashboard updates.\n  - Report dashboard: the single operational progress stream for numbered steps, item completion, blockers, and final state, stored in that browser profile localStorage.\n- Subagent role clarity:\n  - PR/Jira Evidence Agent: read-only API polling for tracked PR approvals, PR states, reviewer state, and Jira status/assignee/board visibility metadata after package-audit browser sync and Jira/Bitbucket API sync succeed.\n  - Blocker Recheck Agent: read-only fresh evidence for assigned blocked Jira tickets or blocked memory items using the exact command/API/source family recorded in memory.\n  - Dashboard Extraction Agent: browser-backed only when granted the Chrome mutex; extracts package-audit Details into normalized repo/branch/file/package/severity/advisory rows and closes or releases the browser lease per current Chrome policy.\n  - Scanner Verification Agent: read-only local scanner execution for assigned repo/branch/file/package rows; writes only assigned evidence paths and reports exact command, exit code, advisory output, and local limitations.\n  - Repository Fix Agent: exactly one repo, one issue, one isolated worktree/security branch, and one disjoint file set; prepares and verifies local diff only. Main agent performs commit/push/PR/Jira/reviewer work.\n  - Staging Smoke Agent: exactly one assigned PRE/repo/URL area; uses Chrome only with browser mutex; writes only the assigned screenshot path and smoke evidence.\n  - Report QA Agent: read-only validation of the report dashboard localStorage state, current-state semantics, run/item data, dismissals, and stale/blocked/done classification.\n- Delegation guardrails:\n  - No task may be delegated until the main agent has written a delegation plan naming the phase, queue, agent display name with role/scope, exact permissions, allowed commands/systems, evidence paths, stop conditions, and whether the browser mutex is granted.\n  - Prefer Codex subagents for bounded evidence and verification; prefer Claude AI for read-only meta-review; prefer Cursor AI for local code comprehension only; prefer Chrome for authenticated UI; prefer Slack only for notifying Thien Nguyen.\n  - If a tool/application is unavailable or unauthenticated, record that tool-specific failure as evidence and choose the next safe path. Never let optional Claude AI or Cursor AI availability block required security tracking.\n  - Before final reconciliation, the main agent must map every active item to exactly one owner and one state: Done, Approved, Wait for PR Approval, Block, Needs triage, or ignored/dismissed by explicit user instruction.\n\nSubagent delegation workflow (mandatory for non-trivial daily runs):\n- The main agent is the orchestrator and the only actor allowed to mutate shared external state: Jira comments/statuses, Bitbucket pushes, PR creation/update/reviewer assignment, automation memory, and report dashboard writes. Subagents are workers, not owners.\n- At run start, the main agent must acquire a single automation run lock for this automation. If another run is active, do not start remediation; report the active run and exit or wait only when explicitly appropriate. Release the lock only after final memory/report reconciliation.\n- At the start of each run, the main agent must write a short delegation plan before spawning workers: current phase, blocked/pending/new-work queues, which tasks stay with the main agent, which subagents are spawned, each subagent's `Name (Role: scope)`, read/write permissions, and browser/API ownership.\n- Keep the immediate critical path local. Delegate only bounded sidecar work that can run independently while the main agent continues orchestration, evidence review, or non-overlapping setup.\n- Give every subagent a frozen memory snapshot, exact scope, expected output format, allowed commands/systems, and explicit stop conditions. Subagents must not re-enumerate and start unrelated work.\n- When spawning, tracking, or reporting a subagent, always write the display name followed by its role in parentheses, using `Name (Role)` or `Name (Role: scope)` format; examples: `Copernicus (Blocker Recheck Agent: PRE-4299)`, `Ada (Repository Fix Agent: enrg-homecenter)`, `Noether (Staging Smoke Agent: PRE-1234)`. Use this format in progress updates, handoffs, memory summaries, dashboard log notes, and final output so Thien Nguyen can immediately see who did what.\n- Run read-only agents in parallel when possible: PR/Jira Evidence Agents poll PR/Jira/reviewer/approval state via API where possible; Blocker Recheck Agents validate assigned blocked items with fresh command/API evidence only; Dashboard Extraction Agents normalize package-audit details into repository/branch/file/package/severity/advisory findings; Report QA Agents check report dashboard data semantics and UI state.\n- Run browser-backed agents serially under the browser mutex: package-audit extraction, optional Jira/Bitbucket UI fallback, Jenkins, and staging smoke tests must never overlap. Prefer API/connector calls for PR/Jira/Bitbucket polling and mutations.\n- Keep browser tab usage minimal: reuse the current Google Chrome tab whenever possible, open at most one new tab per browser lease, do not leave several issue/PR/Jira/detail tabs open, and avoid parallel tab fan-out for dashboard extraction.\n- After a browser-backed agent or main-agent browser lease finishes extracting the needed information from package-audit, Jira, Bitbucket, or staging, keep the current/final Google Chrome tab open for user-visible handoff and report that the browser lease is released. Reuse that tab for the next browser-backed step instead of accumulating extra tabs.\n- For Google Chrome browser pages, keep one reusable current tab open through and after the run. After information is copied into notes or memory, navigate or reuse that same tab for the next issue; do not close Chrome tabs on finish.\n- The main agent grants a browser lease to exactly one agent at a time. The task brief must name the browser holder and scope, and the handoff must state that the browser lease is released.\n- Repository Fix Agent scope is exactly one repository, one issue, one isolated worktree/security branch, and one disjoint file set. It may prepare and verify a local fix, but must not push, create/update PRs, change Jira, write automation memory, or run report refresh. The main agent reviews the diff and performs commit/push/PR/Jira work.\n- Staging Smoke Agent scope is exactly one assigned PRE/repo/URL area. It may use the browser only when the main agent grants the mutex and may write only the assigned screenshot path; it must not edit memory, JSON, Jira, Bitbucket, or report data. If login/route/test-data is missing, it reports the exact blocker instead of guessing.\n- Every subagent handoff must include: `Name (Role: scope)`, assigned scope, files/repos inspected or changed, commands/API calls run, evidence paths or URLs, result, confidence, remaining blockers, blocker reason if any, and the exact next action recommended for the main agent.\n- Subagents must not print or persist secret values, load credential files, or receive raw tokens. Authenticated read-only API work may only use commands/environments prepared by the main agent, with secrets never printed, persisted, copied into prompts, or copied into handoffs.\n- Avoid write conflicts: no two agents may write the same repo/worktree/branch/file, Jira issue, memory file, report file, or evidence screenshot path at the same time. If scopes collide, stop and let the main agent reassign.\n- Blocker Recheck Agents return fresh evidence only. The main agent decides whether to move tickets, update memory, declare the blocker resolved, or add a Jira comment. Jira comments are allowed only for external/shared blockers, never for local-only blocker evidence.\n- The main agent must review subagent results before pushing, creating/updating PRs, changing Jira status, writing memory, updating report dashboard state, or declaring a blocker resolved.\n- At final reconciliation, the main agent dedupes all subagent handoffs, resolves conflicts, appends a single normalized memory summary, then writes one normalized final status through the global reporting rules when available. Do not run old live-report scripts as a reporting hard gate.\n\nUse the Codex in-app Browser or already-open Google Chrome for browser-backed package-audit and package-audit Details. Use Google Chrome for Jenkins and staging smoke tests when the in-app Browser cannot access the required authenticated/client-certificate surface. Jira and Bitbucket do not require Chrome when connector/API access is healthy; browser UI fallback is optional only when API evidence is inconclusive. Open or reuse a single current Google Chrome tab for https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow. From package-audit, iterate each issue and open Details to extract repository, branch, filepath, package, severity, and advisory identifiers. For each extracted row, verify validity against the current target branch and the matching scanner command before treating it as actionable or opening/updating Jira/PR state; stale rows should become Done/no-PR-needed evidence. Load runtime credentials from /Users/thien.nguyen/enrg-web-frontend/.agents/cli/.env; never print or persist secret values. Use Bitbucket BASIC auth with EMAIL:BB_API_TOKEN and workspace BB_WORKSPACE. For each issue repo in the check24 workspace, resolve slug via workspace API when needed, then use an isolated worktree under the automation workspace or clone if absent. Before changes, always fetch, reset to latest scanned target branch, and rebase security branch onto latest target before push. Before any force-push, the main agent must fetch the remote branch and verify it contains only automation-owned commits or matches the expected previous automation head; if human or unknown commits are present, stop and report a blocker. Apply fixes as before: npm/pnpm lockfile vulnerabilities via package manager with focused lockfile diffs; composer vulnerabilities via targeted composer update of affected package with dependencies, no install, no scripts, and ignore platform requirements when needed, using Nexus credentials from env. For lockfiles, preserve unrelated metadata and dependency nodes (including peer metadata like \\\"peer\\\": true); if package-manager regeneration introduces unrelated churn (e.g. peer-flag flips, optional platform binaries, broad resolver noise), rebuild lockfile from parent and patch only vulnerable package nodes, then amend the existing commit and force-push the same security branch. Verify each fix with the same scanner/command family that reported it (npm audit/pnpm audit/composer audit/osv-scanner as applicable). Commit each changed repo on a concise 00000-style security branch, push, create or reuse Bitbucket PR to the scanned target branch. If a local commit or pre-commit hook is blocked solely because a required local Docker daemon or local Docker container is missing or not running, treat that as a local-only validation gap, bypass the local commit hook with the repository-appropriate no-verify or documented bypass mechanism, continue with push/PR creation, and record the skipped local Docker validation in memory, the PR description, and final output without adding a Jira blocker comment, and include a proper PR description covering: what changed, side effects, breakage risk, rollback notes, post-merge checks, and lockfile-diff reasoning from actual committed changes (not local-environment assumptions). Always add Jens Bachmann and Aleksandar Jaksic as reviewers while preserving existing reviewers; resolve user UUIDs by display name if needed. If the scanned target branch is still vulnerable, ensure an open PR exists from the security branch where the same file resolves to a patched version; create or update PR if missing.\n\nStaging smoke-test evidence workflow (mandatory when a fix is pushed to staging):\n- Staging URL is https://www.check24-test.de/strom/. After a fix branch/PR is pushed to staging or otherwise made visible on staging, infer the relevant staging area from the changed repository, route, component, package usage, and code ownership.\n- If the relevant area is visible without missing credentials, smoke test that area in the browser, take a screenshot, and save it under `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/evidence/<YYYY-MM-DD>/<ticket-or-repo>-staging-smoke.png`.\n- Record the staging URL tested, tested area, reasoning from the code, screenshot path, and pass/fail result in memory and in the final output so the report dashboard can show it as release evidence.\n- If the relevant area cannot be inferred, is not visible on staging, needs login, or requires missing test data, do not pretend the smoke test passed; record the exact blocker/question and ask Thien Nguyen for the missing route/login/test data.\n\nJira workflow hard gate (mandatory for every security issue):\n- Before any repository mutation, branch push, PR creation/update, or continuing with a fix, the main agent must search memory, the assigned PRE backlog URL, Jira, and Bitbucket by the stable security-dependency fingerprint, repo, branch, filepath, package, severity, and advisory ID; reuse an existing open PRE ticket instead of creating a duplicate.\n- If no matching PRE ticket exists after the assigned backlog/fingerprint search, create a Jira ticket in project PRE for the exact repo/branch/file/package/advisory/severity via https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132, using the global AGENTS.md SECDEP summary/fingerprint pattern.\n- Set both Assignee and Developer to Thien Nguyen (`712020:98c2de13-71c4-48ae-a98a-3baa7fa11ba2` when the account ID is needed), then move the ticket to In Progress immediately before doing any repository work.\n- Immediately verify the ticket is visible on the PRE board and specifically on https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132?assignee=712020%3A98c2de13-71c4-48ae-a98a-3baa7fa11ba2. If it is not visible, adjust board-relevant fields (status, assignee, labels/epic) and re-rank so it appears in that filtered board view, then record what changed.\n- Only after the PRE ticket is assigned to Thien Nguyen, moved to In Progress, and verified on the filtered PRE board may the main agent continue with repo changes, commits, pushes, or PR creation for that issue.\n- After a PR exists, update the same PRE ticket with the PR link, branch, reviewers, and verification summary, then move the ticket to In Code Review immediately.\n- Assign reviewer/owner in code review context to Alek (Aleksandar Jaksic) and keep Jens Bachmann and Aleksandar Jaksic as Bitbucket reviewers while preserving existing reviewers.\n- Poll PR approval status and Jira ticket status during each daily run (Bitbucket/Jira API preferred for read-only checks; optional serialized Google Chrome page fallback only when API evidence is inconclusive). When the PR is approved, move the Jira ticket to Approved and notify Thien Nguyen in the run output. If no PR is needed because the issue is already clean/current or the security report row is stale/outdated, move the Jira ticket to Done instead of Approved.\n- If the issue becomes blocked after a ticket exists, move or keep the ticket in To Do (never Open), verify board visibility when Jira is reachable, and save the blocker in memory for the next run. Add a Jira ticket comment only for external/shared blockers that require reviewer, owner, credential, repository-access, or product-security action. Do not add Jira comments for local-only blockers from the agent machine, such as missing local dependencies, local DNS/network/cache issues, local worktree setup, local scanner installation, missing local Docker daemon or required local Docker container, local package-manager auth, or local validation failures; record those only in memory, the report dashboard when available, and final output.\n- If no Jira ticket can be created because Jira API/connector access is blocked, do not continue remediation for that issue. Save a blocked memory item with repo/branch/file/package/advisory, the exact Jira API/connector failure, actionability, and next action; re-check it first on the next run and create/move the ticket before continuing.\n- On later runs, re-check each blocked To Do ticket and each blocked memory item first; if still blocked, record fresh evidence in memory/report and add a Jira comment only for external/shared blockers that need action outside the local agent environment; if unblocked, create or move the ticket to In Progress, verify filtered-board visibility, and continue processing.\n\nBlocked item recheck workflow (mandatory first phase of every run):\n- Before scanning the dashboard, creating new tickets, or modifying repositories for new findings, read memory and enumerate all blocked Jira tickets and blocked memory items.\n- For each blocked item, re-run the concrete blocker check: registry version lookup, npm/pnpm/composer/osv audit, Bitbucket PR/API check, Jira status check, dashboard detail check, or the exact command/API family recorded in memory.\n- If the item is still blocked, keep or move the ticket to To Do, verify board visibility when Jira is reachable, and save the fresh timestamp, root cause, concrete evidence/error text, and recommended next action in memory. Add a Jira comment only when the blocker is external/shared and needs human or service-owner action. Do not add Jira comments for local-only blocker evidence; local-only blockers must stay in memory, report dashboard data, and final output only.\n- If the blocker is gone, move the Jira ticket from To Do to In Progress, continue the fix/PR workflow immediately, and record the unblocked evidence in memory and output.\n- If Jira or the required external service is unreachable, treat that access failure as the fresh blocker evidence for this run and still include the Jira URL in memory and output.\n- Never skip a blocked item silently. The final output must include a recheck result for every blocked item from memory.\n\nFor every blocked item, always write an explicit blocker reason with root cause, concrete evidence (error text/command result), and recommended next action. If a Jira ticket exists for that blocked item, move it to To Do (not Open) when appropriate, but add a Jira comment only for external/shared blockers that need action outside the local agent environment. Do not comment local-only blocker evidence to Jira tickets. Always include the Jira ticket URL for each blocked item in the blocked-status section of the run output and saved memory. Track blocked tickets in memory so they are re-checked on the next run.\n\nBlocked/actionability reporting workflow (mandatory for report UX):\n- Every blocked item in final output and saved memory must include exactly these scan-friendly lines near the blocker evidence:\n  - `Block reason: <root cause plus the concrete fresh evidence>`\n  - `Actionability: Actionable|Not actionable yet|Needs triage - <why and the exact next action or owner>`\n- Use `Actionable` when a concrete step can unblock the item now, such as restoring Google Chrome/client-certificate access, credentials, network/DNS, Composer/Nexus mirror access, the intended branch/worktree checkout, route/login/test data, Jira/Bitbucket API access, or another environment dependency.\n- Use `Not actionable yet` when remediation cannot proceed because no fixed upstream version or vendor-supported remediation path exists. Include what should be watched next, such as the package registry/advisory or upstream release.\n- Use `Needs triage` when the evidence is inconclusive or a human product/security decision is required before remediation.\n- If a run has multiple blockers with different actionability, report each blocker separately; the report dashboard will show mixed actionability instead of flattening the run to a single blocker state.\n- Keep routine notes hidden/collapsed by default in the report dashboard. The report's primary scan fields must be status, actionability, block reason, repositories, advisories, PRs, and details.\n\nAutomation-owned persistent operating rules (migrated from memory):\n- Chrome/Jira/Bitbucket/Jenkins access:\n  - The Codex in-app Browser and already-open Google Chrome are both approved browser paths for package-audit, package-audit Details, and report dashboard work. Google Chrome remains the primary browser path for Jenkins, staging smoke-test work, and optional Jira/Bitbucket UI fallback when needed.\n  - Jira and Bitbucket use connector/API/CLI access first. Do not require Chrome before declaring Jira or Bitbucket blocked when the connector/API/CLI path has concrete auth, permission, network, or service evidence.\n  - If package-audit cannot open/authenticate in either approved browser surface, or if Jenkins/staging Chrome cannot launch, navigate, authenticate, or use the needed client certificate/session, record that browser-specific failure with `Block reason:` and `Actionability:`.\n  - Keep browser work serialized under the browser mutex, reuse one current Chrome tab where possible, and keep the final/current Chrome tab open at run finish when Chrome is used.\n  - API/CLI checks are primary for Jira/Bitbucket and secondary corroboration for non-authenticated scanner/package verification. Browser fallback for Jira/Bitbucket is optional and only for inconclusive UI-specific questions.\n- Jira grouping and status rules:\n  - Group fixable remediation by repository/branch/fix batch when multiple findings can be resolved by one dependency update and one PR.\n  - Do not create one Jira ticket per package/severity/advisory when those findings share the same repo, target branch, lockfile, and remediation flow.\n  - If a repo has mixed outcomes, create one repo-level fix ticket for currently fixable findings and separate blocked tickets for independently blocked findings with different owners, upstream releases, access needs, product decisions, or next actions.\n  - Repo-level fix tickets must list all included packages/advisories/severities/files, target branch, PR branch, and verification command.\n  - Blocked tickets must include exact blocker reason, actionability, evidence, and next action.\n  - For non-blocked tickets, prefer Jira status transitions plus memory/report dashboard updates; Jira comments are reserved for fresh blocker evidence or material PR/fix updates.\n  - Before adding a blocker comment, check existing comments or same-run memory and avoid repeating unchanged blocker evidence.\n- PR lifecycle and counting rules:\n  - Never count closed PRs as active. Before polling approvals, updating report cards, deciding Jira transitions, or deciding whether remediation already exists, normalize every Bitbucket PR state into `open` or `terminal`. Only `OPEN` counts as active/pending. `MERGED`, `DECLINED`, `CLOSED`, `SUPERSEDED`, missing/deleted PRs, and any unknown non-open terminal state count as historical only.\n  - Closed/declined/superseded PRs must not appear in the report Current view, must not produce `Wait for PR Approval`, must not satisfy the \\\"open PR exists\\\" requirement, and must not be reused for a new remediation attempt. They belong only in inactive Tickets/PRs history with their terminal state and evidence.\n  - Approval semantics are separate from PR liveness: `Approved` requires explicit approval evidence on an open or merged PR; terminal PRs without approval evidence do not count as approved. If a merged PR has explicit approval evidence and Jira is not already done/closed, move the ticket to Approved. If a terminal PR has no approval evidence, decide from fresh scanner evidence: clean/stale becomes Done; still vulnerable becomes Needs triage or a new open PR after the Jira API/connector hard gate.\n- PR and verification rules:\n  - Verify each fix with the matching scanner command before ending the run: `npm audit`, `pnpm audit`, `composer audit`, or `osv-scanner` as applicable.\n  - PR title/body must describe changed files and dependency/version deltas, side effects, breakage risk, rollback path, post-merge checks, and lockfile-diff reasoning from the actual committed diff.\n  - PR descriptions must explicitly answer `Can this break the application?` with a short justification.\n  - For lockfiles, list changed package nodes (`from -> to`) and classify them as direct, transitive, optional-platform, or resolver/metadata normalization changes.\n  - Preserve unrelated lockfile metadata, especially peer semantics such as `\\\"peer\\\": true`; if package-manager regeneration creates unrelated churn, rebuild from the parent and patch only vulnerable package nodes.\n- Workflow queue rules:\n  - Keep each run moving through numbered steps: report dashboard readiness and run lock, frozen memory snapshot, sync gate/status reconciliation, blocked-item rechecks, package-audit scan, remediation, final memory/report reconciliation, final dashboard state update, and lock release.\n  - Do not leave any Current report card in bare `Need Attention` at final output. Convert each item to `Wait for PR Approval`, `DONE`, ignored, or `Block` with fresh `Block reason` and `Actionability`.\n  - A freshly blocked ticket must not stop the whole queue once blocker evidence, Jira/report dashboard/memory status, and next action are recorded; continue to the next actionable item unless the blocker is a hard gate.\n- Credential handling rules:\n  - Load runtime credentials from `/Users/thien.nguyen/enrg-web-frontend/.agents/cli/.env` first; fall back to `$HOME/.env` for API credentials and `$HOME/.npmrc` for npm/Nexus registry credentials when needed.\n  - Never print or persist secret values. Log only credential-file presence, variable names, HTTP status codes, package versions, advisory IDs, and sanitized command errors.\n  - For npm checks that need user registry auth, pass `NPM_CONFIG_USERCONFIG=$HOME/.npmrc`.\n- Done vs Approved rule:\n  - `Approved` requires an existing Bitbucket PR with explicit approval evidence.\n  - `Done` means no PR is required because the repo is clean/current, package is already fixed, or the dashboard row is stale/outdated.\n  - Always verify reported rows against package-audit Details, current target-branch lockfile/package versions, and the matching scanner command before deciding Done/Blocked/PR-needed.\n- Automation report dashboard rules:\n  - Current view must hide `DONE` items, sort `Need Attention` before `Block`, and use only latest current package-audit/run evidence for each card.\n  - Completed Jira tickets and Bitbucket PR links belong in inactive Tickets/PRs views, not the active Current list.\n  - Every `Need Attention` item must include `Attention reason:` and `Next action:`; if the reason is unknown, use `Needs triage` and state what evidence is missing.\n  - At final output, write the final state through the report dashboard browser hook when available and verify current cards/state through the dashboard hook/localStorage when available.\n\nAt the end, clearly report repos already fixed, repos changed, verification performed, pushed branches, PR links, reviewer assignment results, Jira ticket links/status transitions (including To Do/In Progress/Approved moves), ticket visibility verification results (including the assignee-filtered board URL), approval polling results, notifications sent, global dashboard logging status, and blockers/auth failures. In the blocked section, include one clickable Jira link per blocked item and the fresh recheck result for that run.\n- Final output must include a single `Stable blocker summary` section when applicable: blocker fingerprint, first-seen timestamp, last-verified timestamp, unchanged/changed verdict, evidence source, notification state (`sent`, `failed`, or `suppressed`), and explicit confirmation that no PR/Jira/repository mutations were performed in this run.\n\nSlack blocked notification requirement (updated 2026-06-03):\n- Whenever the automation becomes blocked, immediately notify Thien Nguyen on Slack in a direct message after the fresh blocker evidence is captured and before waiting for human action.\n- This applies to hard-gate blockers, credential/auth/client-certificate blockers, Jira/Bitbucket/package-audit access blockers, local-only environment blockers, repository/scanner blockers, missing staging route/login/test-data blockers, and item-level `Block` / `Needs triage` outcomes.\n- Use the Slack connector/send capability when available. Resolve Thien Nguyen as the recipient by current Slack user or Slack user search, then send one DM per unique blocked run/item. Do not post blockers into public channels unless Thien explicitly asks for that.\n- The Slack message must include: automation name, blocked step number, blocked Jira ticket URL when present, repo/branch/file/package/advisory when present, `Block reason: ...`, `Actionability: ...`, exact next action/owner, report dashboard status when available, and the evidence path or source URL.\n- For multiple blockers, send separate Slack DMs for blockers with different actionability or owners, then include a compact count in the final run output.\n- Do not send secrets, token values, raw credential file contents, cookies, client-certificate material, or full command environments to Slack.\n- If Slack send/auth is unavailable, record `Slack blocked notification failed` with the concrete error in memory, the report dashboard when available, memory, and final output. Continue only if the underlying automation policy allows continuing; for hard gates, stop after recording/reporting the Slack notification failure.\n- Add `Slack notification sent:` or `Slack notification failed:` to the saved memory summary and final output for every blocked item.\n- Slack capability check must run once per automation run. If no Slack send tool is available, set `slack_send_capability=unavailable` for this run, record one concrete failure evidence entry, and suppress repeated per-step send retries; keep blocker status honest as `notification degraded`, not `notification sent`."
