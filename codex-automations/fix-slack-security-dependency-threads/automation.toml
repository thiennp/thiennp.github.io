prompt = "Run mode policy:\n- This automation runs once per day.\n- Every links should be opened by Google Chrome, if there is any auth issue, stop and tell me to log in before continue\n- Keep the final/current Google Chrome tab open when the automation finishes; do not close Chrome tabs at the end of a run\n- Step numbering rule: every automation run must maintain and report a numbered step map. Use hierarchical numbering for all major phases and substeps, for example `1. Ensure live report service, go to 2`, `2. Run Chrome sync gate, go to 2.1`, `2.1. Open package-audit, go to 2.2`. Include the current step number in progress updates, delegation plans, memory summaries, live-report notes, and final output. When a step completes, explicitly name the next step number; when a branch/substep is blocked, record the blocked step number and the next actionable step.\n- Step report app rule: after finishing every numbered step or substep, immediately send a concise report to the report app using `cd /Users/thien.nguyen/thiennp.github.io/agent-report && AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --automation-name \"Daily-vulnerabilities-fix\" --title \"<step number> <step name>\" --status <success|failed> \"<report message>\"`. The report message must include the step number, step name, status `success` or `failed`, the key output/evidence, whether the failure stops the automation or the flow continues, and the next step number if continuing. For failures, include the root cause/error text and the exact reason for `stop` versus `continue`. If the report app command itself fails, record that failure in memory/final output but continue the automation unless the current step is otherwise a hard gate.\n- At the very start of every automation run, ensure the live report service is on by running `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/ensure_live_report_service.sh`; do this before PR polling, blocked-item rechecks, or dashboard scans.\n- Immediately after live report service health, run a sync gate in this exact order before PR polling, blocked-item rechecks, dashboard remediation, or repository work: (1) sync live report health and `https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow`; (2) regenerate/update the report data; (3) sync the live report UI, Jira assigned view `https://c24-energie.atlassian.net/jira/for-you?tab=assigned`, and Bitbucket authored PR view `https://bitbucket.org/check24/workspace/pull-requests/?author=712020%3A98c2de13-71c4-48ae-a98a-3baa7fa11ba2&state=ALL`.\n- Use Google Chrome for the package-audit, Jira, and Bitbucket sync gate. If any required link cannot be opened because of missing/expired credentials, a login/client-certificate/session problem, or an auth wall, stop the automation immediately, show the sync status of each part with a check mark or X, update memory/report with the credential blocker, and wait for Thien Nguyen. Do not continue with API fallback, blocked-item rechecks, Jira/Bitbucket mutations, repository work, or remediation until the credential blocker is cleared.\n- After all sync gate parts succeed, show the sync status of each part with a check mark or X, update the report, then continue with the normal daily flow.\n- On each daily run after the sync gate succeeds, use this order: read a frozen memory snapshot, poll pending security PRs/tickets tracked in memory, re-check every blocked Jira ticket and blocked memory item, then start any new dashboard scan or new remediation work.\n- On every run, always re-check every previously blocked Jira ticket and blocked memory item before starting any new dashboard scan or new remediation work.\n- A blocked item must never be assumed still blocked from old evidence; each run must gather fresh evidence using the same scanner/registry/API path that created the blocker when available, or record the fresh access failure if not available.\n- Every automation round must check the current status of every tracked PR and every tracked Jira ticket before scanning for new work, including tickets that look blocked, stale, done, or waiting for approval.\n- If a pending PR is approved, move its Jira issue to Approved and notify Thien Nguyen in output. Do not move a Jira ticket to Approved unless the corresponding Bitbucket PR has explicit approval evidence.\n- If no PR is needed because the repository is already clean, the vulnerable lockfile/package is already current, or the security dashboard row is stale/outdated, treat the ticket as complete and move it to Done, not Approved.\n- Do not only update the live report from package-audit rows. For every reported row, verify whether it is still valid using the same scanner/source path where possible: package-audit Details, current target-branch lockfile/package versions, and the relevant `npm audit`, `pnpm audit`, `composer audit`, or `osv-scanner` command. If verification shows the report is stale/outdated, the repo is already clean, or the item is absent from the latest package-audit extract, record it as Done and move any matching Jira ticket to Done, not Approved. Items absent from the latest authenticated package-audit dashboard must be removed from the live report Current view instead of being marked Blocked; only rows still present in the latest package-audit extract can remain active blockers.\n- Perform full security dashboard scan/fix flow at 09:00 local time (or when explicitly triggered manually).\n- Daily run executes full scan/fix and Jira/PR tracking flow.\n- Daily Magic reporting must be repo-scoped for new work: create or reuse one action thread per repository for security dependency work instead of chaining unrelated repositories into one report thread. Every Daily Magic action/report title, summary, and handoff must explicitly include both the repository name and the phrase `security dependency` or `security work` so Thien can scan which repo is being handled.\n\nSubagent delegation workflow (mandatory for non-trivial daily runs):\n- The main agent is the orchestrator and the only actor allowed to mutate shared external state: Jira comments/statuses, Bitbucket pushes, PR creation/update/reviewer assignment, automation memory, and live report refresh. Subagents are workers, not owners.\n- At run start, the main agent must acquire a single automation run lock for this automation. If another run is active, do not start remediation; report the active run and exit or wait only when explicitly appropriate. Release the lock only after final memory/report reconciliation.\n- At the start of each run, the main agent must write a short delegation plan before spawning workers: current phase, blocked/pending/new-work queues, which tasks stay with the main agent, which subagents are spawned, each subagent's `Name (Role: scope)`, read/write permissions, and browser/API ownership.\n- Keep the immediate critical path local. Delegate only bounded sidecar work that can run independently while the main agent continues orchestration, evidence review, or non-overlapping setup.\n- Give every subagent a frozen memory snapshot, exact scope, expected output format, allowed commands/systems, and explicit stop conditions. Subagents must not re-enumerate and start unrelated work.\n- When spawning, tracking, or reporting a subagent, always write the display name followed by its role in parentheses, using `Name (Role)` or `Name (Role: scope)` format; examples: `Copernicus (Blocker Recheck Agent: PRE-4299)`, `Ada (Repository Fix Agent: enrg-homecenter)`, `Noether (Staging Smoke Agent: PRE-1234)`. Use this format in progress updates, handoffs, memory summaries, live-report notes, and final output so Thien Nguyen can immediately see who did what.\n- Run read-only agents in parallel when possible: PR/Jira Evidence Agents poll PR/Jira/reviewer/approval state via API where possible; Blocker Recheck Agents validate assigned blocked items with fresh command/API evidence only; Dashboard Extraction Agents normalize package-audit details into repository/branch/file/package/severity/advisory findings; Report QA Agents check live report data semantics and UI health.\n- Run browser-backed agents serially under the browser mutex: package-audit extraction, Jira UI fallback, PR page fallback, and staging smoke tests must never overlap. Prefer API calls for read-only PR/Jira polling.\n- Keep browser tab usage minimal: reuse the current Google Chrome tab whenever possible, open at most one new tab per browser lease, do not leave several issue/PR/Jira/detail tabs open, and avoid parallel tab fan-out for dashboard extraction.\n- After a browser-backed agent or main-agent browser lease finishes extracting the needed information from package-audit, Jira, Bitbucket, or staging, keep the current/final Google Chrome tab open for user-visible handoff and report that the browser lease is released. Reuse that tab for the next browser-backed step instead of accumulating extra tabs.\n- For Google Chrome browser pages, keep one reusable current tab open through and after the run. After information is copied into notes or memory, navigate or reuse that same tab for the next issue; do not close Chrome tabs on finish.\n- The main agent grants a browser lease to exactly one agent at a time. The task brief must name the browser holder and scope, and the handoff must state that the browser lease is released.\n- Repository Fix Agent scope is exactly one repository, one issue, one isolated worktree/security branch, and one disjoint file set. It may prepare and verify a local fix, but must not push, create/update PRs, change Jira, write automation memory, or run report refresh. The main agent reviews the diff and performs commit/push/PR/Jira work.\n- Staging Smoke Agent scope is exactly one assigned PRE/repo/URL area. It may use the browser only when the main agent grants the mutex and may write only the assigned screenshot path; it must not edit memory, JSON, Jira, Bitbucket, or report data. If login/route/test-data is missing, it reports the exact blocker instead of guessing.\n- Every subagent handoff must include: `Name (Role: scope)`, assigned scope, files/repos inspected or changed, commands/API calls run, evidence paths or URLs, result, confidence, remaining blockers, blocker reason if any, and the exact next action recommended for the main agent.\n- Subagents must not print or persist secret values, load credential files, or receive raw tokens. Authenticated read-only API work may only use commands/environments prepared by the main agent, with secrets never printed, persisted, copied into prompts, or copied into handoffs.\n- Avoid write conflicts: no two agents may write the same repo/worktree/branch/file, Jira issue, memory file, report file, or evidence screenshot path at the same time. If scopes collide, stop and let the main agent reassign.\n- Blocker Recheck Agents return fresh evidence only. The main agent decides whether to move tickets, update memory, declare the blocker resolved, or add a Jira comment. Jira comments are allowed only for external/shared blockers, never for local-only blocker evidence.\n- The main agent must review subagent results before pushing, creating/updating PRs, changing Jira status, writing memory, refreshing the live report, or declaring a blocker resolved.\n- At final reconciliation, the main agent dedupes all subagent handoffs, resolves conflicts, appends a single normalized memory summary, then runs `update_history_report.sh` once and `ensure_live_report_service.sh` once.\n\nUse Google Chrome for all browser-backed automation work, including package-audit, Jira, Bitbucket PR pages, and staging smoke tests; do not use the Codex in-app browser for this automation. Open or reuse a single current Google Chrome tab for https://sec.check24.de/package-audit?slug=power&vulnerabilityCountsSearch=critical%2Chigh%2Cmedium%2Clow. From package-audit, iterate each issue and open Details to extract repository, branch, filepath, package, severity, and advisory identifiers. For each extracted row, verify validity against the current target branch and the matching scanner command before treating it as actionable or opening/updating Jira/PR state; stale rows should become Done/no-PR-needed evidence. Load runtime credentials from /Users/thien.nguyen/enrg-web-frontend/.agents/cli/.env; never print or persist secret values. Use Bitbucket BASIC auth with EMAIL:BB_API_TOKEN and workspace BB_WORKSPACE. For each issue repo in the check24 workspace, resolve slug via workspace API when needed, then use an isolated worktree under the automation workspace or clone if absent. Before changes, always fetch, reset to latest scanned target branch, and rebase security branch onto latest target before push. Before any force-push, the main agent must fetch the remote branch and verify it contains only automation-owned commits or matches the expected previous automation head; if human or unknown commits are present, stop and report a blocker. Apply fixes as before: npm/pnpm lockfile vulnerabilities via package manager with focused lockfile diffs; composer vulnerabilities via targeted composer update of affected package with dependencies, no install, no scripts, and ignore platform requirements when needed, using Nexus credentials from env. For lockfiles, preserve unrelated metadata and dependency nodes (including peer metadata like \"peer\": true); if package-manager regeneration introduces unrelated churn (e.g. peer-flag flips, optional platform binaries, broad resolver noise), rebuild lockfile from parent and patch only vulnerable package nodes, then amend the existing commit and force-push the same security branch. Verify each fix with the same scanner/command family that reported it (npm audit/pnpm audit/composer audit/osv-scanner as applicable). Commit each changed repo on a concise 00000-style security branch, push, create or reuse Bitbucket PR to the scanned target branch. If a local commit or pre-commit hook is blocked solely because a required local Docker daemon or local Docker container is missing or not running, treat that as a local-only validation gap, bypass the local commit hook with the repository-appropriate no-verify or documented bypass mechanism, continue with push/PR creation, and record the skipped local Docker validation in memory, the PR description, and final output without adding a Jira blocker comment, and include a proper PR description covering: what changed, dependency/version deltas, evidence-based Risk and impact, exact affected area, realistic change risk, QA needed, if-not-changed impact, post-merge checks, and lockfile-diff reasoning from actual committed changes (not local-environment assumptions). Always add Jens Bachmann and Aleksandar Jaksic as reviewers while preserving existing reviewers; resolve user UUIDs by display name if needed. If the scanned target branch is still vulnerable, ensure an open PR exists from the security branch where the same file resolves to a patched version; create or update PR if missing.\n\nStaging and QA handoff workflow (mandatory when `QA needed` identifies real product or package-consumer QA):\n- If the evidence-based PR risk section says QA is needed for product behavior or package consumers, push the security changes to the relevant staging path or staging release branch before treating the ticket as ready for QA.\n- Comment in the Bitbucket PR that QA is required, why it is required, what was pushed to staging, and the exact feature/package/screen area to test.\n- Add a Jira comment mentioning `@Michael Wiesner`, asking him to test the concrete affected area, and include the staging target plus PR link.\n- Move the Jira ticket to `Test` after the staging push, PR comment, and Jira QA mention are complete.\n- Report the staging push, PR comment, Jira mention, and Test-stage transition in Daily Magic for that repo security dependency thread.\n\nStaging smoke-test evidence workflow (mandatory when a fix is pushed to staging):\n- Staging URL is https://www.check24-test.de/strom/. After a fix branch/PR is pushed to staging or otherwise made visible on staging, infer the relevant staging area from the changed repository, route, component, package usage, and code ownership.\n- If the relevant area is visible without missing credentials, smoke test that area in the browser, take a screenshot, and save it under `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/evidence/<YYYY-MM-DD>/<ticket-or-repo>-staging-smoke.png`.\n- Record the staging URL tested, tested area, reasoning from the code, screenshot path, and pass/fail result in memory and in the final output so the live report can show it as release evidence.\n- If the relevant area cannot be inferred, is not visible on staging, needs login, or requires missing test data, do not pretend the smoke test passed; record the exact blocker/question and ask Thien Nguyen for the missing route/login/test data.\n\nJira workflow hard gate (mandatory for every security issue):\n- Before any repository mutation, branch push, PR creation/update, or continuing with a fix, the main agent must search memory, Jira, and Bitbucket by repo, branch, filepath, package, severity, and advisory ID; reuse an existing open PRE ticket instead of creating a duplicate.\n- If no matching PRE ticket exists, create a Jira ticket in project PRE for the exact repo/branch/file/package/advisory/severity via https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132.\n- Set both Assignee and Developer to Thien Nguyen (`712020:98c2de13-71c4-48ae-a98a-3baa7fa11ba2` when the account ID is needed), then move the ticket to In Progress immediately before doing any repository work.\n- Attach every current or future Daily-vulnerabilities-fix security dependency PRE ticket to Epic PRE-4538 using Epic Link field customfield_10014 when the ticket is created or reused, before or immediately after moving it to In Progress.\n- Immediately verify the ticket is visible on the PRE board and specifically on https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132?assignee=712020%3A98c2de13-71c4-48ae-a98a-3baa7fa11ba2. If it is not visible, adjust board-relevant fields (status, assignee, labels/epic) and re-rank so it appears in that filtered board view, then record what changed.\n- Only after the PRE ticket is assigned to Thien Nguyen, moved to In Progress, and verified on the filtered PRE board may the main agent continue with repo changes, commits, pushes, or PR creation for that issue.\n- After a PR exists, update the same PRE ticket with the PR link, branch, reviewers, and verification summary, then move the ticket to In Code Review immediately.\n- If the PR `QA needed` section identifies real product or package-consumer QA, complete the staging and QA handoff workflow: push to staging, comment in the PR, mention `@Michael Wiesner` in Jira with the staging target and PR link, then move the Jira ticket to Test.\n- Assign reviewer/owner in code review context to Alek (Aleksandar Jaksic) and keep Jens Bachmann and Aleksandar Jaksic as Bitbucket reviewers while preserving existing reviewers.\n- Poll PR approval status and Jira ticket status during each daily run (Bitbucket/Jira API preferred for read-only checks; serialized Google Chrome page fallback). When the PR is approved, move the Jira ticket to Approved and notify Thien Nguyen in the run output. If no PR is needed because the issue is already clean/current or the security report row is stale/outdated, move the Jira ticket to Done instead of Approved.\n- If the issue becomes blocked after a ticket exists, move or keep the ticket in To Do (never Open), verify board visibility when Jira is reachable, and save the blocker in memory for the next run. Add a Jira ticket comment only for external/shared blockers that require reviewer, owner, credential, repository-access, or product-security action. Do not add Jira comments for local-only blockers from the agent machine, such as missing local dependencies, local DNS/network/cache issues, local worktree setup, local scanner installation, missing local Docker daemon or required local Docker container, local package-manager auth, or local validation failures; record those only in memory, the live report, and final output.\n- If no Jira ticket can be created because Jira/API/Google Chrome access is blocked, do not continue remediation for that issue. Save a blocked memory item with repo/branch/file/package/advisory, the exact Jira failure, actionability, and next action; re-check it first on the next run and create/move the ticket before continuing.\n- On later runs, re-check each blocked To Do ticket and each blocked memory item first; if still blocked, record fresh evidence in memory/report and add a Jira comment only for external/shared blockers that need action outside the local agent environment; if unblocked, create or move the ticket to In Progress, verify filtered-board visibility, and continue processing.\n\nBlocked item recheck workflow (mandatory first phase of every run):\n- Before scanning the dashboard, creating new tickets, or modifying repositories for new findings, read memory and enumerate all blocked Jira tickets and blocked memory items.\n- For each blocked item, re-run the concrete blocker check: registry version lookup, npm/pnpm/composer/osv audit, Bitbucket PR/API check, Jira status check, dashboard detail check, or the exact command/API family recorded in memory.\n- If the item is still blocked, keep or move the ticket to To Do, verify board visibility when Jira is reachable, and save the fresh timestamp, root cause, concrete evidence/error text, and recommended next action in memory. Add a Jira comment only when the blocker is external/shared and needs human or service-owner action. Do not add Jira comments for local-only blocker evidence; local-only blockers must stay in memory, report data, and final output only.\n- If the blocker is gone, move the Jira ticket from To Do to In Progress, continue the fix/PR workflow immediately, and record the unblocked evidence in memory and output.\n- If Jira or the required external service is unreachable, treat that access failure as the fresh blocker evidence for this run and still include the Jira URL in memory and output.\n- Never skip a blocked item silently. The final output must include a recheck result for every blocked item from memory.\n\nFor every blocked item, always write an explicit blocker reason with root cause, concrete evidence (error text/command result), and recommended next action. If a Jira ticket exists for that blocked item, move it to To Do (not Open) when appropriate, but add a Jira comment only for external/shared blockers that need action outside the local agent environment. Do not comment local-only blocker evidence to Jira tickets. Always include the Jira ticket URL for each blocked item in the blocked-status section of the run output and saved memory. Track blocked tickets in memory so they are re-checked on the next run.\n\nBlocked/actionability reporting workflow (mandatory for report UX):\n- Every blocked item in final output and saved memory must include exactly these scan-friendly lines near the blocker evidence:\n  - `Block reason: <root cause plus the concrete fresh evidence>`\n  - `Actionability: Actionable|Not actionable yet|Needs triage - <why and the exact next action or owner>`\n- Use `Actionable` when a concrete step can unblock the item now, such as restoring Google Chrome/client-certificate access, credentials, network/DNS, Composer/Nexus mirror access, the intended branch/worktree checkout, route/login/test data, Jira/Bitbucket API access, or another environment dependency.\n- Use `Not actionable yet` when remediation cannot proceed because no fixed upstream version or vendor-supported remediation path exists. Include what should be watched next, such as the package registry/advisory or upstream release.\n- Use `Needs triage` when the evidence is inconclusive or a human product/security decision is required before remediation.\n- If a run has multiple blockers with different actionability, report each blocker separately; the live report will show mixed actionability instead of flattening the run to a single blocker state.\n- Keep routine notes hidden/collapsed by default in the live report. The report's primary scan fields must be status, actionability, block reason, repositories, advisories, PRs, and details.\n\n\nAutomation-owned persistent operating rules (migrated from memory):\n- Chrome/Jira/Bitbucket/Jenkins access:\n  - Authenticated Google Chrome is the primary browser path for package-audit, Jira, Bitbucket, Jenkins, and staging smoke-test work.\n  - Use Chrome before declaring Jira, Bitbucket, or Jenkins blocked because of API, CLI, curl, DNS, or command-line auth failure.\n  - If Chrome cannot launch, navigate, authenticate, or use the needed client certificate/session, record that Chrome-specific failure with `Block reason:` and `Actionability:`.\n  - Keep browser work serialized under the browser mutex, reuse one current Chrome tab where possible, and keep the final/current Chrome tab open at run finish.\n  - API/CLI checks are allowed as secondary corroboration and for non-authenticated scanner/package verification, but they do not replace Chrome for Jira/Bitbucket/Jenkins access decisions unless the sync gate has already succeeded and the workflow explicitly allows API read-only polling.\n- Jira grouping and status rules:\n  - Group fixable remediation by repository/branch/fix batch when multiple findings can be resolved by one dependency update and one PR.\n  - Do not create one Jira ticket per package/severity/advisory when those findings share the same repo, target branch, lockfile, and remediation flow.\n  - If a repo has mixed outcomes, create one repo-level fix ticket for currently fixable findings and separate blocked tickets for independently blocked findings with different owners, upstream releases, access needs, product decisions, or next actions.\n  - Repo-level fix tickets must list all included packages/advisories/severities/files, target branch, PR branch, and verification command.\n  - Blocked tickets must include exact blocker reason, actionability, evidence, and next action.\n  - For non-blocked tickets, prefer Jira status transitions plus memory/report updates; Jira comments are reserved for fresh blocker evidence or material PR/fix updates.\n  - Before adding a blocker comment, check existing comments or same-run memory and avoid repeating unchanged blocker evidence.\n- PR and verification rules:\n  - Verify each fix with the matching scanner command before ending the run: `npm audit`, `pnpm audit`, `composer audit`, or `osv-scanner` as applicable.\n  - PR title/body must describe changed files and dependency/version deltas, evidence-based Risk and impact, exact affected area, realistic change risk, QA needed, if-not-changed impact, post-merge checks, and lockfile-diff reasoning from the actual committed diff.\n  - PR descriptions must explicitly answer whether the change can break runtime product behavior, package consumers, build, test, Storybook, lint, or publish/install, with evidence from actual code and dependency paths.\n  - If QA is needed for real product behavior or package consumers, the PR must not be treated as ready until staging is updated, the PR has a QA-required comment, Jira mentions `@Michael Wiesner` with the staging target and PR link, and the ticket is moved to Test.\n  - For lockfiles, list changed package nodes (`from -> to`) and classify them as direct, transitive, optional-platform, or resolver/metadata normalization changes.\n  - Preserve unrelated lockfile metadata, especially peer semantics such as `\"peer\": true`; if package-manager regeneration creates unrelated churn, rebuild from the parent and patch only vulnerable package nodes.\n- Workflow queue rules:\n  - Keep each run moving through numbered steps: live report service and run lock, frozen memory snapshot, Chrome sync gate/status reconciliation, blocked-item rechecks, package-audit scan, remediation, final memory/report reconciliation, report refresh, and lock release.\n  - Do not leave any Current report card in bare `Need Attention` at final output. Convert each item to `Wait for PR Approval`, `DONE`, ignored, or `Block` with fresh `Block reason` and `Actionability`.\n  - A freshly blocked ticket must not stop the whole queue once blocker evidence, Jira/report/memory status, and next action are recorded; continue to the next actionable item unless the blocker is a hard gate.\n- Credential handling rules:\n  - Load runtime credentials from `/Users/thien.nguyen/enrg-web-frontend/.agents/cli/.env` first; fall back to `$HOME/.env` for API credentials and `$HOME/.npmrc` for npm/Nexus registry credentials when needed.\n  - Never print or persist secret values. Log only credential-file presence, variable names, HTTP status codes, package versions, advisory IDs, and sanitized command errors.\n  - For npm checks that need user registry auth, pass `NPM_CONFIG_USERCONFIG=$HOME/.npmrc`.\n- Done vs Approved rule:\n  - `Approved` requires an existing Bitbucket PR with explicit approval evidence.\n  - `Done` means no PR is required because the repo is clean/current, package is already fixed, or the dashboard row is stale/outdated.\n  - Always verify reported rows against package-audit Details, current target-branch lockfile/package versions, and the matching scanner command before deciding Done/Blocked/PR-needed.\n- Live report UI rules:\n  - Current view must hide `DONE` items, sort `Need Attention` before `Block`, and use only latest current package-audit/run evidence for each card.\n  - Completed Jira tickets and Bitbucket PR links belong in inactive Tickets/PRs views, not the active Current list.\n  - Every `Need Attention` item must include `Attention reason:` and `Next action:`; if the reason is unknown, use `Needs triage` and state what evidence is missing.\n  - At final output, refresh the report, ensure the live service is healthy, and verify the rendered Current cards are coherent before reporting completion.\n\n\nLive report workflow:\n- At the end of every run, after writing the memory summary, regenerate the live report data by running `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/update_history_report.sh`, then run `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/ensure_live_report_service.sh` again so the report is still on after the run completes.\n- The live report server is kept running by the LaunchAgent `com.codex.security-live-report`. Check/recover it with `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/ensure_live_report_service.sh`; install or force-restart it with `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/install_live_report_service.sh`; direct foreground start is still available with `start_live_report.sh`. It serves `http://127.0.0.1:8765/` and pushes updates over `ws://127.0.0.1:8765/ws`.\n- The live report data source is `/Users/thien.nguyen/.codex/automations/fix-slack-security-dependency-threads/history-dashboard/security_audit_history.json`. If the live server is running, JSON changes must be pushed to connected browsers by WebSocket automatically.\n- Do not generate, recreate, or present `security_audit_history.html`; the report is live-only and backed by `security_audit_history.json`, `http://127.0.0.1:8765/`, and `ws://127.0.0.1:8765/ws`.\n- Include the live report URL `http://127.0.0.1:8765/` in the final run output instead of presenting any static HTML file.\n- If report data generation or live server startup