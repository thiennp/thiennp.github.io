name = "Sentry Cursor alternating checks"
prompt = "Every heartbeat, run the Sentry/Jira/Cursor workflow for the two targets below. Use the heartbeat current_time_iso to choose the first triage target deterministically: compute the 5-minute slot from the timestamp; even-numbered slots check EnergyCenter Reverse first, odd-numbered slots check Result List Goes React first. If the slot cannot be determined, alternate from the most recent successful check in this thread; if still unclear, check EnergyCenter Reverse first.\n\nUse MCP/API first wherever available, then fall back to authenticated Google Chrome UI only when MCP/API is unavailable, incomplete, or visible confirmation is required. Prefer the configured Codex MCP servers in /Users/thiennguyen/.codex/config.toml: sentry remote MCP, jira_energy, bitbucket_webfrontend, and bitbucket_energyrev wrapper scripts. Never display or copy secrets from MCP configs, env files, cookies, tokens, passkeys, OTPs, or raw credential material. Use Chrome with bounded retries/new windows for Sentry/Jira controls that MCP cannot perform or confirm. Cursor work still must happen in the native macOS Cursor app/local Cursor CLI context so the user can visually see branch, files, diffs, and workflow output.\n\nAt the start of every heartbeat, before starting a new Sentry triage/fix, run a merged-PR cleanup pass for Jira tickets created or reused by this automation in this thread/repo/PR context. Known examples include PRE-4176, PRE-4177, PRE-4179, PRE-4181, POST-2506, POST-2507, POST-2508, and any future PRE/POST ticket created or reused by this workflow. Use Jira/Bitbucket MCP/API first to find PRs by Jira key in title/branch/description/development panel/local branch/docs/recorded context. If a related PR is merged, transition the Jira ticket to the project's completed/closed/done status and resolve the linked Sentry issue by Sentry MCP/API or visible Sentry controls. Only act on tickets clearly tied to a Sentry issue handled here; do not close unrelated tickets. If PR status cannot be checked, no PR is merged, or cleanup has no safe action, continue normal triage and report only real blockers.\n\nNormally start with one target feed after cleanup, but do not stop merely because the top feed row is not actionable. For the chosen target, scan visible or MCP-listed unresolved issues in Last Seen order and open/fetch each issue detail until one actionable unowned/unticketed issue is found or the visible/listed feed is exhausted. Treat a row as non-actionable and continue to the next row when it is already assigned/owned, already has a related Jira ticket, has a matching open/non-closed Jira ticket found by search, has already been fixed/PR'd/merged/resolved, is a known no-fix/noise issue, is outside the target project, or otherwise clearly needs no Cursor fix. Report skipped issue key, short message, and skip reason briefly. Only start Cursor for the first actionable issue in that target feed. If no actionable issue exists, summarize checked/skipped rows and stop quietly.\n\nIf an actionable check leads to an actual Cursor fix that completes verification, commit, fix-branch push, PR attempt/result, Jira transitions, and staging cherry-pick/push, immediately continue in the same heartbeat with the next alternating target. Keep chaining while time and tools permit. Do not start two Cursor fixes concurrently; run Cursor fixes sequentially.\n\nDo not get stuck on slow UI. Use multiple Chrome windows/tabs for independent work when needed. Use bounded waits and retries; if a browser action is still loading after a reasonable retry cycle, refresh, reopen in a new window, or use the equivalent MCP/API/Jira/Sentry page directly. Stop only for real workflow blockers, not a single slow modal that can be bypassed or retried.\n\nStop the current chain only on real blockers or completed actionable outcomes: Sentry assignment cannot be completed after MCP/API plus bounded UI attempts for an otherwise actionable issue, Jira ticket creation/assignment/status transition cannot be completed after MCP/API plus bounded UI attempts, Cursor determines there are no file changes after starting work, Cursor/verification fails, PR/auth setup blocks completion, staging cherry-pick/conflict resolution/push fails, merged-PR cleanup cannot safely close/resolve a confirmed merged item, or the workflow produced a clear result needing user attention. Do not stop the feed scan for ordinary ownership/ticket de-duplication, already-assigned issues, already-ticketed issues, known no-fix/noise issues, or outside-target rows.\n\nShared Sentry rules: use Sentry MCP/API first to list/fetch issues for the selected target; use the authenticated Chrome Sentry feed URL as fallback or for visible confirmation. Identify newest unresolved issues in the 24h feed/list and process them in Last Seen order until one actionable issue is found. Before asking Cursor to diagnose/fix a candidate, open or fetch that issue detail and inspect current Sentry assignee plus issue-tracking/Jira state before making changes. If already assigned to anyone, including Thien Nguyen, before this run assigns it, treat it as owned: do not create Jira, do not run Cursor, do not commit/push/PR/cherry-pick, and do not change Jira status; report assignee and related Jira if visible/fetched, then continue to the next row. If a related Jira ticket already exists on the Sentry issue before this run creates it, treat it as ticketed and skip that row.\n\nOnly if the Sentry issue is unassigned and no related Jira ticket is visible/fetched should the automation assign the Sentry issue to Thien Nguyen using Sentry MCP/API or visible Sentry controls. If assignment succeeds in this run, collect non-secret diagnostic context: issue key, full title/error, exception type/value, visible stack/function/component frames, culprit/source, URL/route, browser/platform/environment/release if available, last-seen time, event/user counts, priority, tags/breadcrumbs/context, and grouping/fingerprint clues. Do not copy raw event payloads wholesale.\n\nOwnership/ticket de-duplication: do not de-duplicate by local day, prior heartbeat date, or same-day local commits alone. Instead, skip Jira/Cursor/fix work for a row if the Sentry issue was already assigned before this run or if there is an existing Jira ticket related to the same Sentry issue key or same error signature/root cause, whether visible in Sentry or found by Jira MCP/API/search. Search the correct Jira project using Sentry issue key, short signature, route, exception type/value, key stack/component/function names, grouping/fingerprint if available, and likely root-cause terms. Result List Goes React uses PRE - Presales and PRE tickets; EnergyCenter Reverse uses POST - Postsales and POST tickets. Closed statuses include Done, Closed, Resolved, Released, Cancelled, Won't Do, Duplicate, or equivalent completed states; all other statuses are open/non-closed. If a matching open/non-closed Jira exists, do not create a duplicate and do not start Cursor for that row; report ticket key/status/assignee and continue to the next row.\n\nOnly when this run assigned the Sentry issue to Thien Nguyen and no related open/non-closed Jira ticket exists, create a Jira ticket directly in Jira by Jira MCP/API or Jira UI fallback. Result List Goes React creates PRE tickets in PRE - Presales; EnergyCenter Reverse creates POST tickets in POST - Postsales. Title must contain the Sentry issue key and short signature. Description must summarize non-secret Sentry context, Sentry issue URL, route/platform/grouping clues, and intended investigation. Assign the Jira ticket to Thien Nguyen and confirm ticket key/URL.\n\nAfter creating a Jira ticket during this run, link it back to the opened/fetched Sentry issue using Sentry/Jira MCP/API or visible Issue Tracking controls. If Sentry link search stays stuck, retry in another Chrome window or link/check from Jira. If visible linking still cannot be confirmed but the newly created Jira ticket exists, is assigned to Thien Nguyen, and contains Sentry URL/context, continue to Cursor with `Sentry/Jira visible link pending` recorded. Do not create another duplicate because linking UI is slow.\n\nBefore starting Cursor, move the Jira ticket created during this run to In Progress using Jira MCP/API, visible Jira controls, or documented repo workflow. If it cannot be moved after bounded retries, report blocker and stop. Then open the target project in native macOS Cursor and run Cursor Agent automatically using the repo's .cursor bug-fix workflow. Include full Sentry context, confirmed Jira key, Jira In Progress status, and Sentry-link status. Tell Cursor not to paste secrets and to use the Jira key for branch naming, commit context, docs, and PR context.\n\nAfter each actual fix, update required project docs, run verification, then use the repo commit workflow with the confirmed Jira key. Never use 00000, never bypass hooks, never commit directly on release, never push release, never create release-to-release PRs. After commit, have Cursor push the fix branch and create/attempt PR using /bitbucket-create-pr or closest documented Cursor PR workflow; Codex must not create PR directly unless explicitly instructed later. Move Jira to Code Review after branch push/PR attempt.\n\nAfter Code Review, checkout latest staging in the same repo, update from origin, cherry-pick fix commit(s) from the fix branch onto staging, resolve clear conflicts, run required staging verification for touched files, and push staging to origin. Then move Jira to In Test. If Cursor finds no file changes, do not commit, push, PR, or cherry-pick; summarize no commit needed with Jira/Sentry status.\n\nAfter Cursor finishes, cleanup completes, or feed is exhausted, summarize Sentry assignment, skipped rows/reasons, ownership/ticket de-duplication, Jira ticket key/link/assignment, Sentry/Jira linking or pending status, Jira transitions including completed/closed cleanup, changed files, docs updates, commit result, fix branch push, PR link/result/merge state, staging checkout/cherry-pick/conflict-resolution/verification/push, Sentry resolve result, and Sentry issue-detail context used.\n\nEnergyCenter Reverse target: Sentry project 4511296882540544, issue keys should be ENRG-ENERGYCENTER-REV. Chrome fallback URL: https://check24-energie.sentry.io/issues/?project=4511296882540544&statsPeriod=24h. Local repo: /Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev. Use .cursor/commands/fix-bug.md and linked docs. If the top EnergyCenter row is not actionable, continue directly to the next visible/listed EnergyCenter row.\n\nResult List Goes React target: Sentry project 4508879690792960, target project result-list-goes-react / enrg-web-frontend. Chrome fallback URL: https://check24-energie.sentry.io/issues/?project=4508879690792960&statsPeriod=24h. Local repo: /Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react. Use current project .cursor bug-fix workflow. If the top Result List row is not actionable, continue directly to the next visible/listed Result List row."
