prompt = "Every heartbeat is only a scheduler tick. At the very start, check whether a previous automation round is still in progress in this thread or in either target repo/Cursor workflow. In-progress means any active Cursor Agent/Cursor task, visible Cursor verification, uncompleted fix branch workflow, running repo verification, active staging cherry-pick/push flow, pending PR/Jira transition created by this automation, or an explicit prior heartbeat result that has not reached a terminal summary. If anything is in progress, do not start triage, cleanup, Jira, Cursor, commit, PR, or staging work; return a quiet status that the previous round is still active.\n\nWhen no previous round is active, start exactly one automation round. A round owns the workflow until it reaches a terminal outcome: no actionable issue found after feed scan, non-actionable skips exhausted, blocker needing user attention, Cursor no-change result, verification failure, successful fix through PR/staging/Jira transitions, or merged-PR cleanup completion. When a round finishes successfully or reaches a terminal non-actionable/no-work outcome, immediately start the next round from the opposite target in the same turn when tools/time permit, instead of waiting for the next scheduled heartbeat. Continue this chaining while each round reaches a terminal outcome and no round remains active. The scheduled heartbeat should only wake the thread to check the lock; it should not create parallel rounds.\n\nTarget order: use current_time_iso only for the first round started by a scheduler tick. Compute the 5-minute slot; even slots start with EnergyCenter Reverse, odd slots start with Result List Goes React. Chained rounds alternate targets from the just-finished round. If slot cannot be determined, alternate from the last successful completed round, otherwise start EnergyCenter Reverse.\n\nAccess/config precedence: for all Jira, Bitbucket, Sentry, PR, and project workflow access, first inspect and use the target repo's own `.cursor` folder. Result List Goes React sources include `/Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react/.cursor/mcp.json`, `.cursor/scripts/.env`, `.cursor/scripts/jira/.env`, `.cursor/scripts/bb/.env`, Jira scripts/clients under `.cursor/scripts/jira/`, `.cursor/commands/`, `.cursor/skills/`, and `.cursor/rules/`. EnergyCenter Reverse sources include `/Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev/.cursor/cli/.env`, `.cursor/cli/scripts/.env`, `.cursor/cli/jira/JiraClient.ts`, `.cursor/cli/scripts/jira.ts`, `.cursor/commands/bitbucket-create-pr.md`, `.cursor/commands/pm-jira-bitbucket-cli.md`, and `.cursor/rules/`. Use global Codex MCP servers/wrappers only when project-local `.cursor` sources do not provide the needed access or command. Never display or copy secrets from `.cursor`, env files, MCP configs, cookies, tokens, passkeys, OTPs, or raw credential material.\n\nDo not ask the user for permission to run terminal commands for Jira, Bitbucket, or Sentry access. Do not run ad hoc Codex shell/API commands for Jira/Bitbucket/Sentry when they would need external network or credential access. Instead, delegate those operations to the project-local Cursor workflow/scripts by asking Cursor in the native macOS Cursor app to run the repo's documented `.cursor` command, skill, or script. Codex may inspect local non-secret docs/config, open Chrome for visible confirmation, and use local git/repo status commands, but credentialed Jira/Bitbucket/Sentry API work should be performed by Cursor/project scripts unless explicitly instructed otherwise.\n\nUse MCP/API/CLI first through the project-local Cursor workflow, then authenticated Google Chrome UI only when API/CLI is unavailable, incomplete, or visible confirmation is required. Cursor work must happen in the native macOS Cursor app/local Cursor context so branch, files, diffs, and workflow output are visible. Prefer normal visible macOS Cursor workflow if headless `cursor agent` has keychain/auth issues.\n\nAt the start of each round, run merged-PR cleanup for Jira tickets created or reused by this automation, including PRE-4176, PRE-4177, PRE-4179, PRE-4181, PRE-4184, POST-2506, POST-2507, POST-2508, and future PRE/POST tickets from this workflow. Ask Cursor/project-local scripts to find related PRs and linked Sentry issues. If a related PR is merged, ask Cursor/project-local Jira/Sentry workflow to close/complete the Jira ticket and resolve the linked Sentry issue. Only act on tickets clearly tied to Sentry issues handled here. If no PR is merged or no safe cleanup action exists, continue normal triage.\n\nFor the chosen target, scan unresolved Sentry issues in Last Seen order until one actionable unowned/unticketed issue is found or the listed/visible feed is exhausted. If the top row is not actionable, continue directly to the next row. Skip and briefly report rows that are already assigned/owned, already ticketed, have a matching open/non-closed Jira found by search, have already been fixed/PR'd/merged/resolved, are known no-fix/noise, are outside target project, or otherwise need no Cursor fix. Do not stop the feed scan for ordinary ownership/ticket de-duplication.\n\nBefore asking Cursor to diagnose/fix a candidate, open/fetch Sentry issue detail and inspect assignee plus Jira/issue-tracking state. If already assigned before this run or already ticketed, skip that row. Only if unassigned and unticketed, assign Sentry to Thien Nguyen using visible Sentry controls or project-local Cursor/Sentry tooling, collect non-secret context, ask Cursor/project-local Jira tooling to search for matching open/non-closed tickets, then create a Jira ticket only if none exists. Result List creates PRE tickets in PRE - Presales. EnergyCenter Reverse creates POST tickets in POST - Postsales. Ticket title must contain Sentry key and short error signature; description must include non-secret Sentry context and Sentry URL. Assign ticket to Thien Nguyen.\n\nAfter creating a ticket in this run, link it back to Sentry using project-local tooling/API via Cursor or visible controls. If visible Sentry/Jira linking remains stuck but the new Jira ticket exists, is assigned to Thien Nguyen, and contains Sentry URL/context, continue to Cursor and record `Sentry/Jira visible link pending`. Move the ticket to In Progress before Cursor starts, using Cursor/project-local Jira workflow rather than Codex ad hoc API calls.\n\nWhen Cursor starts, include full Sentry context, Jira key, Jira In Progress status, and Sentry-link status. Tell Cursor not to paste secrets and to use the Jira key for branch naming, docs, commit, and PR context. Use the repo's `.cursor/commands/fix-bug.md` and linked docs/rules. After a real fix, update required docs, run verification, commit with the Jira key using normal hooks, push the fix branch, and create/attempt PR using the repo's documented Cursor PR workflow such as `/bitbucket-create-pr` or `pnpm bb:create-pr`. Do not use `00000`, do not bypass hooks, do not commit on release, do not push release, and do not create release-to-release PRs.\n\nAfter PR attempt, move Jira to Code Review through Cursor/project-local Jira workflow. Then checkout latest staging, update from origin, cherry-pick fix commit(s), resolve clear conflicts, run required staging verification, push staging, and move Jira to In Test through Cursor/project-local Jira workflow. If Cursor finds no file changes, do not commit, push, PR, or cherry-pick; summarize no commit needed.\n\nStop only on real blockers or completed actionable outcomes: Sentry assignment failure for an otherwise actionable issue, Jira creation/assignment/status failure, Cursor no-change result after starting, Cursor/verification failure, PR/auth setup block, staging cherry-pick/conflict/verification/push failure, unsafe merged-PR cleanup, or a result requiring user attention.\n\nEnergyCenter Reverse target: Sentry project 4511296882540544; expected keys ENRG-ENERGYCENTER-REV; Chrome fallback https://check24-energie.sentry.io/issues/?project=4511296882540544&statsPeriod=24h; repo `/Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev`.\n\nResult List Goes React target: Sentry project 4508879690792960; project result-list-goes-react / enrg-web-frontend; Chrome fallback https://check24-energie.sentry.io/issues/?project=4508879690792960&statsPeriod=24h; repo `/Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react`.\n\nAfter each round or chain finishes, summarize Sentry assignment, skipped rows/reasons, de-duplication, Jira ticket/link/assignment, Sentry/Jira linking or pending status, Jira transitions, changed files, docs updates, commit, push, PR link/result/merge state, staging cherry-pick/verification/push, Sentry resolve result, and Sentry issue-detail context used."
