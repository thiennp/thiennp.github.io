prompt = "Every heartbeat, run the Sentry/Jira/Cursor workflow for EnergyCenter Reverse and Result List Goes React. Use current_time_iso to choose the first triage target: compute the 5-minute slot; even slots start with EnergyCenter Reverse, odd slots start with Result List Goes React. If unclear, alternate from the last successful check, otherwise start EnergyCenter Reverse.\n\nAccess/config precedence: for all Jira, Bitbucket, Sentry, PR, and project workflow access, first inspect and use the target repo's own `.cursor` folder. Result List Goes React project-local sources include `/Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react/.cursor/mcp.json`, `.cursor/scripts/.env`, `.cursor/scripts/jira/.env`, `.cursor/scripts/bb/.env`, Jira scripts/clients under `.cursor/scripts/jira/`, `.cursor/commands/`, and `.cursor/rules/`. EnergyCenter Reverse project-local sources include `/Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev/.cursor/cli/.env`, `.cursor/cli/scripts/.env`, `.cursor/cli/jira/JiraClient.ts`, `.cursor/cli/scripts/jira.ts`, `.cursor/commands/bitbucket-create-pr.md`, `.cursor/commands/pm-jira-bitbucket-cli.md`, and `.cursor/rules/`. Use global Codex MCP servers/wrappers in `/Users/thiennguyen/.codex/config.toml` only when the project-local `.cursor` sources do not provide the needed access or command. Never display or copy secrets from `.cursor`, env files, MCP configs, cookies, tokens, passkeys, OTPs, or raw credential material.\n\nUse MCP/API/CLI first wherever available, then authenticated Google Chrome UI only when API/CLI is unavailable, incomplete, or visible confirmation is required. Cursor work must happen in the native macOS Cursor app/local Cursor context so branch, files, diffs, and workflow output are visible. Prefer normal visible macOS Cursor workflow if headless `cursor agent` has keychain/auth issues.\n\nAt heartbeat start, run merged-PR cleanup for Jira tickets created or reused by this automation, including PRE-4176, PRE-4177, PRE-4179, PRE-4181, PRE-4184, POST-2506, POST-2507, POST-2508, and future PRE/POST tickets from this workflow. Use project-local `.cursor` Jira/Bitbucket/Sentry tooling first to find related PRs and linked Sentry issues. If a related PR is merged, close/complete the Jira ticket and resolve the linked Sentry issue. Only act on tickets clearly tied to Sentry issues handled here. If no PR is merged or no safe cleanup action exists, continue normal triage.\n\nFor the chosen target, scan unresolved Sentry issues in Last Seen order until one actionable unowned/unticketed issue is found or the listed/visible feed is exhausted. If the top row is not actionable, continue directly to the next row. Skip and briefly report rows that are already assigned/owned, already ticketed, have a matching open/non-closed Jira found by search, have already been fixed/PR'd/merged/resolved, are known no-fix/noise, are outside target project, or otherwise need no Cursor fix. Do not stop the feed scan for ordinary ownership/ticket de-duplication.\n\nBefore asking Cursor to diagnose/fix a candidate, open/fetch Sentry issue detail and inspect assignee plus Jira/issue-tracking state. If already assigned before this run or already ticketed, skip that row. Only if unassigned and unticketed, assign Sentry to Thien Nguyen, collect non-secret context, search Jira for matching open/non-closed tickets, then create a Jira ticket only if none exists. Result List creates PRE tickets in PRE - Presales. EnergyCenter Reverse creates POST tickets in POST - Postsales. Ticket title must contain Sentry key and short error signature; description must include non-secret Sentry context and Sentry URL. Assign ticket to Thien Nguyen.\n\nAfter creating a ticket in this run, link it back to Sentry using project-local tooling/API or visible controls. If visible Sentry/Jira linking remains stuck but the new Jira ticket exists, is assigned to Thien Nguyen, and contains Sentry URL/context, continue to Cursor and record `Sentry/Jira visible link pending`. Move the ticket to In Progress before Cursor starts.\n\nWhen Cursor starts, include full Sentry context, Jira key, Jira In Progress status, and Sentry-link status. Tell Cursor not to paste secrets and to use the Jira key for branch naming, docs, commit, and PR context. Use the repo's `.cursor/commands/fix-bug.md` and linked docs/rules. After a real fix, update required docs, run verification, commit with the Jira key using normal hooks, push the fix branch, and create/attempt PR using the repo's documented Cursor PR workflow such as `/bitbucket-create-pr`. Do not use `00000`, do not bypass hooks, do not commit on release, do not push release, and do not create release-to-release PRs.\n\nAfter PR attempt, move Jira to Code Review. Then checkout latest staging, update from origin, cherry-pick fix commit(s), resolve clear conflicts, run required staging verification, push staging, and move Jira to In Test. If Cursor finds no file changes, do not commit, push, PR, or cherry-pick; summarize no commit needed.\n\nStop only on real blockers or completed actionable outcomes: Sentry assignment failure for an otherwise actionable issue, Jira creation/assignment/status failure, Cursor no-change result after starting, Cursor/verification failure, PR/auth setup block, staging cherry-pick/conflict/verification/push failure, unsafe merged-PR cleanup, or a result requiring user attention.\n\nEnergyCenter Reverse target: Sentry project 4511296882540544; expected keys ENRG-ENERGYCENTER-REV; Chrome fallback https://check24-energie.sentry.io/issues/?project=4511296882540544&statsPeriod=24h; repo `/Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev`.\n\nResult List Goes React target: Sentry project 4508879690792960; project result-list-goes-react / enrg-web-frontend; Chrome fallback https://check24-energie.sentry.io/issues/?project=4508879690792960&statsPeriod=24h; repo `/Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react`.\n\nAfter Cursor finishes, cleanup completes, or feed is exhausted, summarize Sentry assignment, skipped rows/reasons, de-duplication, Jira ticket/link/assignment, Sentry/Jira linking or pending status, Jira transitions, changed files, docs updates, commit, push, PR link/result/merge state, staging cherry-pick/verification/push, Sentry resolve result, and Sentry issue-detail context used."
