name = "Sentry Cursor alternating checks"
prompt = "Every heartbeat, run Sentry triage checks against the two targets in alternating order. Use the heartbeat current_time_iso to choose the first target deterministically: compute the 5-minute slot from the timestamp; even-numbered 5-minute slots check EnergyCenter Reverse first, odd-numbered 5-minute slots check Result List Goes React first. If the slot cannot be determined, alternate from the most recent successful check in this thread; if still unclear, check EnergyCenter Reverse first.\n\nNormally start with exactly one Sentry triage check. However, if that check leads to an actual Cursor fix that completes (verification + commit + push + PR attempt/result + required Jira transitions + staging cherry-pick/push result), immediately continue in the same heartbeat with the next alternating target instead of waiting for another 5 minutes. After each completed actual fix, keep chaining to the next alternating target while time and tools permit. Do not start two Cursor fixes concurrently; run Cursor fixes sequentially.\n\nDo not get stuck on a waiting UI process. Use multiple Google Chrome windows/tabs to keep independent work moving: one window may remain on a slow Sentry/Jira modal while another opens Jira, Sentry, Cursor docs, repo status, or the next required page. Use bounded waits for UI loading and retries; if a browser action is still loading after a reasonable bounded retry cycle, refresh the page, open the same page in a new Chrome window, or use the equivalent Jira/Sentry page directly. Do not wait for one loading modal to finish before doing other independent next steps. Only stop when there is a real workflow blocker, not merely a slow UI state that can be bypassed or retried in another window.\n\nStop the current chain when a check is skipped by de-duplication, no fix is needed, the latest issue is outside the target project, Sentry assignment cannot be completed after bounded retry/new-window attempts, Jira ticket creation/assignment/status transition cannot be completed after bounded retry/new-window attempts, Cursor determines there are no file changes, Cursor/verification fails, PR/auth setup blocks completion, staging cherry-pick/conflict resolution/push fails, or the workflow has produced a clear result that needs user attention. Do not treat a single stuck Sentry/Jira link search modal as an immediate blocker: try another Chrome window/tab, refresh/reopen the issue, link from the other side if available, and continue with the confirmed Jira ticket key if the ticket exists, is assigned to Thien Nguyen, and is moved to In Progress. Record that Sentry-link confirmation is pending if it remains unconfirmed after bounded attempts, but do not let that alone prevent Cursor from starting.\n\nShared rules for both targets: use the authenticated Google Chrome Sentry feed URL for the chosen target. Refresh or copy only the visible issue list needed for triage; do not collect or transmit passwords, OTPs, passkey secrets, cookies, tokens, or raw credential material. Identify the latest issue in the 24h feed. If the latest issue is outside the selected target project, report the latest issue key, message, and last-seen time, then stop the current chain.\n\nBefore asking Cursor to diagnose or fix anything, open the latest issue detail page in Sentry. Immediately after opening the issue detail page, assign the Sentry issue to Thien Nguyen before continuing with triage, de-duplication, Jira ticket creation, or Cursor work. Use only visible Sentry assignee controls/search. If assignment UI is slow, retry with refresh/new Chrome window. If assignment cannot be confirmed after bounded retries, report the blocker and stop the current chain.\n\nAfter Sentry assignment succeeds, collect visible non-secret diagnostic context: issue key, full title/error message, exception type/value, visible stack/function/component frames, culprit/source, URL/route, browser/platform/environment/release if visible, last-seen time, event/user counts, priority, visible tags/breadcrumbs/context, and grouping/fingerprint clues. Do not copy raw event payloads wholesale; capture only visible diagnostic details needed to understand the bug and avoid secrets.\n\nSame-day de-duplication: before creating or reusing a Jira ticket or asking Cursor to fix, check this thread's prior heartbeat results for today's local date and local repos' recent branches/commits/docs for the same Sentry issue key and same error signature. Do not try to fix the same Sentry issue key twice in the same local day. If already attempted, fixed, pushed, PR'd, ticketed and blocked, or determined already-fixed today, skip Jira/Cursor work and report the previous outcome briefly. Also avoid same-signature duplicate clusters handled today unless the opened issue detail clearly shows a different stack/root cause or the previous attempt failed before producing any usable branch/commit. If skipped by de-duplication, do not create a Jira ticket, do not run commit-quick, do not push, do not create a PR, and do not change Jira status.\n\nIf not skipped and a Cursor fix may be needed, check Jira for an existing open/non-closed matching ticket before creating a new one. Search the correct Jira project using the Sentry issue key, short error signature, route, exception type/value, key stack/component/function names, grouping/fingerprint hash if visible, and likely root-cause terms. Result List Goes React uses project PRE - Presales and PRE-xxxx tickets; EnergyCenter Reverse uses project POST - Postsales and POST-xxxx tickets. Closed statuses include Done, Closed, Resolved, Released, Cancelled, Won't Do, Duplicate, or equivalent completed states; all other statuses are open/non-closed. If an open/non-closed matching ticket exists, do not create a duplicate. Assign or keep it assigned to Thien Nguyen when possible, link it to Sentry if possible, and pass the existing key to Cursor.\n\nOnly when no open/non-closed matching Jira ticket exists, create a Jira ticket directly in Jira before starting Cursor. Do not rely on Sentry's Jira project selector for ticket creation. For Result List Goes React, open https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132 and create a PRE ticket in project PRE - Presales. For EnergyCenter Reverse, open https://c24-energie.atlassian.net/jira/software/c/projects/POST/boards/99 and create a POST ticket in project POST - Postsales. Create the ticket from Sentry issue detail context only, with a concise bug title containing the Sentry issue key and short signature, and a non-secret description summarizing Sentry context, Sentry issue URL, route/platform/grouping clues, and intended investigation. Assign the Jira ticket to Thien Nguyen. Confirm the ticket key and Jira URL.\n\nAfter creating or reusing a Jira ticket, try to link it back to the opened Sentry issue using Sentry Issue Tracking/Jira link controls or Jira/Sentry linking controls if available. Use bounded waits; if Sentry's Jira link search stays stuck on Loading, open a separate Chrome window, refresh/reopen the issue, retry linking, and check whether Jira already shows Sentry linkage. If linking still cannot be visibly confirmed but the Jira ticket exists, is assigned to Thien Nguyen, and contains the Sentry URL/context, continue to Cursor with the ticket key and report `Sentry/Jira visible link pending` in the final summary. Do not create another duplicate ticket just because linking UI is slow.\n\nBefore starting Cursor, move the confirmed Jira ticket to In Progress using visible Jira workflow/status controls or the project's documented Cursor/Jira workflow. If already in an equivalent active development status, record that and continue. If the ticket cannot be moved to In Progress after bounded retry/new-window attempts, report the blocker and stop the current chain.\n\nIf Cursor Agent is needed after Sentry assignment, full issue-detail check, de-duplication, Jira duplicate search, Jira ticket creation-or-reuse/assignment, and Jira In Progress transition, run it automatically without asking permission. Open the target project in the native macOS Cursor app first using the shared local project path. Run Cursor/Cursor Agent from the macOS Cursor app or local Cursor CLI context so the user can visually see branch, files, diffs, and fix while it works. Do not run Cursor work in a hidden sandbox, isolated worktree, or non-visible Codex-only workspace unless explicitly requested. Include full Sentry context, confirmed Jira key, Jira In Progress status, and Sentry-link status when handing work to Cursor. Tell Cursor not to paste secrets. Tell Cursor to use the Jira key for workflow naming, branch naming, commit context, docs, and PR context.\n\nAfter each actual fix, update required project docs, run verification, then use the repo's commit-quick/project commit workflow with the confirmed Jira ticket key. Never use 00000 if a Jira ticket was created/reused. Never commit with --no-verify or bypass hooks. After a successful commit on a non-release fix branch, tell Cursor Agent to push that branch and create the PR from Cursor using /bitbucket-create-pr or .cursor/commands/bitbucket-create-pr.md when available. If unavailable, use the closest documented project Cursor PR workflow and explicitly report that /bitbucket-create-pr was unavailable. Codex must not create the PR directly from this thread.\n\nAfter the fix branch push and PR attempt/result, move the Jira ticket to Code Review. If already equivalent review status, record and continue. If it cannot be moved after bounded retry/new-window attempts, report blocker and stop the chain.\n\nAfter moving Jira to Code Review, checkout latest staging in the same target repo, update it from origin, cherry-pick the fix commit(s) from the fix branch onto staging, resolve conflicts automatically where the correct resolution is clear from the fix and current staging code, run required staging verification for touched files, and push staging to origin. Never push release. If conflicts cannot be resolved confidently, verification fails, or staging push fails, report blocker and stop.\n\nAfter staging cherry-pick is verified and pushed, move Jira to In Test. If already equivalent test status, record it. If it cannot be moved after bounded retry/new-window attempts, report blocker and stop.\n\nNever push directly to release, never commit directly on release, and never create a PR from release to release. If current branch is release, create/use a fix branch before editing, committing, pushing, or opening a PR. If Cursor determines the fix already exists or makes no file changes, do not run commit-quick, do not push, do not create a PR, do not cherry-pick to staging, and summarize no commit was needed with Jira ticket/link/status result.\n\nAfter Cursor finishes, summarize Sentry assignment result, Jira duplicate-search result, Jira ticket key/link/assignment result, Sentry/Jira linking result or pending status, Jira transitions (In Progress, Code Review, In Test), changed files, documentation updates, commit result, fix branch push result, PR result/link, staging checkout/cherry-pick/conflict-resolution/verification/push results, and Sentry issue-detail context used.\n\nEnergyCenter Reverse target: check https://check24-energie.sentry.io/issues/?project=4511296882540544&statsPeriod=24h. Target issue keys should be ENRG-ENERGYCENTER-REV. Local repo: /Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev. Use the current project bug-fix workflow from .cursor/commands/fix-bug.md and linked docs, adapted for the Sentry context and linked POST ticket.\n\nResult List Goes React target: check https://check24-energie.sentry.io/issues/?project=4508879690792960&statsPeriod=24h. Target project is result-list-goes-react / enrg-web-frontend. Local repo: /Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react. Use the current project bug-fix workflow adapted for the Sentry context and linked PRE ticket."
