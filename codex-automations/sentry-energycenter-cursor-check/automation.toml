version = 1
id = "sentry-energycenter-cursor-check"
kind = "heartbeat"
name = "Sentry Cursor alternating checks"
prompt = "Every heartbeat, run Sentry triage checks against the two targets in alternating order. Use the heartbeat current_time_iso to choose the first target deterministically: compute the 5-minute slot from the timestamp; even-numbered 5-minute slots check EnergyCenter Reverse first, odd-numbered 5-minute slots check Result List Goes React first. If the slot cannot be determined, alternate from the most recent successful check in this thread; if still unclear, check EnergyCenter Reverse first.\n\nNormally start with exactly one Sentry triage check. However, if that check leads to an actual Cursor fix that completes (verification + commit + push + PR attempt/result + required Jira transitions + staging cherry-pick/push result), immediately continue in the same heartbeat with the next alternating target instead of waiting for another 5 minutes. After each completed actual fix, keep chaining to the next alternating target while time and tools permit. Stop the chain when a check is skipped by de-duplication, no fix is needed, the latest issue is outside the target project, Sentry assignment fails, Jira ticket creation/assignment/linking/transition fails, Cursor determines there are no file changes, Cursor/verification fails, PR/auth setup blocks completion, staging cherry-pick/conflict resolution/push fails, or the workflow has already produced a clear result that needs user attention. Do not start two Cursor fixes concurrently; run chained fixes sequentially.\n\nShared rules for both targets: use the authenticated Google Chrome Sentry feed URL for the chosen target. Refresh or copy only the visible issue list needed for triage; do not collect or transmit passwords, OTPs, passkey secrets, cookies, tokens, or raw credential material. Identify the latest issue in the 24h feed. Before asking Cursor to diagnose or fix anything, open the latest issue detail page in Sentry. Immediately after opening the issue detail page, assign the Sentry issue to Thien Nguyen before continuing with triage, de-duplication, Jira ticket creation, or Cursor work. Use only the visible Sentry assignee control/search; do not collect or transmit passwords, OTPs, passkey secrets, cookies, tokens, or raw credential material. If the assignment control is unavailable, the issue cannot be assigned to Thien Nguyen, or assignment fails, report that blocker and stop the current chain rather than processing the issue unassigned.\n\nAfter Sentry assignment succeeds, collect the full visible issue context needed for triage: issue key, full title/error message, exception type/value, visible stack/function/component frames, culprit/source, URL/route, browser/platform/environment/release if visible, last-seen time, event/user counts, priority, tags/breadcrumbs/context that are visible and non-secret, and any visible grouping/fingerprint clues. Do not copy raw event payloads wholesale; capture only the visible diagnostic details needed to understand the bug and avoid secrets. If the issue detail cannot be opened or is unavailable, report that and use the fullest visible feed context rather than guessing.\n\nSame-day de-duplication: before creating or reusing a Jira ticket or asking Cursor to fix, check this thread's prior heartbeat results for today's date and the local repos' recent branches/commits/docs for the same Sentry issue key and same error signature. Do not try to fix the same Sentry issue key twice in the same local day. If the latest issue key was already attempted, fixed, pushed, PR'd, ticketed, or determined already-fixed today, skip Jira/Cursor work and report the previous outcome briefly. Also avoid duplicate work for a same-signature cluster already handled today (same message, same route, same likely root cause) unless the newly opened issue detail clearly shows a different stack/root cause or the previous attempt failed before producing any usable branch/commit. If skipped by de-duplication, do not create a Jira ticket, do not run commit-quick, do not push, do not create a PR, and do not change Jira status.\n\nIf not skipped by de-duplication and a Cursor fix may be needed, check Jira for an existing open/non-closed ticket before creating a new one. Search the correct Jira project for the target using the Sentry issue key, the short error signature, and enough distinctive non-secret context to catch same-signature tickets: route, exception type/value, key stack/component/function names, grouping/fingerprint hash if visible, and likely root-cause terms. Result List Goes React uses project `PRE - Presales` (`PRE-xxxx` tickets); EnergyCenter Reverse uses project `POST - Postsales` (`POST-xxxx` tickets). Treat statuses such as Done, Closed, Resolved, Released, Cancelled, Won't Do, Duplicate, or equivalent completed states as closed; all other statuses are open/non-closed. If an open/non-closed matching Jira ticket already exists, do not create a new ticket. Assign or keep it assigned to Thien Nguyen when possible, link that existing Jira ticket back to the Sentry issue if it is not already linked, and pass that existing ticket key to Cursor. If the existing matching ticket cannot be assigned or linked, report that blocker and stop the current chain rather than creating a duplicate.\n\nOnly when no open/non-closed matching Jira ticket exists, create a Jira ticket directly in Jira before starting Cursor. Do not rely on Sentry's Jira project selector for ticket creation. For Result List Goes React, open https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132 and create a PRE ticket in project `PRE - Presales`. For EnergyCenter Reverse, open https://c24-energie.atlassian.net/jira/software/c/projects/POST/boards/99 and create a POST ticket in project `POST - Postsales`. Create the ticket from the Sentry issue detail context only, with a concise bug title containing the Sentry issue key and short error signature, and a description summarizing the non-secret Sentry context, Sentry issue URL, observed route/platform/grouping clues, and intended investigation. Assign the Jira ticket to Thien Nguyen. Confirm the created Jira key (`PRE-xxxx` or `POST-xxxx`) and Jira URL.\n\nAfter creating or reusing and assigning a Jira ticket, link the Jira ticket back to the opened Sentry issue using Sentry's Issue Tracking/Jira link controls, or Jira/Sentry linking controls if that is the available path. The Sentry issue must visibly show or otherwise confirm the related Jira key before Cursor starts. If Jira search is unavailable, duplicate status cannot be determined, Jira creation is unavailable, the correct project cannot be used, the ticket cannot be assigned to Thien Nguyen, the ticket key cannot be confirmed, or the ticket cannot be linked back to the Sentry issue, report that blocker and stop the current chain rather than starting Cursor without a linked ticket.\n\nBefore starting Cursor, move the confirmed linked Jira ticket to `In Progress` using the visible Jira workflow/status controls or the project's documented Cursor/Jira workflow. If the ticket is already in an equivalent active development status, record that and continue. If the ticket cannot be moved to `In Progress`, report that blocker and stop the current chain rather than starting Cursor.\n\nIf Cursor Agent is needed after Sentry assignment, full issue-detail check, de-duplication, Jira duplicate search, Jira ticket creation-or-reuse/assignment/linking, and moving the Jira ticket to `In Progress`, run it automatically without asking the user for permission. Open the target project in the native macOS Cursor app first using the shared local project path, and run Cursor/Cursor Agent from the macOS Cursor app or local Cursor CLI context so the user can visually see the project, branch, files, diffs, and fix while it works. Do not run Cursor work in a hidden sandbox, isolated worktree, or non-visible Codex-only workspace unless the user explicitly asks for that. Use the existing macOS Cursor workspace/auth setup and continue without interactive approval prompts where possible. Include the full Sentry issue-detail context, the confirmed linked Jira ticket key, and the fact that the Jira ticket is `In Progress` when handing work to Cursor, not only the feed row. Tell Cursor not to paste secrets. Tell Cursor to use the Jira ticket key for workflow naming, branch naming, commit context, docs, and PR context. Branches should use the target ticket key rather than 00000, for example PRE-1234 for Result List Goes React or POST-1234 for EnergyCenter Reverse.\n\nAfter each actual fix, update the relevant project docs according to the repo workflow, run verification, then use the repo's commit-quick/project commit workflow afterward to commit the fix with the confirmed Jira ticket key. Never use 00000 if a Jira ticket was created or reused. Never commit with --no-verify or bypass hooks; follow the normal commit hooks and report hook failures instead of bypassing them. After a successful commit on a non-release fix branch, tell Cursor Agent to push that branch and create the PR from Cursor using the Cursor command `/bitbucket-create-pr` / `.cursor/commands/bitbucket-create-pr.md` when available. If a repo does not expose that exact command, Cursor must use the closest project Cursor PR workflow documented under `.cursor/commands/` and explicitly report that `/bitbucket-create-pr` was unavailable. Codex must not create the PR directly from this thread; PR creation should happen inside Cursor/Cursor Agent.\n\nAfter the fix branch push and PR attempt/result, move the Jira ticket to `Code Review` using the visible Jira workflow/status controls or the project's documented Cursor/Jira workflow. If the ticket is already in an equivalent review status, record that and continue. If the ticket cannot be moved to `Code Review`, report that blocker and stop the current chain.\n\nAfter moving the Jira ticket to `Code Review`, checkout the latest `staging` branch in the same target repo, update it from origin, cherry-pick the fix commit(s) from the fix branch onto `staging`, resolve cherry-pick conflicts automatically where the correct resolution is clear from the fix and current staging code, run the repository's required staging verification for the touched files, and push the resulting `staging` change to origin. Never push `release`; pushing `staging` is expected for this workflow. If conflicts cannot be resolved confidently, verification fails, or pushing `staging` fails, report the blocker and stop the current chain rather than hiding the failure.\n\nAfter the staging cherry-pick is verified and pushed, move the Jira ticket to `In Test` using the visible Jira workflow/status controls or the project's documented Cursor/Jira workflow. If the ticket is already in an equivalent test status, record that. If the ticket cannot be moved to `In Test`, report that blocker and stop the current chain.\n\nNever push directly to release, never commit directly on release, and never create a PR from release to release. If the current branch is release, create/use a fix branch before editing, committing, pushing, or opening a PR. If Cursor determines the fix already exists or makes no file changes, do not run commit-quick, do not push, do not create a PR, do not cherry-pick to staging, and summarize that no commit was needed with the Jira ticket/link/status result. After Cursor finishes, summarize Sentry assignment result, Jira duplicate-search result, Jira ticket key/link and assignment result, Sentry/Jira linking result, Jira status transitions (`In Progress`, `Code Review`, `In Test`), changed files, documentation updates, commit-quick/commit result, fix branch push result, PR link/result from Cursor, staging checkout/cherry-pick/conflict-resolution/verification/push results, and the Sentry issue-detail context used in this thread.\n\nEnergyCenter Reverse target: check https://check24-energie.sentry.io/issues/?project=4511296882540544&statsPeriod=24h. If the latest issue is not from the EnergyCenter reverse project (issue key/project prefix ENRG-ENERGYCENTER-REV), report the latest issue key, message, and last-seen time, then stop the current chain. If the latest issue is from ENRG-ENERGYCENTER-REV, open its Sentry issue detail page, assign it to Thien Nguyen, collect the full visible non-secret context described above, apply the same-day de-duplication rule, search Jira project `POST - Postsales` for an existing open/non-closed matching ticket, reuse/link that ticket if found, otherwise create and assign a POST Jira ticket to Thien Nguyen directly in Jira via https://c24-energie.atlassian.net/jira/software/c/projects/POST/boards/99 if not skipped, link the POST ticket back to the Sentry issue, move the Jira ticket to `In Progress`, then open /Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev in the native macOS Cursor app, inspect the project .cursor guidance, and run Cursor Agent automatically using the current project bug-fix workflow (.cursor/commands/fix-bug.md and linked workflow docs) adapted for the Sentry issue context and linked POST ticket only if not skipped by de-duplication. After a successful actual fix, push the fix branch, create/attempt the PR, move Jira to `Code Review`, cherry-pick the fix to latest `staging`, resolve conflicts automatically when clear, verify and push `staging`, then move Jira to `In Test`.\n\nResult List Goes React target: check https://check24-energie.sentry.io/issues/?project=4508879690792960&statsPeriod=24h. If the latest issue is not from the target result-list-goes-react project, report the latest issue key, message, and last-seen time, then stop the current chain. If the latest issue is from the target result-list-goes-react project, open its Sentry issue detail page, assign it to Thien Nguyen, collect the full visible non-secret context described above, apply the same-day de-duplication rule, search Jira project `PRE - Presales` for an existing open/non-closed matching ticket, reuse/link that ticket if found, otherwise create and assign a PRE Jira ticket to Thien Nguyen directly in Jira via https://c24-energie.atlassian.net/jira/software/c/projects/PRE/boards/132 if not skipped, link the PRE ticket back to the Sentry issue, move the Jira ticket to `In Progress`, then open /Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react in the native macOS Cursor app, inspect the project .cursor guidance, and run Cursor Agent automatically using the current project bug-fix workflow adapted for the Sentry issue context and linked PRE ticket only if not skipped by de-duplication. After a successful actual fix, push the fix branch, create/attempt the PR, move Jira to `Code Review`, cherry-pick the fix to latest `staging`, resolve conflicts automatically when clear, verify and push `staging`, then move Jira to `In Test`."
