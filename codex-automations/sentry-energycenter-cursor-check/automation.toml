prompt = "Every heartbeat is a scheduler tick for independent Sentry/Jira/Cursor workflows across three targets: EnergyCenter Reverse, Result List Goes React, and EnergyModule. Do not use one global lock, and do not pause new unrelated rounds just because an older workflow is blocked, waiting, dirty, or incomplete. At the start, build a lightweight view of active workflow locks from this thread and the target repos/worktrees: Jira ticket key, Sentry issue key, target repo, branch/worktree, phase, and whether a Cursor/repo verification/staging/Jira transition is actively running. A workflow lock only blocks work that would touch the same Jira ticket, Sentry issue, branch/worktree, active Cursor run, or exact unsafe shared operation. It must not block unrelated triage or a different issue.\n\nAllowed concurrency: multiple workflows may exist at the same time if they are isolated. Old blocked workflows are background locks only for their exact scope. It is OK to start a new triage/fix round while an older workflow is waiting on PR review, staging follow-up, Jira transition, dirty files, user-visible Cursor state, or other non-terminal work, provided the new round uses a different Jira ticket and Sentry issue. If a target repo has an old dirty or incomplete workflow but no active command is running, do not stop; create/use a separate isolated git worktree and visible Cursor window for the new workflow. Never overwrite, reset, checkout over, kill, or mutate another workflow's branch/worktree/files. Never start two Cursor fixes in the same branch/worktree. If primary repos are dirty/busy, use isolated worktrees for safe new workflows whenever possible instead of ignoring the tick.\n\nBefore doing any target-repo work for cleanup, triage, diagnosis, Cursor, verification, commit, PR, or staging, ensure the selected primary repo or isolated worktree starts from the latest release branch. For a primary repo with no conflicting workflow: check it out to `release`, fetch origin, and pull latest release with fast-forward-only semantics before touching files or asking Cursor to work. For an isolated workflow: create or refresh the worktree from `origin/release` after fetching, then open that worktree in visible macOS Cursor. If local changes or another workflow prevent switching/pulling release safely, do not mutate that tree; create/use an isolated worktree from latest `origin/release` instead. Never start a fix from a stale release branch. For staging cherry-pick flows, separately checkout/update `staging` from origin immediately before cherry-picking.\n\nWhen no conflicting exact-scope lock exists, start one new automation round. A round owns only its ticket/Sentry/worktree/branch scope until it reaches a terminal outcome: no actionable issue found after feed scan, non-actionable skips exhausted, blocker needing user attention, Cursor no-change result, verification failure, successful fix through PR/staging/Jira transitions, or merged-PR cleanup completion. When a round reaches terminal outcome, immediately start another safe non-conflicting round from the next target in cycle when tools/time permit; do not wait for the next scheduled heartbeat. Scheduled heartbeats should discover whether there is capacity for another safe workflow, including via separate worktrees.\n\nTarget order: use current_time_iso only for the first new round started by a scheduler tick. Compute the 5-minute slot and use slot modulo 3: 0 starts EnergyCenter Reverse, 1 starts Result List Goes React, 2 starts EnergyModule. Chained rounds rotate EnergyCenter Reverse -> Result List Goes React -> EnergyModule -> EnergyCenter Reverse. If slot cannot be determined, continue from the target after the last successful completed round, otherwise start EnergyCenter Reverse. If the selected target repo has a conflicting exact-scope active workflow, scan/start the next target in cycle or create an isolated worktree for a different issue in the selected target.\n\nAccess/config precedence: for all Jira, Bitbucket, Sentry, PR, and project workflow access, first inspect and use the target repo's own `.cursor` folder. Result List Goes React sources include `/Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react/.cursor/mcp.json`, `.cursor/scripts/.env`, `.cursor/scripts/jira/.env`, `.cursor/scripts/bb/.env`, Jira scripts/clients under `.cursor/scripts/jira/`, `.cursor/commands/`, `.cursor/skills/`, and `.cursor/rules/`. EnergyCenter Reverse sources include `/Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev/.cursor/cli/.env`, `.cursor/cli/scripts/.env`, `.cursor/cli/jira/JiraClient.ts`, `.cursor/cli/scripts/jira.ts`, `.cursor/commands/bitbucket-create-pr.md`, `.cursor/commands/pm-jira-bitbucket-cli.md`, and `.cursor/rules/`. EnergyModule sources include `/Users/thiennguyen/docker-localdev2/workdir/energymodule/.cursor/cursor.json`, `.cursor/cli/`, `.cursor/cli/jira/JiraClient.ts`, `.cursor/cli/scripts/jira.ts`, `.cursor/commands/bitbucket-create-pr.md`, `.cursor/commands/pm-jira-bitbucket-cli.md`, `.cursor/commands/fix-bug.md`, `.cursor/commands/git-cherry-pick-fix-to-staging.md`, `.cursor/skills/`, `.cursor/rules/`, `.cursorrules`, and the repository root `.env`. In isolated worktrees, reuse the repo's `.cursor` folder and project-local commands. Use global Codex MCP servers/wrappers only when project-local `.cursor` sources do not provide the needed access or command. Never display or copy secrets from `.cursor`, env files, MCP configs, cookies, tokens, passkeys, OTPs, or raw credential material.\n\nDo not ask the user for permission to run terminal commands for Jira, Bitbucket, or Sentry access. Do not run ad hoc Codex shell/API commands for Jira/Bitbucket/Sentry when they would need external network or credential access. Instead, delegate those operations to the project-local Cursor workflow/scripts by asking Cursor in the native macOS Cursor app to run the repo's documented `.cursor` command, skill, or script. Codex may inspect local non-secret docs/config, open Chrome for visible confirmation, create/check local git worktrees, and use local git/repo status commands, but credentialed Jira/Bitbucket/Sentry API work should be performed by Cursor/project scripts unless explicitly instructed otherwise.\n\nUse MCP/API/CLI first through the project-local Cursor workflow, then authenticated Google Chrome UI only when API/CLI is unavailable, incomplete, or visible confirmation is required. Cursor work must happen in the native macOS Cursor app/local Cursor context so branch, files, diffs, and workflow output are visible. Prefer normal visible macOS Cursor workflow if headless `cursor agent` has keychain/auth issues.\n\nAt the start of each safe round, run merged-PR cleanup for Jira tickets created or reused by this automation, including PRE-4176, PRE-4177, PRE-4179, PRE-4181, PRE-4184, POST-2506, POST-2507, POST-2508, and future PRE/POST tickets from this workflow. Ask Cursor/project-local scripts to find related PRs and linked Sentry issues. If a related PR is merged, ask Cursor/project-local Jira/Sentry workflow to close/complete the Jira ticket and resolve the linked Sentry issue. Only act on tickets clearly tied to Sentry issues handled here. Cleanup for one ticket must not block unrelated triage unless it mutates the same exact ticket/branch/worktree.\n\nFor the chosen target, scan unresolved Sentry issues in Last Seen order until one actionable unowned/unticketed issue is found or the listed/visible feed is exhausted. If the top row is not actionable, continue directly to the next row. Skip and briefly report rows that are already assigned/owned, already ticketed, have a matching open/non-closed Jira found by search, have already been fixed/PR'd/merged/resolved, are known no-fix/noise, are outside target project, or otherwise need no Cursor fix. Do not stop the feed scan for ordinary ownership/ticket de-duplication.\n\nBefore asking Cursor to diagnose/fix a candidate, open/fetch Sentry issue detail and inspect assignee plus Jira/issue-tracking state. If already assigned before this run or already ticketed, skip that row. Only if unassigned and unticketed, assign Sentry to Thien Nguyen using visible Sentry controls or project-local Cursor/Sentry tooling, collect non-secret context, ask Cursor/project-local Jira tooling to search for matching open/non-closed tickets, then create a Jira ticket only if none exists. Result List creates PRE tickets in PRE - Presales. EnergyCenter Reverse and EnergyModule create POST tickets in POST - Postsales. Ticket title must contain Sentry key and short error signature; description must include non-secret Sentry context and Sentry URL. Assign ticket to Thien Nguyen.\n\nAfter creating a ticket in this run, link it back to Sentry using project-local tooling/API via Cursor or visible controls. If visible Sentry/Jira linking remains stuck but the new Jira ticket exists, is assigned to Thien Nguyen, and contains Sentry URL/context, continue to Cursor and record `Sentry/Jira visible link pending`. Move the ticket to In Progress before Cursor starts, using Cursor/project-local Jira workflow rather than Codex ad hoc API calls.\n\nWhen Cursor starts, include full Sentry context, Jira key, Jira In Progress status, and Sentry-link status. Tell Cursor not to paste secrets and to use the Jira key for branch naming, docs, commit, and PR context. Use the repo's `.cursor/commands/fix-bug.md` and linked docs/rules. After a real fix, update required docs, run verification, commit with the Jira key using normal hooks, push the fix branch, and create/attempt PR using the repo's documented Cursor PR workflow such as `/bitbucket-create-pr`, `pm:bb-create-pr`, or `pnpm bb:create-pr`. Do not use `00000`, do not bypass hooks, do not commit on release, do not push release, and do not create release-to-release PRs.\n\nAfter PR attempt, move Jira to Code Review through Cursor/project-local Jira workflow. Then checkout latest staging, update from origin, cherry-pick fix commit(s), resolve clear conflicts, run required staging verification, push staging, and move Jira to In Test through Cursor/project-local Jira workflow. If Cursor finds no file changes, do not commit, push, PR, or cherry-pick; summarize no commit needed.\n\nStop only on blockers or completed outcomes scoped to that workflow: Sentry assignment failure for an otherwise actionable issue, Jira creation/assignment/status failure, Cursor no-change result after starting, Cursor/verification failure, PR/auth setup block, staging cherry-pick/conflict/verification/push failure, unsafe merged-PR cleanup, or a result requiring user attention. A blocker in one workflow must not stop safe unrelated workflows.\n\nEnergyCenter Reverse target: Sentry project 4511296882540544; expected keys ENRG-ENERGYCENTER-REV; Chrome fallback https://check24-energie.sentry.io/issues/?project=4511296882540544&statsPeriod=24h; primary repo `/Users/thiennguyen/docker-localdev2/workdir/enrg-energycenter-rev`; Bitbucket repo `check24/enrg-energycenter-rev`; if primary repo is dirty for another workflow, create/use an isolated worktree for a different issue.\n\nResult List Goes React target: Sentry project 4508879690792960; project result-list-goes-react / enrg-web-frontend; Chrome fallback https://check24-energie.sentry.io/issues/?project=4508879690792960&statsPeriod=24h; primary repo `/Users/thiennguyen/docker-localdev2/workdir/result-list-goes-react`; Bitbucket repo `check24/enrg-web-frontend`; if primary repo is dirty for another workflow, create/use an isolated worktree for a different issue.\n\nEnergyModule target: Sentry project 1837965 discovered from the repo DSN; expected issue keys should be discovered from Sentry/visible issue detail and are likely EnergyModule-specific, so do not skip solely because the prefix differs from ENRG-ENERGYMODULE. Chrome fallback https://check24-energie.sentry.io/issues/?project=1837965&statsPeriod=24h; primary repo `/Users/thiennguyen/docker-localdev2/workdir/energymodule`; Bitbucket repo `check24/enrg-energymodule`; Jira project POST - Postsales; local workflow uses `.cursor/commands/fix-bug.md`, `.cursor/commands/pm-jira-bitbucket-cli.md`, and `npm --prefix .cursor/tools run pm:*` via visible Cursor/project scripts; if primary repo is dirty for another workflow, create/use an isolated worktree for a different issue.\n\nAfter each workflow step/round/chain finishes, summarize active workflow locks, release checkout/pull or isolated worktree-from-origin-release result, Sentry assignment, skipped rows/reasons, de-duplication, Jira ticket/link/assignment, Sentry/Jira linking or pending status, Jira transitions, changed files/worktree path, docs updates, commit, push, PR link/result/merge state, staging cherry-pick/verification/push, Sentry resolve result, and Sentry issue-detail context used."
