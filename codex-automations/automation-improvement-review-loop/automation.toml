prompt = "\"\"Continue the Automation Improvement Review Loop and hourly automation audit for automation definitions mirrored in `/Users/thien.nguyen/thiennp.github.io/codex-automations/`.\n\nExecution model (deterministic queue, safe self-heal, skip-forward):\n- Build a deterministic work queue before doing write-capable work.\n- For explicit automation-change requests in this thread, queue exactly the requested automation id(s) in Thien's stated order. If the request does not define an order, sort automation ids lexicographically. If Thien explicitly asks for all automations, queue all mirrored automation ids sorted lexicographically.\n- For the hourly audit, scan all mirrored `/Users/thien.nguyen/thiennp.github.io/codex-automations/*/automation.toml` files sorted by automation id. The hourly audit is read-only discovery; audit findings do not become implicit change requests.\n- Process each queued automation independently. A blocker on one automation must not stop the whole run. Record evidence, mark only that target as skipped/blocked or failed, and continue to the next queued automation unless a true global hard stop prevents all local filesystem work.\n- \"Next automation\" means the next item in the explicit-request queue first; hourly audit candidates are only read-only observations unless Thien explicitly requested improvement for them.\n- End every run with a per-target outcome summary. Internal run outcomes are SUCCESS, PARTIAL, or BLOCKED. Because Agent Report does not support a `partial` status, report PARTIAL outcomes with `--status warning` and include `PARTIAL` in the title or message.\n\nAt the start of every heartbeat, ensure the Agent Report server is running with `AGENT_REPORT_SEND_STATUS=0 /Users/thien.nguyen/thiennp.github.io/agent-report/scripts/ensure-agent-report-server.sh`, then send a start report to `ws://localhost:3100/stream` using automationName `Automation improvement review loop`. Report major step completion, every individual automation/file/review item finished, blockers, skipped review-loop participants with concrete reasons, validation results, sync/audit status, commit/push result, and final state.\n\nReporting Contract (authoritative, non-optional):\n- Every Agent Report message must be attempted from `/Users/thien.nguyen/thiennp.github.io/agent-report` using this command shape: `AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --automation-name \"Automation improvement review loop\" --title \"<item or step title>\" --status <running|success|warning|blocked|error|pending|info> \"<concise update>\"`.\n- This is the same format as Thien's example `AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --automation-name \"Daily-vulnerabilities-fix\" --title \"Build check\" --status success \"Build finished successfully\"`; `Daily-vulnerabilities-fix` is the example automation-name value, not the reporting identity for this automation.\n- When reporting about a specific audited automation, keep `--automation-name \"Automation improvement review loop\"` and put the audited automation id/name in the title or message.\n- If older prompt text conflicts with this Reporting Contract, this Reporting Contract wins.\n- Retry failed sends up to 3 times with short backoff. Never claim success if the required report send failed; include send failure evidence in the run output/final state with an honest warning, error, or blocked status.\n- If the Agent Report path or command is unavailable, classify the blocker and attempt only safe self-heal. Safe self-heal may include starting an existing service, installing dependencies in an existing report directory, or retrying a transient command. It must not restore deleted tracked subtrees, acquire secrets, escalate authentication, run destructive git operations, or touch unrelated dirty changes.\n- If reporting remains unavailable after bounded attempts, switch to `REPORTING_DEGRADED`: continue queued audit/improvement work, record the exact command failures, and finish with internal outcome PARTIAL or BLOCKED, never SUCCESS.\n\nBlocker self-healing policy:\n- Classify each blocker before acting.\n- `SELF_HEALABLE_SAFE` means the fix is reversible, low-risk, within this automation's authority, requires no credentials or approvals, does not escalate privileges, and does not modify unrelated automation definitions or unrelated dirty worktree paths.\n- `NON_SELF_HEALABLE_OR_UNSAFE` means the fix would require credentials/MFA, approval, destructive git operations, broad repo restoration, ambiguous ownership, cross-automation edits, overwriting invalid TOML, or any action outside this automation's explicit authority.\n- For a `SELF_HEALABLE_SAFE` blocker, attempt at most 2 distinct fixes per blocker class per target, verify the blocked step after each attempt, and then continue if verification passes.\n- If verification fails after the bounded attempts, or if the blocker is `NON_SELF_HEALABLE_OR_UNSAFE`, record the blocker, attempted fixes, command evidence, and reason for not forcing a fix. Mark that target `SKIPPED_BLOCKED` and continue to the next queued automation.\n- Distinguish `SKIPPED_BLOCKED` from `FAILED`: use `SKIPPED_BLOCKED` when the automation intentionally skipped unsafe work; use `FAILED` when an unexpected error occurred in the improvement logic itself.\n\nEvery hourly heartbeat must check all mirrored automations in `thiennp.github.io`: scan every `/Users/thien.nguyen/thiennp.github.io/codex-automations/*/automation.toml`, parse each TOML, and compare each repo automation id with the matching `/Users/thien.nguyen/.codex/automations/<automation_id>/automation.toml` when present. Validate that `README.md` and `index.md` list the mirrored automations with correct id, name, kind/type, status, and file link metadata. Keep the scan deterministic by sorting automation ids before reporting. To control cost and noise, summarize unchanged byte-equal automations by count and only deep-diff invalid, missing, changed, or metadata-drifted definitions.\n\nOwnership and safety gates:\n- This automation is a read-only global auditor and thread-specific improver.\n- Routine two-way synchronization across all automations remains owned by `sync-codex-automations-to-thiennp-github-io`; do not take over routine global sync or overwrite unrelated automation definitions just because drift exists.\n- Codex owns saving and syncing only the automation definitions it changes during an explicit improvement-review request in this thread.\n- Audit drift, missing files, invalid TOML, metadata mismatches, or timestamp conflicts are not themselves permission to edit. If one side is missing, TOML is invalid, metadata differs, or both sides differ, report the affected automation id, evidence, likely resolution, and whether the dedicated sync automation should handle it.\n- If the dedicated sync automation appears to be running, the repo changes during the audit, or a lock/idempotency marker indicates sync work in progress, skip write-capable actions for affected targets and report the race risk.\n- Never overwrite with invalid TOML, never silently resolve conflicts, never force-restore missing tracked subtrees, never use destructive git commands, never modify unrelated automation definitions, and never commit/push unrelated working-tree changes.\n\nAn explicit automation-change request means a user message in this thread, since the last completed run, that clearly asks to create, improve, update, refactor, clarify, redesign, reschedule, enable, pause, delete, sync, or otherwise change a Codex automation. Do not treat the hourly audit itself, detected drift, stale docs, or an automation heartbeat as an implicit change request.\n\nWhen there is an explicit automation-change request in this thread, follow the `automation-improvement-review-loop` skill exactly for each requested automation in the deterministic queue: read the target automation, capture Thien's requirement exactly, obtain the Claude AI proposal, obtain Cursor Agent critique and update, obtain Claude AI's second critique and update, obtain Cursor Agent's final critique, synthesize the final automation, validate it, save it under `~/.codex/automations/<automation_id>/automation.toml`, sync that reviewed automation to `/Users/thien.nguyen/thiennp.github.io/codex-automations/`, update README/index metadata when needed, and commit/push only the safe `codex-automations` changes when the repo state allows.\n\nExternal reviewer resilience:\n- Reviewer timeout, authentication failure, unavailable CLI, or unusable output is a blocker for that participant step, not automatically a blocker for the whole target.\n- Classify and self-heal reviewer blockers when safe, such as retrying a transient CLI failure once within the bounded blocker budget.\n- If a reviewer remains unavailable, record the skipped participant and concrete reason. Continue the target if there is enough usable critique/proposal material for Codex to synthesize safely; otherwise mark that target `SKIPPED_BLOCKED` and continue to the next queued automation.\n- Do not let one failed target or one unavailable reviewer stall other requested automation targets.\n\nWrite/sync behavior after a successful per-target review:\n- Save to `~/.codex/automations/<automation_id>/automation.toml`.\n- Sync only that reviewed automation to `/Users/thien.nguyen/thiennp.github.io/codex-automations/`.\n- Update README/index metadata only for touched reviewed automations.\n- Commit/push only when scope is clean and safe: staged changes are limited to intended automation artifacts, no unrelated dirty paths are included, and no ownership or validation policy is violated. If the shared repo has unrelated dirty changes that make a safe commit ambiguous, skip commit/push and report why.\n\nIf there is no pending explicit automation-change request in this thread, do not modify automation content. Complete the all-automation audit, report scanned count, valid/invalid TOML count, local/repo drift count, docs metadata drift count, conflicts, race/lock status, skipped items, blocker summary, and whether the dedicated sync automation should be allowed to reconcile anything. Then state that the loop is active and waiting for the next automation-change request.\n\nAUTOMATION REPORT \u2014 AGENT LOGGING PROMPT\n\nDashboard: https://thiennp.github.io/report/\nStorage: localStorage in the browser that has https://thiennp.github.io/report/ open\n\nYou are an automation agent (Codex, Cursor, or similar). Log workflow steps from the report page. No GitHub token or server API is required.\n\nWHEN TO LOG\n- Run start, each step transition, blocker, success, and terminal state\n- After Jira, PR, or Sentry actions that change current work\n- Whenever status changes: running, success, warning, blocked, pending, error, info\n\nPREFERRED \u2014 LOG WORK STATUS INPUT AT PAGE BOTTOM\n1. Open https://thiennp.github.io/report/ in the browser.\n2. Scroll to the bottom \"Log work status\" field (always visible).\n3. Paste JSON into the input.\n4. Click Submit or press Enter.\n\nSend either a work-status object:\n{\"status\":\"running\",\"step\":\"2.1\",\"phase\":\"cursor\",\"title\":\"Fix bug\",\"message\":\"Applying patch\",\"pre\":\"PRE-4401\",\"automationId\":\"my-automation-id\",\"runId\":\"20260608T120000Z\",\"agentName\":\"Codex\",\"nextStep\":\"2.2\"}\n\nOr a full dashboard snapshot:\n{\"workStatus\":{\"status\":\"running\",\"title\":\"Fix bug\",\"message\":\"Applying patch\",\"updatedAt\":\"2026-06-08T12:00:00.000Z\",\"source\":\"automation-report\"},\"automations\":[{\"automationId\":\"my-automation-id\",\"latestRunId\":\"20260608T120000Z\",\"latestStatus\":\"running\",\"latestUpdateTime\":\"2026-06-08T12:00:00.000Z\",\"activeBlockerCount\":0}],\"recentEvents\":[{\"id\":\"evt-1\",\"title\":\"Fix bug\",\"status\":\"running\",\"message\":\"Applying patch\",\"stepNumber\":\"2.1\",\"agentName\":\"Codex\",\"createdAt\":\"2026-06-08T12:00:00.000Z\",\"automationId\":\"my-automation-id\",\"runId\":\"20260608T120000Z\"}],\"report\":{\"title\":\"Check24 Sentry Issues\",\"message\":\"Waiting for the first Sentry refresh.\",\"status\":\"pending\",\"updatedAt\":\"2026-06-08T12:00:00.000Z\",\"issueCount\":0,\"issues\":[]}}\n\nIf you control the browser, type or paste the JSON into that bottom field directly.\n\nALTERNATIVE \u2014 BROWSER HOOK\nWith https://thiennp.github.io/report/ open:\nwindow.__AUTOMATION_REPORT__.pushDashboard({ /* same snapshot object as above */ });\n\nSYNC RULES\n- Data is stored only in this browser profile's localStorage.\n- \"Clear report\" wipes localStorage for this browser only.\n- Activity history is capped at 200 events.\n\nRULES\n- Use real status values; mark blockers as blocked with an actionable message.\n- Include PRE-#### when tied to Jira.\n- Prefer the bottom JSON input when browser automation is available.\"\""
