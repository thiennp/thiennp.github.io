prompt = "Continue the Automation Improvement Review Loop and hourly automation audit for automation definitions mirrored in `/Users/thien.nguyen/thiennp.github.io/codex-automations/`.\n\nExecution model (deterministic queue, safe self-heal, skip-forward):\n- Build a deterministic work queue before doing write-capable work.\n- For explicit automation-change requests in this thread, queue exactly the requested automation id(s) in Thien's stated order. If the request does not define an order, sort automation ids lexicographically. If Thien explicitly asks for all automations, queue all mirrored automation ids sorted lexicographically.\n- For the hourly audit, scan all mirrored `/Users/thien.nguyen/thiennp.github.io/codex-automations/*/automation.toml` files sorted by automation id. The hourly audit is read-only discovery; audit findings do not become implicit change requests.\n- Process each queued automation independently. A blocker on one automation must not stop the whole run. Record evidence, mark only that target as skipped/blocked or failed, and continue to the next queued automation unless a true global hard stop prevents all local filesystem work.\n- \"Next automation\" means the next item in the explicit-request queue first; hourly audit candidates are only read-only observations unless Thien explicitly requested improvement for them.\n- End every run with a per-target outcome summary. Internal run outcomes are SUCCESS, PARTIAL, or BLOCKED. Use the global reporting rules for status updates; when a run is partial, report it honestly as `warning` and include `PARTIAL` in the title or message.\n\nGlobal shared rules:\n- Follow `/Users/thien.nguyen/.codex/AGENTS.md` for automation reporting and shared Jira duplicate-check/fingerprint rules. Do not duplicate those shared rules inside this automation prompt.\n\nBlocker self-healing policy:\n- Classify each blocker before acting.\n- `SELF_HEALABLE_SAFE` means the fix is reversible, low-risk, within this automation's authority, requires no credentials or approvals, does not escalate privileges, and does not modify unrelated automation definitions or unrelated dirty worktree paths.\n- `NON_SELF_HEALABLE_OR_UNSAFE` means the fix would require credentials/MFA, approval, destructive git operations, broad repo restoration, ambiguous ownership, cross-automation edits, overwriting invalid TOML, or any action outside this automation's explicit authority.\n- For a `SELF_HEALABLE_SAFE` blocker, attempt at most 2 distinct fixes per blocker class per target, verify the blocked step after each attempt, and then continue if verification passes.\n- If verification fails after the bounded attempts, or if the blocker is `NON_SELF_HEALABLE_OR_UNSAFE`, record the blocker, attempted fixes, command evidence, and reason for not forcing a fix. Mark that target `SKIPPED_BLOCKED` and continue to the next queued automation.\n- Distinguish `SKIPPED_BLOCKED` from `FAILED`: use `SKIPPED_BLOCKED` when the automation intentionally skipped unsafe work; use `FAILED` when an unexpected error occurred in the improvement logic itself.\n\nEvery hourly heartbeat must check all mirrored automations in `thiennp.github.io`: scan every `/Users/thien.nguyen/thiennp.github.io/codex-automations/*/automation.toml`, parse each TOML, and compare each repo automation id with the matching `/Users/thien.nguyen/.codex/automations/<automation_id>/automation.toml` when present. Validate that `README.md` and `index.md` list the mirrored automations with correct id, name, kind/type, status, and file link metadata. Keep the scan deterministic by sorting automation ids before reporting. To control cost and noise, summarize unchanged byte-equal automations by count and only deep-diff invalid, missing, changed, or metadata-drifted definitions.\n\nOwnership and safety gates:\n- This automation is a read-only global auditor and thread-specific improver.\n- Routine two-way synchronization across all automations remains owned by `sync-codex-automations-to-thiennp-github-io`; do not take over routine global sync or overwrite unrelated automation definitions just because drift exists.\n- Codex owns saving and syncing only the automation definitions it changes during an explicit improvement-review request in this thread.\n- Audit drift, missing files, invalid TOML, metadata mismatches, or timestamp conflicts are not themselves permission to edit. If one side is missing, TOML is invalid, metadata differs, or both sides differ, report the affected automation id, evidence, likely resolution, and whether the dedicated sync automation should handle it.\n- If the dedicated sync automation appears to be running, the repo changes during the audit, or a lock/idempotency marker indicates sync work in progress, skip write-capable actions for affected targets and report the race risk.\n- Never overwrite with invalid TOML, never silently resolve conflicts, never force-restore missing tracked subtrees, never use destructive git commands, never modify unrelated automation definitions, and never commit/push unrelated working-tree changes.\n\nAn explicit automation-change request means a user message in this thread, since the last completed run, that clearly asks to create, improve, update, refactor, clarify, redesign, reschedule, enable, pause, delete, sync, or otherwise change a Codex automation. Do not treat the hourly audit itself, detected drift, stale docs, or an automation heartbeat as an implicit change request.\n\nWhen there is an explicit automation-change request in this thread, follow the `automation-improvement-review-loop` skill exactly for each requested automation in the deterministic queue: read the target automation, capture Thien's requirement exactly, obtain the Claude AI proposal, obtain Cursor Agent critique and update, obtain Claude AI's second critique and update, obtain Cursor Agent's final critique, synthesize the final automation, validate it, save it under `~/.codex/automations/<automation_id>/automation.toml`, sync that reviewed automation to `/Users/thien.nguyen/thiennp.github.io/codex-automations/`, update README/index metadata when needed, and commit/push only the safe `codex-automations` changes when the repo state allows.\n\nExternal reviewer resilience:\n- Reviewer timeout, authentication failure, unavailable CLI, or unusable output is a blocker for that participant step, not automatically a blocker for the whole target.\n- Classify and self-heal reviewer blockers when safe, such as retrying a transient CLI failure once within the bounded blocker budget.\n- If a reviewer remains unavailable, record the skipped participant and concrete reason. Continue the target if there is enough usable critique/proposal material for Codex to synthesize safely; otherwise mark that target `SKIPPED_BLOCKED` and continue to the next queued automation.\n- Do not let one failed target or one unavailable reviewer stall other requested automation targets.\n\nWrite/sync behavior after a successful per-target review:\n- Save to `~/.codex/automations/<automation_id>/automation.toml`.\n- Sync only that reviewed automation to `/Users/thien.nguyen/thiennp.github.io/codex-automations/`.\n- Update README/index metadata only for touched reviewed automations.\n- Commit/push only when scope is clean and safe: staged changes are limited to intended automation artifacts, no unrelated dirty paths are included, and no ownership or validation policy is violated. If the shared repo has unrelated dirty changes that make a safe commit ambiguous, skip commit/push and report why.\n\nIf there is no pending explicit automation-change request in this thread, do not modify automation content. Complete the all-automation audit, report scanned count, valid/invalid TOML count, local/repo drift count, docs metadata drift count, conflicts, race/lock status, skipped items, blocker summary, and whether the dedicated sync automation should be allowed to reconcile anything. Then state that the loop is active and waiting for the next automation-change request."
