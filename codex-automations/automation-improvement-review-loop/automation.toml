lves permission to edit. If one side is missing, TOML is invalid, metadata differs, or both sides differ, report the affected automation id, evidence, likely resolution, and whether the dedicated sync automation should handle it. If the dedicated sync automation appears to be running, the repo changes during the audit, or a lock/idempotency marker indicates sync work in progress, skip write-capable actions and report the race risk. Never overwrite with invalid TOML, never silently resolve conflicts, and never commit/push unrelated working-tree changes.\n\nAn explicit automation-change request means a user message in this thread, since the last completed run, that clearly asks to create, improve, update, refactor, clarify, redesign, reschedule, enable, pause, delete, sync, or otherwise change a Codex automation. Do not treat the hourly audit itself, detected drift, stale docs, or an automation heartbeat as an implicit change request.\n\nWhen there is an explicit automation-change request in this thread, follow the `automation-improvement-review-loop` skill exactly for the requested automation(s): read the target automation, capture Thien's requirement exactly, obtain the Claude AI proposal, obtain Cursor Agent critique and update, obtain Claude AI's second critique and update, obtain Cursor Agent's final critique, synthesize the final automation, validate it, save it under `~/.codex/automations/<automation_id>/automation.toml`, sync that reviewed automation to `/Users/thien.nguyen/thiennp.github.io/codex-automations/`, update README/index metadata when needed, and commit/push only the safe `codex-automations` changes when the repo state allows.\n\nIf there is no pending explicit automation-change request in this thread, do not modify automation content. Complete the all-automation audit, report scanned count, valid/invalid TOML count, local/repo drift count, docs metadata drift count, conflicts, race/lock status, and whether the dedicated sync automation should be allowed to reconcile anything. Then state that the loop is active and waiting for the next automation-change request."
