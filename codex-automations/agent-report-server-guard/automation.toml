prompt = "Check whether the Agent Report server is running on http://localhost:3100/.\n\nRun this exact command from the local machine in `/Users/thien.nguyen/thiennp.github.io/agent-report`:\n`AGENT_REPORT_SEND_STATUS=changes /Users/thien.nguyen/thiennp.github.io/agent-report/scripts/ensure-agent-report-server.sh`\n\nFlow and ownership:\n- Codex owns this automation run: read the automation memory first, run the guard command, inspect only the evidence needed to classify the result, update memory, and return a concise status.\n- The guard script owns health checking, starting the server, and sending Agent Report messages. Do not send a duplicate Agent Report message from Codex.\n- Agent Report should receive a message only when the guard starts the server or hits a blocker. A healthy already-running server should stay quiet.\n- Slack is for human escalation only when the blocker is new or materially changed from the last memory entry. Do not spam Slack for the same repeated blocker; if Slack sending is unavailable, include a short escalation draft in the final result instead.\n- Chrome is only for visual/manual verification when command and log evidence are inconclusive.\n- Claude AI is only for explicit review/evaluation requests, not for the normal guard loop.\n- Cursor AI is only for larger code changes or refactors, not for routine health checks.\n\nClassification:\n- If the command exits 0 and the fresh autostart log entry says the server was already running, report `already healthy`.\n- If the command exits 0 and the fresh autostart log entry says the server started, report `started`.\n- If the command exits nonzero, report `blocked`; inspect `/Users/thien.nguyen/thiennp.github.io/agent-report/logs/autostart.log`, and when useful check port 3100/listener and `http://localhost:3100/` to identify the blocker.\n\nFinal report:\nKeep the result concise. Include whether the server was `already healthy`, `started`, or `blocked`, and include `/Users/thien.nguyen/thiennp.github.io/agent-report/logs/autostart.log` when useful.\n\nAUTOMATION REPORT — AGENT LOGGING PROMPT\n\nPublic dashboard: https://thiennp.github.io/report/\nPublished snapshot: https://thiennp.github.io/report/dashboard.json\n\nYou are an automation agent (Codex, Cursor, or similar). Log every meaningful workflow step so this dashboard shows what you are doing. Humans read https://thiennp.github.io/report/; you write through the local Automation Report API, then publish when the public snapshot should change.\n\nThis Automation Report contract supersedes older Agent Report, agent-report, localhost:3100, and ws://localhost:3100/stream reporting instructions when they conflict. Keep existing domain workflow requirements unchanged.\n\nWHEN TO LOG\n- At run start, each step transition, blocker, success, and terminal state.\n- After Jira/PR/Sentry actions that change current work.\n- When status changes: running, success, warning, blocked, pending.\n\nBEFORE WRITING\n1. Ensure the local server is up:\n   cd automation-report && ./scripts/ensure-automation-report-server.sh\n2. Local write endpoints (not exposed on GitHub Pages):\n   - HTTP work status: http://127.0.0.1:3120/api/work-status\n   - WebSocket ingest: ws://127.0.0.1:3120/ws\n   - Dashboard read/clear: http://127.0.0.1:3120/api/dashboard\n\nPREFERRED — LOG CURRENT WORK (run each step)\nnode bin/send-work-status.mjs \\\n  --status running \\\n  --step \"2.1\" \\\n  --phase cursor \\\n  --title \"Short headline of current work\" \\\n  --pre PRE-4401 \\\n  --automationId \"my-automation-id\" \\\n  --runId \"20260608T120000Z\" \\\n  --agentName \"Codex\" \\\n  --nextStep \"2.2\" \\\n  \"One-line message describing what you are doing right now.\"\n\nALTERNATIVE — WEBSOCKET MESSAGE\nSend to ws://127.0.0.1:3120/ws after connect:\n{\n  \"type\": \"work-status.update\",\n  \"payload\": {\n    \"status\": \"running\",\n    \"step\": \"2.1\",\n    \"phase\": \"cursor\",\n    \"title\": \"Short headline of current work\",\n    \"message\": \"One-line message describing what you are doing right now.\",\n    \"pre\": \"PRE-4401\",\n    \"automationId\": \"my-automation-id\",\n    \"runId\": \"20260608T120000Z\",\n    \"agentName\": \"Codex\",\n    \"nextStep\": \"2.2\"\n  }\n}\n\nOPTIONAL — APPEND ACTIVITY EVENT\ncurl -fsS -X POST http://127.0.0.1:3120/api/automations/{automationId}/runs/{runId}/events \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"stepNumber\": \"2.1\",\n    \"title\": \"Step title\",\n    \"status\": \"running\",\n    \"message\": \"What happened in this step.\",\n    \"nextStep\": \"2.2\",\n    \"agentName\": \"Codex\"\n  }'\n\nPUBLISH TO https://thiennp.github.io/report/\nAfter material updates, sync the public snapshot:\ncd automation-report && npm run deploy:pages\ngit add report/ && git commit -m \"Sync automation report snapshot\" && git push origin master\n\nCLEAR DASHBOARD\nDELETE http://127.0.0.1:3120/api/dashboard\nThen redeploy if the public snapshot should reset.\n\nRULES\n- Use real status values; mark blockers as blocked with an actionable message.\n- Include PRE-#### when tied to Jira.\n- Activity history is capped at 200 events; older entries are trimmed automatically.\n- Do not treat https://thiennp.github.io/report/ as a write target; GitHub Pages is read-only except via deploy:pages."
