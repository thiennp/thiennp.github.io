prompt = "Sync Codex automations two ways between `/Users/thien.nguyen/.codex/automations/` and `/Users/thien.nguyen/thiennp.github.io/codex-automations/` so they stay portable across devices. For each automation id present on either side, compare `automation.toml` on both sides. If only one side exists, copy it to the missing side instead of treating that as a deletion. If both sides exist and differ, inspect fields such as `updated_at` and sync the newer definition to the older side; if timestamps or intent are unclear, prefer the later `updated_at`, report the conflict resolution explicitly, and do not drop fields silently. After syncing files, update `codex-automations/README.md` and `codex-automations/index.md` if automation ids, names, types, or statuses changed, then commit and push the `thiennp.github.io` repo if repo files changed. Do not copy secrets, browser cookies, tokens, passwords, OTPs, passkey secrets, or raw credential material. Summarize which automations were synced local-to-repo, which were synced repo-to-local, which conflicts were resolved, and the commit/push result.\n\nAgent Report requirement (updated 2026-06-02):\n- At the very start of every run or heartbeat, ensure the Agent Report server is running by executing: AGENT_REPORT_SEND_STATUS=0 /Users/thien.nguyen/thiennp.github.io/agent-report/scripts/ensure-agent-report-server.sh\n- Immediately after the ensure step, send a start message to the Agent Report page at http://localhost:3100/ so Thien can see that this automation has started.\n- Always report major step completion, every individual item finished, pause/blocker, and final state to ws://localhost:3100/stream with automationName, title, status, and text. Keep source as terminal; do not put the automation name in source.\n- Item-finished reports are mandatory: whenever an automation sync, conflict resolution, doc update, commit/push step, or other discrete work item completes, immediately send a report before moving to the next item. Do not wait for the final summary.\n- Each item-finished report must include the item name/key, status, key evidence/output, whether the automation continues or stops, and the next item or next step.\n- Preferred command: cd /Users/thien.nguyen/thiennp.github.io/agent-report && AGENT_REPORT_WS=ws://localhost:3100/stream npm run send -- --automation-name \"Sync Codex automations to thiennp.github.io\" --title \"<item or step title>\" --status <running|success|warning|error|blocked|pending|info> \"<concise update>\"\n- Use honest statuses: running for in progress, success for completed work, warning for partial/non-blocking issues, error or blocked for stopped work, pending for waiting, info for neutral updates.\n- If the report server or send command fails, mention that in the final output and continue only when the current task can safely run without the report page.\n\nAUTOMATION REPORT — AGENT LOGGING PROMPT\n\nPublic dashboard: https://thiennp.github.io/report/\nPublished snapshot: https://thiennp.github.io/report/dashboard.json\n\nYou are an automation agent (Codex, Cursor, or similar). Log every meaningful workflow step so this dashboard shows what you are doing. Humans read https://thiennp.github.io/report/; you write through the local Automation Report API, then publish when the public snapshot should change.\n\nThis Automation Report contract supersedes older Agent Report, agent-report, localhost:3100, and ws://localhost:3100/stream reporting instructions when they conflict. Keep existing domain workflow requirements unchanged.\n\nWHEN TO LOG\n- At run start, each step transition, blocker, success, and terminal state.\n- After Jira/PR/Sentry actions that change current work.\n- When status changes: running, success, warning, blocked, pending.\n\nBEFORE WRITING\n1. Ensure the local server is up:\n   cd automation-report && ./scripts/ensure-automation-report-server.sh\n2. Local write endpoints (not exposed on GitHub Pages):\n   - HTTP work status: http://127.0.0.1:3120/api/work-status\n   - WebSocket ingest: ws://127.0.0.1:3120/ws\n   - Dashboard read/clear: http://127.0.0.1:3120/api/dashboard\n\nPREFERRED — LOG CURRENT WORK (run each step)\nnode bin/send-work-status.mjs \\\n  --status running \\\n  --step \"2.1\" \\\n  --phase cursor \\\n  --title \"Short headline of current work\" \\\n  --pre PRE-4401 \\\n  --automationId \"my-automation-id\" \\\n  --runId \"20260608T120000Z\" \\\n  --agentName \"Codex\" \\\n  --nextStep \"2.2\" \\\n  \"One-line message describing what you are doing right now.\"\n\nALTERNATIVE — WEBSOCKET MESSAGE\nSend to ws://127.0.0.1:3120/ws after connect:\n{\n  \"type\": \"work-status.update\",\n  \"payload\": {\n    \"status\": \"running\",\n    \"step\": \"2.1\",\n    \"phase\": \"cursor\",\n    \"title\": \"Short headline of current work\",\n    \"message\": \"One-line message describing what you are doing right now.\",\n    \"pre\": \"PRE-4401\",\n    \"automationId\": \"my-automation-id\",\n    \"runId\": \"20260608T120000Z\",\n    \"agentName\": \"Codex\",\n    \"nextStep\": \"2.2\"\n  }\n}\n\nOPTIONAL — APPEND ACTIVITY EVENT\ncurl -fsS -X POST http://127.0.0.1:3120/api/automations/{automationId}/runs/{runId}/events \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"stepNumber\": \"2.1\",\n    \"title\": \"Step title\",\n    \"status\": \"running\",\n    \"message\": \"What happened in this step.\",\n    \"nextStep\": \"2.2\",\n    \"agentName\": \"Codex\"\n  }'\n\nPUBLISH TO https://thiennp.github.io/report/\nAfter material updates, sync the public snapshot:\ncd automation-report && npm run deploy:pages\ngit add report/ && git commit -m \"Sync automation report snapshot\" && git push origin master\n\nCLEAR DASHBOARD\nDELETE http://127.0.0.1:3120/api/dashboard\nThen redeploy if the public snapshot should reset.\n\nRULES\n- Use real status values; mark blockers as blocked with an actionable message.\n- Include PRE-#### when tied to Jira.\n- Activity history is capped at 200 events; older entries are trimmed automatically.\n- Do not treat https://thiennp.github.io/report/ as a write target; GitHub Pages is read-only except via deploy:pages."
