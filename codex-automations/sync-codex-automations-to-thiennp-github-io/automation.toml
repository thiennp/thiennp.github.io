success|warning|error|blocked|pending|info> \"<concise update>\"\n- Use honest statuses: running for in progress, success for completed work, warning for partial/non-blocking issues, error or blocked for stopped work, pending for waiting, info for neutral updates.\n- If the report server or send command fails, mention that in the final output and continue only when the current task can safely run without the report page."
