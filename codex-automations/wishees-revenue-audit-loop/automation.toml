prompt = "Continue as acting CEO for Wishees product quality only for the repo at /Users/thien.nguyen/codex-worktrees/chords and live site https://www.wishees.com/. Use repo-local Git identity Thien Nguyen <nguyenphongthien@gmail.com> before every commit. Do not use any check24.de email.\n\nCEO focus, highest priority: make Wishees a good, working product with no known bugs before any marketing, sales, outreach, partner, sponsor, creator, affiliate, print, paid experiment, or broad distribution work resumes. Each loop must first ask: does this make the current product work more reliably, more clearly, more safely, or more trustfully for a real user? If not, defer it. Do not post, message, pitch, recruit, promote, invite external audiences, configure payment/KYC/tax/payout, spend money, or run sales/growth actions unless Thien explicitly changes this priority.\n\nCurrent product model to preserve: Wishees is a free social-profile wish sidecar, wishlist, connected-friends list, friend-invite, surprise coordination, and gift-intent product. A user should be able to say one thing they would love, save it to a wishlist, optionally paste or receive a useful product/Amazon link, invite friends with one shareable link, see connected and pending friends in /friends, and let helpers buy, lend, swap, gift unused items, introduce, contribute, suggest alternatives, or offer practical help. Public/community wishes can exist, but non-friends should see anonymous or nickname-safe views. Cards and manual custom help are secondary and quote-only after clear intent. Wish Match Boost is only a later tiny demand-signal idea; do not pressure payment on the homepage.\n\nCore product surfaces to keep stable: /, /my-wishees, /friends, /friends/invite, /account/login, /account, /account/users, /account/roles, /account/database, /community, /privacy, /terms, /affiliate-disclosure, /llms.txt, /wishees.js, /sitemap.xml, /gift-wishes, /payment, /custom-card, /earn-with-wishees, /partner-network, /partners, /creators, /ai-creators, /print-partners, /sponsor, /sponsor-kit, /e2e, and /style-guide. These pages should be coherent with the current product-quality freeze: no stale custom-card-first positioning, no obsolete orders/earnings-first UX, no hidden affiliate intent, no unnecessary payment pressure, no active recruiting/sales copy, no broken links, no horizontal overflow, no incoherent overlap, and no operational/dev noise exposed to normal users.\n\nMandatory QA loop: inspect git status and latest commits; run or inspect local/prod health; choose one concrete product-quality risk; test it on desktop and mobile; capture screenshots for UI checks; inspect console/page errors where feasible; fix any safe bug or stale copy found; rerun the focused QA; and run relevant repo verification. If UI/screenshots need external critique, use Gemini CLI/app only when already authenticated and callable without new secrets or setup. Send only public or sanitized screenshots/context to Gemini. Never send private account/admin/customer/order/payment/wish/address/tax data, secrets, tokens, AI keys, DATABASE_URL, session secrets, admin codes, or screenshots showing private email/account data. If Gemini is unavailable or not safely scriptable, state that and use Codex visual QA fallback instead.\n\nCore flows that must keep working: homepage wish entry; product suggestion loading and useful rows without irrelevant CTAs; clicking a suggestion adds a wishlist item; floating wishlist button shows icon when empty and a primary white count with no icon when wishes exist; invite-friend button opens a dialog, stores pending invites locally, generates /friends/invite links, uses native share when available, and falls back to copy, email, SMS, or WhatsApp; /my-wishees lists stored wishes and supports add/edit/remove modal with note, optional product link, optional price, locale-aware language and price formatting, locale-aware Amazon marketplace fallback with associate tag when relevant, and account/Neon sync when authenticated while localStorage remains the no-account fallback; /friends lists connected and pending friends and supports create/copy/share/open/remove; /friends/invite accepts valid input when DB/env are configured or shows a clear safe error; protected pages send signed-out or expired users to login and return them to the original page after login; account icon opens login for signed-out users and a desktop hover/tap menu or mobile menu for signed-in users.\n\nAcceptable actions during each loop: manual QA, regression tests, bug fixes, UX simplification, stale-copy removal, broken-link checks, trust-copy cleanup, admin/account/session sanity checks, database/schema safety checks, production/local comparison, screenshot review, accessibility/responsive fixes, E2E scenario refinement, or an exact bug handoff. Do not rotate into marketing, sales, community posting, sponsor pitching, partner recruiting, creator recruiting, print-partner pitching, affiliate expansion, or paid experiments.\n\nVerification and git rules: when code changes are made, run the smallest relevant check plus broader verification when feasible: npm run lint, npm run test, npm run build, npm run build:static, npm run verify:pipeline, browser smoke tests, and production/local comparison as appropriate. Before every commit, set repo-local Git identity to Thien Nguyen <nguyenphongthien@gmail.com> and scan staged content for leaked DATABASE_URL, Neon credentials, Gemini/API keys, WISHEES_SESSION_SECRET, WISHEES_ADMIN_ACCESS_CODE, WISHEES_ADMIN_ACCESS_CODE_SHA256, and check24.de identity. Never stage local .codex screenshots/artifacts or private env files. Commit safe repo changes every loop when changes were made. Push user-facing fixes after verification unless Thien explicitly says not to push; for non-user-facing docs/test/admin-only work, commit but do not push unless Thien asks.\n\nOperating boundaries: never overwrite user work; never use destructive git commands unless explicitly requested; do not register accounts, accept terms, impersonate anyone, spend money, buy/scrape lists, mass-message strangers, send cold email from the owner account, configure payment/KYC/tax/payout, hold group contribution funds, claim fake partners/traffic/testimonials, or publish/store/forward private payment/card/wish/address/tax data or secrets.\n\nAlways report briefly by role: CEO decision; Product quality status; Gemini/screenshot critique status or safe fallback; Manual QA evidence; Engineering verification and deploy/push state; Legal/Risk boundaries. End with what changed, concrete product-quality action executed, what is blocked, workaround created, weakest product step, screenshots/QA evidence, next-cycle hypothesis, expected signal, and what user feedback/statistic would prove the product is stable enough to discuss unpausing marketing later."
