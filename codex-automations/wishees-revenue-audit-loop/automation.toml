prompt = "Continue the Wishees production revenue loop for the repo at /Users/thien.nguyen/codex-worktrees/chords and the live site https://www.wishees.com/. Use repo-local Git identity Thien Nguyen <nguyenphongthien@gmail.com> for every commit and ensure git config user.name and git config user.email are set before committing. Do not use any check24.de email. On every run, send a concise status report in this thread; do not silently skip reporting.\n\nCore business cycle: every 15-minute run must complete one closed learning loop: 1) collect statistics and feedback, 2) interpret what changed since the last cycle, 3) choose the smallest useful stakeholder actions, 4) execute only safe/no-cost actions that Codex can do, 5) clearly assign actions that require humans, partners, creators, sponsors, print shops, AI agents, or owner approval, 6) record the hypothesis and expected signal for the next run, and 7) wait for the next cycle to compare feedback and stats before escalating. Do not treat audit output as the end of the job; convert observations into next actions and next-cycle measurements.\n\nOperating rules: inspect git status, latest local main/origin/main commits, and uncommitted changes before editing; never overwrite user work. Commit and push every safe repo change to main. If a change needs owner judgment, credentials, legal approval, real partner approval, payout setup, analytics secrets, private inbox/payment data, or paid spend, do not guess; report the exact decision/action needed. Any investment, paid tool, ad spend, domain/app cost, or outsourced work must come only from verified Wishees earnings and be approved by the owner.\n\nLive health audit: check production routes /, /custom-card, /sponsor, /payment, /partners, /creators, /print-partners, /community, /feedback, /affiliate-disclosure, /privacy, /earning-report, /llms.txt, /wishees.js, and /sitemap.xml for HTTP status, expected content, and stale deploy signals. Compare live production with pushed main by confirming new pages and sitemap entries are live. If live is stale and Vercel CLI is already authenticated and safely linked to the existing Wishees Vercel project, deploy production from the repo. Do not create or link a new Vercel project non-interactively; report the blocker instead.\n\nBrowser/E2E audit: when the in-app browser or a local browser runner is available, test the homepage for console errors, open the ecard wizard, create a sample ecard, verify the generated card URL loads on production, test referral carry-through with ?ref=maya-bdays, creator carry-through with creative=soft-letter-pack, print carry-through with print=paperly-local, custom-card inquiry CTAs, sponsor inquiry CTAs, feedback mailto flows, payment PayPal link attribution, print-ready PayPal attribution, public /wishees.js loading, and key navigation across every public page. If a page feature is broken, fix it if safe, then verify with npm run lint, npm run test, npm run build, npm run build:static, and a browser smoke check.\n\nStatistics and feedback intake: check /earning-report and any public, repo-visible, or already-authenticated stats available without secrets. Look for evidence of traffic, generated cards, shared card links, feedback emails, custom-card inquiries, creator/partner/print-partner leads, sponsor leads, PayPal payments, refunds, and payout obligations. If Outlook, PayPal, Vercel Analytics, GitHub, Slack, or other connected tools are available and already authorized in the environment, use read-only checks where appropriate; never require secrets or collect sensitive recipient/card content unnecessarily. If no analytics provider or payment export is connected, say so and recommend the smallest free measurable next step, such as privacy-safe event logging, checking Vercel analytics if enabled, or recording public funnel events without collecting sensitive data.\n\nBusiness interpretation: turn statistics and feedback into a simple funnel diagnosis: awareness, card creation, card sharing, feedback, inquiry, payment, partner/creator/print lead, sponsor lead, payout owed, and reinvestment. State which step is currently weakest, what evidence supports that, and whether the previous cycle's action improved, worsened, or did not yet affect the signal.\n\nStakeholder actions: produce an action queue grouped by stakeholder. Owner/Thien: decisions, approvals, payment setup, legal/disclosure choices, payout approvals, and paid-spend approvals. Codex/dev: safe code, copy, route, test, deploy, analytics, and documentation improvements. Customers/senders/recipients: feedback prompts, clearer CTAs, card-sharing nudges, and trust improvements. Partners/affiliates/AI agents: clearer referral instructions, disclosure copy, sample links, and no-spam outreach drafts. Creators: card/content pack prompts, creative account instructions, attribution codes, and submission templates. Print partners: approval workflow, print-ready file offer, quote request drafts, and no fake partnership claims. Sponsors/brands: sponsor CTA, proof needed, package clarity, and reply drafts. Communities: free, respectful announcement drafts and places to learn from replies. Execute only Codex/dev actions that are safe; for others, prepare handoff drafts and wait for stakeholder response.\n\nRevenue and attribution audit: review custom-card CTA, sponsor CTA, partner program CTA, creative account CTA, print partner CTA, AI/agent affiliate CTA, community outreach CTA, feedback flows, disclosure clarity, referral attribution, creator attribution, print attribution, and PayPal custom metadata. Confirm that creators, affiliates, AI agents, and print partners can understand how they share revenue only when Wishees earns money. Do not imply fake partnerships or guaranteed income.\n\nSales and marketing plan tracking: use May 25, 2026 as the plan start date unless a newer plan file says otherwise. Track dated milestones: first live audit pass, first community announcement draft, first real feedback/inquiry, first creator application, first affiliate/AI-agent referral, first print partner lead, first paid custom card, first sponsor payment, first verified PayPal payment, first payout owed, and first reinvestment decision funded by earnings. State whether Wishees is behind, on track, or ahead and why. When behind, propose and, where safe, execute the smallest no-cost action for the next 15-minute cycle.\n\nCommunity and AI distribution: check whether people-facing community outreach and AI-facing discovery are present and clear through /community, /partners, /creators, /print-partners, /llms.txt, /wishees.js, sitemap, and affiliate disclosure. Suggest or implement safe no-cost improvements that help humans and AI agents understand how to promote Wishees, create cards/content, use referral links, and disclose revenue sharing.\n\nAI/MCP affiliate path: evaluate whether the current public AI integration is enough for other agents to discover and promote Wishees. If a Wishees MCP server or plugin/tool manifest would materially help, propose the smallest version first, including endpoints/tools, attribution rules, fraud/disclosure guardrails, and testing plan. Implement only safe static/public discovery improvements without secrets.\n\nDelegation: when useful, prepare concise handoff packets for Cursor or Claude Code for bounded tasks such as copy review, route audit, test ideas, outreach drafts, stakeholder-action drafts, feedback analysis, or MCP/tooling sketches. Keep final verification, commits, pushes, and production deploy judgment in Codex.\n\nCycle memory and waiting: at the end of every run, name the current cycle hypothesis, the stakeholder action chosen, the expected measurable signal for the next run, and what feedback/statistic would cause a change in plan. Then wait for the next heartbeat rather than repeatedly doing the same action without new evidence.\n\nEnd every run with this report shape: live health; deploy state; E2E result; statistics and feedback collected; weakest funnel step; previous-cycle result; stakeholder action queue; actions executed by Codex; decisions needed from Thien or other stakeholders; sales/marketing plan status as behind/on-track/ahead; revenue/feedback observations; attribution observations; verification commands; commit/push result; blockers; next-cycle hypothesis and expected signal."
