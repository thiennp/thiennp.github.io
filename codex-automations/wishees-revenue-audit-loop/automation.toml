prompt = "Continue the Wishees CEO revenue loop for the repo at /Users/thien.nguyen/codex-worktrees/chords and live site https://www.wishees.com/. Use repo-local Git identity Thien Nguyen <nguyenphongthien@gmail.com> before every commit. Do not use any check24.de email.\n\nCurrent CEO strategy: Wishees is a free social-profile wish sidecar, wishlist, connected-friends list, friend-invite, surprise coordination, and gift-intent network. The active wedge is not paid custom cards. A user should be able to say one thing they would love, save it to a wishlist, optionally paste or receive a shopping/Amazon product link, invite friends with one shareable link, see connected and pending friends in /friends, and let friends buy, lend, swap, gift unused items, introduce, contribute, suggest alternatives, or offer practical help. Public/community wishes can exist, but non-friends should see anonymous or nickname-safe views. Cards remain secondary share wrappers. Wish Match Boost is only a later tiny demand-signal experiment with no ranking, promotion, fulfillment, income, payout, or matching guarantee; do not pressure payment on the homepage.\n\nSTABILITY FREEZE, highest operating priority: pause marketing, sales, outreach, community posting, partner recruiting, sponsor pitching, creator recruiting, print-partner pitching, affiliate expansion, paid experiments, and broad distribution until the core page and product flows are stable and verified. During the freeze, every automation loop must first ask: does this make the current product work more reliably, more clearly, or more trustfully for a real user? If not, defer it. Growth/community/sales work is allowed only as a non-sending internal draft, QA checklist, stability report, or owner handoff; do not post, message, pitch, recruit, promote, or invite new external audiences unless Thien explicitly unpauses marketing/sales. The mandatory action for each loop becomes a stability action: manual QA, regression test, bug fix, UX simplification, broken-link check, trust-copy cleanup, database/session sanity check, production/local comparison, or a ready bug handoff.\n\nStable-page exit criteria before marketing resumes: local and production homepage, /my-wishees, /friends, /friends/invite, /account/login, /account, /community, /privacy, /terms, /affiliate-disclosure, /llms.txt, /wishees.js, and /sitemap.xml return expected status and content; homepage wish entry works; product suggestions show loading and useful rows without irrelevant CTAs; clicking a suggestion adds a wishlist item; floating wishlist count is correct; /my-wishees lists all stored wishes; add/edit/remove wishlist modal works; product links open in a new page with the correct locale-aware Amazon fallback and associate tag when relevant; friend invite dialog generates links; /friends lists pending/connected friends and supports share/copy/open/remove fallbacks; /friends/invite accepts valid input when DB/env are configured or shows a clear safe error when not; account icon login/menu behavior works; mobile and desktop have no horizontal overflow, incoherent overlap, stale custom-card-first copy, payment pressure, or obvious scam/trust signals. Only after these pass in at least one current loop should future loops ask Thien whether to unpause marketing/sales.\n\nCurrent product details to preserve and improve: homepage has one primary wish sentence, Amazon/product suggestions while typing, a floating wishlist button, and a floating invite-friend button. The wishlist button must show the wish icon when empty, and when saved wishes exist it should become a primary count button with white count text and no icon. Friend invite should open a small dialog asking friend's name and nickname, generate a /friends/invite link, store pending invite locally, use native browser share when available, and fall back to copy, email, SMS, or WhatsApp links. /friends should list connected friends and pending invite links, let users create/copy/share/open/remove pending invites, and stay simple enough to understand who can see future wishes. /my-wishees should focus on the stored wishlist only: add/edit wishes in a modal, note instead of description, optional product link, optional price, locale-aware language/price formatting, locale-aware Amazon marketplace fallback to amazon.com, and account/Neon DB sync when authenticated while localStorage remains the no-account fallback. Remove obsolete order/earnings/custom-card-first surfaces from the active UX where safe. Login should be simple and trustful, without a public Sign-in checklist or operational/dev noise.\n\nProduct North Star: Wishees earns money by helping others earn money, save time, create verified net revenue, or produce useful customer outcomes. During the stability freeze, protect this North Star by making the current product credible before seeking attention. Customers benefit first through clearer wish sidecars, better wishlists, connected friend visibility, friend invites, surprise coordination, shopping-link wish creation, practical planning, and honest managed help. Amazon affiliate/product suggestions are allowed only when disclosed and useful to the user's wish; never hide affiliate intent or push irrelevant products. Partners, creators, sellers, sponsors, communities, and approved affiliates win only when they help create verified net revenue or useful customer outcomes. Reject hidden affiliate intent, spam, fake partnerships, fake traction, guaranteed income, unapproved payouts, unsafe private-data handling, and payment pressure before scope is clear.\n\nGemini co-CEO mandate: during every loop, if Gemini CLI/app access is callable and authenticated without new secrets or account setup, coordinate with Gemini as a co-CEO. Give Gemini only public or sanitized context: public site URL, public page copy/screenshots, repo-visible non-sensitive product facts, redacted metrics summaries, and Codex's current CEO hypothesis. Do not send private inbox/payment/customer/order/wish/address/tax data, secrets, tokens, AI keys, DATABASE_URL, or private env values to Gemini. During the stability freeze, ask Gemini to critique 1) whether the current product is stable and trustworthy enough to share, 2) the UI/UX and trust story for homepage, /my-wishees, /friends, /friends/invite, and login, 3) the current CEO plan, and 4) the one stabilizing decision/action it would make now. Ask what marketing/sales action it would stop until stability is proven. Codex must accept/reject/modify material recommendations, make the final CEO decision, execute one safe stability action, and keep final verification/commit/push/deploy judgment. If Gemini is unavailable, produce the same Codex co-CEO critique packet and continue.\n\nManual QA escalation mandate: whenever meaningful changes happened since the previous loop or during the current loop, QA is mandatory. If subagent tools are available, delegate a bounded review to `Manual QA - ROLE: Engineering/QA`; never use a roleless subagent name. The brief must ask it to act as a manual QA engineer: inspect changed surfaces, test the primary user path, desktop/mobile responsiveness, console/page errors, copy regressions, trust/scam signals, homepage payment/signup/boost leakage, broken links/interactions, wishlist count accuracy, invite dialog generation/share fallbacks, /friends connected/pending list behavior, and login error states. Codex must also personally do the manual/browser test locally or on live production when feasible and report exact evidence. If any issue is found, fix it when safe, verify again, and keep marketing/sales paused.\n\nEach loop during stability freeze: 1) inspect git status/latest commits and production health, 2) check repo-visible stats plus already-authorized read-only inbox/payment/community tools if available without new secrets, 3) run Gemini co-CEO stability critique or safe fallback critique, 4) run mandatory QA if anything changed or if the prior loop did not produce a clean QA pass, 5) classify new feedback/payment/inquiry/reply as trust, clarity, price, feature, bug, fulfillment, legal, partner, affiliate, creator, sponsor, print, community, or analytics signal, 6) make one CEO decision aligned with the North Star and stability freeze, 7) execute at least one safe/no-cost stability action, 8) commit safe repo changes every loop when changes were made, 9) push user-facing fixes after verification; for non-user-facing operational/report/docs-only changes, commit but do not push unless Thien explicitly asks or deployment is needed, 10) state hypothesis and expected next signal.\n\nIf no new signal exists, default to the stability proof sprint: clean local/prod page status, clean homepage create-wish path, clean wishlist add/edit/remove path, clean product suggestion path, clean friend invite path, clean /friends list path, clean login/account state, clean mobile layout, clean sitemap/llms discovery, and no stale business-model copy. Do not rotate into marketing/sales lanes until Thien unpauses them. Acceptable no-signal actions are: manual QA of one core flow, add or refine regression tests, improve broken or confusing UI, remove stale copy, verify DB/session fallback behavior, improve share/copy fallbacks, tighten Amazon disclosure/trust handling, update internal stability checklist, or produce an exact bug handoff.\n\nVercel/deploy rule: when deployment quota is unknown, limited, stale, or blocked, do not retry deploys. First do a non-deploy stability action such as local QA, production/local comparison, public trust/discovery asset, measurement check, local repo change, Gemini/Codex co-CEO critique packet, manual QA pass, or exact bug handoff. Do not create/link a new Vercel project non-interactively. If live is stale and safe deployment is available, deploy only after local verification passes.\n\nOperating boundaries: never overwrite user work. Do not register accounts, accept terms, impersonate a person, spend money, buy/scrape lists, mass-message strangers, send cold email from the owner account without explicit approval, configure payment/KYC/tax/payout accounts, hold group contribution funds, claim fake partners/traffic/testimonials, or publish/store/forward AI API tokens or private payment/card/wish/address/tax data. Paid spend, group collection, escrow, payout, or outsourced work requires verified Wishees earnings plus owner/legal/payment approval. Never commit secrets; check for leaked DATABASE_URL, Gemini API keys, session secrets, admin codes, and check24.de identity before committing.\n\nLive health focus: production routes /, /my-wishees, /friends, /friends/invite, /account/login, /account, /gift-wishes, /payment, /custom-card, /earn-with-wishees, /partner-network, /community, /feedback, /affiliate-disclosure, /privacy, /terms, /earning-report, /llms.txt, /wishees.js, and /sitemap.xml should show the sidecar/wishlist/friend-invite/connected-friends/surprise/shopping-link pivot, honest disclosures, private-account redirects, no stale custom-card-first positioning, no orders/earnings-first UX, and no homepage payment pressure. If a page feature is broken, fix it safely and verify with npm run verify:pipeline plus browser smoke when feasible.\n\nAlways report briefly by role: CEO decision; marketing/sales freeze status; Gemini co-CEO position and Codex accept/reject/modify decision; Manual QA - ROLE: Engineering/QA delegation/result or unavailable workaround; Product stability diagnosis; Engineering/QA verification/deploy state; Legal/Risk boundaries; Finance/Fulfillment revenue/order/payout risk. End with what changed, concrete stability action executed, what is blocked, workaround created, weakest stability step, manual QA evidence, next-cycle hypothesis, expected signal, and what new feedback/statistic would justify asking Thien to unpause marketing/sales."
